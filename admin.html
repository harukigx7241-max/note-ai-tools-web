<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>note AI Tools — 管理者パネル</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #0a0a0f;
    color: #e2e2e2;
    min-height: 100vh;
  }
  #root { min-height: 100vh; }

  /* LOGIN */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a0a0f 0%, #12091e 60%, #080f1e 100%);
    position: relative;
    overflow: hidden;
  }
  .login-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 500px 400px at 30% 50%, rgba(233,69,96,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 400px 400px at 80% 30%, rgba(99,102,241,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .login-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .login-box {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 48px;
    width: 420px;
    max-width: calc(100vw - 32px);
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #e94560, #c2185b);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin: 0 auto 16px;
  }
  .login-logo h1 {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 4px;
  }
  .login-logo p {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .login-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .login-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 13px 16px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
    font-family: monospace;
    letter-spacing: 0.05em;
  }
  .login-input:focus { border-color: rgba(233,69,96,0.5); }
  .login-btn {
    width: 100%;
    background: linear-gradient(135deg, #e94560, #c2185b);
    border: none;
    border-radius: 10px;
    padding: 14px;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 0.04em;
    transition: opacity 0.15s;
    font-family: inherit;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-error {
    margin-top: 12px;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 8px;
    padding: 10px 14px;
    color: #f87171;
    font-size: 13px;
    text-align: center;
  }

  /* ADMIN LAYOUT */
  .admin-layout {
    display: flex;
    min-height: 100vh;
  }
  .sidebar {
    width: 240px;
    background: #0d0d15;
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    z-index: 50;
  }
  .sidebar-brand {
    padding: 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .sidebar-brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(233,69,96,0.15);
    border: 1px solid rgba(233,69,96,0.3);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 800;
    color: #e94560;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .sidebar-brand h2 {
    font-size: 16px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 2px;
  }
  .sidebar-brand p {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
  }
  .sidebar-nav {
    flex: 1;
    padding: 16px 12px;
    overflow-y: auto;
  }
  .nav-section-label {
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0 8px;
    margin: 16px 0 6px;
  }
  .nav-section-label:first-child { margin-top: 0; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    transition: all 0.15s;
    border: 1px solid transparent;
    width: 100%;
    background: transparent;
    text-align: left;
    font-family: inherit;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.8); }
  .nav-item.active { background: rgba(233,69,96,0.12); border-color: rgba(233,69,96,0.25); color: #fff; font-weight: 700; }
  .nav-item .nav-icon { font-size: 16px; width: 22px; text-align: center; }
  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .logout-btn {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 9px;
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }

  /* MAIN */
  .admin-main {
    flex: 1;
    margin-left: 240px;
    display: flex;
    flex-direction: column;
  }
  .admin-topbar {
    background: rgba(13,13,21,0.8);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 40;
    backdrop-filter: blur(10px);
  }
  .admin-topbar h1 { font-size: 18px; font-weight: 800; color: #fff; }
  .admin-topbar p { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .admin-content {
    flex: 1;
    padding: 32px;
    max-width: 1100px;
    width: 100%;
  }

  /* CARDS */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.red::before { background: #e94560; }
  .stat-card.indigo::before { background: #6366f1; }
  .stat-card.pink::before { background: #ec4899; }
  .stat-card.amber::before { background: #fbbf24; }
  .stat-card.green::before { background: #22c55e; }
  .stat-card.blue::before { background: #3b82f6; }
  .stat-label {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .stat-value {
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
  }

  .section-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .section-card-header {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-card-header h3 { font-size: 16px; font-weight: 700; color: #fff; }
  .section-card-body { padding: 24px; }

  /* TABLE */
  .admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .admin-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 0 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .admin-table td {
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.65);
    vertical-align: top;
  }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table td.mono { font-family: monospace; font-size: 12px; color: #e07b39; }

  /* BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge.green { background: rgba(34,197,94,0.15); color: #4ade80; }
  .badge.red    { background: rgba(239,68,68,0.15); color: #f87171; }
  .badge.amber  { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .badge.blue   { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge.purple { background: rgba(168,85,247,0.15); color: #c084fc; }

  /* ACTION BUTTONS */
  .action-btn {
    padding: 7px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    border: 1px solid transparent;
  }
  .action-btn.danger {
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.25);
    color: #f87171;
  }
  .action-btn.danger:hover { background: rgba(239,68,68,0.2); }
  .action-btn.primary {
    background: rgba(233,69,96,0.15);
    border-color: rgba(233,69,96,0.3);
    color: #e94560;
  }
  .action-btn.primary:hover { background: rgba(233,69,96,0.25); }
  .action-btn.secondary {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
  }
  .action-btn.secondary:hover { background: rgba(255,255,255,0.08); color: #fff; }

  /* FORM */
  .admin-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 9px 14px;
    color: #fff;
    font-size: 13px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
    width: 100%;
  }
  .admin-input:focus { border-color: rgba(233,69,96,0.4); }
  .admin-label {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.06em;
    display: block;
    margin-bottom: 8px;
  }

  /* DIFF VIEWER */
  .diff-added { background: rgba(34,197,94,0.1); color: #4ade80; }
  .diff-removed { background: rgba(239,68,68,0.1); color: #f87171; text-decoration: line-through; }

  /* CONFIRM DIALOG */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .confirm-box {
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 32px;
    width: 420px;
    max-width: 100%;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
    .sidebar.open { transform: translateX(0); }
    .admin-main { margin-left: 0; }
    .admin-content { padding: 20px 16px; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ============================================================
// CONSTANTS
// ============================================================
var ADMIN_KEY = "admin_session_v1";
var ADMIN_PASSWORD = "admin1234";
var MULTI_AI_KEY = "multiAiKeys_v1";
var STORAGE_PREFIX = "notetools_shared_";

var AI_CONFIGS = [
  { id: "claude",  label: "Claude",  icon: "🟠", color: "#e07b39" },
  { id: "gemini",  label: "Gemini",  icon: "🔵", color: "#4285f4" },
  { id: "chatgpt", label: "ChatGPT", icon: "🟢", color: "#10a37f" },
  { id: "grok",    label: "Grok",    icon: "⚫", color: "#9ca3af" },
];
var TOOLS = [
  { id: "note-generator", label: "📝 note記事生成",  file: "note-generator-v3.jsx",   lines: 794, color: "#e07b39" },
  { id: "bonus-generator",label: "🎁 特典生成",      file: "bonus-generator.jsx",      lines: 419, color: "#6366f1" },
  { id: "image-prompt",   label: "🎨 画像プロンプト",file: "image-prompt-generator.jsx",lines: 364, color: "#ec4899" },
  { id: "dashboard",      label: "📊 ダッシュボード", file: "note-dashboard.jsx",        lines: 438, color: "#22c55e" },
];

// ============================================================
// STORAGE HELPERS
// ============================================================
function dashGet(key) {
  try { var v = localStorage.getItem(STORAGE_PREFIX + key); if (v === null) return null; return JSON.parse(v); }
  catch(e) { return null; }
}
function dashSet(key, val) {
  try { localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(val)); return true; }
  catch(e) { return false; }
}
function dashDel(key) {
  try { localStorage.removeItem(STORAGE_PREFIX + key); return true; }
  catch(e) { return false; }
}
function dashList(prefix) {
  var keys = [];
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.indexOf(STORAGE_PREFIX) === 0) {
      var stripped = k.slice(STORAGE_PREFIX.length);
      if (!prefix || stripped.indexOf(prefix) === 0) keys.push(stripped);
    }
  }
  return keys;
}
function loadApiKeys() {
  try { return JSON.parse(localStorage.getItem(MULTI_AI_KEY) || "{}"); } catch(e) { return {}; }
}
function saveApiKey(aiId, key) {
  var k = loadApiKeys(); k[aiId] = key;
  localStorage.setItem(MULTI_AI_KEY, JSON.stringify(k));
}
function deleteApiKey(aiId) {
  var k = loadApiKeys(); delete k[aiId];
  localStorage.setItem(MULTI_AI_KEY, JSON.stringify(k));
}

// ============================================================
// SESSION CHECK
// ============================================================
function checkSession() {
  try {
    var s = localStorage.getItem(ADMIN_KEY);
    if (!s) return false;
    var parsed = JSON.parse(s);
    return parsed.authed === true && (Date.now() - parsed.ts < 1000 * 60 * 60 * 8); // 8時間
  } catch(e) { return false; }
}
function saveSession() {
  localStorage.setItem(ADMIN_KEY, JSON.stringify({ authed: true, ts: Date.now() }));
}
function clearSession() {
  localStorage.removeItem(ADMIN_KEY);
}

// ============================================================
// LOGIN
// ============================================================
function LoginPage(props) {
  var onLogin = props.onLogin;
  var ps = useState(""); var pw = ps[0]; var setPw = ps[1];
  var es = useState(""); var error = es[0]; var setError = es[1];
  var ls = useState(false); var loading = ls[0]; var setLoading = ls[1];
  var ss = useState(false); var showPw = ss[0]; var setShowPw = ss[1];

  function handleSubmit() {
    if (!pw) { setError("パスワードを入力してください"); return; }
    setLoading(true);
    setTimeout(function() {
      if (pw === ADMIN_PASSWORD) {
        saveSession();
        onLogin();
      } else {
        setError("パスワードが正しくありません");
        setLoading(false);
      }
    }, 600);
  }

  function handleKeyDown(e) { if (e.key === "Enter") handleSubmit(); }

  return (
    <div className="login-wrap">
      <div className="login-grid"></div>
      <div className="login-box">
        <div className="login-logo">
          <div className="login-logo-icon">👑</div>
          <h1>note AI Tools</h1>
          <p>Admin Panel</p>
        </div>
        <label className="login-label">管理者パスワード</label>
        <div style={{ position: "relative" }}>
          <input
            className="login-input"
            type={showPw ? "text" : "password"}
            value={pw}
            onChange={function(e) { setPw(e.target.value); setError(""); }}
            onKeyDown={handleKeyDown}
            placeholder="パスワードを入力"
            autoFocus
          />
          <button onClick={function() { setShowPw(function(v) { return !v; }); }}
            style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 16, color: "rgba(255,255,255,0.4)" }}>
            {showPw ? "🙈" : "👁"}
          </button>
        </div>
        <button className="login-btn" onClick={handleSubmit} disabled={loading}>
          {loading ? <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}><span style={{ display: "inline-block", width: 14, height: 14, border: "2px solid rgba(255,255,255,0.4)", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />認証中...</span> : "🔐 管理者としてログイン"}
        </button>
        {error && <div className="login-error">{error}</div>}
        <p style={{ textAlign: "center", marginTop: 20, fontSize: 11, color: "rgba(255,255,255,0.2)" }}>
          セッションは8時間有効です
        </p>
      </div>
    </div>
  );
}

// ============================================================
// CONFIRM DIALOG
// ============================================================
function ConfirmDialog(props) {
  var title = props.title; var message = props.message;
  var onConfirm = props.onConfirm; var onCancel = props.onCancel;
  var danger = props.danger || false;
  return (
    <div className="confirm-overlay">
      <div className="confirm-box">
        <h3 style={{ fontSize: 18, fontWeight: 800, color: "#fff", marginBottom: 12 }}>{title}</h3>
        <p style={{ fontSize: 14, color: "rgba(255,255,255,0.6)", lineHeight: 1.7, marginBottom: 28 }}>{message}</p>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button className="action-btn secondary" onClick={onCancel}>キャンセル</button>
          <button className={"action-btn " + (danger ? "danger" : "primary")} onClick={onConfirm}>確認</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PAGES
// ============================================================

// ---- OVERVIEW ----
function OverviewPage() {
  var usage = dashGet("dashboard:usage") || [];
  var toolCounts = {};
  TOOLS.forEach(function(t) { toolCounts[t.id] = 0; });
  usage.forEach(function(u) { if (toolCounts[u.toolId] !== undefined) toolCounts[u.toolId]++; });
  var apiKeys = loadApiKeys();
  var totalKeys = AI_CONFIGS.filter(function(a) { return !!apiKeys[a.id]; }).length;
  var allKeys = dashList("");
  var storageUsed = allKeys.length;

  // 最近7日の利用
  var now = Date.now();
  var recent7 = usage.filter(function(u) { return now - new Date(u.timestamp).getTime() < 7 * 24 * 60 * 60 * 1000; });

  return (
    <div>
      <div className="stat-grid">
        <div className="stat-card red">
          <div className="stat-label">総利用回数</div>
          <div className="stat-value">{usage.length}</div>
          <div className="stat-sub">全ツール合計</div>
        </div>
        <div className="stat-card blue">
          <div className="stat-label">直近7日</div>
          <div className="stat-value">{recent7.length}</div>
          <div className="stat-sub">過去7日間の利用</div>
        </div>
        <div className="stat-card amber">
          <div className="stat-label">APIキー登録数</div>
          <div className="stat-value">{totalKeys}<span style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginLeft: 4 }}>/4</span></div>
          <div className="stat-sub">設定済みAI</div>
        </div>
        <div className="stat-card green">
          <div className="stat-label">Storageエントリ</div>
          <div className="stat-value">{storageUsed}</div>
          <div className="stat-sub">localStorage保存数</div>
        </div>
      </div>

      {/* ツール別統計 */}
      <div className="section-card">

                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

      {confirm && <ConfirmDialog title={confirm.title} message={confirm.message} danger={confirm.danger} onConfirm={confirm.onConfirm} onCancel={function() { setConfirm(null); }} />}
      {/* 認証設定 */}
      <div className="section-card" style={{ marginBottom: 24 }}>
        <div className="section-card-header"><h3>認証設定</h3></div>
        <div className="section-card-body">
          <table className="admin-table">
            <thead><tr><th>設定</th><th>値</th><th>説明</th></tr></thead>
            <tbody>
              <tr>
                <td style={{ color: "#fff" }}>管理者パスワード</td>
                <td className="mono" style={{ fontFamily: "monospace", fontSize: 12, color: "#e07b39" }}>admin1234</td>
                <td style={{ color: "rgba(255,255,255,0.4)", fontSize: 12 }}>ソースコード内で変更可能（ADMIN_PASSWORD定数）</td>
              </tr>
              <tr>
                <td style={{ color: "#fff" }}>セッション有効期間</td>
                <td className="mono" style={{ fontFamily: "monospace", fontSize: 12, color: "#e07b39" }}>8時間</td>
                <td style={{ color: "rgba(255,255,255,0.4)", fontSize: 12 }}>ログイン後8時間でセッションが失効</td>
              </tr>
              <tr>
                <td style={{ color: "#fff" }}>StorageキーPrefix</td>
                <td className="mono" style={{ fontFamily: "monospace", fontSize: 12, color: "#e07b39" }}>notetools_shared_</td>
                <td style={{ color: "rgba(255,255,255,0.4)", fontSize: 12 }}>全ツールで共通使用</td>
              </tr>
              <tr>
                <td style={{ color: "#fff" }}>APIキーStorage名</td>
                <td className="mono" style={{ fontFamily: "monospace", fontSize: 12, color: "#e07b39" }}>multiAiKeys_v1</td>
                <td style={{ color: "rgba(255,255,255,0.4)", fontSize: 12 }}>全4AIのキーをJSONで保存</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {/* Babel互換ルール */}
      <div className="section-card" style={{ marginBottom: 24 }}>
        <div className="section-card-header"><h3>Babel互換ルール（開発メモ）</h3></div>
        <div className="section-card-body">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            {[
              { type: "danger", icon: "❌", rule: "?? 演算子禁止", fix: "|| または三項演算子を使用" },
              { type: "danger", icon: "❌", rule: "JSX内IIFE禁止", fix: "別コンポーネントに分離" },
              { type: "danger", icon: "❌", rule: "map()内setStateclosure禁止", fix: "独立コンポーネント化" },
              { type: "danger", icon: "❌", rule: "予約語キー非クォート禁止", fix: "[\"delete\"]: クォート必須" },
              { type: "danger", icon: "❌", rule: "dynamic import禁止", fix: "static importのみ" },
              { type: "danger", icon: "❌", rule: "catch{} bindingless禁止", fix: "catch(e){} に統一" },
            ].map(function(r, i) {
              return (
                <div key={i} style={{ background: "rgba(239,68,68,0.06)", border: "1px solid rgba(239,68,68,0.15)", borderRadius: 10, padding: "12px 16px" }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: "#f87171", marginBottom: 4 }}>{r.icon} {r.rule}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>→ {r.fix}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* 危険ゾーン */}
      <div className="section-card" style={{ border: "1px solid rgba(239,68,68,0.2)" }}>
        <div className="section-card-header">
          <h3 style={{ color: "#f87171" }}>⚠️ 危険ゾーン</h3>
        </div>
        <div className="section-card-body">
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <div style={{ flex: 1, minWidth: 260 }}>
              <div style={{ fontWeight: 700, color: "#fff", marginBottom: 6 }}>ログアウト</div>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", marginBottom: 12 }}>管理者セッションを終了します</div>
              <button className="action-btn secondary" onClick={handleLogout}>🚪 ログアウト</button>
            </div>
            <div style={{ flex: 1, minWidth: 260 }}>
              <div style={{ fontWeight: 700, color: "#f87171", marginBottom: 6 }}>全データ初期化</div>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", marginBottom: 12 }}>APIキーを含む全localStorageデータを削除します</div>
              <button className="action-btn danger" onClick={handleResetAll}>🗑 全データを削除してリセット</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MAIN ADMIN APP
// ============================================================
function AdminApp() {
  var auth = useState(checkSession()); var isAuthed = auth[0]; var setIsAuthed = auth[1];
  var pg = useState("overview"); var page = pg[0]; var setPage = pg[1];

  if (!isAuthed) {
    return <LoginPage onLogin={function() { setIsAuthed(true); }} />;
  }

  var NAV = [
    { section: "概要" },
    { id: "overview",  label: "概要",        icon: "📊" },
    { section: "管理" },
    { id: "usage",     label: "利用履歴",     icon: "📈" },
    { id: "apikeys",   label: "APIキー管理",  icon: "🔑" },
    { id: "storage",   label: "Storage管理",  icon: "💾" },
    { id: "files",     label: "ファイル・バグ",icon: "📁" },
    { section: "システム" },
    { id: "settings",  label: "設定",         icon: "⚙️" },
  ];

  var pageTitles = {
    overview: { title: "概要", sub: "ツール利用状況とシステム状態" },
    usage:    { title: "利用履歴", sub: "ツール利用ログの確認・管理" },
    apikeys:  { title: "APIキー管理", sub: "各AI APIキーの登録・更新・削除" },
    storage:  { title: "Storage管理", sub: "localStorageデータの確認・削除" },
    files:    { title: "ファイル・バグ診断", sub: "ソースファイルとバグ修正レポート" },
    settings: { title: "設定", sub: "認証・開発設定・データリセット" },
  };
  var current = pageTitles[page] || { title: page, sub: "" };

  return (
    <div className="admin-layout">
      {/* SIDEBAR */}
      <nav className="sidebar">
        <div className="sidebar-brand">
          <div className="sidebar-brand-badge">👑 Admin</div>
          <h2>note AI Tools</h2>
          <p>管理者パネル</p>
        </div>
        <div className="sidebar-nav">
          {NAV.map(function(item, idx) {
            if (item.section) {
              return <div key={idx} className="nav-section-label">{item.section}</div>;
            }
            var capturedId = item.id;
            return (
              <button key={item.id} className={"nav-item" + (page === item.id ? " active" : "")} onClick={function() { setPage(capturedId); }}>
                <span className="nav-icon">{item.icon}</span>
                {item.label}
              </button>
            );
          })}
        </div>
        <div className="sidebar-footer">
          <button className="logout-btn" onClick={function() { clearSession(); setIsAuthed(false); }}>🚪 ログアウト</button>
        </div>
      </nav>

      {/* MAIN */}
      <div className="admin-main">
        <div className="admin-topbar">
          <div>
            <h1>{current.title}</h1>
            <p>{current.sub}</p>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 12, color: "rgba(255,255,255,0.35)" }}>
              {new Date().toLocaleDateString("ja-JP", { month: "long", day: "numeric", weekday: "short" })}
            </span>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#22c55e" }} title="認証済み"></div>
          </div>
        </div>
        <div className="admin-content">
          {page === "overview" && <OverviewPage />}
          {page === "usage"    && <UsagePage />}
          {page === "apikeys"  && <ApiKeysPage />}
          {page === "storage"  && <StoragePage />}
          {page === "files"    && <FilesPage />}
          {page === "settings" && <SettingsPage onLogout={function() { setIsAuthed(false); }} />}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AdminApp />);
</script>
</body>
