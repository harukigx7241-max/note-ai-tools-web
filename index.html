<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>note AI Tools</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #fafaf8;
    color: #1a1a1a;
    line-height: 1.6;
  }
  #root { min-height: 100vh; }

  /* LANDING */
  .landing {
    min-height: 100vh;
    background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 50%, #0a1628 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .landing::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 500px at 30% 40%, rgba(224,123,57,0.1) 0%, transparent 70%),
      radial-gradient(ellipse 500px 500px at 80% 20%, rgba(99,102,241,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .landing-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  .landing-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid rgba(224,123,57,0.4);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 11px;
    color: #e07b39;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }
  .landing-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #e07b39;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spin { to { transform: rotate(360deg); } }
  .landing-title {
    font-size: clamp(48px, 9vw, 96px);
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .landing-title span { color: #e07b39; }
  .landing-sub {
    font-size: 17px;
    color: rgba(255,255,255,0.5);
    max-width: 500px;
    margin: 0 auto 40px;
    font-weight: 300;
    position: relative;
    z-index: 1;
    line-height: 1.7;
  }
  .ai-badges {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }
  .ai-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    background: rgba(255,255,255,0.04);
  }
  .ai-dot { width: 8px; height: 8px; border-radius: 50%; }
  .tool-cards-landing {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    max-width: 900px;
    width: 100%;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }
  .tool-card-landing {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .tool-card-landing:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(224,123,57,0.4);
    transform: translateY(-2px);
  }
  .tool-card-icon { font-size: 28px; margin-bottom: 10px; }
  .tool-card-name { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .tool-card-desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; }

  /* SHARED APP STYLES */
  .app-wrap { min-height: 100vh; background: #fafaf8; }
  .app-header {
    background: #fff;
    border-bottom: 1px solid #eee;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(0,0,0,0.05);
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    color: #555;
    transition: background 0.15s;
  }
  .back-btn:hover { background: rgba(0,0,0,0.09); }
  .app-title { font-size: 20px; font-weight: 800; margin: 0; }
  .app-sub { font-size: 12px; color: #888; margin: 3px 0 0; }
  .key-btn {
    padding: 8px 16px;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.15s;
  }
  .key-btn:hover { background: #ebebeb; }
  .app-body { max-width: 860px; margin: 0 auto; padding: 24px 16px; }

  /* NOTE GENERATOR SPECIFIC */
  .dark-app { background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 50%, #0a1628 100%); min-height: 100vh; }
  .dark-header {
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .dark-tabs {
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    padding: 0 20px;
    overflow-x: auto;
    position: sticky;
    top: 65px;
    z-index: 99;
    backdrop-filter: blur(10px);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-box {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    width: 500px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-box-dark {
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.12);
  }

  input[type="range"] { cursor: pointer; }
  textarea { font-family: inherit; }
  select { font-family: inherit; cursor: pointer; }

  @media (max-width: 600px) {
    .tool-cards-landing { grid-template-columns: 1fr 1fr; }
    .app-body { padding: 16px 12px; }
    .landing-title { font-size: 52px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ============================================================
// SHARED: AI CONFIGS & API KEY UTILS
// ============================================================
var AI_CONFIGS = [
  { id: "claude",  label: "Claude",  icon: "🟠", color: "#e07b39", badge: "AUTO" },
  { id: "gemini",  label: "Gemini",  icon: "🔵", color: "#4285f4", badge: "API"  },
  { id: "chatgpt", label: "ChatGPT", icon: "🟢", color: "#10a37f", badge: "API"  },
  { id: "grok",    label: "Grok",    icon: "⚫", color: "#9ca3af", badge: "API"  },
];
var MULTI_AI_KEY = "multiAiKeys_v1";

function loadApiKeys() {
  try { return JSON.parse(localStorage.getItem(MULTI_AI_KEY) || "{}"); }
  catch(e) { return {}; }
}
function saveApiKey(aiId, key) {
  var k = loadApiKeys(); k[aiId] = key;
  localStorage.setItem(MULTI_AI_KEY, JSON.stringify(k));
}
function getApiKey(aiId) { return loadApiKeys()[aiId] || ""; }

async function callAI(opts) {
  var aiId = opts.aiId; var messages = opts.messages;
  var systemPrompt = opts.systemPrompt || ""; var maxTokens = opts.maxTokens || 4000;
  var key = getApiKey(aiId);
  if (!key) throw new Error(aiId + "のAPIキーが設定されていません");
  if (aiId === "claude") {
    var r1 = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: maxTokens, system: systemPrompt, messages: messages })
    });
    if (!r1.ok) throw new Error("Claude API error: " + r1.status);
    var d1 = await r1.json(); return d1.content.map(function(b) { return b.text || ""; }).join("");
  }
  if (aiId === "gemini") {
    var gContents = messages.map(function(m) { return { role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.content }] }; });
    var gBody = { contents: gContents, generationConfig: { maxOutputTokens: maxTokens } };
    if (systemPrompt) gBody.systemInstruction = { parts: [{ text: systemPrompt }] };
    var r2 = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + key, {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(gBody)
    });
    if (!r2.ok) throw new Error("Gemini API error: " + r2.status);
    var d2 = await r2.json();
    return (d2.candidates && d2.candidates[0] && d2.candidates[0].content && d2.candidates[0].content.parts)
      ? d2.candidates[0].content.parts.map(function(p) { return p.text || ""; }).join("") : "";
  }
  if (aiId === "chatgpt") {
    var cMsgs = systemPrompt ? [{ role: "system", content: systemPrompt }].concat(messages) : messages;
    var r3 = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
      body: JSON.stringify({ model: "gpt-4o", max_tokens: maxTokens, messages: cMsgs })
    });
    if (!r3.ok) throw new Error("ChatGPT API error: " + r3.status);
    var d3 = await r3.json();
    return (d3.choices && d3.choices[0] && d3.choices[0].message) ? d3.choices[0].message.content : "";
  }
  if (aiId === "grok") {
    var xMsgs = systemPrompt ? [{ role: "system", content: systemPrompt }].concat(messages) : messages;
    var r4 = await fetch("https://api.x.ai/v1/chat/completions", {
      method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
      body: JSON.stringify({ model: "grok-3", max_tokens: maxTokens, messages: xMsgs })
    });
    if (!r4.ok) throw new Error("Grok API error: " + r4.status);
    var d4 = await r4.json();
    return (d4.choices && d4.choices[0] && d4.choices[0].message) ? d4.choices[0].message.content : "";
  }
  throw new Error("未対応のAI");
}

async function callClaudeSearch(opts) {
  var messages = opts.messages; var systemPrompt = opts.systemPrompt || ""; var maxTokens = opts.maxTokens || 2000;
  var key = getApiKey("claude");
  if (!key) throw new Error("ClaudeのAPIキーが設定されていません");
  var r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: maxTokens, system: systemPrompt, messages: messages, tools: [{ type: "web_search_20250305", name: "web_search" }] })
  });
  if (!r.ok) throw new Error("Claude Search error: " + r.status);
  var d = await r.json(); return d.content.map(function(b) { return b.text || ""; }).join("");
}

// ============================================================
// SHARED: API KEY MODAL
// ============================================================
function ApiKeyModal(props) {
  var onClose = props.onClose; var isDark = props.isDark || false;
  var ks = useState(loadApiKeys()); var keys = ks[0]; var setKeys = ks[1];
  var ss = useState({}); var show = ss[0]; var setShow = ss[1];
  var vs = useState({}); var saved = vs[0]; var setSaved = vs[1];
  function doSave(id) {
    saveApiKey(id, keys[id] || "");
    setSaved(function(s) { var n = Object.assign({}, s); n[id] = true; return n; });
    setTimeout(function() { setSaved(function(s) { var n = Object.assign({}, s); n[id] = false; return n; }); }, 2000);
  }
  var bg = isDark ? { background: "#1a1a2e", border: "1px solid rgba(255,255,255,0.12)" } : { background: "#fff" };
  var textCol = isDark ? "#fff" : "#1a1a1a";
  var inputStyle = isDark
    ? { flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 8, padding: "10px 14px", color: "#fff", fontSize: 13, outline: "none" }
    : { flex: 1, padding: "8px 12px", border: "1px solid #ddd", borderRadius: 8, fontSize: 14, outline: "none" };
  return (
    <div className="modal-overlay">
      <div className="modal-box" style={Object.assign({}, bg)}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <div style={{ color: textCol, fontWeight: 800, fontSize: 18 }}>🔑 APIキー設定</div>
          <button onClick={onClose} style={{ background: "rgba(0,0,0,0.06)", border: "none", borderRadius: 8, width: 36, height: 36, fontSize: 20, cursor: "pointer", color: textCol }}>×</button>
        </div>
        {AI_CONFIGS.map(function(ai) {
          var aid = ai.id;
          return (
            <div key={aid} style={{ marginBottom: 16 }}>
              <div style={{ color: isDark ? "rgba(255,255,255,0.65)" : "#444", fontSize: 12, fontWeight: 700, marginBottom: 8 }}>{ai.icon} {ai.label}</div>
              <div style={{ display: "flex", gap: 8 }}>
                <input type={show[aid] ? "text" : "password"} value={keys[aid] || ""}
                  onChange={function(e) { var v = e.target.value; setKeys(function(k) { var n = Object.assign({}, k); n[aid] = v; return n; }); }}
                  placeholder={ai.label + " APIキーを入力"}
                  style={inputStyle} />
                <button onClick={function() { setShow(function(s) { var n = Object.assign({}, s); n[aid] = !s[aid]; return n; }); }}
                  style={{ padding: "0 12px", background: isDark ? "rgba(255,255,255,0.07)" : "#f5f5f5", border: isDark ? "1px solid rgba(255,255,255,0.12)" : "1px solid #ddd", borderRadius: 8, cursor: "pointer", fontSize: 16 }}>
                  {show[aid] ? "🙈" : "👁"}
                </button>
                <button onClick={function() { doSave(aid); }}
                  style={{ padding: "0 16px", background: saved[aid] ? "rgba(74,222,128,0.2)" : isDark ? "rgba(255,255,255,0.1)" : "#333", border: saved[aid] ? "1px solid #4ade80" : isDark ? "1px solid rgba(255,255,255,0.15)" : "none", borderRadius: 8, color: saved[aid] ? "#4ade80" : "#fff", cursor: "pointer", fontWeight: 700, fontSize: 13 }}>
                  {saved[aid] ? "✅" : "保存"}
                </button>
              </div>
            </div>
          );
        })}
        <p style={{ fontSize: 12, color: "#888", marginTop: 16 }}>※ APIキーはブラウザのlocalStorageに保存されます</p>
      </div>
    </div>
  );
}

// ============================================================
// TOOL 1: NOTE GENERATOR
// ============================================================
var THEMES_GEN = [
  { id: "money",        label: "💰 お金・副業" },
  { id: "health",       label: "💪 健康・ダイエット" },
  { id: "career",       label: "🚀 キャリア・転職" },
  { id: "mindset",      label: "🧠 マインドセット" },
  { id: "relationship", label: "❤️ 人間関係・恋愛" },
  { id: "productivity", label: "⚡ 生産性・習慣" },
  { id: "parenting",    label: "👶 育児・子育て" },
  { id: "other",        label: "📝 その他" },
];
var TONES = [
  { id: "story",    label: "📖 体験談ストーリー型" },
  { id: "how_to",   label: "📋 ハウツー解説型" },
  { id: "secret",   label: "🔐 暴露・秘密公開型" },
  { id: "contrast", label: "⚡ 比較・対比型" },
  { id: "warm",     label: "💛 共感・寄り添い型" },
];
var AGE_OPTIONS = [
  { id: "10s", label: "10代" }, { id: "20s", label: "20代" },
  { id: "30s", label: "30代" }, { id: "40s", label: "40代" },
  { id: "50s", label: "50代以上" }, { id: "all", label: "年齢不問" },
];
var TOPIC_EXAMPLES = {
  money: ["月5万円を3ヶ月で達成した副業術","サラリーマンが年収+100万にした方法","初心者が失敗しないせどりの始め方","SNSだけで月10万稼いだコンテンツ販売"],
  health: ["1日1時間で-8kg達成したダイエット法","リバウンドなしで痩せ続ける食事術","40代から始めて体脂肪率15%を実現した筋トレ"],
  career: ["未経験から年収100万UPした転職戦略","面接通過率90%を叩き出した自己PR術","30代でフリーランス転向して収入2倍の実録"],
  mindset: ["自己肯定感が低かった私が人生を変えた思考法","1年で別人になれた毎日5分のマインドセット術"],
  relationship: ["人間関係が劇的に変わった会話の習慣","恋愛で失敗し続けた私が結婚できた理由"],
  productivity: ["1日3時間で仕事を終わらせるタスク管理術","先延ばし癖を完全に直した5つの習慣"],
  parenting: ["夜泣きをゼロにした3ヶ月の取り組み全記録","イヤイヤ期を乗り越えた40の声がけ法"],
  other: ["私が3年間で学んだ人生で大切なこと","失敗から学んだ後悔しない選択の仕方"],
};

function getAgeCtx(id) {
  var map = { "10s":"進路・受験・バイト・将来不安","20s":"就職・恋愛・一人暮らし・キャリア","30s":"子育て・住宅ローン・昇進・時間不足","40s":"更年期・介護・教育費・老後準備","50s":"定年・老後資金・健康・人生の意味","all":"幅広い読者層" };
  return map[id] || "";
}
function getThemeLabel(id) {
  var t = THEMES_GEN.find(function(x) { return x.id === id; });
  return t ? t.label.replace(/[💰💪🚀🧠❤️⚡👶📝]/gu, "").trim() : id;
}
function getToneLabel(id) {
  var t = TONES.find(function(x) { return x.id === id; });
  return t ? t.label.replace(/[📖📋🔐⚡💛]/gu, "").trim() : id;
}
function getAgeLabel(id) {
  var a = AGE_OPTIONS.find(function(x) { return x.id === id; });
  return a ? a.label : id;
}

function buildPrompt(opts) {
  var topic = opts.topic; var themeId = opts.theme; var toneId = opts.tone; var price = opts.price;
  var freeWC = opts.freeWC; var paidWC = opts.paidWC; var searchSummary = opts.searchSummary;
  var targetAge = opts.targetAge; var sit = opts.targetSituation; var worry = opts.targetWorry;
  var tLabel = getThemeLabel(themeId); var toneLabel = getToneLabel(toneId); var ageLabel = getAgeLabel(targetAge);
  var s1 = Math.round(freeWC * 0.30), s2 = Math.round(freeWC * 0.40), s3 = Math.round(freeWC * 0.30);
  var s4 = Math.round(paidWC * 0.50), s5 = Math.round(paidWC * 0.20), s6 = Math.round(paidWC * 0.18), s7 = Math.round(paidWC * 0.12);
  var ref = searchSummary ? "\n## 参考情報（必ず自分の言葉で書き直すこと）\n" + searchSummary + "\n" : "";
  return "あなたは有料noteのプロライターです。以下の設定で記事を最初から最後まで完全に書いてください。\n\n" +
    "## ターゲット読者\n- 年齢：" + ageLabel + "\n- 状況：" + (sit || "特に指定なし") + "\n- 悩み：" + (worry || "特に指定なし") + "\n- ライフステージ：" + getAgeCtx(targetAge) + "\n" + ref +
    "\n## 基本設定\n- ジャンル：" + tLabel + "\n- テーマ：" + (topic || "ジャンルで最も売れるテーマを自由に考案") + "\n- 文体：" + toneLabel + "\n- 価格：¥" + price.toLocaleString() + "\n- 無料エリア：約" + freeWC + "字\n- 有料エリア：約" + paidWC + "字\n\n" +
    "## 文章ルール\n1. です・ます調で統一 2. 1文50字以内 3. 2〜3文ごとに改行 4. 専門用語不使用 5. 各段落に具体例\n\n" +
    "## 出力ルール（厳守）\n- 前置き・説明・補足は一切不要\n- 記事本文だけを最初から最後まで出力\n- コードブロック禁止\n- 最初の文字は # （タイトル行）\n\n" +

async function generateArticle(aiId, prompt, onRetry) {
  var sys = "有料noteのプロライター。前置き不要。記事本文のみ出力。コードブロック禁止。最初の文字は # 。です・ます調。1文50字以内。冒頭に体験談。失敗談1〜2箇所。読者への問いかけ。励ましのメッセージ。";
  for (var attempt = 1; attempt <= 3; attempt++) {
    if (attempt > 1) {
      if (onRetry) onRetry(attempt - 1);
      await new Promise(function(resolve) { setTimeout(resolve, attempt * 1200); });
    }
    try {
      var result = await callAI({ aiId: aiId, messages: [{ role: "user", content: prompt }], systemPrompt: sys, maxTokens: 8000 });
      var text = result.replace(/```[\w]*\n?/gm, "").replace(/```$/gm, "").trim();
      if (!text || text.length < 200) throw new Error("生成内容が短すぎます");
      return text;
    } catch(err) { if (attempt === 3) throw err; }
  }
}

async function fetchTargetSuggestions(aiId, themeLabel, topic, ageLabel) {
  var prompt = "以下の条件でnote記事を書くためのターゲット読者分析をしてください。\n\n" +
    "ジャンル：" + themeLabel + "\nテーマ：" + (topic || themeLabel) + "\n年齢層：" + ageLabel + "\n\n" +
    "このテーマに興味を持つ読者が実際に抱えている「具体的な状況」を5つと「具体的な悩み」を5つ、それぞれ20字以内で列挙してください。\n\n" +
    "JSONのみ出力（前置き不要）：\n" +
    "{\"situations\":[\"状況1\",\"状況2\",\"状況3\",\"状況4\",\"状況5\"],\"worries\":[\"悩み1\",\"悩み2\",\"悩み3\",\"悩み4\",\"悩み5\"]}";
  var result;
  if (aiId === "claude") {
    result = await callClaudeSearch({ messages: [{ role: "user", content: prompt }], systemPrompt: "JSONのみ出力。前置き・説明・バッククォート不要。", maxTokens: 800 });
  } else {
    result = await callAI({ aiId: aiId, messages: [{ role: "user", content: prompt }], systemPrompt: "JSONのみ出力。前置き・説明・バッククォート不要。", maxTokens: 800 });
  }
  var s = result.indexOf("{"); var e = result.lastIndexOf("}");
  if (s === -1) throw new Error("JSON解析失敗");
  var parsed = JSON.parse(result.slice(s, e + 1));
  return { situations: parsed.situations || [], worries: parsed.worries || [] };
}

  else if (format === "md") { var b2 = new Blob([text], { type: "text/markdown;charset=utf-8" }); var a2 = document.createElement("a"); a2.href = URL.createObjectURL(b2); a2.download = filename + ".md"; a2.click(); }
  else if (format === "doc") { var html = "<html><head><meta charset=\"utf-8\"></head><body>" + text.replace(/\n/g, "<br>") + "</body></html>"; var b3 = new Blob([html], { type: "application/msword" }); var a3 = document.createElement("a"); a3.href = URL.createObjectURL(b3); a3.download = filename + ".doc"; a3.click(); }

async function readFileAsText(file) {
  if (!file) return "";
  var name = file.name.toLowerCase();
  if (name.endsWith(".docx") && typeof mammoth !== "undefined") {
    var arrayBuffer = await file.arrayBuffer();
    var result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
    return result.value;
  }
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result); };
    reader.onerror = reject;
    reader.readAsText(file, "utf-8");
  });
}

function downloadAsXlsx(rows, filename) {
  if (typeof XLSX === "undefined") { alert("XLSXライブラリが読み込めませんでした。"); return; }
  var ws = XLSX.utils.aoa_to_sheet(rows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "特典");
  XLSX.writeFile(wb, (filename || "bonus") + ".xlsx");
}

var dashStorage = (function() {
  var prefix = "notetools_shared_";
  return {
    get: async function(key) {
      try {
        var val = localStorage.getItem(prefix + key);
        if (val === null) throw new Error("not found");
        return { key: key, value: val };
      } catch(e) { throw e; }
    },
    set: async function(key, value) {
      try { localStorage.setItem(prefix + key, value); return { key: key, value: value }; }
      catch(e) { throw e; }
    },
    "delete": async function(key) {
      try { localStorage.removeItem(prefix + key); return { key: key, deleted: true }; }
      catch(e) { throw e; }
    },
    list: async function(pfx) {
      try {
        var keys = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k && k.indexOf(prefix) === 0) {
            var stripped = k.slice(prefix.length);
            if (!pfx || stripped.indexOf(pfx) === 0) keys.push(stripped);
          }
        }
        return { keys: keys };
      } catch(e) { throw e; }
    },
  };
})();

  var ns = useState([]); var notes = ns[0]; var setNotes = ns[1];
  var ls = useState(true); var dataLoading = ls[0]; var setDataLoading = ls[1];
  var ms = useState(""); var memo = ms[0]; var setMemo = ms[1];
  var mss = useState(false); var memoSaved = mss[0]; var setMemoSaved = mss[1];

  useEffect(function() {
    async function loadData() {
      setDataLoading(true);
      try { var r1 = await dashStorage.get("dashboard:usage"); if (r1 && r1.value) setUsage(JSON.parse(r1.value)); } catch(e) {}
      try { var r2 = await dashStorage.get("dashboard:memo"); if (r2 && r2.value) setMemo(r2.value); } catch(e) {}
      try {
        var r3 = await dashStorage.list("notes:");
        if (r3 && r3.keys && r3.keys.length > 0) {
          var items = [];
          for (var i = 0; i < r3.keys.length; i++) {
            try { var item = await dashStorage.get(r3.keys[i]); if (item && item.value) items.push(JSON.parse(item.value)); } catch(e2) {}
          }
          setNotes(items);
        }
      } catch(e) {}
      setDataLoading(false);
    }
    loadData();
  }, []);

  var recordUsage = useCallback(async function(toolId) {
    var newEntry = { toolId: toolId, timestamp: new Date().toISOString() };
    setUsage(function(prev) {
      var next = [newEntry].concat(prev).slice(0, 50);
      dashStorage.set("dashboard:usage", JSON.stringify(next)).catch(function() {});
      return next;
    });
  }, []);

  var saveMemo = useCallback(async function() {
    try { await dashStorage.set("dashboard:memo", memo); setMemoSaved(true); setTimeout(function() { setMemoSaved(false); }, 2000); }
    catch(e) {}
  }, [memo]);

  var deleteNote = useCallback(async function(noteId) {
    try { await dashStorage["delete"]("notes:" + noteId); setNotes(function(prev) { return prev.filter(function(n) { return n.id !== noteId; }); }); }
    catch(e) {}
  }, []);

  var toolCounts = {};
  DASH_TOOLS.forEach(function(t) { toolCounts[t.id] = 0; });
  usage.forEach(function(u) { if (toolCounts[u.toolId] !== undefined) toolCounts[u.toolId]++; });
  var apiKeys = loadApiKeys();
  var configuredKeys = AI_CONFIGS.filter(function(ai) { return !!apiKeys[ai.id]; });

  return (
    <div className="app-wrap">
      {showApi && <ApiKeyModal onClose={function() { setShowApi(false); }} />}
      <div className="app-header">
        <div className="app-header-left">
          <button className="back-btn" onClick={onBack}>← 戻る</button>
          <div>
            <h1 className="app-title">📊 note ツールダッシュボード</h1>
            <p className="app-sub">APIキー: {configuredKeys.length > 0 ? configuredKeys.map(function(a) { return a.icon; }).join(" ") + " 設定済み" : "未設定"}</p>
          </div>
        </div>
        <button className="key-btn" onClick={function() { setShowApi(true); }}>🔑 APIキー設定</button>
      </div>
      {/* タブ - 独立コンポーネントで修正 */}
      <div style={{ background: "#fff", borderBottom: "1px solid #eee", display: "flex", padding: "0 24px", overflowX: "auto", position: "sticky", top: 65, zIndex: 99 }}>
        <DashTabBtn label="🏠 ホーム"    isActive={tab === "home"}  onClick={function() { setTab("home"); }} />
        <DashTabBtn label="🛠 ツール一覧" isActive={tab === "tools"} onClick={function() { setTab("tools"); }} />
        <DashTabBtn label="📄 記事管理"  isActive={tab === "notes"} onClick={function() { setTab("notes"); }} />
        <DashTabBtn label="📝 メモ"      isActive={tab === "memo"}  onClick={function() { setTab("memo"); }} />
      </div>
      <div className="app-body">
        {tab === "home" && (
          <div>
            {configuredKeys.length === 0 && (
              <div style={{ background: "#fffbeb", border: "1px solid #fbbf24", borderRadius: 10, padding: 16, marginBottom: 20 }}>
                <strong>⚠️ APIキーが設定されていません</strong>
                <p style={{ margin: "8px 0 0", fontSize: 14 }}>右上の「🔑 APIキー設定」からAPIキーを登録してください。</p>
              </div>
            )}
            <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>🛠 ツール</h2>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16, marginBottom: 32 }}>
              {DASH_TOOLS.map(function(tool) {
                var capturedId = tool.id;
                return (
                  <div key={tool.id} style={{ background: "#fff", borderRadius: 12, padding: 20, border: "1px solid #eee", cursor: "pointer", transition: "box-shadow 0.2s" }}
                    onClick={function() { recordUsage(capturedId); setTab("tools"); }}>
                    <div style={{ fontSize: 28, marginBottom: 8 }}>{tool.label.split(" ")[0]}</div>
                    <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 4 }}>{tool.label.split(" ").slice(1).join(" ")}</div>
                    <div style={{ fontSize: 13, color: "#888", marginBottom: 12 }}>{tool.desc}</div>
                    <div style={{ fontSize: 12, color: tool.color, fontWeight: 600 }}>使用回数: {toolCounts[tool.id]}回</div>
                  </div>
                );
              })}
            </div>
            {usage.length > 0 && (
              <div>
                <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>📈 最近の利用履歴</h2>
                <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #eee", overflow: "hidden" }}>
                  {usage.slice(0, 10).map(function(u, idx) {
                    var tool = DASH_TOOLS.find(function(t) { return t.id === u.toolId; });
                    var d = new Date(u.timestamp);
                    return (
                      <div key={idx} style={{ padding: "12px 16px", borderBottom: idx < 9 ? "1px solid #f0f0f0" : "none", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontSize: 14 }}>{tool ? tool.label : u.toolId}</span>
                        <span style={{ fontSize: 12, color: "#aaa" }}>{d.toLocaleDateString("ja-JP")} {d.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" })}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
        {tab === "tools" && (
          <div>
            <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>🛠 ツール一覧</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {DASH_TOOLS.map(function(tool) {
                return (
                  <div key={tool.id} style={{ background: "#fff", borderRadius: 12, padding: 24, border: "1px solid #eee" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 18, marginBottom: 6 }}>{tool.label}</div>
                        <div style={{ fontSize: 14, color: "#888", marginBottom: 12 }}>{tool.desc}</div>
                        <div style={{ fontSize: 12, background: "#f5f5f5", display: "inline-block", padding: "4px 10px", borderRadius: 6, fontFamily: "monospace" }}>{tool.id}.jsx</div>
                      </div>
                      <div style={{ fontSize: 24, color: tool.color }}>{tool.label.split(" ")[0]}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab === "notes" && (
          <div>
            <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>📄 保存された記事</h2>
            {dataLoading ? (
              <div style={{ textAlign: "center", padding: 40, color: "#888" }}>⏳ 読み込み中...</div>
            ) : notes.length === 0 ? (
              <div style={{ background: "#fff", borderRadius: 12, padding: 40, border: "1px solid #eee", textAlign: "center", color: "#888" }}>
                <div style={{ fontSize: 40, marginBottom: 16 }}>📄</div>
                <div style={{ fontWeight: 600, marginBottom: 8 }}>保存された記事はありません</div>
                <div style={{ fontSize: 14 }}>note記事ジェネレーターで生成した記事がここに表示されます</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {notes.map(function(note) {
                  var capturedNoteId = note.id;
                  return (
                    <div key={note.id} style={{ background: "#fff", borderRadius: 12, padding: 20, border: "1px solid #eee" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 4 }}>{note.title || "（タイトルなし）"}</div>
                          <div style={{ fontSize: 12, color: "#aaa" }}>{note.createdAt ? new Date(note.createdAt).toLocaleDateString("ja-JP") : ""} ／ {note.theme || ""}</div>
                        </div>
                        <button onClick={function() { deleteNote(capturedNoteId); }}
                          style={{ padding: "6px 12px", background: "#fef2f2", color: "#dc2626", border: "1px solid #fca5a5", borderRadius: 8, cursor: "pointer", fontSize: 13 }}>
                          🗑 削除
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
        {tab === "memo" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700 }}>📝 メモ</h2>
              <button onClick={saveMemo} style={{ padding: "8px 20px", background: memoSaved ? "#22c55e" : "#e07b39", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 600, fontSize: 14 }}>
                {memoSaved ? "✅ 保存済み" : "💾 保存"}
              </button>
            </div>
            <textarea value={memo} onChange={function(e) { setMemo(e.target.value); }}
              placeholder="自由にメモを書いてください..."
              style={{ width: "100%", minHeight: 400, padding: 16, border: "1px solid #ddd", borderRadius: 12, fontSize: 14, lineHeight: 1.8, boxSizing: "border-box", resize: "vertical" }} />
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// LANDING PAGE & ROOT APP
// ============================================================
function App() {
  var vs = useState("landing"); var view = vs[0]; var setView = vs[1];

  if (view === "generator") return <NoteGenerator onBack={function() { setView("landing"); }} />;
  if (view === "bonus")     return <BonusGenerator onBack={function() { setView("landing"); }} />;
  if (view === "image")     return <ImagePromptGenerator onBack={function() { setView("landing"); }} />;
  if (view === "dashboard") return <Dashboard onBack={function() { setView("landing"); }} />;

  return (
    <div className="landing">
      <div className="landing-grid"></div>
      <div className="landing-badge">note AI Tools</div>
      <h1 className="landing-title">note<span>AI</span><br/>Tools</h1>
      <p className="landing-sub">有料note記事の生成から特典・画像プロンプトまで、AI駆動の制作ツール群</p>
      <div className="ai-badges">
        <div className="ai-badge"><div className="ai-dot" style={{ background: "#e07b39" }}></div>Claude</div>
        <div className="ai-badge"><div className="ai-dot" style={{ background: "#4285f4" }}></div>Gemini</div>
        <div className="ai-badge"><div className="ai-dot" style={{ background: "#10a37f" }}></div>ChatGPT</div>
        <div className="ai-badge"><div className="ai-dot" style={{ background: "#9ca3af" }}></div>Grok</div>
      </div>
      <div className="tool-cards-landing">
        <div className="tool-card-landing" onClick={function() { setView("generator"); }}>
          <div className="tool-card-icon">✏️</div>
          <div className="tool-card-name">note記事生成</div>
          <div className="tool-card-desc">有料記事を全自動生成。設定からプレビュー・投稿まで一気通貫</div>
        </div>
        <div className="tool-card-landing" onClick={function() { setView("bonus"); }}>
          <div className="tool-card-icon">🎁</div>
          <div className="tool-card-name">購入者特典生成</div>
          <div className="tool-card-desc">記事をアップロードしてAIが特典8件を提案、XLSX書き出し対応</div>
        </div>
        <div className="tool-card-landing" onClick={function() { setView("image"); }}>
          <div className="tool-card-icon">🎨</div>
          <div className="tool-card-name">画像プロンプト生成</div>
          <div className="tool-card-desc">記事に合った画像プロンプトを英日両言語で自動生成</div>
        </div>
        <div className="tool-card-landing" onClick={function() { setView("dashboard"); }}>
          <div className="tool-card-icon">📊</div>
          <div className="tool-card-name">ダッシュボード</div>
          <div className="tool-card-desc">記事管理・メモ・利用履歴の統合管理画面</div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
