<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>note AI Tools</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
/* =========================================
   RESET & BASE
   ========================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #0d0d1a;
  color: #fff;
  line-height: 1.6;
}
input, textarea, select, button { font-family: inherit; }
input[type="range"] { cursor: pointer; }
textarea { resize: vertical; }
select { cursor: pointer; }
a { color: inherit; }

/* =========================================
   LANDING PAGE
   ========================================= */
.landing {
  min-height: 100vh;
  background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 50%, #0a1628 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px;
  text-align: center;
  position: relative; overflow: hidden;
}
.landing::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 700px 500px at 30% 40%, rgba(224,123,57,0.1) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 80% 20%, rgba(99,102,241,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.landing-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 50px 50px;
}
.landing-badge {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid rgba(224,123,57,0.4);
  border-radius: 100px; padding: 5px 14px;
  font-size: 11px; color: #e07b39;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 28px; position: relative; z-index: 1;
}
.landing-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%; background: #e07b39;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes spin { to { transform: rotate(360deg); } }
.landing-title {
  font-size: clamp(48px, 9vw, 96px);
  font-weight: 900; color: #fff;
  letter-spacing: -0.03em; line-height: 1.05;
  margin-bottom: 20px;
  position: relative; z-index: 1;
}
.landing-title span { color: #e07b39; }
.landing-sub {
  font-size: 17px; color: rgba(255,255,255,0.5);
  max-width: 500px; margin: 0 auto 40px;
  font-weight: 300; position: relative; z-index: 1;
  line-height: 1.7;
}
.ai-badges {
  display: flex; gap: 10px;
  justify-content: center; flex-wrap: wrap;
  margin-bottom: 40px;
  position: relative; z-index: 1;
}
.ai-badge {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; font-size: 13px;
  font-weight: 500; color: #fff;
  background: rgba(255,255,255,0.04);
}
.ai-dot { width: 8px; height: 8px; border-radius: 50%; }
.tool-cards-landing {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px; max-width: 900px; width: 100%;
  margin-bottom: 40px;
  position: relative; z-index: 1;
}
.tool-card-landing {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 20px;
  cursor: pointer; transition: all 0.2s;
  text-align: left;
}
.tool-card-landing:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(224,123,57,0.4);
  transform: translateY(-2px);
}
.tool-card-icon { font-size: 28px; margin-bottom: 10px; }
.tool-card-name { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.tool-card-desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; }

/* =========================================
   SHARED APP LAYOUT
   ========================================= */
.app-wrap {
  min-height: 100vh;
  background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 50%, #0a1628 100%);
}
.app-header {
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 14px 24px;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(10px);
}
.app-header-left { display: flex; align-items: center; gap: 12px; }
.back-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 6px 12px;
  font-size: 13px; cursor: pointer;
  color: rgba(255,255,255,0.7);
  transition: background 0.15s;
}
.back-btn:hover { background: rgba(255,255,255,0.14); }
.app-title { font-size: 20px; font-weight: 800; margin: 0; color: #fff; }
.app-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin: 3px 0 0; }
.key-btn {
  padding: 8px 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,0.7);
  transition: background 0.15s;
}
.key-btn:hover { background: rgba(255,255,255,0.13); }
.app-body { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
.dark-tabs {
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; padding: 0 20px;
  overflow-x: auto;
  position: sticky; top: 65px; z-index: 99;
  backdrop-filter: blur(10px);
}

/* =========================================
   MODAL
   ========================================= */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 9999;
  display: flex; align-items: center;
  justify-content: center; padding: 16px;
}
.modal-box {
  background: #1a1a2e;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px; padding: 32px;
  width: 500px; max-width: 100%;
  max-height: 90vh; overflow-y: auto;
}

/* =========================================
   CARD / LABEL COMMON
   ========================================= */
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px; padding: 22px 26px;
  margin-bottom: 14px;
}
.lbl {
  color: rgba(255,255,255,0.6);
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.1em;
  display: block; margin-bottom: 10px;
}

/* =========================================
   RESPONSIVE
   ========================================= */
@media (max-width: 768px) {
  .app-body { padding: 16px 14px; }
  .app-header { padding: 12px 16px; }
  .dark-tabs { padding: 0 12px; top: 58px; }
  .tool-cards-landing { grid-template-columns: 1fr 1fr; gap: 10px; }
}
@media (max-width: 480px) {
  .landing { padding: 32px 16px; }
  .landing-title { font-size: clamp(36px, 12vw, 56px); }
  .landing-sub { font-size: 14px; margin-bottom: 28px; }
  .tool-cards-landing { gap: 8px; margin-bottom: 28px; }
  .tool-card-landing { padding: 14px 12px; border-radius: 12px; }
  .tool-card-icon { font-size: 22px; }
  .tool-card-name { font-size: 12px; }
  .app-header { padding: 10px 12px; }
  .app-title { font-size: 15px; }
  .app-sub { font-size: 10px; }
  .back-btn { padding: 5px 9px; font-size: 12px; }
  .key-btn { padding: 6px 10px; font-size: 11px; }
  .app-body { padding: 12px 10px; }
  .dark-tabs { padding: 0 8px; top: 54px; }
  .modal-box { padding: 20px 16px; }
  .card { padding: 16px 14px; border-radius: 14px; }
}
@media (max-width: 360px) {
  .landing-title { font-size: 34px; }
  .tool-card-desc { display: none; }
  .app-title { font-size: 13px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* =============================================
   RESPONSIVE HOOK
   ============================================= */
function useIsMobile() {
  var state = useState(window.innerWidth <= 480);
  var isMobile = state[0];
  var setIsMobile = state[1];
  useEffect(function() {
    function handleResize() { setIsMobile(window.innerWidth <= 480); }
    window.addEventListener('resize', handleResize);
    return function() { window.removeEventListener('resize', handleResize); };
  }, []);
  return isMobile;
}

/* =============================================
   AI CONFIGS & KEY STORAGE
   ============================================= */
var AI_LIST = [
  { id: 'claude',  label: 'Claude',  icon: '🟠', color: '#e07b39', badge: 'API' },
  { id: 'gemini',  label: 'Gemini',  icon: '🔵', color: '#4285f4', badge: 'API' },
  { id: 'chatgpt', label: 'ChatGPT', icon: '🟢', color: '#10a37f', badge: 'API' },
  { id: 'grok',    label: 'Grok',    icon: '⚫', color: '#9ca3af', badge: 'API' },
];
var KEY_STORAGE = 'noteAiKeys_v2';

function loadKeys() {
  try { return JSON.parse(localStorage.getItem(KEY_STORAGE) || '{}'); }
  catch(e) { return {}; }
}
function saveKey(id, val) {
  var k = loadKeys(); k[id] = val;
  localStorage.setItem(KEY_STORAGE, JSON.stringify(k));
}
function getKey(id) { return loadKeys()[id] || ''; }

/* =============================================
   API CALL FUNCTIONS (正確な仕様に基づく実装)
   ============================================= */

/* --- Claude API ---
   エンドポイント: POST https://api.anthropic.com/v1/messages
   必須ヘッダー:
     x-api-key: {APIキー}
     anthropic-version: 2023-06-01
     content-type: application/json
     anthropic-dangerous-direct-browser-access: true  ← ブラウザから直接呼ぶ場合必須
   ボディ: { model, max_tokens, system?, messages: [{role, content}] }
   レスポンス: { content: [{type:"text", text:"..."}], ... }
*/
async function callClaude(messages, systemPrompt, maxTokens) {
  var key = getKey('claude');
  if (!key) throw new Error('Claude: APIキーが設定されていません');
  var body = {
    model: 'claude-sonnet-4-6',
    max_tokens: maxTokens || 4000,
    messages: messages
  };
  if (systemPrompt) body.system = systemPrompt;
  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    var errData = {};
    try { errData = await res.json(); } catch(e) {}
    var msg = errData.error ? errData.error.message : '';
    if (res.status === 401) throw new Error('Claude 401: APIキーが無効です。console.anthropic.comで確認してください。' + (msg ? ' (' + msg + ')' : ''));
    if (res.status === 429) throw new Error('Claude 429: レート制限超過。しばらく待ってから再試行してください。');
    if (res.status === 400) throw new Error('Claude 400: リクエストが不正です。' + (msg ? msg : ''));
    if (res.status === 500) throw new Error('Claude 500: Anthropicサーバーエラー。しばらく待ってください。');
    throw new Error('Claude APIエラー ' + res.status + (msg ? ': ' + msg : ''));
  }
  var data = await res.json();
  if (!data.content || !data.content.length) throw new Error('Claude: 空のレスポンスが返りました');
  return data.content.map(function(b) { return b.text || ''; }).join('');
}

/* --- Gemini API ---
   エンドポイント: POST https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={APIキー}
   ヘッダー: Content-Type: application/json
   ボディ: { contents: [{role, parts:[{text}]}], generationConfig?: {maxOutputTokens}, systemInstruction?: {parts:[{text}]} }
   注意:
     - role は "user" または "model" (assistantではない)
     - gemini-1.5-flash は廃止。現行モデルは gemini-2.0-flash / gemini-2.5-flash
     - モデル: gemini-2.0-flash (標準・安定), gemini-2.5-flash (高性能・フォールバック)
*/
async function callGemini(messages, systemPrompt, maxTokens) {
  var key = getKey('gemini');
  if (!key) throw new Error('Gemini: APIキーが設定されていません');

  // roleをGemini形式に変換 (user/assistant → user/model)
  var contents = messages.map(function(m) {
    return {
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    };
  });
  var body = {
    contents: contents,
    generationConfig: { maxOutputTokens: maxTokens || 4000 }
  };
  if (systemPrompt) {
    body.systemInstruction = { parts: [{ text: systemPrompt }] };
  }

  // gemini-2.0-flashを優先、404/429時はgemini-2.5-flashにフォールバック
  var models = ['gemini-2.0-flash', 'gemini-2.5-flash'];
  var lastErr = null;
  for (var i = 0; i < models.length; i++) {
    var model = models[i];
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + key;
    var res;
    try {
      res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    } catch(e) {
      lastErr = new Error('Gemini: ネットワークエラー - ' + e.message);
      continue;
    }
    if (res.status === 429) {
      // 429の場合は次のモデルを試す前に少し待機
      if (i < models.length - 1) {
        await new Promise(function(r) { setTimeout(r, 3000); });
        lastErr = new Error('Gemini 429: レート制限。次のモデルを試します...');
        continue;
      }
      throw new Error('Gemini 429: レート制限超過。無料枠の上限に達しました。\n・しばらく時間をおいてから再試行してください\n・Google AI Studioで使用量を確認してください');
    }
    if (res.status === 404) {
      // 404はモデルが存在しない or このAPIバージョンでサポートされていない
      if (i < models.length - 1) {
        lastErr = new Error('Gemini 404: モデル ' + model + ' が見つかりません。次のモデルを試します...');
        continue;
      }
      var e404 = {};
      try { e404 = await res.json(); } catch(ex) {}
      var msg404 = e404.error ? e404.error.message : '';
      throw new Error('Gemini 404: モデルが見つかりません。' + (msg404 ? ' (' + msg404 + ')' : '') + '\nAPIキーが正しいか、Google AI Studioで確認してください。');
    }
    if (res.status === 400) {
      var e400 = {};
      try { e400 = await res.json(); } catch(ex) {}
      var msg400 = e400.error ? e400.error.message : '';
      throw new Error('Gemini 400: APIキーが無効か、リクエストが不正です。' + (msg400 ? ' (' + msg400 + ')' : '') + '\nGoogle AI Studio(aistudio.google.com)でキーを確認してください。');
    }
    if (res.status === 403) {
      throw new Error('Gemini 403: APIキーに権限がありません。Google AI Studioでキーの設定を確認してください。');
    }
    if (!res.ok) {
      var eData = {};
      try { eData = await res.json(); } catch(ex) {}
      var eMsg = eData.error ? eData.error.message : '';
      throw new Error('Gemini APIエラー ' + res.status + (eMsg ? ': ' + eMsg : ''));
    }
    var data = await res.json();
    if (!data.candidates || !data.candidates.length) {
      // safety filterなどで空の場合
      var fb = data.promptFeedback;
      if (fb && fb.blockReason) throw new Error('Gemini: コンテンツがブロックされました (' + fb.blockReason + ')');
      throw new Error('Gemini: レスポンスが空でした');
    }
    var cand = data.candidates[0];
    if (!cand.content || !cand.content.parts) throw new Error('Gemini: レスポンス形式が不正です');
    return cand.content.parts.map(function(p) { return p.text || ''; }).join('');
  }
  throw lastErr || new Error('Gemini: すべてのモデルで失敗しました');
}

/* --- ChatGPT (OpenAI) API ---
   エンドポイント: POST https://api.openai.com/v1/chat/completions
   必須ヘッダー:
     Authorization: Bearer {APIキー}
     Content-Type: application/json
   ボディ: { model, messages: [{role, content}], max_tokens? }
   注意: systemプロンプトはmessagesの最初に role:"system" として追加
*/
async function callChatGPT(messages, systemPrompt, maxTokens) {
  var key = getKey('chatgpt');
  if (!key) throw new Error('ChatGPT: APIキーが設定されていません');
  var msgs = systemPrompt
    ? [{ role: 'system', content: systemPrompt }].concat(messages)
    : messages;
  var res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key
    },
    body: JSON.stringify({
      model: 'gpt-4.1',
      max_tokens: maxTokens || 4000,
      messages: msgs
    })
  });
  if (!res.ok) {
    var eData = {};
    try { eData = await res.json(); } catch(e) {}
    var eMsg = eData.error ? eData.error.message : '';
    if (res.status === 401) throw new Error('ChatGPT 401: APIキーが無効です。platform.openai.comで確認してください。');
    if (res.status === 429) throw new Error('ChatGPT 429: レート制限またはクレジット不足。platform.openai.comで使用量を確認してください。');
    if (res.status === 400) throw new Error('ChatGPT 400: リクエストが不正です。' + (eMsg ? eMsg : ''));
    throw new Error('ChatGPT APIエラー ' + res.status + (eMsg ? ': ' + eMsg : ''));
  }
  var data = await res.json();
  if (!data.choices || !data.choices.length) throw new Error('ChatGPT: 空のレスポンスが返りました');
  return data.choices[0].message.content || '';
}

/* --- Grok (xAI) API ---
   エンドポイント: POST https://api.x.ai/v1/chat/completions
   OpenAI互換形式。ヘッダー・ボディはChatGPTと同じ構造
   モデル: grok-3 (現在の推奨)
*/
async function callGrok(messages, systemPrompt, maxTokens) {
  var key = getKey('grok');
  if (!key) throw new Error('Grok: APIキーが設定されていません');
  var msgs = systemPrompt
    ? [{ role: 'system', content: systemPrompt }].concat(messages)
    : messages;

  // grok-3（標準・広く利用可能）→ grok-4（最新フラッグシップ、一部制限あり）の順でフォールバック
  var grokModels = ['grok-3', 'grok-4'];
  var lastErr = null;
  for (var gi = 0; gi < grokModels.length; gi++) {
    var grokModel = grokModels[gi];
    var grokRes;
    try {
      grokRes = await fetch('https://api.x.ai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + key
        },
        body: JSON.stringify({
          model: grokModel,
          max_tokens: maxTokens || 4000,
          messages: msgs
        })
      });
    } catch(e) {
      lastErr = new Error('Grok: ネットワークエラー - ' + e.message);
      continue;
    }
    if (grokRes.status === 404 || grokRes.status === 400) {
      if (gi < grokModels.length - 1) {
        lastErr = new Error('Grok: モデル ' + grokModel + ' が利用不可。次を試します...');
        continue;
      }
    }
    if (!grokRes.ok) {
      var eData = {};
      try { eData = await grokRes.json(); } catch(e) {}
      var eMsg = eData.error ? eData.error.message : '';
      if (grokRes.status === 401) throw new Error('Grok 401: APIキーが無効です。console.x.aiで確認してください。');
      if (grokRes.status === 429) throw new Error('Grok 429: レート制限超過。しばらく待ってから再試行してください。');
      throw new Error('Grok APIエラー ' + grokRes.status + (eMsg ? ': ' + eMsg : ''));
    }
    var data = await grokRes.json();
    if (!data.choices || !data.choices.length) throw new Error('Grok: 空のレスポンスが返りました');
    return data.choices[0].message.content || '';
  }
  throw lastErr || new Error('Grok: すべてのモデルで失敗しました');
}

/* --- 統合AI呼び出し関数 --- */
async function callAI(aiId, messages, systemPrompt, maxTokens) {
  if (aiId === 'claude')  return await callClaude(messages, systemPrompt, maxTokens);
  if (aiId === 'gemini')  return await callGemini(messages, systemPrompt, maxTokens);
  if (aiId === 'chatgpt') return await callChatGPT(messages, systemPrompt, maxTokens);
  if (aiId === 'grok')    return await callGrok(messages, systemPrompt, maxTokens);
  throw new Error('不明なAI: ' + aiId);
}

/* =============================================
   API KEY MODAL
   ============================================= */
function ApiKeyModal(props) {
  var onClose = props.onClose;
  var keys = useState(loadKeys());
  var localKeys = keys[0]; var setLocalKeys = keys[1];
  var shows = useState({});
  var show = shows[0]; var setShow = shows[1];
  var saved = useState({});
  var savedState = saved[0]; var setSaved = saved[1];

  function doSave(id) {
    saveKey(id, localKeys[id] || '');
    setSaved(function(s) { var n = Object.assign({}, s); n[id] = true; return n; });
    setTimeout(function() {
      setSaved(function(s) { var n = Object.assign({}, s); n[id] = false; return n; });
    }, 2000);
  }

  return (

  var ageLabel = (NOTE_AGES.find(function(a) { return a.id === age; }) || {}).label || age;
  var ageCtx = { '10s':'10代・学生・バイト・部活', '20s':'20代・社会人・転職・恋愛', '30s':'30代・育児・住宅・キャリア', '40s':'40代・老後・子育て・健康', '50s':'50代以上・定年・健康・老後', 'all':'全年代共通' }[age] || '';

  return 'あなたは人気noteクリエイターです。以下の条件でnoteの有料記事を作成してください。\n\n'

    + '- 有料部分の文字数: ' + paidWC + '文字\n\n'
    + '## 構成ルール\n'
    + '1. タイトルは「# 」で始める 2. 1記事50〜100文字の要約 3. 「---FREE_START---」から無料部分開始 4. 「---FREE_END---」で無料終了 5. 「---PAID_START---」から有料部分開始 6. 「---PAID_END---」で有料終了\n\n'

var BONUS_THEMES = ['副業・お金','ダイエット・健康','節約・お金','育児・子育て','マインドセット','ビジネス・キャリア','人間関係','ライフスタイル','その他'];
var BONUS_AGES = ['10代','20代前半','20代後半','30代前半','30代後半','40代','50代以上','全年齢'];

async function readFileAsText(file) {
  if (!file) return '';
  var name = file.name.toLowerCase();
  if (name.endsWith('.docx') && typeof mammoth !== 'undefined') {
    var buf = await file.arrayBuffer();
    var result = await mammoth.extractRawText({ arrayBuffer: buf });
    return result.value;
  }
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result); };
    reader.onerror = reject;
    reader.readAsText(file, 'utf-8');
  });
}

function BonusGenerator(props) {
  var onBack = props.onBack;
  var isMobile = useIsMobile();
  var showApi = useState(false);
  var setShowApi = showApi[1]; showApi = showApi[0];
  var aiState = useState('claude');
  var aiId = aiState[0]; var setAiId = aiState[1];
  var themeState = useState('副業・お金');
  var theme = themeState[0]; var setTheme = themeState[1];
  var ageState = useState('30代前半');
  var targetAge = ageState[0]; var setTargetAge = ageState[1];
  var fileState = useState(null);
  var articleFile = fileState[0]; var setArticleFile = fileState[1];
  var textState = useState('');
  var articleText = textState[0]; var setArticleText = textState[1];
  var sugState = useState([]);
  var suggestions = sugState[0]; var setSuggestions = sugState[1];
  var selState = useState([]);
  var selected = selState[0]; var setSelected = selState[1];
  var resState = useState({});
  var results = resState[0]; var setResults = resState[1];
  var loadState = useState(false);
  var loading = loadState[0]; var setLoading = loadState[1];
  var genLoadState = useState({});
  var genLoading = genLoadState[0]; var setGenLoading = genLoadState[1];
  var errState = useState('');
  var error = errState[0]; var setError = errState[1];
  var fileRef = useRef(null);
  var aiRef = useRef(aiId);
  aiRef.current = aiId;

  var handleFileChange = useCallback(async function(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    setArticleFile(file);
    try {
      var text = await readFileAsText(file);
      setArticleText(text);
    } catch(err) {
      setError('ファイル読み込みエラー: ' + err.message);
    }
  }, []);

  var handleAnalyze = useCallback(function() {
    var currentAiId = aiRef.current;
    if (!articleText.trim()) { setError('記事テキストをアップロードするか貼り付けてください'); return; }
    setError(''); setLoading(true); setSuggestions([]); setSelected([]); setResults({});
    var prompt = '以下のnote記事を分析して、購入者向けの特典コンテンツを8つ提案してください。\n\n'
      + '【ジャンル】' + theme + '\n【ターゲット年齢】' + targetAge + '\n\n'
      + '【記事内容（抜粋）】\n' + articleText.slice(0, 3000) + '\n\n'
      + 'JSONのみで出力（前置きなし）。形式: [{id, type, title, description, reason}]\n'
      + 'typeは checklist/template/worksheet/glossary/casestudy/qanda/resource/stepguide のいずれか';
    callAI(currentAiId, [{ role:'user', content: prompt }], null, 2000)
      .then(function(result) {
        var clean = result.replace(/```json/g, '').replace(/```/g, '').trim();
        var parsed = JSON.parse(clean);
        setSuggestions(parsed); setLoading(false);
      })
      .catch(function(err) {
        setError('分析エラー: ' + err.message); setLoading(false);
      });
  }, [articleText, theme, targetAge]);

  function handleGenerate(bonusId, bonusTitle, bonusType) {
    var currentAiId = aiRef.current;
    setGenLoading(function(s) { var n = Object.assign({}, s); n[bonusId] = true; return n; });
    setError('');
    var prompt = '以下の特典コンテンツを実際に作成してください。\n\n'
      + '【特典タイトル】' + bonusTitle + '\n【タイプ】' + bonusType + '\n【ジャンル】' + theme + '\n【ターゲット】' + targetAge + '\n\n'
      + '【参考記事（抜粋）】\n' + articleText.slice(0, 2000) + '\n\n'
      + '読者がすぐに使えるクオリティで、具体的な内容を作成してください。';
    callAI(currentAiId, [{ role:'user', content: prompt }], null, 3000)
      .then(function(result) {
        setResults(function(r) { var n = Object.assign({}, r); n[bonusId] = result; return n; });
        setGenLoading(function(s) { var n = Object.assign({}, s); n[bonusId] = false; return n; });
      })
      .catch(function(err) {
        setError('生成エラー: ' + err.message);
        setGenLoading(function(s) { var n = Object.assign({}, s); n[bonusId] = false; return n; });
      });
  }

  function downloadXlsx() {
    if (typeof XLSX === 'undefined') { alert('XLSXライブラリが読み込まれていません'); return; }
    var rows = [['特典タイトル', 'タイプ', '内容']];
    selected.forEach(function(id) {
      var s = suggestions.find(function(x) { return x.id === id; });
      rows.push([s ? s.title : id, s ? s.type : '', results[id] || '（未生成）']);
    });
    var ws = XLSX.utils.aoa_to_sheet(rows);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '特典一覧');
    XLSX.writeFile(wb, 'bonus_list.xlsx');
  }

  var cardStyle = { background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.09)', borderRadius: isMobile ? 14 : 18, padding: isMobile ? '16px 14px' : '22px 26px', marginBottom:14 };
  var lblStyle = { color:'rgba(255,255,255,0.6)', fontSize:12, fontWeight:700, letterSpacing:'0.1em', display:'block', marginBottom:10 };
  var inputStyle = { width:'100%', padding:'10px 12px', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:8, fontSize:14, color:'#fff', outline:'none' };

  return (
    <div className="app-wrap">
      <style>{'@keyframes spin{to{transform:rotate(360deg)}}'}</style>

          </div>
        </div>
        <button className="key-btn" onClick={function() { setShowApi(true); }}>🔑 APIキー設定</button>

        <div style={cardStyle}>

          <div style={{ display:'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: isMobile ? 10 : 16, marginTop:20 }}>
            <div>
              <div style={lblStyle}>🎯 ジャンル</div>
              <select value={theme} onChange={function(e) { setTheme(e.target.value); }} style={inputStyle}>
                {BONUS_THEMES.map(function(t) { return <option key={t} style={{ background:'#1a1a2e' }}>{t}</option>; })}
              </select>
            </div>
            <div>
              <div style={lblStyle}>👤 ターゲット年齢</div>
              <select value={targetAge} onChange={function(e) { setTargetAge(e.target.value); }} style={inputStyle}>
                {BONUS_AGES.map(function(a) { return <option key={a} style={{ background:'#1a1a2e' }}>{a}</option>; })}
              </select>
            </div>
          </div>
        </div>

        {/* 記事入力 */}
        <div style={cardStyle}>
          <span style={lblStyle}>📄 note記事をアップロード or 貼り付け</span>
          <div onClick={function() { fileRef.current && fileRef.current.click(); }}
            style={{ border:'2px dashed rgba(255,255,255,0.15)', borderRadius:10, padding:24, textAlign:'center', cursor:'pointer', marginBottom:12, background:'rgba(255,255,255,0.02)' }}>
            <div style={{ fontSize:32, marginBottom:8 }}>📂</div>
            <div style={{ fontWeight:600, marginBottom:4, color:'#fff' }}>{articleFile ? articleFile.name : 'クリックしてファイルを選択'}</div>
            <div style={{ fontSize:12, color:'rgba(255,255,255,0.4)' }}>.txt / .md / .docx 対応</div>
            <input ref={fileRef} type="file" accept=".txt,.md,.docx" onChange={handleFileChange} style={{ display:'none' }} />
          </div>
          <textarea value={articleText} onChange={function(e) { setArticleText(e.target.value); }}

        {error && <div style={{ background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:8, padding:16, color:'#f87171', marginBottom:16, whiteSpace:'pre-line' }}>{error}</div>}

        <button onClick={handleAnalyze} disabled={loading}

                      style={{ marginTop:3, accentColor:'#e07b39', cursor:'pointer' }} />
                    <div style={{ flex:1 }}>
                      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
                        <span style={{ background:'rgba(224,123,57,0.15)', color:'#e07b39', fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:4 }}>{s.type}</span>
                        <span style={{ color:'#fff', fontWeight:700, fontSize:14 }}>{s.title}</span>
                      </div>
                      <div style={{ fontSize:12, color:'rgba(255,255,255,0.45)', marginBottom:6 }}>{s.description}</div>
                      <div style={{ fontSize:11, color:'rgba(255,255,255,0.3)' }}>💡 {s.reason}</div>
                    </div>
                    <button onClick={function() { handleGenerate(sid, s.title, s.type); }} disabled={isGenerating}
                      style={{ padding:'8px 16px', background: hasResult ? 'rgba(74,222,128,0.15)' : 'rgba(224,123,57,0.15)', border: hasResult ? '1px solid rgba(74,222,128,0.4)' : '1px solid rgba(224,123,57,0.4)', borderRadius:8, color: hasResult ? '#4ade80' : '#e07b39', fontSize:12, fontWeight:700, cursor: isGenerating ? 'not-allowed' : 'pointer', whiteSpace:'nowrap' }}>
                      {isGenerating ? '⏳ 生成中' : hasResult ? '✓ 生成済' : '✨ 生成'}
                    </button>
                  </div>
                  {hasResult && (
                    <div style={{ borderTop:'1px solid rgba(255,255,255,0.07)', padding:'14px 20px', background:'rgba(0,0,0,0.2)' }}>
                      <pre style={{ margin:0, fontSize:13, color:'rgba(255,255,255,0.7)', whiteSpace:'pre-wrap', lineHeight:1.7, fontFamily:'inherit' }}>{results[sid]}</pre>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* =============================================
   TOOL 3: 画像プロンプト生成ツール
   ============================================= */
var IMG_STYLES = ['イラスト・アニメ風','リアル・写真風','シンプル・フラット','3D・CGレンダリング','水彩・手描き風','ミニマル・モダン'];
var IMG_TOOLS = ['Midjourney','DALL-E 3','Stable Diffusion','Adobe Firefly','Ideogram'];
var IMG_USES = [
  { id:'header', label:'ヘッダー画像' },
  { id:'thumbnail', label:'サムネイル' },
  { id:'cover', label:'マガジン表紙' },
  { id:'profile', label:'プロフィール画像' },
  { id:'content', label:'本文挿絵' },
];

function ImagePromptGenerator(props) {
  var onBack = props.onBack;
  var isMobile = useIsMobile();
  var showApi = useState(false);
  var setShowApi = showApi[1]; showApi = showApi[0];
  var aiState = useState('claude');
  var aiId = aiState[0]; var setAiId = aiState[1];
  var fileState = useState(null);
  var articleFile = fileState[0]; var setArticleFile = fileState[1];
  var textState = useState('');
  var articleText = textState[0]; var setArticleText = textState[1];
  var styleState = useState('イラスト・アニメ風');
  var imageStyle = styleState[0]; var setImageStyle = styleState[1];
  var toolState = useState('Midjourney');
  var imageTool = toolState[0]; var setImageTool = toolState[1];
  var usesState = useState(['header', 'thumbnail']);
  var selectedUses = usesState[0]; var setSelectedUses = usesState[1];
  var promptsState = useState([]);
  var prompts = promptsState[0]; var setPrompts = promptsState[1];
  var loadState = useState(false);
  var loading = loadState[0]; var setLoading = loadState[1];
  var errState = useState('');
  var error = errState[0]; var setError = errState[1];
  var copiedState = useState({});
  var copied = copiedState[0]; var setCopied = copiedState[1];
  var fileRef = useRef(null);
  var aiRef = useRef(aiId);
  aiRef.current = aiId;

  var handleFileChange = useCallback(async function(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    setArticleFile(file);
    try {
      var text = await readFileAsText(file);
      setArticleText(text);
    } catch(err) {
      setError('ファイル読み込みエラー: ' + err.message);
    }
  }, []);

  var handleGenerate = useCallback(function() {
    var currentAiId = aiRef.current;
    if (!articleText.trim()) { setError('記事テキストをアップロードするか貼り付けてください'); return; }
    setError(''); setLoading(true); setPrompts([]);
    var useLabels = selectedUses.map(function(uid) {
      var u = IMG_USES.find(function(x) { return x.id === uid; });
      return u ? u.label : uid;
    }).join('、');
    var prompt = '以下のnote記事に合う画像プロンプトを、' + useLabels + 'の各用途に対して生成してください。\n\n'
      + '【画像スタイル】' + imageStyle + '\n【使用ツール】' + imageTool + '\n\n'
      + '【記事内容（抜粋）】\n' + articleText.slice(0, 2000) + '\n\n'
      + '各用途について:\n- 日本語説明（50文字程度）\n- ' + imageTool + '用の英語プロンプト（詳細なもの）\n\n'
      + 'JSONのみで出力。形式: [{use, description, prompt_en}]';
    callAI(currentAiId, [{ role:'user', content: prompt }], null, 2000)
      .then(function(result) {
        var clean = result.replace(/```json/g, '').replace(/```/g, '').trim();
        var parsed = JSON.parse(clean);
        setPrompts(parsed); setLoading(false);
      })
      .catch(function(err) {
        setError('生成エラー: ' + err.message); setLoading(false);
      });
  }, [articleText, imageStyle, imageTool, selectedUses]);

  function doCopy(text, key) {
    navigator.clipboard.writeText(text).catch(function() {});
    setCopied(function(s) { var n = Object.assign({}, s); n[key] = true; return n; });
    setTimeout(function() { setCopied(function(s) { var n = Object.assign({}, s); n[key] = false; return n; }); }, 2000);
  }

  var cardStyle = { background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.09)', borderRadius: isMobile ? 14 : 18, padding: isMobile ? '16px 14px' : '22px 26px', marginBottom:14 };
  var lblStyle = { color:'rgba(255,255,255,0.6)', fontSize:12, fontWeight:700, letterSpacing:'0.1em', display:'block', marginBottom:10 };

  return (
    <div className="app-wrap">
      <style>{'@keyframes spin{to{transform:rotate(360deg)}}'}</style>
      {showApi && <ApiKeyModal onClose={function() { setShowApi(false); }} />}
      <div className="app-header">
        <div className="app-header-left">
          <button className="back-btn" onClick={onBack}>← 戻る</button>
          <div>
            <h1 className="app-title">🖼️ 画像プロンプトジェネレーター</h1>
            <p className="app-sub">note記事用AI画像プロンプトを自動生成</p>
          </div>
        </div>
        <button className="key-btn" onClick={function() { setShowApi(true); }}>🔑 APIキー設定</button>
      </div>
      <div className="app-body">
        <div style={cardStyle}>
          <span style={lblStyle}>🤖 使用するAI</span>
          <AiSelector value={aiId} onChange={function(id) { setAiId(id); aiRef.current = id; }} />
          <div style={{ display:'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: isMobile ? 10 : 16, marginTop:20 }}>
            <div>
              <div style={lblStyle}>🎨 画像スタイル</div>
              <select value={imageStyle} onChange={function(e) { setImageStyle(e.target.value); }}
                style={{ width:'100%', padding:'10px 12px', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:8, fontSize:14, color:'#fff', outline:'none' }}>
                {IMG_STYLES.map(function(s) { return <option key={s} style={{ background:'#1a1a2e' }}>{s}</option>; })}
              </select>
            </div>
            <div>
              <div style={lblStyle}>🛠️ 画像生成ツール</div>
              <select value={imageTool} onChange={function(e) { setImageTool(e.target.value); }}
                style={{ width:'100%', padding:'10px 12px', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:8, fontSize:14, color:'#fff', outline:'none' }}>
                {IMG_TOOLS.map(function(t) { return <option key={t} style={{ background:'#1a1a2e' }}>{t}</option>; })}
              </select>
            </div>
          </div>
        </div>

        <div style={cardStyle}>
          <span style={lblStyle}>🖼️ 生成する画像の用途</span>
          <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
            {IMG_USES.map(function(u) {
              var isSelected = selectedUses.indexOf(u.id) !== -1;
              return (
                <button key={u.id} onClick={function() {
                  setSelectedUses(function(sel) {
                    var idx = sel.indexOf(u.id);
                    return idx === -1 ? sel.concat([u.id]) : sel.filter(function(x) { return x !== u.id; });
                  });
                }}
                  style={{ background: isSelected ? 'rgba(99,102,241,0.2)' : 'rgba(255,255,255,0.05)', border: isSelected ? '2px solid #6366f1' : '1px solid rgba(255,255,255,0.1)', borderRadius:10, padding:'8px 14px', fontSize:13, cursor:'pointer', color: isSelected ? '#fff' : 'rgba(255,255,255,0.5)', fontWeight: isSelected ? 700 : 400 }}>
                  {u.label}
                </button>
              );
            })}
          </div>
        </div>

        <div style={cardStyle}>
          <span style={lblStyle}>📄 note記事をアップロード or 貼り付け</span>
          <div onClick={function() { fileRef.current && fileRef.current.click(); }}
            style={{ border:'2px dashed rgba(255,255,255,0.15)', borderRadius:10, padding:20, textAlign:'center', cursor:'pointer', marginBottom:12, background:'rgba(255,255,255,0.02)' }}>
            <div style={{ fontWeight:600, color:'#fff', marginBottom:4 }}>{articleFile ? articleFile.name : 'クリックしてファイルを選択'}</div>
            <div style={{ fontSize:12, color:'rgba(255,255,255,0.4)' }}>.txt / .md / .docx 対応</div>
            <input ref={fileRef} type="file" accept=".txt,.md,.docx" onChange={handleFileChange} style={{ display:'none' }} />
          </div>
          <textarea value={articleText} onChange={function(e) { setArticleText(e.target.value); }}
            placeholder="または記事テキストをここに貼り付けてください..."
            style={{ width:'100%', minHeight:120, padding:12, background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:8, fontSize:14, lineHeight:1.7, boxSizing:'border-box', resize:'vertical', color:'#e2e8f0', outline:'none' }} />
        </div>

        {error && <div style={{ background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:8, padding:16, color:'#f87171', marginBottom:16, whiteSpace:'pre-line' }}>{error}</div>}

        <button onClick={handleGenerate} disabled={loading}
          style={{ width:'100%', padding:16, background: loading ? 'rgba(99,102,241,0.25)' : 'linear-gradient(135deg,#6366f1,#4f46e5)', color:'#fff', border:'none', borderRadius:14, fontSize:16, fontWeight:800, cursor: loading ? 'not-allowed' : 'pointer', marginBottom:24, boxShadow: loading ? 'none' : '0 8px 30px rgba(99,102,241,0.4)' }}>
          {loading ? '⏳ プロンプト生成中...' : '🎨 画像プロンプトを生成する'}
        </button>

        {prompts.length > 0 && (
          <div>
            <h3 style={{ fontSize:15, fontWeight:800, color:'#fff', marginBottom:14 }}>✨ 生成されたプロンプト ({prompts.length}件)</h3>
            {prompts.map(function(p, idx) {
              var key = 'p_' + idx;
              return (
                <div key={idx} style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.09)', borderRadius:14, marginBottom:10, overflow:'hidden' }}>
                  <div style={{ padding:'16px 20px', borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                      <span style={{ background:'rgba(99,102,241,0.2)', color:'#818cf8', fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:6 }}>{p.use}</span>
                      <button onClick={function() { doCopy(p.prompt_en, key); }}
                        style={{ padding:'6px 14px', background: copied[key] ? 'rgba(74,222,128,0.15)' : 'rgba(99,102,241,0.15)', border: copied[key] ? '1px solid #4ade80' : '1px solid rgba(99,102,241,0.4)', borderRadius:8, color: copied[key] ? '#4ade80' : '#818cf8', fontSize:12, fontWeight:700, cursor:'pointer' }}>
                        {copied[key] ? '✓ コピー済み' : '📋 プロンプトをコピー'}
                      </button>
                    </div>
                    <div style={{ color:'rgba(255,255,255,0.6)', fontSize:13, marginBottom:10 }}>{p.description}</div>
                    <div style={{ background:'rgba(0,0,0,0.3)', borderRadius:8, padding:'12px 14px', fontFamily:'monospace', fontSize:13, color:'#93c5fd', lineHeight:1.6 }}>{p.prompt_en}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* =============================================
   DASHBOARD (使用履歴・メモ機能は削除し軽量化)
   ============================================= */
function Dashboard(props) {
  var onBack = props.onBack;
  var isMobile = useIsMobile();
  var showApi = useState(false);
  var setShowApi = showApi[1]; showApi = showApi[0];
  var apiKeys = loadKeys();
  var configuredKeys = AI_LIST.filter(function(ai) { return !!apiKeys[ai.id]; });

  var toolStats = [
    { icon:'📝', name:'note記事生成', desc:'テーマ・ターゲット・文字数を設定して有料記事を自動生成', color:'#e94560' },
    { icon:'🎁', name:'特典ジェネレーター', desc:'購入者向けの豪華特典コンテンツを記事から自動提案・生成', color:'#e07b39' },
    { icon:'🖼️', name:'画像プロンプト生成', desc:'記事に合うAI画像用プロンプトを自動生成', color:'#6366f1' },
  ];

  return (
    <div className="app-wrap">
      {showApi && <ApiKeyModal onClose={function() { setShowApi(false); }} />}
      <div className="app-header">
        <div className="app-header-left">
          <button className="back-btn" onClick={onBack}>← 戻る</button>
          <div>
            <h1 className="app-title">📊 ダッシュボード</h1>
            <p className="app-sub">ツール一覧とAPIキー管理</p>
          </div>
        </div>
        <button className="key-btn" onClick={function() { setShowApi(true); }}>🔑 APIキー設定</button>
      </div>
      <div className="app-body">
        {/* APIキー状態 */}
        <div style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.09)', borderRadius:18, padding:'22px 26px', marginBottom:24 }}>
          <div style={{ color:'rgba(255,255,255,0.6)', fontSize:12, fontWeight:700, letterSpacing:'0.1em', marginBottom:14 }}>🔑 APIキー状態</div>
          <div style={{ display:'grid', gridTemplateColumns: isMobile ? '1fr 1fr' : 'repeat(4, 1fr)', gap:10 }}>
            {AI_LIST.map(function(ai) {
              var hasKey = !!apiKeys[ai.id];
              return (
                <div key={ai.id} style={{ background: hasKey ? 'rgba(74,222,128,0.08)' : 'rgba(255,255,255,0.03)', border: hasKey ? '1px solid rgba(74,222,128,0.25)' : '1px solid rgba(255,255,255,0.08)', borderRadius:12, padding:'12px', textAlign:'center' }}>
                  <div style={{ fontSize:20, marginBottom:6 }}>{ai.icon}</div>
                  <div style={{ fontSize:12, fontWeight:700, color: hasKey ? '#4ade80' : 'rgba(255,255,255,0.4)' }}>{ai.label}</div>
                  <div style={{ fontSize:10, color: hasKey ? '#4ade80' : 'rgba(255,255,255,0.25)', marginTop:2 }}>{hasKey ? '✓ 設定済み' : '未設定'}</div>
                </div>
              );
            })}
          </div>
          {configuredKeys.length === 0 && (
            <div style={{ marginTop:14, textAlign:'center' }}>
              <button onClick={function() { setShowApi(true); }} style={{ background:'#e07b39', border:'none', borderRadius:8, padding:'10px 24px', color:'#fff', fontSize:14, fontWeight:700, cursor:'pointer' }}>
                APIキーを設定する
              </button>
            </div>
          )}
        </div>

        {/* ツール一覧 */}
        <div style={{ color:'rgba(255,255,255,0.6)', fontSize:12, fontWeight:700, letterSpacing:'0.1em', marginBottom:12 }}>🛠️ ツール一覧</div>
        <div style={{ display:'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fit, minmax(240px, 1fr))', gap:14, marginBottom:32 }}>
          {toolStats.map(function(t) {
            return (
              <div key={t.name} style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.09)', borderRadius:16, padding:'20px', cursor:'pointer', transition:'all 0.2s' }}
                onClick={onBack}>
                <div style={{ fontSize:28, marginBottom:10 }}>{t.icon}</div>
                <div style={{ fontSize:15, fontWeight:700, color:'#fff', marginBottom:6 }}>{t.name}</div>
                <div style={{ fontSize:12, color:'rgba(255,255,255,0.45)', lineHeight:1.5 }}>{t.desc}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* =============================================
   LANDING / APP ROUTER
   ============================================= */
var TOOLS = [
  { id:'note',   icon:'📝', name:'note記事生成',       desc:'テーマ・文字数を設定してAIが有料記事を自動生成',  badge:'人気No.1' },
  { id:'bonus',  icon:'🎁', name:'購入者特典生成',      desc:'記事から特典コンテンツを自動提案・生成',          badge:'NEW' },
  { id:'image',  icon:'🖼️', name:'画像プロンプト生成',  desc:'記事に合うAI画像プロンプトを自動生成',            badge:'' },
  { id:'dash',   icon:'📊', name:'ダッシュボード',      desc:'ツール一覧とAPIキー管理',                         badge:'' },
];

function App() {
  var screenState = useState('landing');
  var screen = screenState[0]; var setScreen = screenState[1];

  if (screen === 'note')   return <NoteGenerator onBack={function() { setScreen('landing'); }} />;
  if (screen === 'bonus')  return <BonusGenerator onBack={function() { setScreen('landing'); }} />;
  if (screen === 'image')  return <ImagePromptGenerator onBack={function() { setScreen('landing'); }} />;
  if (screen === 'dash')   return <Dashboard onBack={function() { setScreen('landing'); }} />;

  return (
    <div className="landing">
      <div className="landing-grid" />
      <div className="landing-badge">✦ note AI Tools</div>
      <h1 className="landing-title">
        note<span>AI</span><br />Tools
      </h1>
      <p className="landing-sub">
        Claude・Gemini・ChatGPT・Grokを使った<br />
        note特化AIツール集
      </p>
      <div className="ai-badges">
        {AI_LIST.map(function(ai) {
          return (
            <div key={ai.id} className="ai-badge">
              <div className="ai-dot" style={{ background: ai.color }} />
              {ai.label}
            </div>
          );
        })}
      </div>
      <div className="tool-cards-landing">
        {TOOLS.map(function(tool) {
          return (
            <div key={tool.id} className="tool-card-landing" onClick={function() { setScreen(tool.id); }}>
              {tool.badge && (
                <div style={{ display:'inline-block', background:'rgba(233,69,96,0.2)', border:'1px solid rgba(233,69,96,0.4)', borderRadius:100, padding:'2px 8px', fontSize:9, color:'#e94560', fontWeight:800, letterSpacing:'0.1em', marginBottom:8 }}>{tool.badge}</div>
              )}
              <div className="tool-card-icon">{tool.icon}</div>
              <div className="tool-card-name">{tool.name}</div>
              <div className="tool-card-desc">{tool.desc}</div>
            </div>
          );
        })}
      </div>
      <p style={{ position:'relative', zIndex:1, fontSize:12, color:'rgba(255,255,255,0.2)', marginTop:8 }}>
        APIキーはブラウザに安全に保存。サーバーには送信されません。
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
