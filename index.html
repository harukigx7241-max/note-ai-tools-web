      const aiList = [
        { name: 'ChatGPT', url: 'https://chatgpt.com', color: 'bg-success' },
        { name: 'Claude', url: 'https://claude.ai', color: 'bg-orange-500' },
        { name: 'Gemini', url: 'https://gemini.google.com', color: 'bg-brand' },
        { name: 'Perplexity', url: 'https://www.perplexity.ai', color: 'bg-white' }
      ];
      return h('div', { className: 'bg-white/5 border border-brand/20 rounded-2xl p-6 my-8 text-center animate-fade-in' },
        h('p', { className: 'text-brand-light text-sm font-black mb-5' }, '🚀 送信先のAIを選択してください'),
        h('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-3' },
          aiList.map(ai => h('a', { key: ai.name, href: ai.url, target: '_blank', className: 'bg-white/10 hover:bg-white/20 py-3 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2 group' }, 
            h('span', { className: 'w-2 h-2 rounded-full ' + ai.color + ' group-hover:animate-pulse' }), ai.name
          ))
        ),
        props.showImport && h('p', { className: 'text-[10px] text-white/30 mt-5' }, '※回答が完了したら全てコピーして「📥 AI回答読込」に貼り付けてください')
      );
    };

    /* =========================================================================
       4. ツールエンジン (絶対不壊の実行コア)
       ========================================================================= */
    const ToolEngine = function(props) {
      const { tid, username, role, onBack } = props;
      const conf = TOOLS[tid];
      
      const [db, setDb] = useState(AppDatabase.load());
      const uData = db.users[username];
      const pid = uData.curProj;
      const [vals, setVals] = useState(uData.projects[pid].data[tid] || {});
      
      const [activeTab, setActiveTab] = useState('settings');
      const [copied, setCopied] = useState({});
      const [showLauncher, setShowLauncher] = useState(false);
      const [importTxt, setImportTxt] = useState('');
      const [result, setResult] = useState(null);
      const [err, setErr] = useState('');

      const updateValue = (fid, val) => {
        const nv = Object.assign({}, vals, { [fid]: val });
        setVals(nv);
        if (role !== 'admin') {
          const newDb = AppDatabase.load();
          newDb.users[username].projects[pid].data[tid] = nv;
          AppDatabase.save(newDb);
        }
      };

      const handleMagic = (fid, isMain) => {
        if (isMain) {
          const genre = vals.genre || 'お金・副業';
          const age = vals.age || '30代';
          const pool = MAGIC_DATABASE[genre] ? (MAGIC_DATABASE[genre][age] || MAGIC_DATABASE[genre]['全年齢']) : MAGIC_DATABASE['お金・副業']['全年齢'];
          const concept = pool[Math.floor(Math.random() * pool.length)];
          
          const newVals = Object.assign({}, vals, {
            theme: concept.theme,
            target_detail: age + 'の' + concept.target,
            benefit: concept.benefit,
            authority: concept.authority,
            price: concept.price,
            free_vol: concept.free,
            paid_vol: concept.paid
          });
          setVals(newVals);
          updateValue('theme', concept.theme); // 保存
        } else {
          const fObj = conf.fields.find(x => x.id === fid);
          if (fObj && fObj.magic) updateValue(fid, fObj.magic);
        }
      };

      const handleGenerate = () => {
        const aiPlan = uData.brand.plan || 'free';
        const brand = uData.brand || {};
        const prefix = aiPlan === 'paid' ? 
          '【システム: 有料版AIリミッター解除】高度な推論と最新のWeb情報を活用して出力せよ。\n' : 
          '【システム: 無料版AI節約モード】短く簡潔に、エラーが起きないよう要点のみ出力せよ。\n';
        const context = brand.name ? `【著者情報】${brand.name} ターゲット:${brand.target}\n\n` : '';
        
        copyToClipboard(prefix + context + conf.build(vals), copied, setCopied, 'gen');
        setShowLauncher(true);
        if (!conf.isOnePage) setActiveTab('import');
      };

      const handleImport = () => {
        if (conf.noJson) { setResult(importTxt); setActiveTab('preview'); return; }
        const parsed = safeJSONParse(importTxt);
        if (parsed) { setResult(parsed); setActiveTab('preview'); setImportTxt(''); }
        else setErr('JSON形式ではありません。AIの回答をそのまま貼り付けてください。');
      };

      const header = h('div', { className: 'tool-header animate-in' },
        h('div', { className: 'flex items-center gap-4 mb-8' },
          h('button', { onClick: onBack, className: 'bg-white/10 hover:bg-white/20 px-5 py-2.5 rounded-xl text-sm font-bold transition' }, '← 戻る'),
          h('div', null,
            h('h1', { className: 'text-2xl font-black' }, conf.name),
            h('p', { className: 'text-xs text-slate-500' }, conf.desc)
          )
        )
      );

      const tabs = h('div', { className: 'tabs-container hide-scrollbar' },
        [{id:'settings', l:'⚙️ 条件設定'}, {id:'import', l:'📥 AI回答読込'}, {id:'preview', l:'👁 結果確認'}].map(t =>
          h('button', { key: t.id, onClick: () => setActiveTab(t.id), className: 'tab-item ' + (activeTab === t.id ? 'active' : '') }, t.l)
        )
      );

      // --- UI描画ロジック ---
      if (conf.isOnePage) {
        return h('div', { className: 'w-full max-w-4xl mx-auto' },
          header,
          h('div', { className: 'bg-brand/5 border border-brand/20 rounded-2xl p-6 mb-8 text-sm text-white/70 italic' }, conf.tut),
          conf.fields.map(f => h(InputField, { key: f.id, f: f, val: vals[f.id], onChange: updateValue, onMagic: handleMagic })),
          h('button', { onClick: handleGenerate, className: 'magic-button-gradient w-full py-5 rounded-2xl text-white font-black text-lg mb-6' }, copied.gen ? '✓ コピー完了！AIへ送信してください' : '📋 プロンプト生成 ＆ コピー'),
          showLauncher && h(Launcher, { showImport: false }),
          h('div', { className: 'glass rounded-3xl p-8 mt-10' },
            h('span', { className: 'block text-xs font-black text-slate-400 mb-4' }, '📥 AIの回答を貼り付けて保存'),
            h('textarea', { className: 'input-premium min-h-[400px]', value: result || '', onChange: e => setResult(e.target.value) }),
            h('button', { onClick: () => copyToClipboard(result, copied, setCopied, 'ca'), className: 'w-full bg-white/10 hover:bg-white/20 py-4 rounded-xl font-bold mt-5' }, copied.ca ? '✓ コピー完了' : '📋 全文コピー')
          )
        );
      }

      return h('div', { className: 'w-full max-w-4xl mx-auto' },
        header,
        tabs,
        activeTab === 'settings' && h('div', { className: 'animate-slide-up' },
          h('div', { className: 'bg-brand/5 border border-brand/20 rounded-2xl p-6 mb-8 text-sm text-white/70' }, conf.tut),
          conf.fields.map(f => h(InputField, { key: f.id, f: f, val: vals[f.id], onChange: updateValue, onMagic: handleMagic })),
          h('button', { onClick: handleGenerate, className: 'magic-button-gradient w-full py-5 rounded-2xl text-white font-black text-lg mb-6' }, copied.gen ? '✓ コピー完了！' : '📋 プロンプト生成 ＆ コピー'),
          showLauncher && h(Launcher, { showImport: true })
        ),
        activeTab === 'import' && h('div', { className: 'glass rounded-3xl p-8 animate-slide-up' },
          h('span', { className: 'block text-xs font-black text-slate-400 mb-4' }, '📥 AIの出力を貼り付け'),
          h('textarea', { className: 'input-premium min-h-[300px]', value: importTxt, onChange: e => setImportTxt(e.target.value) }),
          err && h('p', { className: 'text-brand-danger text-sm font-bold mt-4' }, '❌ ' + err),
          h('button', { onClick: handleImport, disabled: !importTxt.trim(), className: 'w-full bg-brand py-4 rounded-xl font-bold mt-6 disabled:opacity-50' }, 'データを解析して反映')
        ),
        activeTab === 'preview' && result && h('div', { className: 'glass rounded-3xl p-8 animate-slide-up' }, h(DataViewer, { data: result }))
      );
    };

    /* =========================================================================
       5. 管理者：オメガ・ダッシュボード (SaaS Analytics & Visibility)
       ========================================================================= */
    const AdminDashboard = function(props) {
      const [db, setDb] = useState(AppDatabase.load());
      const [tab, setTab] = useState('analytics');
      const [expUser, setExpUser] = useState(null);

      const toggleVisibility = (tid) => {
        const newDb = AppDatabase.load();
        newDb.config.toolVisibility[tid] = !newDb.config.toolVisibility[tid];
        AppDatabase.save(newDb);
        setDb(newDb);
      };

      const userKeys = Object.keys(db.users).filter(k => k !== 'admin');
      const premiumCount = userKeys.filter(k => Object.keys(db.users[k].perms || {}).length > 0).length;
      const mrr = premiumCount * 9800;

      const TabBtn = (id, l) => h('button', { onClick: () => setTab(id), className: 'px-6 py-4 text-sm font-black transition-all border-b-2 ' + (tab===id ? 'border-brand text-brand' : 'border-transparent text-slate-500') }, l);

      return h('div', { className: 'w-full animate-fade-in' },
        h('div', { className: 'flex flex-col md:flex-row justify-between items-center mb-10 gap-6' },
          h('h1', { className: 'text-3xl font-black italic' }, '💎 Omega Dash'),
          h('div', { className: 'flex gap-3' },
            h('button', { onClick: props.onGoApp, className: 'magic-button-gradient px-8 py-3 rounded-full font-black text-sm' }, '🚀 ユーザー画面へ'),
            h('button', { onClick: props.onLogout, className: 'bg-white/10 px-8 py-3 rounded-full font-black text-sm' }, 'ログアウト')
          )
        ),
        
        h('div', { className: 'flex gap-2 overflow-x-auto mb-10 hide-scrollbar border-b border-white/5' },
          TabBtn('analytics', '📊 アナリティクス'), TabBtn('users', '👥 ユーザー管理'), TabBtn('tools', '🛠 ツール表示設定'), TabBtn('inqs', '📩 問い合わせ')
        ),

        tab === 'analytics' && h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6 animate-slide-up' },
          h('div', { className: 'glass p-8 rounded-[2rem]' }, h('p', { className: 'text-xs font-bold text-slate-500 mb-2 uppercase' }, '推定月間収益 (MRR)'), h('p', { className: 'text-4xl font-black text-brand-success' }, '¥' + mrr.toLocaleString())),
          h('div', { className: 'glass p-8 rounded-[2rem]' }, h('p', { className: 'text-xs font-bold text-slate-500 mb-2 uppercase' }, '総登録ユーザー'), h('p', { className: 'text-4xl font-black text-white' }, userKeys.length + '名')),
          h('div', { className: 'glass p-8 rounded-[2rem]' }, h('p', { className: 'text-xs font-bold text-slate-500 mb-2 uppercase' }, 'プレミアム転換率'), h('p', { className: 'text-4xl font-black text-brand-gold' }, Math.round((premiumCount/userKeys.length||0)*100) + '%'))
        ),

        tab === 'tools' && h('div', { className: 'glass rounded-[2rem] p-8 animate-slide-up' },
          h('p', { className: 'text-brand-accent font-bold mb-6 flex items-center gap-2' }, '⚠️ チェックを外すと、一般ユーザーの画面からツールが消えます。'),
          h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4' },
            Object.keys(TOOLS).map(tid => h('label', { key: tid, className: 'flex items-center justify-between bg-white/5 p-4 rounded-xl border border-white/5 hover:bg-white/10 transition cursor-pointer' },
              h('div', { className: 'flex items-center gap-3' }, h('span', null, TOOLS[tid].icon), h('span', { className: 'text-sm font-bold' }, TOOLS[tid].name)),
              h('input', { type: 'checkbox', className: 'w-6 h-6 accent-brand', checked: db.config.toolVisibility[tid] !== false, onChange: () => toggleVisibility(tid) })
            ))
          )
        ),

        tab === 'users' && h('div', { className: 'glass rounded-[2rem] overflow-hidden animate-slide-up' },
          h('table', { className: 'w-full text-left' },
            h('thead', { className: 'bg-white/5' }, h('tr', null, ['ユーザー名', 'SNS', '状態', '操作'].map(th => h('th', { className: 'p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest' }, th)))),
            h('tbody', { className: 'divide-y divide-white/5' }, userKeys.map(k => h('tr', { key: k, className: 'hover:bg-white/5 transition' },
              h('td', { className: 'p-5 font-bold' }, k),
              h('td', { className: 'p-5 text-brand-light' }, db.users[k].sns),
              h('td', { className: 'p-5' }, h('span', { className: 'px-3 py-1 rounded-full text-[10px] font-black ' + (db.users[k].status==='approved'?'bg-success/20 text-success':'bg-brand-accent/20 text-brand-accent') }, db.users[k].status)),
              h('td', { className: 'p-5' }, h('button', { onClick: () => { const n=AppDatabase.load(); n.users[k].status='approved'; AppDatabase.save(n); setDb(n); }, className: 'text-brand-success font-black text-xs' }, '許可'))
            )))
          )
        ),

        // フッター：バージョン表示
        h('div', { className: 'mt-20 pt-10 border-t border-white/5 text-center' },
          h('p', { className: 'text-[10px] font-black text-slate-700 tracking-[0.3em] uppercase' }, 'System Engine: ' + db.config.version)
        )
      );
    };

    /* =========================================================================
       6. メインアプリケーション (ユーザー画面)
       ========================================================================= */
    const MainApp = function(props) {
      const [screen, setScreen] = useState('home');
      const db = AppDatabase.load();
      const uData = db.users[props.user] || {};
      const [inqOpen, setInqOpen] = useState(false);

      if (screen === 'settings') {
        const [b, setB] = useState(uData.brand || { plan: 'free', name: '', target: '', tone: '' });
        return h('div', { className: 'w-full max-w-2xl mx-auto animate-slide-up' },
          h('div', { className: 'flex items-center gap-4 mb-10' }, h('button', { onClick: () => setScreen('home'), className: 'bg-white/10 px-4 py-2 rounded-xl text-sm font-bold' }, '← 戻る'), h('h1', { className: 'text-2xl font-black' }, '👤 マイ設定')),
          h('div', { className: 'glass rounded-3xl p-8 space-y-6' },
            h('div', null, h('span', { className: 'block text-xs font-black text-slate-400 mb-3' }, '🤖 AIプラン選択'), h('select', { className: 'input-premium', value: b.plan, onChange: e => setB({...b, plan: e.target.value}) }, h('option', {value:'free'}, '無料版 AI'), h('option', {value:'paid'}, '有料版 AI'))),
            h('div', null, h('span', { className: 'block text-xs font-black text-slate-400 mb-3' }, 'あなたの名前/肩書き'), h('input', { className: 'input-premium', value: b.name, onChange: e => setB({...b, name: e.target.value}) })),
            h('button', { onClick: () => { const n=AppDatabase.load(); n.users[props.user].brand=b; AppDatabase.save(n); alert('保存しました'); setScreen('home'); }, className: 'w-full magic-button-gradient py-4 rounded-xl font-black' }, '設定を保存')
          )
        );
      }

      if (TOOLS[screen]) return h(ToolEngine, { tid: screen, username: props.user, role: props.role, onBack: () => setScreen('home') });

      const usageCount = (uData.usage && uData.usage.date === new Date().toDateString()) ? uData.usage.count : 0;

      return h('div', { className: 'w-full animate-fade-in' },
        // 上部アクション
        h('div', { className: 'fixed top-4 right-4 md:top-8 md:right-8 z-50 flex gap-3' },
          props.role === 'admin' && h('button', { onClick: props.onGoAdmin, className: 'bg-brand-accent text-white px-5 py-2.5 rounded-full text-[10px] font-black shadow-lg shadow-brand-accent/20' }, '🎛️ DASHBOARD'),
          h('div', { className: 'glass px-5 py-2.5 rounded-full text-[10px] font-black text-white/50 border-white/5' }, 'USAGE: ' + usageCount + '/' + DAILY_LIMIT),
          h('button', { onClick: props.onLogout, className: 'bg-white/5 hover:bg-white/10 px-5 py-2.5 rounded-full text-[10px] font-black transition' }, 'LOGOUT')
        ),

        // ヒーロー
        h('div', { className: 'text-center mt-20 mb-24 animate-slide-up' },
          h('div', { className: 'inline-block bg-brand/10 border border-brand/20 px-4 py-1.5 rounded-full mb-8' }, h('span', { className: 'magic-text-gradient text-[10px] font-black tracking-[0.4em] uppercase' }, 'AI Content Pro Divine')),
          h('h1', { className: 'text-5xl md:text-7xl font-black tracking-tighter mb-8 leading-tight text-white' }, 'Master of ', h('span', { className: 'text-brand' }, 'Marketing')),
          h('p', { className: 'text-slate-500 text-lg md:text-xl max-w-2xl mx-auto' }, 'クラウドワークス案件から独自の販売まで。', h('br'), 'すべてを完全自動化する、あなただけのAI軍団。'),
          h('div', { className: 'flex justify-center gap-4 mt-12' },
            h('button', { onClick: () => setScreen('settings'), className: 'glass px-8 py-4 rounded-2xl font-black text-sm hover:bg-white/5 transition flex items-center gap-3' }, h('span', { className: 'text-xl' }, '👤'), 'ブランド ＆ AI設定')
          )
        ),

        // カテゴリ描画
        CATEGORIES.map(cat => {
          const visibleTools = cat.tools.filter(tid => db.config.toolVisibility[tid] !== false);
          if (visibleTools.length === 0) return null;

          return h('div', { key: cat.id, className: 'mb-20' },
            h('h2', { className: 'text-xl font-black text-white mb-10 flex items-center gap-4' }, h('div', { className: 'w-10 h-1.5 bg-brand rounded-full' }), cat.name),
            h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8' },
              visibleTools.map(tid => {
                const t = TOOLS[tid];
                return h('div', { key: tid, onClick: () => setScreen(tid), className: 'glass rounded-[2.5rem] p-8 md:p-10 transition duration-500 group hover:-translate-y-2 hover:border-brand/40 hover:bg-brand/5 cursor-pointer relative overflow-hidden' },
                  h('div', { className: 'absolute -right-4 -top-4 w-24 h-24 bg-brand/5 rounded-full blur-2xl group-hover:bg-brand/20 transition' }),
                  h('div', { className: 'flex justify-between items-start mb-8 relative z-10' },
                    h('div', { className: 'text-5xl group-hover:scale-110 transition duration-500' }, t.icon),
                    t.badge && h('span', { className: 'bg-brand/10 text-brand text-[10px] font-black px-3 py-1.5 rounded-lg border border-brand/20' }, t.badge)
                  ),
                  h('h3', { className: 'text-xl font-black mb-4 text-white/90 group-hover:text-white transition' }, t.name),
                  h('p', { className: 'text-sm text-slate-500 leading-relaxed' }, t.desc)
                );
              })
            )
          );
        })
      );
    };

    /* =========================================================================
       7. ログイン ＆ ルート制御
       ========================================================================= */
    const AuthScreen = function(props) {
      const [u, setU] = useState(''); const [p, setP] = useState('');
      const handleLogin = () => {
        const db = AppDatabase.load();
        if (u === db.config.adminU && p === db.config.adminP) {
          localStorage.setItem(SESS_KEY, JSON.stringify({ u, r: 'admin' }));
          props.onLogin(u, 'admin');
        } else if (db.users[u] && db.users[u].status === 'approved') {
          localStorage.setItem(SESS_KEY, JSON.stringify({ u, r: 'approved' }));
          props.onLogin(u, 'approved');
        } else alert('ユーザー名またはパスワードが正しくないか、承認待ちです。');
      };
      return h('div', { className: 'w-full max-w-md mt-24 animate-in' },
        h('div', { className: 'glass rounded-[3rem] p-10 md:p-14 shadow-2xl text-center' },
          h('h2', { className: 'text-3xl font-black mb-12 tracking-tighter' }, 'AI Content Pro'),
          h('div', { className: 'space-y-6' },
            h('input', { className: 'input-premium', placeholder: 'ユーザー名', value: u, onChange: e => setU(e.target.value) }),
            h('input', { className: 'input-premium', type: 'password', placeholder: 'パスワード', value: p, onChange: e => setP(e.target.value) }),
            h('button', { onClick: handleLogin, className: 'w-full magic-button-gradient py-5 rounded-2xl text-white font-black text-lg mt-6' }, 'ログイン')
          ),
          h('p', { className: 'text-xs text-slate-600 font-bold mt-10' }, '新規の方は申請フォームから送信してください')
        )
      );
    };

    const Root = function() {
      const [auth, setAuth] = useState({ u: null, r: null });
      const [isAdminTab, setIsAdminTab] = useState(false);

      useEffect(() => {
        const session = localStorage.getItem(SESS_KEY);
        if (session) setAuth(JSON.parse(session));
      }, []);

      const onLogout = () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); setIsAdminTab(false); };

      if (!auth.u) return h(AuthScreen, { onLogin: (u, r) => setAuth({ u, r }) });
      if (auth.r === 'admin' && isAdminTab) return h(AdminDashboard, { onGoApp: () => setIsAdminTab(false), onLogout });
      
      return h(MainApp, { user: auth.u, role: auth.r, onLogout, onGoAdmin: () => setIsAdminTab(true) });
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(h(Root));

  })();
  </script>
</body>
</html>
