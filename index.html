*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#0d0d1a;color:#fff;min-height:100vh;overflow-x:hidden;line-height:1.6}
button,input,textarea,select{font-family:inherit;font-size:16px}
button{-webkit-tap-highlight-color:transparent;cursor:pointer}
a{-webkit-tap-highlight-color:transparent}
/* LANDING */
.pg{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;position:relative;overflow-x:hidden;background:linear-gradient(135deg,#0d0d1a,#1a0a2e 50%,#0a1628)}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.z1{position:relative;z-index:1}
.badge-sm{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:6px 18px;font-size:11px;font-weight:700;letter-spacing:.15em;color:rgba(255,255,255,.7);margin-bottom:24px}
.main-ttl{font-size:clamp(48px,12vw,88px);font-weight:900;line-height:1.0;text-align:center;margin-bottom:16px}
.main-ttl span{color:#e94560}
.main-sub{font-size:15px;color:rgba(255,255,255,.5);text-align:center;line-height:1.8;margin-bottom:22px}
.ai-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:32px}
.ai-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:6px 14px;font-size:13px;font-weight:600}
.ai-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* TOOL CARDS */
.tool-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:840px;margin-bottom:28px}
.tool-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:20px 16px;cursor:pointer;transition:background .2s,transform .15s;text-align:left}
.tool-card:hover{background:rgba(255,255,255,.08);border-color:rgba(233,69,96,.4);transform:translateY(-2px)}
.tc-badge{display:inline-block;background:rgba(233,69,96,.2);border:1px solid rgba(233,69,96,.4);border-radius:100px;padding:2px 8px;font-size:9px;color:#e94560;font-weight:800;letter-spacing:.1em;margin-bottom:7px}
.tc-icon{font-size:26px;margin-bottom:7px}
.tc-name{font-size:14px;font-weight:800;color:#fff;margin-bottom:4px}
.tc-desc{font-size:11px;color:rgba(255,255,255,.4);line-height:1.5}
/* THEME BOX */
.tbox{width:100%;max-width:840px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:20px;margin-bottom:22px}
.blbl{font-size:11px;font-weight:800;color:rgba(255,255,255,.45);letter-spacing:.1em;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:12px}
.chip{padding:7px 13px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s}
.chip:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.chip-on{background:rgba(233,69,96,.2) !important;border-color:rgba(233,69,96,.6) !important;color:#fff !important}
.chip-age-on{background:rgba(99,102,241,.2) !important;border-color:rgba(99,102,241,.6) !important;color:#fff !important}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:7px;margin-bottom:12px}
.titem{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.8);line-height:1.5;transition:all .15s}
.titem:hover{background:rgba(255,255,255,.08);border-color:rgba(233,69,96,.3)}
.titem-on{background:rgba(233,69,96,.12) !important;border-color:rgba(233,69,96,.6) !important}
.tnum{font-size:10px;font-weight:800;color:rgba(255,255,255,.25);min-width:15px;flex-shrink:0}
.sw-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:14px}
.sw-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:10px 14px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.8);transition:all .12s;line-height:1.5}
.sw-item:hover{background:rgba(255,255,255,.08)}
.sw-sit{background:rgba(99,102,241,.12) !important;border-color:rgba(99,102,241,.5) !important;color:#fff !important}
.sw-wry{background:rgba(251,191,36,.1) !important;border-color:rgba(251,191,36,.4) !important;color:#fff !important}
.sw-lbl{font-size:12px;font-weight:800;color:rgba(255,255,255,.6);margin-bottom:8px}
.brow{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.btn-back{padding:8px 13px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.55);font-size:13px;cursor:pointer}
.btn-rl{display:flex;align-items:center;gap:5px;padding:9px 16px;border-radius:9px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.btn-primary{padding:11px 24px;border-radius:9px;background:linear-gradient(135deg,#e94560,#c2185b);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(233,69,96,.4)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-go{width:100%;padding:14px;border-radius:11px;background:linear-gradient(135deg,#e94560,#c2185b);border:none;color:#fff;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 5px 18px rgba(233,69,96,.4);transition:opacity 0.2s}
.btn-go:disabled{opacity:0.4;cursor:not-allowed}
.ld-txt{text-align:center;padding:18px;color:rgba(255,255,255,.5);font-size:13px;font-weight:700}

.cinp{width:100%;padding:12px 13px;margin-bottom:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:16px;outline:none}
.cinp:focus{border-color:rgba(233,69,96,.5)}
.cta{resize:vertical;min-height:90px}
.btn-send{width:100%;padding:13px;border-radius:8px;background:linear-gradient(135deg,#e94560,#c2185b);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer}

.app{min-height:100vh;background:linear-gradient(135deg,#0d0d1a,#1a0a2e 50%,#0a1628)}
.app-hd{background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.07);padding:11px 16px;display:flex;justify-content:space-between;align-items:center;position:-webkit-sticky;position:sticky;top:0;z-index:50;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.app-hd-l{display:flex;align-items:center;gap:9px}
.back-btn{padding:7px 12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:7px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.app-ttl{font-size:15px;font-weight:900;color:#fff;margin:0}
.app-sub{font-size:11px;color:rgba(255,255,255,.35);margin:2px 0 0}
.ai-bdg{background:linear-gradient(135deg,#e94560,#c2185b);border-radius:5px;padding:2px 8px;font-size:10px;font-weight:800;letter-spacing:.06em}
.key-btn{padding:7px 12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:7px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.app-body{max-width:720px;margin:0 auto;padding:16px 12px}
.tabs{background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:12px 15px;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.35);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.tab-on{color:#fff !important;border-bottom-color:#e94560 !important}
.tab:disabled{opacity:.25;cursor:not-allowed}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:15px 16px;margin-bottom:11px}
.lbl{color:rgba(255,255,255,.55);font-size:11px;font-weight:700;letter-spacing:.1em;display:block;margin-bottom:9px}
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:16px;outline:none;padding:11px 13px}
.inp:focus{border-color:rgba(233,69,96,.5)}
.hint{font-size:11px;color:rgba(255,255,255,.28);margin-top:5px}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:6px 12px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s}
.pill:hover{background:rgba(255,255,255,.1)}
.pill-on{background:rgba(233,69,96,.2) !important;border-color:rgba(233,69,96,.5) !important;color:#fff !important}
.warn{background:rgba(255,180,0,.09);border:1px solid rgba(255,180,0,.3);border-radius:9px;padding:10px 12px;font-size:12px;color:#fcd34d;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.err{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.3);border-radius:9px;padding:10px 12px;font-size:13px;color:#f87171;margin-bottom:9px}
.genbtn{width:100%;border-radius:11px;border:none;cursor:pointer;position:relative;overflow:hidden}
.genbtn:disabled{cursor:not-allowed}
.gen-ov{position:absolute;inset:0;background:rgba(0,0,0,.3);border-radius:11px}
.gen-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(233,69,96,.35)}
.gen-in{position:relative;z-index:2;padding:16px 20px;display:flex;flex-direction:column;align-items:center;gap:5px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1a1a2e;border:1px solid rgba(255,255,255,.12);border-radius:15px;padding:24px 20px;width:100%;max-width:390px}
.ai-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ai-card{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:9px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s}
.ai-card-on{border-color:#e94560 !important;background:rgba(255,255,255,.1) !important}
.ai-ico{font-size:20px;margin-bottom:3px}
.ai-nm{font-size:10px;font-weight:700;color:#fff}
.ai-st{font-size:9px;margin-top:2px}
.prev-box{background:#fff;border-radius:11px;overflow:hidden;box-shadow:0 12px 36px rgba(0,0,0,.4)}
.post-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin-bottom:8px}
.post-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.06)}
.post-body{padding:10px 13px;max-height:90px;overflow-y:auto;font-size:13px;color:rgba(255,255,255,.5);white-space:pre-wrap;line-height:1.7}
.cpbtn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s}
.edit-ta{width:100%;min-height:460px;padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:14px;line-height:1.8;resize:vertical;outline:none;font-family:monospace}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}
@media(max-width:560px){
  .main-ttl{font-size:44px}
  .tool-grid{grid-template-columns:repeat(2,1fr)}
  .tgrid{grid-template-columns:1fr}
  .sw-grid{grid-template-columns:1fr}
  .ai-grid{grid-template-columns:repeat(2,1fr)}
  .app-ttl{font-size:13px}
  .tc-desc{display:none}
  .tbox{padding:14px 12px}
  .app-body{padding:12px 10px}
  .modal{padding:18px 14px}
  .edit-ta{min-height:280px}
}
</style>

function apiClaude(msgs,sys,max){
  var key=getKey('claude');
  if(!key)return Promise.reject(new Error('Claude APIキー未設定'));
  var body={model:'claude-3-7-sonnet-20250219',max_tokens:max,messages:msgs};
  if(sys)body.system=sys;
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  }).then(function(r){
    if(!r.ok)return r.json().catch(function(){return{};}).then(function(e){throw new Error((e.error&&e.error.message)||('Claude APIエラー '+r.status));});
    return r.json();
  }).then(function(d){
    return d.content.filter(function(c){return c.type==='text';}).map(function(c){return c.text;}).join('');
  });
}
function apiGemini(msgs,sys,max){
  var key=getKey('gemini');
  if(!key)return Promise.reject(new Error('Gemini APIキー未設定'));
  var models=['gemini-2.5-pro','gemini-2.0-flash'];
  var contents=msgs.map(function(m){return{role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]};});
  var body={contents:contents,generationConfig:{maxOutputTokens:max}};
  if(sys)body.systemInstruction={parts:[{text:sys}]};
  function tryM(i){
    if(i>=models.length)return Promise.reject(new Error('Gemini 全モデル失敗'));
    return fetch('https://generativelanguage.googleapis.com/v1beta/models/'+models[i]+':generateContent?key='+key,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
    }).then(function(r){
      if(!r.ok){if(r.status===404||r.status===429)return tryM(i+1);return r.json().catch(function(){return{};}).then(function(e){throw new Error((e.error&&e.error.message)||'Gemini APIエラー');});}
      return r.json();
    }).then(function(d){
      var p=d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts;
      return (p||[]).map(function(x){return x.text||'';}).join('');
    });
  }
  return tryM(0);
}
function apiChatGPT(msgs,sys,max){
  var key=getKey('chatgpt');
  if(!key)return Promise.reject(new Error('ChatGPT APIキー未設定'));
  var messages=sys?[{role:'system',content:sys}].concat(msgs):msgs.slice();

    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},

    return r.json();
  }).then(function(d){
    return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'';
  });
}

function buildPrompt(o){
  var tl=(THEMES.find(function(t){return t.id===o.theme;})||{}).label||o.theme;
  var toneL=(TONES.find(function(t){return t.id===o.tone;})||{}).label||o.tone;
  var ageL=(AGES.find(function(a){return a.id===o.age;})||{}).label||o.age;
  var ctxMap={'10s':'10代・学生','20s':'20代・社会人','30s':'30代・育児・キャリア','40s':'40代・老後・健康','50s':'50代以上・定年','all':'全年代共通'};
  var kw=(SEO_KW[o.theme]||SEO_KW.other).slice(0,4).join('・');
  var ft=Math.max(50,Math.round(o.freeWC*0.1));
  var pt=Math.max(50,Math.round(o.paidWC*0.1));
  return 'あなたは人気noteクリエイターかつSEOライターです。以下の条件でnoteの有料記事を作成してください。\n\n'
    +'## ターゲット読者\n'

    +'- 文体: '+toneL+' / 販売価格: ¥'+o.price.toLocaleString()+'\n\n'
    +'## SEO（必須）\n'
    +'- キーワード: '+kw+'\n\n'

// ── 強化版 JSON解析ユーティリティ ──
function parseJSON(text){
  var clean=text.replace(/```(?:json)?\n?/gi,'').replace(/```/g,'').trim();
  var m=clean.match(/\{[\s\S]*\}/);
  if(m){ try{return JSON.parse(m[0]);}catch(e){} }
  return JSON.parse(clean);
}

// ── ファイル読み込み ──
function readFile(file){
  if(!file)return Promise.resolve('');
  if(file.name.toLowerCase().indexOf('.docx')>=0&&typeof mammoth!=='undefined'){
    return file.arrayBuffer().then(function(buf){return mammoth.extractRawText({arrayBuffer:buf});}).then(function(r){return r.value;});
  }
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(e){res(e.target.result);};
    r.onerror=rej;
    r.readAsText(file,'utf-8');
  });
}
