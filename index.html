<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Content Pro (SaaS Edition)</title>
  <!-- React ライブラリの読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  
  <style>
    /* =========================================================================
       Base Reset & Typography
       ========================================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #0d0d1a;
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }
    button, input, textarea, select {
      font-family: inherit;
      font-size: 14px;
      color: #ffffff;
      outline: none;
      border: none;
    }
    button { cursor: pointer; background: transparent; }
    a { text-decoration: none; color: inherit; }

    /* =========================================================================
       Layouts
       ========================================================================= */
    .page-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px 80px;
      position: relative;
      background: linear-gradient(135deg, #0d0d1a, #1a0a2e 50%, #0a1628);
    }
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .content-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 920px;
    }

    /* =========================================================================
       Typography & Titles
       ========================================================================= */
    .main-title {
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 10px;
    }
    .main-title span { color: #38bdf8; }
    .main-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      margin-bottom: 30px;
    }
    .category-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 16px;
      color: #38bdf8;
      border-bottom: 2px solid rgba(56, 189, 248, 0.2);
      padding-bottom: 8px;
    }

    /* =========================================================================
       Dashboard Grid & Tool Cards
       ========================================================================= */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    .tool-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .tool-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(56, 189, 248, 0.4);
      transform: translateY(-2px);
    }
    .tool-card.locked {
      opacity: 0.5;
      filter: grayscale(100%);
    }
    .tool-card.locked:hover {
      transform: none;
      border-color: rgba(255, 255, 255, 0.08);
    }
    .tool-icon { font-size: 26px; margin-bottom: 8px; }
    .tool-name { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
    .tool-desc { font-size: 12px; color: rgba(255, 255, 255, 0.5); line-height: 1.5; }

    /* Badges */
    .badge-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
    .badge {
      background: rgba(56, 189, 248, 0.15);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 50px;
      padding: 4px 10px;
      font-size: 10px;
      color: #38bdf8;
      font-weight: 800;
    }
    .badge.red { background: rgba(244, 63, 94, 0.15); border-color: rgba(244, 63, 94, 0.3); color: #f43f5e; }
    .status-badge { font-size: 10px; padding: 4px 10px; border-radius: 50px; font-weight: 800; }
    .status-badge.locked { background: #64748b; color: #ffffff; }
    .status-badge.unlimited { background: #10b981; color: #ffffff; }
    .status-badge.free { background: #6366f1; color: #ffffff; }

    /* =========================================================================
       UI Forms & Inputs
       ========================================================================= */
    .form-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .form-label {
      font-size: 13px;
      font-weight: 800;
      color: #94a3b8;
      display: block;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 14px;
      transition: all 0.2s;
    }
    .form-input:focus {
      border-color: #38bdf8;
      background: rgba(255, 255, 255, 0.06);
    }
    
    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      border-radius: 8px;
      padding: 16px 24px;
      font-size: 15px;
      font-weight: 800;
      box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
      transition: all 0.2s;
      width: 100%;
      text-align: center;
      margin-top: 10px;
      margin-bottom: 20px;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .btn-sub {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-sub:hover { background: rgba(255, 255, 255, 0.12); }
    
    .btn-copy {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.15s;
    }
    .btn-copy:hover { background: rgba(255, 255, 255, 0.15); }

    /* Layout Helpers */
    .flex-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .flex-1 { flex: 1; min-width: 200px; }
    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    /* =========================================================================
       Tool UI specifics & Panels
       ========================================================================= */
    .tutorial-panel {
      background: rgba(56, 189, 248, 0.05);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    .tutorial-title { font-size: 14px; font-weight: 800; color: #38bdf8; margin-bottom: 8px; }
    .tutorial-body { font-size: 13px; color: rgba(255, 255, 255, 0.8); line-height: 1.7; white-space: pre-wrap; }

    .tool-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 16px;
    }
    .tool-header-title { font-size: 18px; font-weight: 900; margin: 0; }

    .tabs-container {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 24px;
      gap: 12px;
    }
    .tab-item {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .tab-item.active { color: #38bdf8; border-bottom-color: #38bdf8; }

    /* AI Web Links Panel */
    .weblinks-panel {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }
    .weblinks-title { font-size: 13px; font-weight: 800; color: #38bdf8; margin-bottom: 14px; }
    .weblinks-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 14px; }
    .ai-btn {
      flex: 1; min-width: 120px; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 800;
      background: rgba(255, 255, 255, 0.1); transition: all 0.2s; text-align: center;
    }
    .ai-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }

    /* Results UI */
    .json-result-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      white-space: pre-wrap;
      color: #e2e8f0;
      margin-bottom: 12px;
      font-family: monospace;
      line-height: 1.6;
    }

    /* =========================================================================
       Modals & Auth & Admin
       ========================================================================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 48px rgba(0,0,0,0.6);
    }
    .auth-container {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      backdrop-filter: blur(12px);
    }
    
    .admin-table-wrapper { width: 100%; overflow-x: auto; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th, .admin-table td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      text-align: left;
    }
    .admin-table th { font-weight: 800; color: #94a3b8; }

    @media(max-width: 600px) {
      .main-title { font-size: 28px; }
      .tool-grid { grid-template-columns: 1fr; }
      .admin-table th, .admin-table td { padding: 10px 8px; font-size: 12px; }
      .auth-container { padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
  (function(){
    'use strict';
    
    // React Shortcuts (Explicit & Safe)
    const el = React.createElement;
    const { useState, useEffect, Fragment } = React;

    /* =========================================================================
       1. 自己修復型データベース (Error Boundary)
       ========================================================================= */
    const DB_KEY = 'AICP_v30_DB'; // 完全リセット用の新キー
    const SESS_KEY = 'AICP_v30_Sess';
    const DAILY_LIMIT = 3;

    const DEFAULT_UNLOCKED_TOOLS = ['note', 'research', 'lp', 'affiliate', 'backend', 'bonus'];

    const AppDB = {
      get: function() {
        let db = null;
        try {
          const raw = localStorage.getItem(DB_KEY);
          if (raw) db = JSON.parse(raw);
        } catch (error) {
          console.error("DB Read Error:", error);
        }

        // DBが存在しない場合は初期化
        if (!db || typeof db !== 'object') {
          db = this.createInitialDB();
          this.save(db);
        }

        // 自己修復（データ欠落によるNull参照エラーを完全に防ぐ）
        return this.repair(db);
      },
      save: function(db) {
        try {
          localStorage.setItem(DB_KEY, JSON.stringify(db));
        } catch (error) {
          console.error("DB Save Error:", error);
        }
      },
      createInitialDB: function() {
        return {
          admin: { password: 'admin123' },
          users: {
            'admin': { 
              status: 'approved', 
              sns: '@admin', 
              registeredAt: Date.now(), 
              usage: { date: '', count: 0 }, 
              perms: {}, 
              brand: { plan: 'paid', name: '管理者', target: '', tone: '' }, 
              projects: { 'default': { name: '管理者領域', data: {} } }, 
              curProj: 'default' 
            }
          },
          inquiries: []
        };
      },
      repair: function(db) {
        if (!db.admin) db.admin = { password: 'admin123' };
        if (!db.users) db.users = {};
        if (!db.inquiries) db.inquiries = [];

        Object.keys(db.users).forEach(username => {
          const user = db.users[username];
          if (!user.usage) user.usage = { date: '', count: 0 };
          if (!user.perms) user.perms = {};
          if (!user.brand) user.brand = { plan: 'free', name: '', target: '', tone: '' };
          if (!user.projects || typeof user.projects !== 'object') {
            user.projects = { 'default': { name: 'デフォルト', data: {} } };
          }
          if (!user.curProj || !user.projects[user.curProj]) {
            user.curProj = Object.keys(user.projects)[0] || 'default';
          }
          // 全プロジェクトのdataオブジェクトを保証（これがクラッシュの最大の原因だった）
          Object.keys(user.projects).forEach(pid => {
            if (!user.projects[pid].data) user.projects[pid].data = {};
          });
        });
        return db;
      }
    };

    // クリップボード安全コピー
    const copyToClipboard = (text, stateObj, setStateFunc, key) => {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(() => {});
        }
        setStateFunc({ ...stateObj, [key]: true });
        setTimeout(() => {
          setStateFunc(prevState => ({ ...prevState, [key]: false }));
        }, 2000);
      } catch (err) {
        console.error("Clipboard Error:", err);
      }
    };

    // 安全なJSONパース
    const safeParseJSON = (text) => {
      if (!text || typeof text !== 'string') return null;
      try {
        const clean = text.replace(/```(?:json)?\n?/gi, '').replace(/```/g, '').trim();
        const match = clean.match(/\{[\s\S]*\}/);
        if (match) {
          try { return JSON.parse(match[0]); } catch(e) {}
        }
        return JSON.parse(clean);
      } catch (err) {
        return null;
      }
    };

    // 日付フォーマット
    const formatDateTime = (timestamp) => {
      if (!timestamp) return '-';
      const d = new Date(timestamp);
      return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${('0'+d.getHours()).slice(-2)}:${('0'+d.getMinutes()).slice(-2)}`;
    };

    /* =========================================================================
       2. ツール設定データ ＆ プロンプトジェネレータ
       ========================================================================= */
    const CATEGORIES = [
      { name: '📝 コンテンツ作成 ＆ マネタイズ', tools: ['note', 'research', 'lp', 'affiliate', 'backend', 'bonus'] },
      { name: '🚀 SNS集客 ＆ アカウント設計', tools: ['profile', 'sns', 'video', 'image'] },
      { name: '💬 ファン化 ＆ 自動化', tools: ['magnet', 'line', 'funnel', 'reply', 'interview', 'journey'] },
      { name: '💻 開発 ＆ その他', tools: ['webdev'] }
    ];

    const JSON_RULE = '\n\n【ルール】前置きや挨拶は一切不要です。以下のJSONフォーマットのみを出力してください:\n';

    const TOOLS = {
      note: { 
        icon: '📝', name: 'note記事生成', badge: '必須', desc: '売れる記事構成と本文を作成', 
        tutorial: '読者の悩みに寄り添い、解決策を提示する有料記事を作成します。\n【提案】「30代向け」などターゲットを絞り、文字数は無料1000字・有料3000字程度に設定すると読みやすくなります。',
        fields: [
          {id: 'theme', type: 'text', label: 'テーマ (自由入力)', placeholder: '例: 副業で月5万稼ぐ方法'},
          {id: 'target', type: 'text', label: 'ターゲット層・悩み', placeholder: '例: 忙しくて時間がない会社員'},
          {id: 'price_vol', type: 'text', label: '価格・文字数目安', placeholder: '例: 980円・3000字'},
          {id: 'use_bonus', type: 'checkbox', label: '有料パートの最後に、購入者特典の案内を含める'}
        ],
        buildPrompt: (v, b) => `${b}テーマ「${v.theme || '未指定'}」、悩み「${v.target || '未指定'}」向けにnote有料記事を作成してください。価格/文字数目安:${v.price_vol || '未指定'}\n${v.use_bonus ? '※有料パートの最後に特典の受け取り案内を魅力的に含めること\n' : ''}【厳守】前置きなしで以下のMarkdownフォーマットのみ出力してください。\n---TITLES---\n1.タイトル案...\n---FREE_START---\n無料本文...\n---FREE_END---\n---PAID_START---\n有料本文...\n---PAID_END---`,
        isOnePageUI: true
      },
      research: { 
        icon: '⚔️', name: '競合リサーチ', badge: '神機能', desc: '弱点とブルーオーシャンを発見', 
        tutorial: '売れているライバルの教材から「欠けている要素」を見つけます。\n【提案】自分の強みに「未経験から1ヶ月で達成」などを入れると強烈な差別化になります。',
        fields: [
          {id: 'rival', type: 'textarea', label: 'ライバルの教材の目次・セールス文'},
          {id: 'strength', type: 'text', label: '自分の強み(任意)'}
        ],
        buildPrompt: (v, b) => `${b}以下のライバル教材を分析し、弱点と私の強み「${v.strength}」を活かした勝てる商品コンセプト(ブルーオーシャン)を3つ提案してください。\n【ライバル情報】\n${v.rival}${JSON_RULE}{"concepts":[{"title":"コンセプト名","weakness":"ライバルの弱点","strategy":"勝つための戦略"}]}`
      },
      lp: { 
        icon: '📄', name: '爆売れLP作成', badge: '必須', desc: '高単価を売るセールスレター', 
        tutorial: '商品を販売するためのランディングページ（LP）の構成を作ります。\n【提案】ベネフィットには「月5万稼げる」だけでなく「週末に外食に行ける」のように感情的な未来を書くと売れます。',
        fields: [
          {id: 'product', type: 'text', label: '商品名・価格'},
          {id: 'benefits', type: 'textarea', label: '商品のベネフィット・特徴'}
        ],
        buildPrompt: (v, b) => `${b}商品「${v.product}」を売るためのLPの構成とセールスコピーを作成してください。商品の特徴: ${v.benefits}${JSON_RULE}{"hero":"強烈なキャッチコピー","empathy":["共感ポイント1..."],"benefits":["利点1..."],"offer":"オファー内容"}`
      },
      affiliate: { 
        icon: '🔗', name: 'アフィリエイト', badge: '', desc: '商品レビュー＆SNS誘導', 
        tutorial: '他人の商品を売るためのレビュー記事と誘導ポストを作ります。\n【提案】推しポイントには「実際に使ってどう変わったか」という自分の体験談を必ず入れてください。',
        fields: [
          {id: 'product', type: 'text', label: '商品名・URL'},
          {id: 'target', type: 'text', label: '売りたいターゲット層'},
          {id: 'points', type: 'textarea', label: '推しポイント・体験談'}
        ],
        buildPrompt: (v, b) => `${b}商品「${v.product}」をターゲット「${v.target}」に売るためのレビュー記事の構成と、SNS誘導文を作成してください。推しポイント: ${v.points}${JSON_RULE}{"article":{"title":"タイトル","sections":["見出し1..."]},"sns_posts":["ポスト1..."]}`
      },
      backend: { 
        icon: '💎', name: '高単価バックエンド', badge: '', desc: '30万円〜の商材企画', 
        tutorial: 'フロント商品購入者へ売る高単価企画を作ります。\n【提案】価格は「30万円・6ヶ月間」など具体的にし、提供価値に「通話サポート無制限」などを入れると成約率が上がります。',
        fields: [
          {id: 'price_format', type: 'text', label: '想定価格・形式'},
          {id: 'knowledge', type: 'textarea', label: 'ベースとなる知識・元記事'}
        ],
        buildPrompt: (v, b) => `${b}以下の知識をベースに、価格・形式「${v.price_format}」の高額バックエンド商品企画を3つ作成してください。\n${v.knowledge}${JSON_RULE}{"plans":[{"title":"商品名","detail":"詳細","pitch":"セールス文"}]}`
      },
      bonus: { 
        icon: '🎁', name: '購入者特典生成', badge: '', desc: '記事から特典アイデア作成', 
        tutorial: '商品の購入率を上げる「おまけ」を提案します。\n【提案】チェックリスト、テンプレートなど、すぐに使える形式の特典が喜ばれます。',
        fields: [ {id: 'article', type: 'textarea', label: '元記事テキスト'} ],
        buildPrompt: (v, b) => `${b}以下の記事を分析し、購入者特典を8つ提案してください。\n${v.article}${JSON_RULE}{"suggestions":[{"title":"特典タイトル","type":"種類","desc":"説明"}]}`
      },
      profile: {

    /* =========================================================================
       3. 共通UIコンポーネント (安全性・独立性確保)
       ========================================================================= */

    // フォーム入力の安全な生成
    const FormField = ({field, value, onChange}) => {
      const val = value !== undefined ? value : (field.type === 'checkbox' ? false : (field.options ? field.options[0] : ''));
      
      if (field.type === 'text') {
        return el('div', {className: 'form-card'}, 
          el('span', {className: 'form-label'}, field.label), 
          el('input', {className: 'form-input', value: val, placeholder: field.placeholder || '', onChange: (e) => onChange(e.target.value)})
        );
      }
      if (field.type === 'textarea') {
        return el('div', {className: 'form-card'}, 
          el('span', {className: 'form-label'}, field.label), 
          el('textarea', {className: 'form-input', style: {minHeight: 100, resize: 'vertical'}, value: val, placeholder: field.placeholder || '', onChange: (e) => onChange(e.target.value)})
        );
      }
      if (field.type === 'select') {
        return el('div', {className: 'form-card'}, 
          el('span', {className: 'form-label'}, field.label), 
          el('select', {className: 'form-input', value: val, onChange: (e) => onChange(e.target.value)}, 
            field.options.map(opt => el('option', {key: opt, value: opt}, opt))
          )
        );
      }
      if (field.type === 'checkbox') {
        return el('div', {className: 'form-card flex-row', style: {alignItems: 'center'}}, 
          el('input', {type: 'checkbox', checked: val, onChange: (e) => onChange(e.target.checked), style: {width: 18, height: 18}}), 
          el('span', {style: {fontWeight: 800}}, field.label)
        );
      }
      return null;
    };

    // JSONツリーの安全な描画（再帰）
    const JSONViewer = ({data}) => {
      if (typeof data === 'string') {
        return el('p', {className: 'res-box'}, data);
      }
      if (Array.isArray(data)) {
        return el('div', null, 
          data.map((item, index) => el('div', {key: index, style: {marginBottom: 16, paddingBottom: 16, borderBottom: '1px dashed #334155'}}, 
            el(JSONViewer, {data: item})
          ))
        );
      }
      if (typeof data === 'object' && data !== null) {
        return el('div', null, 
          Object.keys(data).map(key => el('div', {key: key, style: {marginBottom: 10}}, 
            el('span', {style: {color: '#38bdf8', fontSize: 12, fontWeight: 800, display: 'block', marginBottom: 4}}, key),

    /* =========================================================================
       4. 汎用ツール実行エンジン (クラッシュ回避の中核)
       ========================================================================= */
    const ToolRunner = ({toolId, username, role, onBack}) => {
      const conf = TOOLS[toolId];
      if (!conf) return el('div', {className: 'z1'}, el('p', null, 'Error: Tool not found.'));

      // データベースから安全に初期値を取得
      const db = AppDB.get();
      const userObj = db.users[username];
      const projId = userObj.curProj;
      const initialData = (userObj.projects[projId] && userObj.projects[projId].data[toolId]) ? userObj.projects[projId].data[toolId] : {};

      const [inputs, setInputs] = useState(initialData);
      const [activeTab, setActiveTab] = useState('settings');
      const [copyState, setCopyState] = useState({});
      const [showLinks, setShowLinks] = useState(false);
      const [importText, setImportText] = useState('');
      const [resultData, setResultData] = useState(null);
      const [errorMessage, setErrorMessage] = useState('');

      const handleInputChange = (fieldId, val) => {
        const newInputs = { ...inputs, [fieldId]: val };
        setInputs(newInputs);
        if (role !== 'admin') {
          const newDb = AppDB.get();
          newDb.users[username].projects[projId].data[toolId] = newInputs;
          AppDB.save(newDb);
        }
      };

      const checkPermission = () => {
        if (role === 'admin') return true;
        if (userObj.perms && userObj.perms[toolId]) return true;
        const today = new Date().toDateString();
        if (userObj.usage.date !== today) return true;
        return userObj.usage.count < DAILY_LIMIT;
      };

      const handleGenerate = () => {
        if (!checkPermission()) {
          alert(`本日の無料枠(${DAILY_LIMIT}回)を終了しました。\n無制限利用をご希望の場合は管理者へお問い合わせください。`);
          return;
        }

        // 使用回数を記録
        if (role !== 'admin' && !(userObj.perms && userObj.perms[toolId])) {
          const newDb = AppDB.get();
          const today = new Date().toDateString();
          if (newDb.users[username].usage.date !== today) {
            newDb.users[username].usage = { date: today, count: 0 };
          }
          newDb.users[username].usage.count++;
          AppDB.save(newDb);
        }

        // ブランド・AIプラン情報を付与
        let brandContext = '';
        const aiPlan = (userObj.brand && userObj.brand.plan) ? userObj.brand.plan : 'free';
        if (userObj.brand && userObj.brand.name) {
          brandContext = `【発信者情報(文体やターゲットに反映)】名前:${userObj.brand.name} ターゲット:${userObj.brand.target || ''} 文体:${userObj.brand.tone || ''}\n\n`;
        }

        const basePrompt = conf.buildPrompt(inputs, brandContext);
        const systemPrefix = aiPlan === 'paid' 
          ? '【システム設定: 有料AIモード】\nあなたは高度な推論とWeb検索が可能な状態です。複雑な指示にも完璧に従い最高品質の出力をしてください。\n\n'
          : '【システム設定: 無料AIモード】\nあなたは出力制限がある環境です。回答が途切れないよう簡潔に要点を絞って出力してください。\n\n';
        
        const finalPrompt = systemPrefix + basePrompt;

        doCopy(finalPrompt, copyState, setCopyState, 'generate');
        setShowLinks(true);
        if (!conf.noJsonParse && !conf.isOnePageUI) {
          setActiveTab('import');
        }
      };

      const handleImport = () => {
        if (conf.noJsonParse) {
          setResultData(importText);
          setActiveTab('preview');
          setImportText('');
          return;
        }
        setErrorMessage('');
        const parsed = safeParseJSON(importText);
        if (parsed) {
          setResultData(parsed);
          setActiveTab('preview');
          setImportText('');
        } else {
          setErrorMessage('JSONフォーマットエラーです。AIの出力をそのまま（余計な文字を含めず）貼り付けてください。');
        }
      };

      // --- 1画面完結UI (note用) ---
      if (conf.isOnePageUI) {
        return el('div', {className: 'z1'},
          el('div', {className: 'tool-header'}, 
            el('div', {className: 'flex-row', style: {alignItems: 'center'}}, 
              el('button', {className: 'btn-sub', onClick: onBack}, '← 戻る'), 
              el('h1', {className: 'tool-header-title'}, conf.name)
            )
          ),
          el('div', {className: 'tutorial-panel'}, 
            el('div', {className: 'tutorial-title'}, '💡 使い方と目的'), 
            el('div', {className: 'tutorial-body'}, conf.tutorial)
          ),
          conf.fields.map(f => el(FormField, { key: f.id, field: f, value: inputs[f.id], onChange: (val) => handleInputChange(f.id, val) })),
          el('button', {className: 'btn-primary', onClick: handleGenerate}, copyState['generate'] ? '✓ コピー完了！AIへ送信してください' : '📋 プロンプト生成 ＆ コピー'),
          showLinks && el(LauncherLinks, {showImportMessage: false}),
          el('div', {className: 'form-card', style: {marginTop: 20}}, 
            el('span', {className: 'form-label'}, '📥 AIの回答を貼り付けて保管・編集'), 
            el('textarea', {className: 'form-input', style: {minHeight: 250}, value: resultData || '', onChange: (e) => setResultData(e.target.value)}), 
            el('button', {className: 'btn-sub', style: {width: '100%', marginTop: 14}, onClick: () => doCopy(resultData || '', copyState, setCopyState, 'copyAll')}, copyState['copyAll'] ? '✓ コピー完了' : '📋 全文コピー')
          )
        );
      }

      // --- 通常ツール UI (タブ切り替え) ---
      return el('div', {className: 'z1'},
        el('div', {className: 'tool-header'}, 
          el('div', {className: 'flex-row', style: {alignItems: 'center'}}, 
            el('button', {className: 'btn-sub', onClick: onBack}, '← 戻る'), 
            el('h1', {className: 'tool-header-title'}, conf.name)
          )
        ),
        el('div', {className: 'tabs-container'}, 
          [ {id: 'settings', label: '⚙️ 条件設定', disabled: false},
            {id: 'import', label: '📥 AI回答読込', disabled: false},
            {id: 'preview', label: '👁 結果確認', disabled: !resultData}
          ].map(t => 
            el('button', {
              key: t.id, 
              className: `tab-item ${activeTab === t.id ? 'active' : ''}`, 
              disabled: t.disabled,
              onClick: () => { if (!t.disabled) setActiveTab(t.id); }
            }, t.label)
          )
        ),
        activeTab === 'settings' && el('div', null,
          el('div', {className: 'tutorial-panel'}, 
            el('div', {className: 'tutorial-title'}, '💡 使い方と目的'), 
            el('div', {className: 'tutorial-body'}, conf.tutorial)

          conf.fields.map(f => el(FormField, { key: f.id, field: f, value: inputs[f.id], onChange: (val) => handleInputChange(f.id, val) })),
          el('button', {className: 'btn-primary', onClick: handleGenerate}, copyState['generate'] ? '✓ コピー完了！' : '📋 プロンプト生成 ＆ コピー'),
          showLinks && el(LauncherLinks, {showImportMessage: !conf.noJsonParse})
        ),
        activeTab === 'import' && el('div', null, 
          el('div', {className: 'form-card'}, 
            el('span', {className: 'form-label'}, '📥 AIの出力を貼り付け'), 
            el('textarea', {className: 'form-input', style: {minHeight: 180}, value: importText, onChange: (e) => setImportText(e.target.value)}), 
            errorMessage && el('div', {className: 'error-box'}, '❌ ' + errorMessage), 
            el('button', {className: 'btn-primary', disabled: !importText.trim(), onClick: handleImport}, 'システムに反映して結果を見る')
          )
        ),
        activeTab === 'preview' && resultData && el('div', {className: 'form-card'}, 
          el(JSONViewer, {data: resultData})
        )
      );
    };

    /* =========================================================================

        el('div', {className: 'tool-header'}, el('div', {className: 'flex-row', style: {alignItems: 'center'}}, el('button', {className: 'btn-sub', onClick: onBack}, '← 戻る'), el('h1', {className: 'tool-header-title'}, '👤 マイ・ブランド ＆ AI設定'))),

       ========================================================================= */
    const Root = () => {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null);
      const [goAdmin, setGoAdmin] = useState(false);
      const [showManual, setShowManual] = useState(false);

      // 安全なセッション復元
      useEffect(() => {
        try {
          const sStr = localStorage.getItem(SESS_KEY);
          if (sStr) {
            const s = JSON.parse(sStr);
            if (s && s.u) {
              if (s.r === 'admin') {
                setUser(s.u); setRole('admin'); setGoAdmin(true);
              } else {
                const db = AppDB.get();
                if (db.users[s.u]) {
                  setUser(s.u); setRole(db.users[s.u].status);
                } else {
                  localStorage.removeItem(SESS_KEY);
                }
              }
            }
          }
        } catch(e) {}
      }, []);

      const handleLogout = () => {
        localStorage.removeItem(SESS_KEY);
        setUser(null); setRole(null); setGoAdmin(false);
      };

      const checkStatus = () => {
        try {
          const s = JSON.parse(localStorage.getItem(SESS_KEY) || '{}');
          if (s.u) {
            const db = AppDB.get();
            if (db.users[s.u]) setRole(db.users[s.u].status);
          }
        } catch(e) {}
      };

      if (!user) {
        return el(AuthScreen, {onLogin: (usr, rol) => {
          setUser(usr); setRole(rol); if (rol === 'admin') setGoAdmin(true);
        }});
      }

      if (role === 'admin' && goAdmin) {
        return el(AdminDashboard, {onLogout: handleLogout, onGoApp: () => setGoAdmin(false)});
      }

      if (role === 'pending' || role === 'rejected') {
        return el('div', null, 
          showManual && el(ManualModal, {onClose: () => setShowManual(false)}), 
          el('div', {className: 'page-container'},

              el('button', {className: 'btn-primary', style: {marginBottom: 16}, onClick: checkStatus}, 'ステータスを更新'), 
              el('button', {className: 'btn-sub', style: {width: '100%'}, onClick: handleLogout}, 'ログアウト')
            )
          )
        );
      }

      if (role === 'approved' || (role === 'admin' && !goAdmin)) {
        return el(MainDashboard, {user: user, role: role, onLogout: handleLogout, onGoAdmin: () => setGoAdmin(true)});
      }

      return null;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(el(Root, null));

  })();
  </script>
</body>
</html>
