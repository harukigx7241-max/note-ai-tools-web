<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>note AI Tools</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth/mammoth.browser.min.js"></script>

<style>
/* =========================================
   RESET & BASE
   ========================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #0d0d1a;
  color: #fff;
  line-height: 1.6;
}
input, textarea, select, button { font-family: inherit; }
input[type="range"] { cursor: pointer; }
textarea { resize: vertical; }
select { cursor: pointer; }
a { color: inherit; }

/* =========================================
   LANDING PAGE
   ========================================= */
.landing {
  min-height: 100vh;
  background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 50%, #0a1628 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px;
  text-align: center;
  position: relative; overflow: hidden;
}
.landing::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 700px 500px at 30% 40%, rgba(224,123,57,0.1) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 80% 20%, rgba(99,102,241,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.landing-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 50px 50px;
}
.landing-badge {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid rgba(224,123,57,0.4);
  border-radius: 100px; padding: 5px 14px;
  font-size: 11px; color: #e07b39;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 28px; position: relative; z-index: 1;
}
.landing-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%; background: #e07b39;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes spin { to { transform: rotate(360deg); } }
.landing-title {
  font-size: clamp(48px, 9vw, 96px);
  font-weight: 900; color: #fff;
  letter-spacing: -0.03em; line-height: 1.05;
  margin-bottom: 20px;
  position: relative; z-index: 1;
}
.landing-title span { color: #e07b39; }
.landing-sub {
  font-size: 17px; color: rgba(255,255,255,0.5);
  max-width: 500px; margin: 0 auto 40px;
  font-weight: 300; position: relative; z-index: 1;
  line-height: 1.7;
}
.ai-badges {
  display: flex; gap: 10px;
  justify-content: center; flex-wrap: wrap;
  margin-bottom: 40px;
  position: relative; z-index: 1;
}
.ai-badge {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; font-size: 13px;
  font-weight: 500; color: #fff;
  background: rgba(255,255,255,0.04);
}
.ai-dot { width: 8px; height: 8px; border-radius: 50%; }
.tool-cards-landing {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px; max-width: 900px; width: 100%;
  margin-bottom: 40px;
  position: relative; z-index: 1;
}
.tool-card-landing {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 20px;
  cursor: pointer; transition: all 0.2s;
  text-align: left;
}
.tool-card-landing:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(224,123,57,0.4);
  transform: translateY(-2px);
}
.tool-card-icon { font-size: 28px; margin-bottom: 10px; }
.tool-card-name { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.tool-card-desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; }

/* =========================================
   SHARED APP LAYOUT
   ========================================= */
.app-wrap {
  min-height: 100vh;
  background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 50%, #0a1628 100%);
}
.app-header {
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 14px 24px;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(10px);
}
.app-header-left { display: flex; align-items: center; gap: 12px; }
.back-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 6px 12px;
  font-size: 13px; cursor: pointer;
  color: rgba(255,255,255,0.7);
  transition: background 0.15s;
}
.back-btn:hover { background: rgba(255,255,255,0.14); }
.app-title { font-size: 20px; font-weight: 800; margin: 0; color: #fff; }
.app-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin: 3px 0 0; }
.key-btn {
  padding: 8px 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,0.7);
  transition: background 0.15s;
}
.key-btn:hover { background: rgba(255,255,255,0.13); }
.app-body { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
.dark-tabs {
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; padding: 0 20px;
  overflow-x: auto;
  position: sticky; top: 65px; z-index: 99;
  backdrop-filter: blur(10px);
}

/* =========================================
   MODAL
   ========================================= */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 9999;
  display: flex; align-items: center;
  justify-content: center; padding: 16px;
}
.modal-box {
  background: #1a1a2e;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px; padding: 32px;
  width: 500px; max-width: 100%;
  max-height: 90vh; overflow-y: auto;
}

/* =========================================
   CARD / LABEL COMMON
   ========================================= */
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px; padding: 22px 26px;
  margin-bottom: 14px;
}
.lbl {
  color: rgba(255,255,255,0.6);
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.1em;
  display: block; margin-bottom: 10px;
}

/* =========================================
   RESPONSIVE
   ========================================= */
@media (max-width: 768px) {
  .app-body { padding: 16px 14px; }
  .app-header { padding: 12px 16px; }
  .dark-tabs { padding: 0 12px; top: 58px; }
  .tool-cards-landing { grid-template-columns: 1fr 1fr; gap: 10px; }
}
@media (max-width: 480px) {
  .landing { padding: 32px 16px; }
  .landing-title { font-size: clamp(36px, 12vw, 56px); }
  .landing-sub { font-size: 14px; margin-bottom: 28px; }
  .tool-cards-landing { gap: 8px; margin-bottom: 28px; }
  .tool-card-landing { padding: 14px 12px; border-radius: 12px; }
  .tool-card-icon { font-size: 22px; }
  .tool-card-name { font-size: 12px; }
  .app-header { padding: 10px 12px; }
  .app-title { font-size: 15px; }
  .app-sub { font-size: 10px; }
  .back-btn { padding: 5px 9px; font-size: 12px; }
  .key-btn { padding: 6px 10px; font-size: 11px; }
  .app-body { padding: 12px 10px; }
  .dark-tabs { padding: 0 8px; top: 54px; }
  .modal-box { padding: 20px 16px; }
  .card { padding: 16px 14px; border-radius: 14px; }
}
@media (max-width: 360px) {
  .landing-title { font-size: 34px; }
  .tool-card-desc { display: none; }
  .app-title { font-size: 13px; }
}

/* =========================================
   X LOGIN SCREEN
   ========================================= */
.x-login-screen {
  min-height: 100vh;
  background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 50%, #0a1628 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px; text-align: center;
  position: relative; overflow: hidden;
}
.x-login-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px; padding: 48px 40px;
  width: 420px; max-width: 95vw;
  position: relative; z-index: 1;
}
.x-login-logo { font-size: 56px; margin-bottom: 16px; }
.x-login-title { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 8px; }
.x-login-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 32px; line-height: 1.7; }
.x-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px 24px;
  background: #000; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50px; color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; margin-bottom: 12px;
}
.x-btn:hover { background: #1a1a1a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.x-btn-icon { font-size: 20px; font-weight: 900; }
.x-login-note { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 20px; line-height: 1.7; }
.x-setup-link { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 16px; cursor: pointer; text-decoration: underline; }
.x-user-badge {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50px; padding: 6px 14px 6px 6px; font-size: 13px; color: rgba(255,255,255,0.8);
}
.x-user-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1d9bf0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }

/* =========================================
   AI THEME PROPOSAL (LANDING)
   ========================================= */
.theme-proposal-section {
  width: 100%; max-width: 900px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 28px 24px;
  margin-bottom: 32px; position: relative; z-index: 1;
}
.theme-section-title { font-size: 14px; font-weight: 800; color: rgba(255,255,255,0.7); margin-bottom: 16px; letter-spacing: 0.05em; }
.genre-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; }
.genre-btn {
  padding: 7px 14px; border-radius: 50px; font-size: 12px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s;
}
.genre-btn.active {
  background: rgba(233,69,96,0.2); border-color: rgba(233,69,96,0.6); color: #fff;
}
.genre-btn:hover:not(.active) { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.8); }
.theme-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; margin-bottom: 16px; }
.theme-item {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
  border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; text-align: left;
  display: flex; align-items: center; gap: 10px;
}
.theme-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(233,69,96,0.4); transform: translateY(-1px); }
.theme-item.selected { background: rgba(233,69,96,0.12); border-color: rgba(233,69,96,0.6); }
.theme-item-num { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.3); min-width: 20px; }
.theme-item-text { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.5; flex: 1; }
.theme-controls { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
.reload-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 10px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer; transition: all 0.15s;
}
.reload-btn:hover { background: rgba(255,255,255,0.12); }
.decide-btn {
  padding: 11px 28px; border-radius: 10px;
  background: linear-gradient(135deg, #e94560, #c2185b);
  border: none; color: #fff; font-size: 14px; font-weight: 800;
  cursor: pointer; box-shadow: 0 4px 16px rgba(233,69,96,0.4);
  transition: all 0.15s;
}
.decide-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.decide-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.theme-loading { text-align: center; padding: 24px; color: rgba(255,255,255,0.4); font-size: 13px; }

/* AGE SELECTOR (LANDING) */
.age-selector-section {
  width: 100%; max-width: 900px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 28px 24px;
  margin-bottom: 32px; position: relative; z-index: 1;
}
.age-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; }
.age-btn {
  padding: 8px 20px; border-radius: 50px; font-size: 13px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s;
}
.age-btn.active { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.6); color: #fff; }
.sitworry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.sitworry-col-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 10px; letter-spacing: 0.08em; }
.sitworry-item {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 10px 12px; cursor: pointer;
  font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 7px;
  transition: all 0.12s; line-height: 1.5;
}
.sitworry-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
.sitworry-item.sit-selected { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.5); color: #fff; }
.sitworry-item.worry-selected { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.4); color: #fff; }
.start-tool-btn {
  width: 100%; padding: 16px; border-radius: 14px;
  background: linear-gradient(135deg, #e94560, #c2185b);
  border: none; color: #fff; font-size: 16px; font-weight: 900;
  cursor: pointer; box-shadow: 0 6px 24px rgba(233,69,96,0.45); transition: all 0.15s;
}
.start-tool-btn:hover { opacity: 0.88; }
.start-tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* CONTACT SECTION */
.contact-section {
  width: 100%; max-width: 620px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 32px 28px;
  margin-bottom: 32px; position: relative; z-index: 1;
}
.contact-title { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 6px; }
.contact-sub   { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 20px; }
.contact-input {
  width: 100%; padding: 12px 14px; margin-bottom: 12px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; color: #fff; font-size: 14px; outline: none;
  font-family: inherit;
}
.contact-input:focus { border-color: rgba(233,69,96,0.5); }
.contact-textarea { resize: vertical; min-height: 120px; }
.contact-send-btn {
  width: 100%; padding: 14px; border-radius: 10px;
  background: linear-gradient(135deg, #e94560, #c2185b);
  border: none; color: #fff; font-size: 15px; font-weight: 800;
  cursor: pointer; box-shadow: 0 4px 16px rgba(233,69,96,0.4);
}
.contact-send-btn:hover { opacity: 0.88; }

@media (max-width: 600px) {
  .x-login-box { padding: 32px 20px; }
  .theme-proposal-section { padding: 20px 16px; }
  .theme-list { grid-template-columns: 1fr; }
  .sitworry-grid { grid-template-columns: 1fr; }
  .age-selector-section { padding: 20px 16px; }
  .contact-section { padding: 24px 16px; }
}
</style>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* =============================================
   RESPONSIVE HOOK
   ============================================= */
function useIsMobile() {
  var state = useState(window.innerWidth <= 480);
  var isMobile = state[0];
  var setIsMobile = state[1];
  useEffect(function() {
    function handleResize() { setIsMobile(window.innerWidth <= 480); }
    window.addEventListener('resize', handleResize);
    return function() { window.removeEventListener('resize', handleResize); };
  }, []);
  return isMobile;
}

/* =============================================
   AI CONFIGS & KEY STORAGE
   ============================================= */
var AI_LIST = [
  { id: 'claude',  label: 'Claude',  icon: '🟠', color: '#e07b39', badge: 'API' },
  { id: 'gemini',  label: 'Gemini',  icon: '🔵', color: '#4285f4', badge: 'API' },
  { id: 'chatgpt', label: 'ChatGPT', icon: '🟢', color: '#10a37f', badge: 'API' },
  { id: 'grok',    label: 'Grok',    icon: '⚫', color: '#9ca3af', badge: 'API' },
];
var KEY_STORAGE = 'noteAiKeys_v2';

function loadKeys() {
  try { return JSON.parse(localStorage.getItem(KEY_STORAGE) || '{}'); }
  catch(e) { return {}; }
}
function saveKey(id, val) {
  var k = loadKeys(); k[id] = val;
  localStorage.setItem(KEY_STORAGE, JSON.stringify(k));
}
function getKey(id) { return loadKeys()[id] || ''; }

/* =============================================
   API CALL FUNCTIONS (正確な仕様に基づく実装)
   ============================================= */

/* --- Claude API ---
   エンドポイント: POST https://api.anthropic.com/v1/messages
   必須ヘッダー:
     x-api-key: {APIキー}
     anthropic-version: 2023-06-01
     content-type: application/json
     anthropic-dangerous-direct-browser-access: true  ← ブラウザから直接呼ぶ場合必須
   ボディ: { model, max_tokens, system?, messages: [{role, content}] }
   レスポンス: { content: [{type:"text", text:"..."}], ... }
*/
async function callClaude(messages, systemPrompt, maxTokens) {
  var key = getKey('claude');
  if (!key) throw new Error('Claude: APIキーが設定されていません');
  var body = {
    model: 'claude-sonnet-4-6',
    max_tokens: maxTokens || 4000,
    messages: messages
  };
  if (systemPrompt) body.system = systemPrompt;
  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    var errData = {};
    try { errData = await res.json(); } catch(e) {}
    var msg = errData.error ? errData.error.message : '';
    if (res.status === 401) throw new Error('Claude 401: APIキーが無効です。console.anthropic.comで確認してください。' + (msg ? ' (' + msg + ')' : ''));
    if (res.status === 429) throw new Error('Claude 429: レート制限超過。しばらく待ってから再試行してください。');
    if (res.status === 400) throw new Error('Claude 400: リクエストが不正です。' + (msg ? msg : ''));
    if (res.status === 500) throw new Error('Claude 500: Anthropicサーバーエラー。しばらく待ってください。');
    throw new Error('Claude APIエラー ' + res.status + (msg ? ': ' + msg : ''));
  }
  var data = await res.json();
  if (!data.content || !data.content.length) throw new Error('Claude: 空のレスポンスが返りました');
  return data.content.map(function(b) { return b.text || ''; }).join('');
}

/* --- Gemini API ---
   エンドポイント: POST https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={APIキー}
   ヘッダー: Content-Type: application/json
   ボディ: { contents: [{role, parts:[{text}]}], generationConfig?: {maxOutputTokens}, systemInstruction?: {parts:[{text}]} }
   注意:
     - role は "user" または "model" (assistantではない)
     - gemini-1.5-flash は廃止。現行モデルは gemini-2.0-flash / gemini-2.5-flash
     - モデル: gemini-2.0-flash (標準・安定), gemini-2.5-flash (高性能・フォールバック)
*/
async function callGeminiModel(key, body, model) {
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + key;
  var res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res;
}

async function callGemini(messages, systemPrompt, maxTokens) {
  var key = getKey('gemini');
  if (!key) throw new Error('Gemini: APIキーが設定されていません');

  // roleをGemini形式に変換 (user/assistant → user/model)
  var contents = messages.map(function(m) {
    return {
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    };
  });
  var body = {
    contents: contents,
    generationConfig: { maxOutputTokens: maxTokens || 4000 }
  };
  if (systemPrompt) {
    body.systemInstruction = { parts: [{ text: systemPrompt }] };
  }

  // モデル優先順位: gemini-2.0-flash → gemini-2.5-flash → gemini-1.5-flash
  // 再帰関数でBabel互換に実装（forループ内awaitを避ける）
  async function tryModel(modelList, idx) {
    if (idx >= modelList.length) {
      throw new Error('Gemini: 利用可能なモデルが見つかりませんでした。\nAPIキーをGoogle AI Studio(aistudio.google.com)で確認してください。');
    }
    var model = modelList[idx];
    var res;
    try {
      res = await callGeminiModel(key, body, model);
    } catch(e) {
      return tryModel(modelList, idx + 1);
    }

    if (res.status === 429) {
      if (idx < modelList.length - 1) {
        // 429: レート制限 → 3秒待って次のモデルを試す
        await new Promise(function(resolve) { setTimeout(resolve, 3000); });
        return tryModel(modelList, idx + 1);
      }
      throw new Error('Gemini 429: レート制限超過。無料枠の上限に達しました。\n・しばらく待ってから再試行してください\n・Google AI Studio(aistudio.google.com)で使用量を確認してください');
    }

    if (res.status === 404) {
      // 404: モデルが見つからない → 次のモデルを試す
      if (idx < modelList.length - 1) {
        return tryModel(modelList, idx + 1);
      }
      var e404 = {};
      try { e404 = await res.json(); } catch(ex) {}
      var msg404 = e404.error ? e404.error.message : '';
      throw new Error('Gemini 404: モデルが見つかりません。' + (msg404 ? '\n' + msg404 : '') + '\nAPIキーをGoogle AI Studioで確認してください。');
    }

    if (res.status === 400) {
      var e400 = {};
      try { e400 = await res.json(); } catch(ex) {}
      var msg400 = e400.error ? e400.error.message : '';
      throw new Error('Gemini 400: APIキーが無効またはリクエストが不正です。\n' + (msg400 || '') + '\nGoogle AI Studio(aistudio.google.com)でAPIキーを確認してください。');
    }

    if (res.status === 403) {
      throw new Error('Gemini 403: APIキーに権限がありません。\nGoogle AI Studio(aistudio.google.com)でAPIキーを確認してください。');
    }

    if (res.status === 401) {
      throw new Error('Gemini 401: APIキーが無効です。\nGoogle AI Studio(aistudio.google.com)で新しいAPIキーを取得してください。');
    }

    if (!res.ok) {
      var eData = {};
      try { eData = await res.json(); } catch(ex) {}
      var eMsg = eData.error ? eData.error.message : '';
      throw new Error('Gemini APIエラー ' + res.status + (eMsg ? ': ' + eMsg : ''));
    }

    var data = await res.json();
    if (!data.candidates || !data.candidates.length) {
      var fb = data.promptFeedback;
      if (fb && fb.blockReason) throw new Error('Gemini: コンテンツがブロックされました (' + fb.blockReason + ')');
      throw new Error('Gemini: レスポンスが空でした');
    }
    var cand = data.candidates[0];
    if (!cand.content || !cand.content.parts) throw new Error('Gemini: レスポンス形式が不正です');
    return cand.content.parts.map(function(p) { return p.text || ''; }).join('');
  }

  return tryModel(['gemini-2.0-flash', 'gemini-2.5-flash', 'gemini-1.5-flash'], 0);
}

/* --- ChatGPT (OpenAI) API ---
   エンドポイント: POST https://api.openai.com/v1/chat/completions
   必須ヘッダー:
     Authorization: Bearer {APIキー}
     Content-Type: application/json
   ボディ: { model, messages: [{role, content}], max_tokens? }
   注意: systemプロンプトはmessagesの最初に role:"system" として追加
*/
async function callChatGPT(messages, systemPrompt, maxTokens) {
  var key = getKey('chatgpt');
  if (!key) throw new Error('ChatGPT: APIキーが設定されていません');
  var msgs = systemPrompt
    ? [{ role: 'system', content: systemPrompt }].concat(messages)
    : messages;
  var res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key
    },
    body: JSON.stringify({
      model: 'gpt-4.1',
      max_tokens: maxTokens || 4000,
      messages: msgs
    })
  });
  if (!res.ok) {
    var eData = {};
    try { eData = await res.json(); } catch(e) {}
    var eMsg = eData.error ? eData.error.message : '';
    if (res.status === 401) throw new Error('ChatGPT 401: APIキーが無効です。platform.openai.comで確認してください。');
    if (res.status === 429) throw new Error('ChatGPT 429: レート制限またはクレジット不足。platform.openai.comで使用量を確認してください。');
    if (res.status === 400) throw new Error('ChatGPT 400: リクエストが不正です。' + (eMsg ? eMsg : ''));
    throw new Error('ChatGPT APIエラー ' + res.status + (eMsg ? ': ' + eMsg : ''));
  }
  var data = await res.json();
  if (!data.choices || !data.choices.length) throw new Error('ChatGPT: 空のレスポンスが返りました');
  return data.choices[0].message.content || '';
}

/* --- Grok (xAI) API ---
   エンドポイント: POST https://api.x.ai/v1/chat/completions
   OpenAI互換形式。ヘッダー・ボディはChatGPTと同じ構造
   モデル: grok-3 (現在の推奨)
*/
async function callGrok(messages, systemPrompt, maxTokens) {
  var key = getKey('grok');
  if (!key) throw new Error('Grok: APIキーが設定されていません');
  var msgs = systemPrompt
    ? [{ role: 'system', content: systemPrompt }].concat(messages)
    : messages;

  // grok-3（標準）→ grok-4（最新）の順でフォールバック
  // 再帰関数でBabel互換に実装（forループ内awaitを避ける）
  async function tryGrokModel(modelList, idx) {
    if (idx >= modelList.length) {
      throw new Error('Grok: 利用可能なモデルが見つかりませんでした。console.x.aiでAPIキーを確認してください。');
    }
    var grokModel = modelList[idx];
    var grokRes;
    try {
      grokRes = await fetch('https://api.x.ai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model: grokModel, max_tokens: maxTokens || 4000, messages: msgs })
      });
    } catch(e) {
      if (idx < modelList.length - 1) return tryGrokModel(modelList, idx + 1);
      throw new Error('Grok: ネットワークエラー - ' + e.message);
    }
    if (grokRes.status === 404 || (grokRes.status === 400 && idx < modelList.length - 1)) {
      return tryGrokModel(modelList, idx + 1);
    }
    if (!grokRes.ok) {
      var eData = {};
      try { eData = await grokRes.json(); } catch(e) {}
      var eMsg = eData.error ? eData.error.message : '';
      if (grokRes.status === 401) throw new Error('Grok 401: APIキーが無効です。console.x.aiで確認してください。');
      if (grokRes.status === 429) throw new Error('Grok 429: レート制限超過。しばらく待ってから再試行してください。');
      throw new Error('Grok APIエラー ' + grokRes.status + (eMsg ? ': ' + eMsg : ''));
    }
    var data = await grokRes.json();
    if (!data.choices || !data.choices.length) throw new Error('Grok: 空のレスポンスが返りました');
    return data.choices[0].message.content || '';
  }

  return tryGrokModel(['grok-3', 'grok-4'], 0);
}

/* --- 管理者用統計記録（GitHub API書き込み版） --- */
// 設定キー（管理画面のlocalStorageと共有）
var ADMIN_CFG_KEY   = 'noteAiAdminConfig_v1';
var ADMIN_QUEUE_KEY = 'noteAiAdminQueue_v1';  // 送信失敗時のキュー

function loadAdminConfig() {
  try { return JSON.parse(localStorage.getItem(ADMIN_CFG_KEY) || 'null') || {}; }
  catch(e) { return {}; }
}

function makeEmptyStats() {
  return {
    totalAccess: 0, totalGenerate: 0, lastAccess: null,
    byTool: {}, byAi: {}, byTheme: {}, dailyAccess: {}, history: []
  };
}

// GitHub APIでdata.jsonを取得
async function fetchRemoteStats(cfg) {
  if (!cfg.pat || !cfg.owner || !cfg.repo) return null;
  try {
    var url = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/' + (cfg.path || 'data.json');
    var r = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + cfg.pat, 'Accept': 'application/vnd.github+json' }
    });
    if (r.status === 404) return { stats: makeEmptyStats(), sha: null };
    if (!r.ok) return null;
    var d = await r.json();
    var decoded = JSON.parse(atob(d.content.replace(/\n/g, '')));
    return { stats: decoded, sha: d.sha };
  } catch(e) { return null; }
}

// GitHub APIでdata.jsonを上書き保存
async function saveRemoteStats(cfg, stats, sha) {
  if (!cfg.pat || !cfg.owner || !cfg.repo) return false;
  try {
    var url = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/' + (cfg.path || 'data.json');
    var body = {
      message: 'Update stats ' + new Date().toISOString().slice(0,16),
      content: btoa(unescape(encodeURIComponent(JSON.stringify(stats, null, 2)))),
    };
    if (sha) body.sha = sha;
    var r = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + cfg.pat,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    return r.ok;
  } catch(e) { return false; }
}

// キューに積んで非同期でGitHubに送信
function enqueueEvent(type, payload) {
  try {
    var q = JSON.parse(localStorage.getItem(ADMIN_QUEUE_KEY) || '[]');
    q.push({ type: type, payload: payload, time: new Date().toISOString() });
    if (q.length > 100) q = q.slice(-100);
    localStorage.setItem(ADMIN_QUEUE_KEY, JSON.stringify(q));
  } catch(e) {}
  // 非同期でフラッシュ
  setTimeout(flushQueue, 200);
}

// キューをGitHubに書き込む
var _flushing = false;
async function flushQueue() {
  if (_flushing) return;
  var cfg = loadAdminConfig();
  if (!cfg.pat || !cfg.owner || !cfg.repo) return;  // PAT未設定なら何もしない
  _flushing = true;
  try {
    var q = JSON.parse(localStorage.getItem(ADMIN_QUEUE_KEY) || '[]');
    if (q.length === 0) { _flushing = false; return; }

    var remote = await fetchRemoteStats(cfg);
    if (!remote) { _flushing = false; return; }
    var s = remote.stats;
    var sha = remote.sha;

    // キューのイベントをまとめて統計に反映
    q.forEach(function(ev) {
      if (ev.type === 'access') {
        s.totalAccess = (s.totalAccess || 0) + 1;
        s.lastAccess = ev.time;
        var day = ev.time.slice(0, 10);
        s.dailyAccess = s.dailyAccess || {};
        s.dailyAccess[day] = (s.dailyAccess[day] || 0) + 1;
        var days = Object.keys(s.dailyAccess).sort();
        if (days.length > 60) { days.slice(0, days.length-60).forEach(function(k){delete s.dailyAccess[k];}); }
      } else if (ev.type === 'generate') {
        s.totalGenerate = (s.totalGenerate || 0) + 1;
        s.byAi = s.byAi || {};
        s.byAi[ev.payload.ai] = (s.byAi[ev.payload.ai] || 0) + 1;
        s.byTool = s.byTool || {};
        s.byTool[ev.payload.tool] = (s.byTool[ev.payload.tool] || 0) + 1;
        if (ev.payload.theme) {
          s.byTheme = s.byTheme || {};
          s.byTheme[ev.payload.theme] = (s.byTheme[ev.payload.theme] || 0) + 1;
        }
        s.history = s.history || [];
        s.history.unshift({ time: ev.time, ai: ev.payload.ai, tool: ev.payload.tool, theme: ev.payload.theme || '' });
        if (s.history.length > 100) s.history = s.history.slice(0, 100);
      }
    });

    var ok = await saveRemoteStats(cfg, s, sha);
    if (ok) {
      localStorage.removeItem(ADMIN_QUEUE_KEY);
    }
  } catch(e) {}
  _flushing = false;
}

function recordAccess() {
  enqueueEvent('access', {});
}

function recordGenerate(aiId, toolId, themeId) {
  enqueueEvent('generate', { ai: aiId, tool: toolId, theme: themeId || '' });
}

async function readFileAsText(file) {
  if (!file) return '';
  var name = file.name.toLowerCase();
  if (name.endsWith('.docx') && typeof mammoth !== 'undefined') {
    var buf = await file.arrayBuffer();
    var result = await mammoth.extractRawText({ arrayBuffer: buf });
    return result.value;
  }
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result); };
    reader.onerror = reject;
    reader.readAsText(file, 'utf-8');
  });
}

      <div className="contact-section">
        <div className="contact-title">📬 お問い合わせ</div>
        <div className="contact-sub">ご質問・ご要望・不具合報告などはこちらからどうぞ</div>
        {contactSent ? (
          <div style={{ textAlign:'center', padding:'24px 0', color:'#4ade80', fontSize:15, fontWeight:700 }}>
            ✅ お問い合わせを受け付けました。ありがとうございます。
          </div>
        ) : (
          <div>
            <input type="text" id="contact-name" className="contact-input" placeholder="お名前" />
            <input type="email" id="contact-email" className="contact-input" placeholder="メールアドレス" />
            <textarea id="contact-message" className="contact-input contact-textarea" placeholder="お問い合わせ内容を入力してください..."></textarea>
            <button className="contact-send-btn"
              onClick={function() {
                var name = document.getElementById('contact-name').value.trim();
                var email = document.getElementById('contact-email').value.trim();
                var msg = document.getElementById('contact-message').value.trim();
                if (!name || !email || !msg) { alert('すべての項目を入力してください。'); return; }
                if (!email.includes('@')) { alert('正しいメールアドレスを入力してください。'); return; }
                // mailto形式で送信（静的サイトのため）
                var subject = encodeURIComponent('[note AI Tools] お問い合わせ from ' + name);
                var body = encodeURIComponent('お名前: ' + name + '\nメール: ' + email + '\n\n' + msg);
                window.open('mailto:?subject=' + subject + '&body=' + body);
                setContactSent(true);
              }}>
              送信する
            </button>
          </div>
        )}
      </div>

      <p style={{ position:'relative', zIndex:1, fontSize:12, color:'rgba(255,255,255,0.2)', marginTop:8, marginBottom:20 }}>
        APIキーはブラウザに安全に保存。サーバーには送信されません。
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
