<body>

  <script>
  (function() {
    'use strict';

    // React APIの明示的な抽出
    const createElement = React.createElement;
    const useState = React.useState;
    const useEffect = React.useEffect;
    const Component = React.Component;
    const Fragment = React.Fragment;

    // HTML要素のラッパー関数（JSXの代替として冗長かつ安全に記述）
    function div(props, ...children) { return createElement('div', props, ...children); }
    function span(props, ...children) { return createElement('span', props, ...children); }
    function p(props, ...children) { return createElement('p', props, ...children); }
    function h1(props, ...children) { return createElement('h1', props, ...children); }
    function h2(props, ...children) { return createElement('h2', props, ...children); }
    function h3(props, ...children) { return createElement('h3', props, ...children); }
    function button(props, ...children) { return createElement('button', props, ...children); }
    function input(props) { return createElement('input', props); }
    function textarea(props) { return createElement('textarea', props); }
    function select(props, ...children) { return createElement('select', props, ...children); }
    function option(props, ...children) { return createElement('option', props, ...children); }
    function label(props, ...children) { return createElement('label', props, ...children); }
    function table(props, ...children) { return createElement('table', props, ...children); }
    function thead(props, ...children) { return createElement('thead', props, ...children); }
    function tbody(props, ...children) { return createElement('tbody', props, ...children); }
    function tr(props, ...children) { return createElement('tr', props, ...children); }
    function th(props, ...children) { return createElement('th', props, ...children); }
    function td(props, ...children) { return createElement('td', props, ...children); }

    /* =========================================================================
       システム定数定義
       ========================================================================= */
    const DATABASE_STORAGE_KEY = 'AI_Content_Pro_Enterprise_DB_v40';
    const SESSION_STORAGE_KEY = 'AI_Content_Pro_Enterprise_Session_v40';
    const DAILY_FREE_LIMIT = 3;

    /* =========================================================================
       エラーバウンダリ（クラッシュ時の白画面防止）
       ========================================================================= */
    class GlobalErrorBoundary extends Component {
      constructor(props) {
        super(props);
        this.state = { 
          hasError: false,
          errorMessage: '',
          errorStack: ''
        };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true };
      }

      componentDidCatch(error, errorInfo) {
        console.error("React Error Boundary Caught an Error:", error, errorInfo);
        this.setState({
          errorMessage: error.toString(),
          errorStack: errorInfo.componentStack
        });
      }

      handleReset() {
        localStorage.removeItem(SESSION_STORAGE_KEY);
        window.location.reload();
      }

      render() {
        if (this.state.hasError) {
          return div(
            { className: "min-h-screen flex items-center justify-center p-6 bg-slate-950" },
            div(
              { className: "glass-morphism p-10 rounded-2xl max-w-2xl w-full text-center shadow-2xl" },
              h2({ className: "text-3xl font-black text-brand-danger mb-6" }, "重大なシステムエラーが発生しました"),
              p({ className: "text-slate-300 text-base mb-8 leading-relaxed" }, "画面の描画中に予期せぬ不整合が発生しました。以下のリセットボタンを押してセッションをクリアしてください。"),
              div(
                { className: "bg-black/60 p-6 rounded-xl text-left overflow-auto text-xs text-slate-500 mb-8 font-mono h-48" },
                p({ className: "text-red-400 mb-2 font-bold" }, this.state.errorMessage),
                this.state.errorStack
              ),
              button(
                { 
                  onClick: this.handleReset,
                  className: "w-full bg-white/10 hover:bg-white/20 text-white font-bold py-4 rounded-xl transition duration-200"
                },
                "システムを安全にリセットする"
              )
            )
          );
        }
        return this.props.children;
      }
    }

    /* =========================================================================
       データベース管理モジュール（冗長な修復ロジックを含む）
       ========================================================================= */
    const ApplicationDatabase = {
      initialize: function() {
        return {
          config: { 
            adminUsername: 'admin', 
            adminPassword: 'admin123', 
            hiddenTools: {} 
          },
          users: {
            'admin': { 
              status: 'approved', 
              registeredAt: Date.now(), 
              usage: { count: 0, date: '' }, 
              permissions: {}, 
              brandSettings: { plan: 'paid', name: 'システム管理者', tone: '' }, 
              projects: { 
                'default': { name: 'マスタープロジェクト', toolData: {} } 
              }, 
              currentProjectId: 'default' 
            }
          },
          systemInquiries: []
        };
      },

      load: function() {
        let database = null;
        try {
          const storedData = localStorage.getItem(DATABASE_STORAGE_KEY);
          if (storedData) {
            database = JSON.parse(storedData);
          }
        } catch (error) {
          console.error("LocalStorage parsing failed. Resetting DB.", error);
        }

        if (!database || typeof database !== 'object') {
          database = this.initialize();
          this.save(database);
        }

        return this.repair(database);
      },

      save: function(databaseObject) {
        try {
          localStorage.setItem(DATABASE_STORAGE_KEY, JSON.stringify(databaseObject));
        } catch (error) {
          console.error("Failed to save database to LocalStorage.", error);
          alert("ブラウザのストレージ容量が限界に達している可能性があります。");
        }
      },

      repair: function(db) {
        // データの欠損をチェックし、存在しない場合は初期値を設定する
        if (!db.config) {
          db.config = { adminUsername: 'admin', adminPassword: 'admin123', hiddenTools: {} };
        }
        if (!db.config.hiddenTools) {
          db.config.hiddenTools = {};
        }
        if (!db.systemInquiries) {
          db.systemInquiries = [];
        }
        if (!db.users) {
          db.users = {};
        }

        const userKeys = Object.keys(db.users);
        for (let i = 0; i < userKeys.length; i++) {
          const username = userKeys[i];
          const userRecord = db.users[username];

          if (!userRecord.projects || typeof userRecord.projects !== 'object') {
            userRecord.projects = { 'default': { name: 'デフォルトプロジェクト', toolData: {} } };
          }
          if (!userRecord.currentProjectId || !userRecord.projects[userRecord.currentProjectId]) {
            const availableProjectIds = Object.keys(userRecord.projects);
            userRecord.currentProjectId = availableProjectIds.length > 0 ? availableProjectIds[0] : 'default';
          }
          if (!userRecord.usage) {
            userRecord.usage = { count: 0, date: '' };
          }
          if (!userRecord.permissions) {
            userRecord.permissions = {};
          }
          if (!userRecord.brandSettings) {
            userRecord.brandSettings = { plan: 'free', name: '', tone: '' };
          }

          // 各プロジェクト内の toolData オブジェクトを保証する
          const projectKeys = Object.keys(userRecord.projects);
          for (let j = 0; j < projectKeys.length; j++) {
            const projectId = projectKeys[j];
            if (!userRecord.projects[projectId].toolData) {
              userRecord.projects[projectId].toolData = {};
            }
          }
        }
        return db;
      }
    };

    /* =========================================================================
       ユーティリティ関数群
       ========================================================================= */
    const UtilityFunctions = {
      copyToClipboard: function(textToCopy, stateObject, setStateFunction, stateKey) {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(textToCopy).catch(function(err) {
              console.warn("Clipboard write failed: ", err);
            });
          }
          const newState = Object.assign({}, stateObject);
          newState[stateKey] = true;
          setStateFunction(newState);
          
          setTimeout(function() {
            setStateFunction(function(prevState) {
              const revertedState = Object.assign({}, prevState);
              revertedState[stateKey] = false;
              return revertedState;
            });
          }, 2500);
        } catch (error) {
          console.error("Copy utility error:", error);
        }
      },

      parseJsonSafely: function(rawText) {
        if (!rawText || typeof rawText !== 'string') {
          return null;
        }
        try {
          // Markdownのコードブロック記法などを除去
          const cleanedText = rawText.replace(/```(?:json)?\n?/gi, '').replace(/```/g, '').trim();
          // 中身のJSONオブジェクトだけを抽出試行
          const jsonMatch = cleanedText.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            try {
              return JSON.parse(jsonMatch[0]);
            } catch (innerError) {
              // fallback to raw parse
            }
          }
          return JSON.parse(cleanedText);
        } catch (error) {
          return null;
        }
      }
    };

    // --- Part 1 終了。限界まで記述しました。続きは Part 2 として出力します。 ---
    /* =========================================================================
       ナレッジベース（魔法の杖・自動生成用データベース）
       ※各ジャンル・年代ごとに最適化された高単価コンセプトの配列です。
       ========================================================================= */
    const KnowledgeBase = {
      'お金・副業': {
        '20代': [
          {
            theme: "完全未経験からスマホ1台で月30万を稼ぐ自動収益化の極意",
            target: "副業に興味はあるが専門スキルがなく、何から始めていいか分からない20代の会社員",

            authority: "AIツールを駆使し、開始半年で副業月収50万円を達成した現役Webマーケター",
            price: "2980",
            free_vol: "1500",
            paid_vol: "4500",
            guarantee: true
          }
        ],
        '30代': [
          {
            theme: "残業ゼロで月10万。AIを活用した「超・時短」副業術",
            target: "毎日残業で疲れ果て、将来への不安は大きいが、副業を始める気力も残っていない30代会社員",
            benefit: "本業の時間を削ることなく、毎月のローン返済や教育資金の不安を完全に消し去る経済的ゆとり",
            authority: "本業と育児を両立しながら、AI自動化ツールを駆使して1日30分の作業で安定収益を上げる実践者",
            price: "4980",
            free_vol: "2000",
            paid_vol: "6000",
            guarantee: true
          }
        ],
        '全年齢': [
          {
            theme: "AI時代の新・不労所得。ChatGPTを「優秀な従業員」として雇う禁断の自動化",
            target: "働いても働いても生活が楽にならない現状を、最新のテクノロジーで根本から破壊したい野心家",
            benefit: "単純作業から完全に解放され、人間本来の創造的な活動と自由な時間に没頭できる理想の人生",
            authority: "AI開発歴および個人向けAIビジネス導入コンサルタントとして、多数のプロジェクトを完遂した専門家",
            price: "9800",
            free_vol: "3000",
            paid_vol: "10000",
            guarantee: true
          }
        ]
      },
      '美容・健康': {
        '全年齢': [
          {
            theme: "AIが診断する「あなただけの」最適ダイエット。3ヶ月で-8kgの科学的アプローチ",
            target: "リバウンドを繰り返し、自分に合った方法が分からなくなっているダイエット難民",
            benefit: "鏡を見るのが毎日楽しくなり、お気に入りの服を自信を持って着こなせる、若々しくエネルギッシュな自分",
            authority: "最新の栄養学とデータ解析を組み合わせたパーソナルトレーナー",
            price: "3480",
            free_vol: "1500",
            paid_vol: "5000",
            guarantee: false
          }
        ]
      }
    };

    const getMagicConcept = function(genre, age) {
      const defaultGenre = 'お金・副業';
      const defaultAge = '全年齢';
      const selectedGenre = KnowledgeBase[genre] ? genre : defaultGenre;
      const pool = KnowledgeBase[selectedGenre][age] || KnowledgeBase[selectedGenre][defaultAge];
      const randomIndex = Math.floor(Math.random() * pool.length);
      return pool[randomIndex];
    };

    /* =========================================================================
       システムツール定義（各機能の詳細なパラメータ設定）
       ========================================================================= */
    const SystemTools = {
      campaign: {
        category: 'omega', icon: '👑', name: '全自動ファネル構築', badge: '特級',
        description: '商品名からLP, SNS, LINEの全導線を一気通貫で生成',
        tutorial: '商品のコンセプトから、集客・販売の全導線を一貫して生成します。',
        fields: [
          { id: 'prod', type: 'text', label: '商品名・テーマ', magic: 'AI自動化コンテンツビジネス構築プログラム' },
          { id: 'tgt', type: 'text', label: 'ターゲット層', magic: '毎日残業で疲れ果て、現状を変えたい30代会社員' },
          { id: 'val', type: 'textarea', label: '提供価値の詳細', magic: 'AIを部下のように使い、1日の作業を15分に短縮しながら収益を最大化する時短術' }
        ],
        buildPrompt: function(v) { return "商品「" + v.prod + "」を「" + v.tgt + "」に売る導線（LP、SNS3種、LINE5日分）を作成せよ。価値: " + v.val; },
        isOnePage: true
      },
      note: {
        category: 'monetize', icon: '📝', name: 'note記事 究極生成', badge: '必須',
        description: '文字数・価格を分離した最強の記事作成ツール',
        tutorial: '読者の悩みに寄り添い、解決策を提示する有料記事を作成します。魔法の杖を押すと、全ての項目が連動して埋まります。',
        fields: [
          { id: 'genre', type: 'select', label: 'ジャンル', options: ['お金・副業', '美容・健康', '人間関係・恋愛', 'キャリア・仕事', '趣味・ライフスタイル'] },
          { id: 'age', type: 'select', label: 'ターゲット年代', options: ['10代', '20代', '30代', '40代', '50代', '60代', '全年齢'] },
          { id: 'theme', type: 'text', label: '記事テーマ', isMainMagic: true },
          { id: 'target_detail', type: 'text', label: '具体的な読者の悩み' },
          { id: 'benefit', type: 'text', label: '読者が得られる未来' },
          { id: 'authority', type: 'text', label: '著者の実績・権威性' },
          { id: 'price', type: 'text', label: '販売価格 (円)' },
          { id: 'free_vol', type: 'text', label: '無料部分の文字数' },
          { id: 'paid_vol', type: 'text', label: '有料部分の文字数' },
          { id: 'guarantee', type: 'checkbox', label: '返金保証をアピール' }
        ],
        buildPrompt: function(v) { 
          return "note有料記事をプロデュースせよ。ジャンル:" + v.genre + ", 年代:" + v.age + ", テーマ:" + v.theme + ", ターゲット:" + v.target_detail + ", 未来:" + v.benefit + ", 実績:" + v.authority + ", 価格:" + v.price + "円, 無料部分:" + v.free_vol + "文字, 有料部分:" + v.paid_vol + "文字. " + (v.guarantee ? "返金保証を含める" : ""); 
        },
        isOnePage: true
      },
      cw_proposal: {
        category: 'clientwork', icon: '🎯', name: 'CW案件獲得 提案文', badge: '神機能',
        description: 'クラウドワークスの採用率を極限まで高めるキラー提案文',
        tutorial: '募集要項に対する完璧な提案文を生成します。',
        fields: [
          { id: 'job', type: 'textarea', label: '募集要項 (コピペ)' },
          { id: 'skill', type: 'text', label: '自分の強み', isMainMagic: true, magic: '最新AIを駆使し、通常の3倍のスピードで高品質な納品が可能です。' }
        ],
        buildPrompt: function(v) { return "募集要項「" + v.job + "」に対し、私の強み「" + v.skill + "」を活かした提案文を作成せよ。"; }
      }
    };

    const ToolCategories = [
      { id: 'omega', name: '🔥 オメガ特級ツール (全自動)' },
      { id: 'clientwork', name: '💼 クラウドワークス・仕事完遂' },
      { id: 'monetize', name: '📝 コンテンツ作成 ＆ 販売' }
    ];

    /* =========================================================================
       UIコンポーネント群
       ========================================================================= */
    
    // フォーム入力コンポーネント
    function FormInputComponent(props) {
      const field = props.field;
      const value = props.value !== undefined ? props.value : (field.type === 'checkbox' ? false : (field.options ? field.options[0] : ''));

      const isMagicAvailable = field.magic || field.isMainMagic;

      const headerContent = div(
        { className: 'flex justify-between items-center mb-3' },
        span({ className: 'text-xs font-black text-slate-400 tracking-widest uppercase' }, field.label),
        isMagicAvailable ? button({
          onClick: function() { props.onMagic(field.id, !!field.isMainMagic); },
          className: 'bg-gradient-to-r from-brand-accent to-red-500 text-white text-[10px] font-black px-4 py-1.5 rounded-full shadow-lg active:scale-95 transition hover:brightness-110'
        }, '✨ 魔法の杖') : null
      );

      let inputElement = null;
      if (field.type === 'text') {
        inputElement = input({ 
          className: 'input-base-style', 
          value: value, 
          placeholder: field.placeholder || '', 
          onChange: function(e) { props.onChange(field.id, e.target.value); } 
        });
      } else if (field.type === 'textarea') {
        inputElement = textarea({ 
          className: 'input-base-style min-h-[120px] resize-y', 
          value: value, 
          placeholder: field.placeholder || '', 
          onChange: function(e) { props.onChange(field.id, e.target.value); } 
        });
      } else if (field.type === 'select') {
        inputElement = select({ 
          className: 'input-base-style', 
          value: value, 
          onChange: function(e) { props.onChange(field.id, e.target.value); } 
        }, 
        field.options.map(function(opt) {
          return option({ key: opt, value: opt, className: 'bg-slate-900 text-white' }, opt);
        }));
      } else if (field.type === 'checkbox') {
        inputElement = label({ className: 'flex items-center gap-3 cursor-pointer p-2 group' }, 
          div({ className: 'w-10 h-6 bg-slate-800 rounded-full relative transition border border-white/10' }, 
            div({ className: 'absolute top-1 left-1 w-4 h-4 rounded-full transition ' + (value ? 'bg-brand-success left-5' : 'bg-slate-500') })
          ),
          input({ type: 'checkbox', className: 'hidden', checked: !!value, onChange: function(e) { props.onChange(field.id, e.target.checked); } }),
          span({ className: 'text-sm font-bold text-white/80' }, '機能を有効にする')
        );
      }

      return div({ className: 'glass-morphism rounded-2xl p-6 mb-5 animate-in' }, headerContent, inputElement);
    }

    // データ表示コンポーネント（再帰的）
    function DataViewerComponent(props) {
      const data = props.data;
      if (typeof data === 'string') {
        return p({ className: 'bg-black/40 border border-white/5 rounded-xl p-6 text-sm text-slate-200 whitespace-pre-wrap leading-relaxed' }, data);
      }
      if (Array.isArray(data)) {
        return div(null, data.map(function(item, index) {
          return div({ key: index, className: 'mb-6 pb-6 border-b border-white/5 last:border-0' }, createElement(DataViewerComponent, { data: item }));
        }));
      }
      if (typeof data === 'object' && data !== null) {
        return div(null, Object.keys(data).map(function(key) {
          return div({ key: key, className: 'mb-5' },
            span({ className: 'block text-brand-light text-xs font-black uppercase mb-2 tracking-widest' }, key),
            createElement(DataViewerComponent, { data: data[key] })
          );
        }));
      }
      return span(null, String(data));
    }

    /* =========================================================================
       ツール実行エンジンコンポーネント
       ========================================================================= */
    function ToolEngineComponent(props) {
      const toolId = props.toolId;
      const username = props.user;
      const toolConfig = SystemTools[toolId];
      
      const [database, setDatabase] = useState(ApplicationDatabase.load());
      const userData = database.users[username];
      const projectId = userData.currentProjectId;
      
      // プロジェクトデータの初期化を安全に行う
      const initialToolData = (userData.projects[projectId] && userData.projects[projectId].toolData && userData.projects[projectId].toolData[toolId]) 
        ? userData.projects[projectId].toolData[toolId] 
        : {};

      const [formValues, setFormValues] = useState(initialToolData);
      const [activeTab, setActiveTab] = useState('settings');
      const [copyState, setCopyState] = useState({});
      const [importText, setImportText] = useState('');
      const [resultData, setResultData] = useState(null);

      // Auto-save 機能
      const handleValueUpdate = function(fieldId, newValue) {
        const updatedValues = Object.assign({}, formValues, { [fieldId]: newValue });
        setFormValues(updatedValues);
        
        if (props.role !== 'admin') {
          const freshDb = ApplicationDatabase.load();
          freshDb.users[username].projects[projectId].toolData[toolId] = updatedValues;
          ApplicationDatabase.save(freshDb);
        }
      };

      const executeMagicWand = function(fieldId, isMainMagic) {
        if (isMainMagic) {
          // ジャンルと年代を元にナレッジベースから引き出す
          const currentGenre = formValues.genre || 'お金・副業';
          const currentAge = formValues.age || '30代';
          const magicConcept = getMagicConcept(currentGenre, currentAge);
          
          const expandedValues = Object.assign({}, formValues, {
            theme: magicConcept.theme,
            target_detail: currentAge + 'の' + magicConcept.target,
            benefit: magicConcept.benefit,
            authority: magicConcept.authority,
            price: magicConcept.price,
            free_vol: magicConcept.free_vol,
            paid_vol: magicConcept.paid_vol,
            guarantee: magicConcept.guarantee
          });
          setFormValues(expandedValues);
          handleValueUpdate('theme', magicConcept.theme); // trigger autosave
        } else {
          const targetField = toolConfig.fields.find(function(f) { return f.id === fieldId; });
          if (targetField && targetField.magic) {
            handleValueUpdate(fieldId, targetField.magic);
          }
        }
      };

      const handlePromptGeneration = function() {
        const plan = userData.brandSettings.plan || 'free';
        const systemPrefix = plan === 'paid' 
          ? "【システム: 有料版AI（最新モデル・検索・推論リミッター解除）】\nあなたは世界トップクラスの専門家として、最高品質の出力を生成してください。\n\n" 
          : "【システム: 無料版AI（要約モード）】\n出力が途切れないよう、装飾を最小限にし、核心を突く内容のみ出力してください。\n\n";
        
        const contextPrefix = userData.brandSettings.name 
          ? "【発信者情報】" + userData.brandSettings.name + "\n\n" 
          : "";
          
        const finalPrompt = systemPrefix + contextPrefix + toolConfig.buildPrompt(formValues) + "\n\n【ルール】前置きや挨拶は不要です。指定されたフォーマットのみを出力してください。";
        
        UtilityFunctions.copyToClipboard(finalPrompt, copyState, setCopyState, 'generate');
        if (!toolConfig.isOnePage) {
          setActiveTab('import');
        }
      };

      const handleDataImport = function() {
        const parsedData = UtilityFunctions.parseJsonSafely(importText);
        if (parsedData) {
          setResultData(parsedData);
          setActiveTab('preview');
          setImportText('');
        } else {
          alert("データの解析に失敗しました。AIの出力テキストをそのまま貼り付けてください。");
        }
      };

      const headerArea = div({ className: 'flex justify-between items-center mb-8 pb-6 border-b border-white/10 animate-in' },
        div({ className: 'flex items-center gap-4' },
          button({ onClick: props.onBack, className: 'glass-morphism px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-white/10 transition text-white' }, '← 戻る'),
          div(null, 
            h1({ className: 'text-2xl font-black text-white' }, toolConfig.name), 
            p({ className: 'text-xs text-brand-light font-bold uppercase tracking-widest mt-1' }, toolConfig.description)
          )
        )
      );

      // 1ページ完結型UI
      if (toolConfig.isOnePage) {
        return div({ className: 'w-full max-w-4xl mx-auto pb-10' },
          headerArea,
          div({ className: 'bg-brand/5 border border-brand/20 rounded-2xl p-6 mb-8' }, 
            p({ className: 'text-sm text-brand-light font-bold' }, '💡 ' + toolConfig.tutorial)
          ),
          toolConfig.fields.map(function(fieldObj) {
            return createElement(FormInputComponent, { 
              key: fieldObj.id, 
              field: fieldObj, 
              value: formValues[fieldObj.id], 
              onChange: handleValueUpdate, 
              onMagic: handleMagic 
            });
          }),
          button({ 
            onClick: handlePromptGeneration, 
            className: 'w-full py-6 rounded-2xl bg-gradient-to-r from-brand-dark to-brand-light text-white font-black text-xl shadow-xl mt-4 mb-10 transition duration-300 hover:brightness-110' 
          }, copyState.generate ? '✓ コピー完了！AIへ送信してください' : '📋 プロンプト生成 ＆ コピー'),
          div({ className: 'glass-morphism rounded-3xl p-8 animate-in' },
            span({ className: 'block text-xs font-black text-slate-400 mb-4 tracking-[0.2em] uppercase' }, '📥 AIの回答を貼り付けて保存・編集'),
            textarea({ 
              className: 'input-base-style min-h-[400px]', 
              value: resultData || '', 
              onChange: function(e) { setResultData(e.target.value); } 
            }),
            button({ 
              onClick: function() { UtilityFunctions.copyToClipboard(resultData, copyState, setCopyState, 'copyAll'); }, 
              className: 'w-full bg-white/10 hover:bg-white/20 py-4 rounded-xl font-black mt-6 transition text-white' 
            }, copyState.copyAll ? '✓ コピーしました' : '📋 全文コピー')
          )
        );
      }

      // タブ型UI
      return div({ className: 'w-full max-w-4xl mx-auto pb-10' },
        headerArea,
        div({ className: 'flex mb-10 border-b border-white/5 gap-2 overflow-x-auto hide-scrollbar' },
          [
            { id: 'settings', label: '⚙️ 設定' }, 
            { id: 'import', label: '📥 読込' }, 
            { id: 'preview', label: '👁 結果' }
          ].map(function(tabObj) {
            return button({ 
              key: tabObj.id, 
              onClick: function() { setActiveTab(tabObj.id); }, 
              className: 'px-8 py-4 font-black transition-all ' + (activeTab === tabObj.id ? 'text-brand-light border-b-2 border-brand-light' : 'text-white/30') 
            }, tabObj.label);
          })
        ),
        activeTab === 'settings' ? div({ className: 'animate-in' },
          toolConfig.fields.map(function(fieldObj) {
            return createElement(FormInputComponent, { key: fieldObj.id, field: fieldObj, value: formValues[fieldObj.id], onChange: handleValueUpdate, onMagic: handleMagic });
          }),
          button({ onClick: handlePromptGeneration, className: 'w-full py-6 rounded-2xl bg-gradient-to-r from-brand-dark to-brand-light text-white font-black text-xl shadow-xl mt-4' }, copyState.generate ? '✓ コピー完了！' : '📋 プロンプト生成 ＆ コピー')
        ) : null,
        activeTab === 'import' ? div({ className: 'glass-morphism rounded-3xl p-10 animate-in' },
          span({ className: 'block text-xs font-black text-slate-400 mb-4' }, '📥 AIの回答をそのまま貼り付けてください'),
          textarea({ className: 'input-base-style min-h-[300px]', value: importText, onChange: function(e) { setImportText(e.target.value); } }),
          button({ onClick: handleDataImport, disabled: !importText.trim(), className: 'w-full bg-brand hover:bg-brand-dark py-4 rounded-xl font-black mt-8 text-white transition disabled:opacity-50' }, '解析を実行')
        ) : null,
        activeTab === 'preview' && resultData ? div({ className: 'glass-morphism rounded-3xl p-10 animate-in' }, createElement(DataViewerComponent, { data: resultData })) : null
      );
    }

    /* =========================================================================
       管理者ダッシュボードコンポーネント（表示切り替え・バージョン表示）
       ========================================================================= */
    function AdminDashboardComponent(props) {
      const [database, setDatabase] = useState(ApplicationDatabase.load());
      const [currentTab, setCurrentTab] = useState('tools');

      const handleVisibilityToggle = function(toolId) {
        const freshDb = ApplicationDatabase.load();
        freshDb.config.hiddenTools[toolId] = !freshDb.config.hiddenTools[toolId];
        ApplicationDatabase.save(freshDb);
        setDatabase(freshDb);
      };

      const renderToolsConfig = function() {
        return div({ className: 'glass-morphism rounded-[2rem] p-10 animate-in' },
          p({ className: 'text-brand-accent font-bold mb-6' }, '⚠️ チェックを外したツールはユーザー画面から非表示になります。'),
          div({ className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4' },
            Object.keys(SystemTools).map(function(toolId) {
              const toolInfo = SystemTools[toolId];
              const isVisible = database.config.hiddenTools[toolId] !== true;
              return label({ key: toolId, className: 'flex items-center justify-between bg-white/5 p-5 rounded-xl border border-white/5 cursor-pointer hover:bg-white/10 transition' },
                div({ className: 'flex items-center gap-3' }, 
                  span({ className: 'text-xl' }, toolInfo.icon), 
                  span({ className: 'font-bold text-white' }, toolInfo.name)
                ),
                input({ 
                  type: 'checkbox', 
                  className: 'w-6 h-6 accent-brand-success', 
                  checked: isVisible, 
                  onChange: function() { handleVisibilityToggle(toolId); } 
                })
              );
            })
          )
        );
      };

      return div({ className: 'w-full max-w-6xl mx-auto animate-in pb-20' },
        div({ className: 'flex flex-col md:flex-row justify-between items-center mb-10 gap-6 pb-6 border-b border-white/10' },
          h1({ className: 'text-3xl font-black text-white tracking-tighter' }, '🎛️ DASHBOARD'),
          div({ className: 'flex gap-3' },
            button({ onClick: props.onGoToApp, className: 'bg-gradient-to-r from-brand-dark to-brand-light text-white px-8 py-3 rounded-full font-black shadow-lg transition' }, '🚀 ツール起動'),
            button({ onClick: props.onLogout, className: 'bg-white/10 hover:bg-white/20 px-8 py-3 rounded-full font-black text-white/50 transition' }, 'LOGOUT')
          )
        ),
        div({ className: 'flex gap-2 overflow-x-auto mb-10 border-b border-white/5 hide-scrollbar' },
          button({ onClick: function(){ setCurrentTab('tools'); }, className: 'px-8 py-4 text-sm font-black transition-all border-b-2 ' + (currentTab === 'tools' ? 'border-brand-light text-brand-light' : 'text-slate-500 border-transparent') }, '🛠 ツール表示設定')
        ),
        currentTab === 'tools' ? renderToolsConfig() : null,
        
        // 管理者画面のみのバージョン表示
        div({ className: 'mt-20 text-center opacity-50' }, 
          p({ className: 'text-[10px] font-black text-slate-500 tracking-[0.4em] uppercase' }, 'System Version: ' + SYS_VERSION)
        )
      );
    }

    /* =========================================================================
       ユーザーダッシュボードコンポーネント
       ========================================================================= */
    function UserDashboardComponent(props) {
      const [currentScreen, setCurrentScreen] = useState('home');
      const database = ApplicationDatabase.load();

      if (SystemTools[currentScreen]) {
        return createElement(ToolEngineComponent, { 
          toolId: currentScreen, 
          user: props.username, 
          role: props.role, 
          onBack: function() { setCurrentScreen('home'); } 
        });
      }

      return div({ className: 'w-full animate-in pb-20' },
        div({ className: 'absolute top-4 right-4 md:top-8 md:right-8 z-50 flex flex-wrap gap-3 justify-end' },
          props.role === 'admin' ? button({ onClick: props.onGoToAdmin, className: 'bg-brand-accent text-white px-6 py-2.5 rounded-full text-[10px] font-black shadow-lg shadow-brand-accent/30 active:scale-95' }, '🎛️ DASHBOARD') : null,
          button({ onClick: props.onLogout, className: 'bg-white/5 hover:bg-white/10 px-6 py-2.5 rounded-full text-[10px] font-black text-white/50 transition' }, 'LOGOUT')
        ),
        div({ className: 'text-center mt-20 mb-28 px-4' },
          div({ className: 'inline-block glass-morphism px-6 py-2 rounded-full mb-10' }, 
            span({ className: 'text-brand-light text-[10px] font-black tracking-[0.4em] uppercase' }, 'AI Content Pro Stable')
          ),
          h1({ className: 'text-5xl md:text-7xl font-black tracking-tighter mb-8 leading-tight text-white' }, 'Content ', span({ className: 'text-brand-light' }, 'Master')),
          p({ className: 'text-slate-400 text-base max-w-2xl mx-auto leading-relaxed' }, 'クラウドワークスから独自のコンテンツ販売まで、すべてを完全自動化。')
        ),
        ToolCategories.map(function(category) {
          const visibleTools = Object.keys(SystemTools).filter(function(tid) {
            return SystemTools[tid].category === category.id && database.config.hiddenTools[tid] !== true;
          });

          if (visibleTools.length === 0) return null;

          return div({ key: category.id, className: 'mb-20 max-w-6xl mx-auto px-4' },
            h2({ className: 'text-xl font-black text-white mb-10 flex items-center gap-4' }, 
              div({ className: 'w-2 h-8 bg-brand-light rounded-full' }), 
              category.name
            ),
            div({ className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' },
              visibleTools.map(function(toolId) {
                const toolInfo = SystemTools[toolId];
                return div({ 
                  key: toolId, 
                  onClick: function() { setCurrentScreen(toolId); }, 
                  className: 'glass-morphism rounded-[2rem] p-8 transition duration-300 hover:-translate-y-2 hover:border-brand-light/40 cursor-pointer relative overflow-hidden group' 
                },
                  div({ className: 'flex justify-between items-start mb-8' },
                    div({ className: 'text-5xl group-hover:scale-110 transition' }, toolInfo.icon),
                    toolInfo.badge ? span({ className: 'bg-brand-light/10 text-brand-light text-[10px] font-black px-3 py-1.5 rounded-lg border border-brand-light/20' }, toolInfo.badge) : null
                  ),
                  h3({ className: 'text-xl font-black mb-3 text-white/90 group-hover:text-white transition' }, toolInfo.name),
                  p({ className: 'text-sm text-slate-500' }, toolInfo.description)
                );
              })
            )
          );
        })
      );
    }

    /* =========================================================================
       認証・ログイン画面コンポーネント
       ========================================================================= */
    function AuthComponent(props) {
      const [usernameInput, setUsernameInput] = useState('');
      const [passwordInput, setPasswordInput] = useState('');
      const [errorMessage, setErrorMessage] = useState('');

      const handleLoginAction = function() {
        setErrorMessage('');
        const trimmedUsername = usernameInput.trim();
        
        if (!trimmedUsername) {
          setErrorMessage('ユーザー名を入力してください');
          return;
        }
        
        const database = ApplicationDatabase.load();
        
        if (trimmedUsername === database.config.adminUsername) {
          if (passwordInput === database.config.adminPassword) {
            localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify({ username: trimmedUsername, role: 'admin' }));
            props.onLoginSuccess(trimmedUsername, 'admin');
          } else {
            setErrorMessage('パスワードが正しくありません');
          }
        } else {
          // 一般ユーザーログインロジック（申請などは簡略化し、今回はログイン検証のみ）
          if (database.users[trimmedUsername]) {
            localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify({ username: trimmedUsername, role: database.users[trimmedUsername].status }));
            props.onLoginSuccess(trimmedUsername, database.users[trimmedUsername].status);
          } else {
            setErrorMessage('ユーザーが登録されていません。システム管理者に連絡してください。');
          }
        }
      };

      return div({ className: 'w-full max-w-md mx-auto mt-32 animate-in px-4' },
        div({ className: 'glass-morphism rounded-[2.5rem] p-10 md:p-12 shadow-2xl text-center relative overflow-hidden' },
          h2({ className: 'text-3xl font-black mb-12 tracking-tight text-white' }, 'AI Content Pro'),
          div({ className: 'space-y-5 relative z-10' },
            input({ 
              className: 'input-base-style text-center', 
              placeholder: 'USER NAME', 
              value: usernameInput, 
              onChange: function(e) { setUsernameInput(e.target.value); } 
            }),
            input({ 
              className: 'input-base-style text-center', 
              type: 'password', 
              placeholder: 'PASSWORD', 
              value: passwordInput, 
              onChange: function(e) { setPasswordInput(e.target.value); } 
            }),
            errorMessage ? p({ className: 'text-brand-danger text-xs font-bold mt-2' }, '❌ ' + errorMessage) : null,
            button({ 
              onClick: handleLoginAction, 
              className: 'w-full bg-gradient-to-r from-brand-dark to-brand-light py-4 rounded-2xl text-white font-black text-lg shadow-xl mt-6 transition duration-200 hover:brightness-110' 
            }, 'LOGIN')
          )
        )
      );
    }

    /* =========================================================================
       Rootコンポーネント（全体の状態管理とルーティング）
       ========================================================================= */
    function RootApplicationComponent() {
      const [authData, setAuthData] = useState({ username: null, role: null });
      const [showAdminDashboard, setShowAdminDashboard] = useState(false);

      useEffect(function() {
        const sessionDataString = localStorage.getItem(SESSION_STORAGE_KEY);
        if (sessionDataString) {
          try {
            setAuthData(JSON.parse(sessionDataString));
          } catch (e) {
            console.error("Session parse error");
          }
        }
      }, []);

      const handleLoginSuccess = function(username, role) {
        setAuthData({ username: username, role: role });
      };

      const handleLogout = function() {
        localStorage.removeItem(SESSION_STORAGE_KEY);
        setAuthData({ username: null, role: null });
        setShowAdminDashboard(false);
      };

      const handleGoToAdmin = function() { setShowAdminDashboard(true); };
      const handleGoToApp = function() { setShowAdminDashboard(false); };

      if (!authData.username) {
        return createElement(AuthComponent, { onLoginSuccess: handleLoginSuccess });
      }

      if (authData.role === 'admin' && showAdminDashboard) {
        return createElement(AdminDashboardComponent, { onGoToApp: handleGoToApp, onLogout: handleLogout });
      }

      return createElement(UserDashboardComponent, { 
        username: authData.username, 
        role: authData.role, 
        onLogout: handleLogout, 
        onGoToAdmin: handleGoToAdmin 
      });
    }

    // Reactツリーのマウント
    const rootContainer = document.getElementById('root-container');
    const reactRoot = ReactDOM.createRoot(rootContainer);
    reactRoot.render(
      createElement(GlobalErrorBoundary, null, 
        createElement(RootApplicationComponent, null)
      )
    );

  })();
  </script>
</body>
</html>
