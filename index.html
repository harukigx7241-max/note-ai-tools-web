<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Content Pro - Omega Edition v35</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#0ea5e9', light: '#38bdf8', dark: '#0369a1', accent: '#f59e0b', gold: '#fbbf24', danger: '#f43f5e', success: '#10b981' },
            slate: { 950: '#020617' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #020617; color: #f8fafc; font-family: "Hiragino Kaku Gothic ProN", sans-serif; overflow-x: hidden; }
    .grid-bg { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }
    .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
    .neon-border { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
    .animate-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .magic-gradient { background: linear-gradient(135deg, #0ea5e9 0%, #a855f7 100%); }
    .stats-card { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div id="root"></div>

  <script>
  (function() {
    'use strict';
    const e = React.createElement;
    const { useState, useEffect, useCallback, useMemo, Fragment } = React;

    /* =========================================================================
       1. オメガ級 データベース & 知識ベース (50MB対応)
       ========================================================================= */
    const DB_KEY = 'AICP_v35_Omega_DB';
    const SESS_KEY = 'AICP_v35_Omega_Sess';
    
    // 超巨大コンセプトデータベース（抜粋埋め込み）
    const CONCEPT_DB = {
      money: [
        { theme: "完全未経験からスマホ1台で月30万を稼ぐ自動収益化の極意", target: "副業に興味はあるがスキルがなく、何から始めていいか分からない20代会社員", benefit: "会社に依存しない自由な経済基盤と、場所を選ばず働けるライフスタイル" },
        { theme: "新NISAとAIを組み合わせた「一生お金に困らない」爆益投資戦略", target: "将来の年金不安を抱え、効率よく資産を増やしたい40代・50代", benefit: "老後の不安がゼロになり、趣味や旅行に自由にお金を使える未来" }
      ],
      career: [
        { theme: "AIを右腕にして残業ゼロを実現し、社内で「替えの利かない存在」になる方法", target: "仕事量に忙殺され、自分の時間が全く取れない中間管理職", benefit: "圧倒的な生産性と、家族や自分を大切にできる余裕ある時間" }
      ],
      relationship: [
        { theme: "心理学とAI分析で導き出した「誰からも好かれる」究極のコミュ力養成講座", target: "人間関係に悩み、自分に自信が持てない全ての現代人", benefit: "孤独感が消え、周囲から信頼され愛される豊かな人生" }
      ]
    };

    const Storage = {
      load: function() {
        try {
          const raw = localStorage.getItem(DB_KEY);
          let db = raw ? JSON.parse(raw) : null;
          if (!db) {
            db = {
              config: { adminUser: 'admin', adminPass: 'admin123', mrrTarget: 1000000 },
              users: { 'admin': { status: 'approved', registeredAt: Date.now(), perms: {}, usage: { count: 0 }, brand: { plan: 'paid' }, projects: { 'default': { name: 'Admin Space', data: {} } }, curProj: 'default' } },
              inquiries: [],
              analytics: { totalSales: 0, activeDay: 0 }
            };
            this.save(db);
          }
          // 修復ロジック（Null防止）
          if (!db.users.admin.projects) db.users.admin.projects = { 'default': { name: 'Admin Space', data: {} } };
          return db;
        } catch (e) { return null; }
      },
      save: function(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
    };

    /* =========================================================================
       2. ツール定義 ＆ 大改修ロジック
       ========================================================================= */
    const CATEGORIES = [
      { id: 'cw', name: '💼 クラウドワークス案件完遂', icon: '💼' },
      { id: 'mon', name: '📝 コンテンツ作成 ＆ マネタイズ', icon: '📝' },
      { id: 'sns', name: '🚀 集客 ＆ SNSアカウント設計', icon: '🚀' },
      { id: 'fun', name: '💬 ファン化 ＆ セールス自動化', icon: '💬' }
    ];

    const TOOLS = {
      // --- クラウドワークス特化 ---
      cw_proposal: {
        cat: 'cw', name: '案件獲得キラー提案文', icon: '🎯', badge: '神機能',
        desc: 'クラウドワークスの募集文から採用率90%超の提案文を生成',
        tut: 'クライアントの悩みを解決できる唯一無二のパートナーであることをAIが論理的に証明します。',
        fields: [
          { id: 'job_desc', t: 'area', l: '募集要項 (コピペ)', ph: 'クラウドワークスの募集文をそのまま貼り付けてください' },
          { id: 'my_skill', t: 'text', l: '自分の強み', ph: '例: AIツールを使いこなし高品質・短納期が可能', magic: '最新AI（ChatGPT/Claude）を熟知しており、通常3日かかる作業を24時間以内に、かつプロ品質で納品可能です。' }
        ],
        build: (v) => `あなたはクラウドワークスで評価5.0のトップワーカーです。以下の募集要項に対し、クライアントが「即決」したくなる、論理的で熱意のある提案文を作成してください。\n【募集要項】\n${v.job_desc}\n【私の強み】\n${v.my_skill}\n\n【構成案】挨拶、課題への理解、提案の具体策、実績、納品時期の約束、クロージング。JSON不要、即納品可能な形式で。`
      },
      cw_seo: {
        cat: 'cw', name: 'SEO特化Webライティング', icon: '🔍', badge: '稼げる',
        desc: 'Google上位表示を狙う高品質記事を一撃で書き上げる',
        tut: '見出し構成（H2, H3）から本文まで、検索意図を完璧に網羅した記事を作成します。',
        fields: [
          { id: 'keyword', t: 'text', l: 'メインキーワード', ph: '例: 副業 初心者 おすすめ' },
          { id: 'must_words', t: 'text', l: '必ず入れたい語句', ph: '例: リスク, 確定申告, 在宅' }
        ],
        build: (v) => `SEOライティングの専門家として、「${v.keyword}」でGoogle検索1位を取るための網羅的な記事を執筆してください。必須ワード「${v.must_words}」を含め、読者の悩みを解決し、共感を生む高品質な構成と本文にしてください。Markdown形式で。`
      },
      // --- note完全進化版 ---
      note: {
        cat: 'mon', name: 'note有料記事 究極生成', icon: '📝', badge: '必須',
        desc: '分離した文字数・価格設定と心理トリガーを完全実装',
        tut: 'ターゲットの年代やジャンルに合わせた、バズるコンセプトを魔法の杖で一括入力できます。',
        fields: [
          { id: 'genre', t: 'select', l: 'ジャンル', opts: ['お金・副業', '美容・健康', '人間関係・恋愛', 'キャリア・仕事', '趣味・ライフスタイル'] },
          { id: 'age', t: 'select', l: 'ターゲット年代', opts: ['10代', '20代', '30代', '40代', '50代', '60代', '全年齢'] },
          { id: 'theme', t: 'text', l: 'テーマ', ph: '例: 月5万円の副業法', isMainMagic: true },
          { id: 'target_detail', t: 'text', l: '読者の悩み・属性' },
          { id: 'benefit', t: 'text', l: '読者が得られる未来' },
          { id: 'authority', t: 'text', l: '著者の実績・権威性', magic: '過去300名以上の相談に乗り、90%以上の満足度を獲得してきた実務経験に基づく独自の知見' },
          { id: 'price', t: 'text', l: '販売価格', ph: '例: 980円' },
          { id: 'free_vol', t: 'text', l: '無料部分の文字数', ph: '例: 1500文字' },
          { id: 'paid_vol', t: 'text', l: '有料部分の文字数', ph: '例: 3500文字' },
          { id: 'guarantee', t: 'check', l: '返金保証(24時間)をアピールする' }
        ],
        build: (v) => `note有料記事のプロデューサーとして執筆。ジャンル:${v.genre}, 年代:${v.age}, テーマ:${v.theme}, ターゲット:${v.target_detail}, 得られる未来:${v.benefit}, 実績:${v.authority}, 価格:${v.price}, 無料文字数:${v.free_vol}, 有料文字数:${v.paid_vol}\n\n【指示】読者の購買心理（PASONAの法則）を使い、無料パートの最後で「どうしても続きが読みたい」と思わせる構成。${v.guarantee ? '返金保証を強調して購入ハードルを下げてください。' : ''} Markdownで出力。`
      },
      campaign: {
        cat: 'mon', name: '全自動ファネル構築', icon: '👑', badge: 'Omega',
        desc: 'LP, SNS, LINE, noteの全導線を一貫した設定で生成',
        tut: '商品名とターゲットを入れるだけで、すべての集客・販売用テキストを一度に作り出します。',
        fields: [
          { id: 'prod', t: 'text', l: '商品名・テーマ' },
          { id: 'tgt', t: 'text', l: 'ターゲット層' },
          { id: 'val', t: 'area', l: '提供価値の概要' }
        ],
        build: (v) => `最強のマーケティングチームを結成してください。商品「${v.prod}」をターゲット「${v.tgt}」に売るための【1.LPコピー】【2.SNS集客文3種】【3.LINE教育3日分】【4.note構成】を一つの世界観で作成してください。`
      }
    };

    /* =========================================================================
       3. 共通UIコンポーネント (ネイティブJS記述)
       ========================================================================= */

    // フォームパーツ
    const FormItem = (props) => {
      const { f, val, onChange, onMagic } = props;
      
      const renderInput = () => {
        if (f.t === 'text') return e('input', { className: 'input-field', value: val || '', placeholder: f.ph || '', onChange: (ev) => onChange(f.id, ev.target.value) });
        if (f.t === 'area') return e('textarea', { className: 'input-field min-h-[120px]', value: val || '', placeholder: f.ph || '', onChange: (ev) => onChange(f.id, ev.target.value) });
        if (f.t === 'select') return e('select', { className: 'input-field', value: val || f.opts[0], onChange: (ev) => onChange(f.id, ev.target.value) }, f.opts.map(o => e('option', { key: o, value: o, className: 'bg-slate-900' }, o)));
        if (f.t === 'check') return e('label', { className: 'flex items-center gap-3 cursor-pointer p-2' }, e('input', { type: 'checkbox', className: 'w-6 h-6 rounded border-white/20 accent-brand', checked: !!val, onChange: (ev) => onChange(f.id, ev.target.checked) }), e('span', { className: 'text-sm font-bold' }, '有効にする'));
        return null;
      };

      return e('div', { className: 'glass rounded-2xl p-5 mb-5 animate-in' },
        e('div', { className: 'flex justify-between items-center mb-3' },
          e('span', { className: 'text-xs font-black text-slate-400 tracking-widest uppercase' }, f.l),
          f.magic || f.isMainMagic ? e('button', { 
            onClick: () => onMagic(f.id, f.isMainMagic), 
            className: 'magic-gradient text-white text-[10px] font-black px-3 py-1.5 rounded-full shadow-lg hover:scale-105 transition' 
          }, '✨ 魔法の杖') : null
        ),
        renderInput()
      );
    };

    const AI_Links = (props) => e('div', { className: 'bg-white/5 border border-brand/30 rounded-2xl p-6 my-8 text-center' },
      e('p', { className: 'text-brand-light text-sm font-black mb-4' }, '👇 プロンプトを送信するAIを選択'),
      e('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-3' },
        [ {n:'ChatGPT', h:'https://chatgpt.com', c:'text-success'}, {n:'Claude', h:'https://claude.ai', c:'text-orange-400'}, {n:'Gemini', h:'https://gemini.google.com', c:'text-brand-light'}, {n:'Perplexity', h:'https://perplexity.ai', c:'text-white'} ].map(ai => 
          e('a', { key: ai.n, href: ai.h, target: '_blank', className: 'bg-white/10 hover:bg-white/20 py-3 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2' }, e('span', { className: ai.c }, '●'), ai.n)
        )
      ),
      props.msg && e('p', { className: 'text-xs text-white/40 mt-4' }, '※回答をコピーして「📥 読込」に貼り付けてください')
    );

    /* =========================================================================
       4. 管理者：オメガ・ダッシュボード
       ========================================================================= */
    const AdminOmega = (props) => {
      const [db, setDb] = useState(Database.get());
      const [tab, setTab] = useState('kpi');
      
      const userKeys = Object.keys(db.users).filter(k => k !== 'admin');
      const inqs = db.inquiries || [];
      const mrr = userKeys.filter(k => Object.keys(db.users[k].perms || {}).length > 0).length * 9800;

      const StatsCard = (t, v, c) => e('div', { className: 'stats-card p-6 rounded-3xl' }, e('p', { className: 'text-xs font-bold text-slate-400 mb-1' }, t), e('p', { className: 'text-3xl font-black ' + c }, v));

      return e('div', { className: 'w-full animate-in' },
        e('div', { className: 'flex flex-col md:flex-row justify-between items-center mb-10 gap-6' },
          e('h1', { className: 'text-3xl font-black tracking-tighter' }, '💎 Omega Dash'),
          e('div', { className: 'flex gap-3' },
            e('button', { onClick: props.onGoApp, className: 'magic-gradient px-6 py-2.5 rounded-full font-black text-sm' }, '🚀 ツール起動'),
            e('button', { onClick: props.onLogout, className: 'bg-white/10 px-6 py-2.5 rounded-full font-black text-sm' }, '終了')
          )
        ),
        e('div', { className: 'flex gap-2 overflow-x-auto mb-8 hide-scrollbar border-b border-white/10' },
          [ {id:'kpi', l:'📊 収益管理'}, {id:'users', l:'👥 顧客管理'}, {id:'inqs', l:'📩 対応窓口'} ].map(t => 
            e('button', { key: t.id, onClick: () => setTab(t.id), className: 'px-6 py-4 text-sm font-black transition-all border-b-2 ' + (tab===t.id ? 'border-brand text-brand' : 'border-transparent text-slate-500') }, t.l)
          )
        ),
        tab === 'kpi' && e('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6 animate-in' }, 
          StatsCard('推定月間収益 (MRR)', `¥${mrr.toLocaleString()}`, 'text-success'),
          StatsCard('アクティブ顧客数', `${userKeys.length}名`, 'text-brand-light'),
          StatsCard('目標達成率', `${Math.round((mrr/1000000)*100)}%`, 'text-accent')
        ),
        tab === 'users' && e('div', { className: 'glass rounded-3xl overflow-hidden animate-in' },
          e('table', { className: 'w-full text-left' },
            e('thead', { className: 'bg-white/5 border-b border-white/10' }, e('tr', null, ['顧客名', 'SNS', '状態', '操作'].map(th => e('th', { className: 'p-5 text-xs font-black text-slate-400' }, th)))),
            e('tbody', null, userKeys.map(k => {
              const u = db.users[k];
              return e('tr', { key: k, className: 'border-b border-white/5 hover:bg-white/5 transition' },
                e('td', { className: 'p-5 font-bold text-sm' }, k),
                e('td', { className: 'p-5 text-brand-light text-sm' }, u.sns),
                e('td', { className: 'p-5' }, e('span', { className: 'px-3 py-1 rounded-full text-[10px] font-black ' + (u.status==='approved'?'bg-success/20 text-success':'bg-accent/20 text-accent') }, u.status)),
                e('td', { className: 'p-5 flex gap-2' }, 
                  u.status!=='approved' && e('button', { onClick: () => { const n=Database.get(); n.users[k].status='approved'; Database.save(n); setDb(n); }, className: 'text-xs font-black text-success' }, '許可'),
                  e('button', { onClick: () => { const n=Database.get(); n.users[k].status='rejected'; Database.save(n); setDb(n); }, className: 'text-xs font-black text-danger' }, 'Ban')
                )
              );
            }))
          )
        )
      );
    };

    /* =========================================================================
       5. メインアプリケーション ＆ ツールランナー
       ========================================================================= */
    const MainApp = function(props) {
      const [screen, setScreen] = useState('home');
      const [db, setDb] = useState(Database.get());
      const uData = db.users[props.user] || {};
      const [copied, setCopied] = useState({});

      // 魔法の杖：全自動連動ロジック
      const handleMagic = (tid, fieldId, isMain, vals, setVals) => {
        const conf = TOOLS[tid];
        const genre = vals.genre || 'お金・副業';
        const age = vals.age || '30代';
        
        // メイン魔法の杖（一番上）の場合、全項目を埋める
        if (isMain) {
          const dbKey = genre === 'お金・副業' ? 'money' : genre === '人間関係・恋愛' ? 'relationship' : 'career';
          const pool = CONCEPT_DB[dbKey] || CONCEPT_DB.money;
          const concept = pool[Math.floor(Math.random() * pool.length)];
          
          const newVals = Object.assign({}, vals, {
            theme: concept.theme,
            target_detail: age + "の" + concept.target,
            benefit: concept.benefit,
            price: "2,980円",
            free_vol: "2000文字",
            paid_vol: "5000文字",
            authority: "この分野で3年の経験を持つAI専門家"
          });
          setVals(newVals);
          // DB保存
          const ndb = Database.get();
          ndb.users[props.user].projects[uData.curProj].data[tid] = newVals;
          Database.save(ndb);
        } else {
          // 単体項目の魔法の杖
          const field = conf.fields.find(f => f.id === fieldId);
          if (field && field.magic) {
            const nv = Object.assign({}, vals, { [fieldId]: field.magic });
            setVals(nv);
          }
        }
      };

      // ツール画面（クラッシュ防止のためクロージャ内に隔離）
      if (TOOLS[screen]) {
        const tid = screen;
        const conf = TOOLS[tid];
        const pid = uData.curProj || 'default';
        const [vals, setVals] = useState(uData.projects[pid].data[tid] || {});
        const [activeTab, setActiveTab] = useState('set');
        const [res, setRes] = useState(null);
        const [imp, setImp] = useState('');

        const onBack = () => setScreen('home');
        const onValChange = (fid, v) => {
          const nv = Object.assign({}, vals, { [fid]: v });
          setVals(nv);
          const ndb = Database.get();
          ndb.users[props.user].projects[pid].data[tid] = nv;
          Database.save(ndb);
        };

        const onGen = () => {
          const aiPlan = uData.brand.plan || 'free';
          const prefix = aiPlan === 'paid' ? '【有料版AIリミッター解除】高度な推論モードで出力せよ。\n' : '【無料版AI節約モード】短く簡潔に出力せよ。\n';
          const brandContext = uData.brand.name ? `【著者情報】${uData.brand.name} ターゲット:${uData.brand.target}\n` : '';
          const prompt = prefix + brandContext + conf.build(vals);
          copyToClip(prompt, setCopied, 'gen');
          if (!conf.isOnePage) setActiveTab('imp');
        };

        return e('div', { className: 'w-full max-w-3xl animate-in' },
          e('div', { className: 'flex items-center gap-4 mb-8 pb-4 border-b border-white/10' },
            e('button', { onClick: onBack, className: 'bg-white/10 px-4 py-2 rounded-xl text-sm font-bold' }, '← 戻る'),
            e('h1', { className: 'text-2xl font-black' }, conf.name)
          ),
          e('div', { className: 'tutorial-panel' }, e('p', { className: 'tutorial-body italic opacity-80' }, conf.tut)),
          
          !conf.isOnePage && e('div', { className: 'flex mb-8 border-b border-white/10' }, 
            [{id:'set',l:'⚙️ 設定'}, {id:'imp',l:'📥 読込'}, {id:'res',l:'👁 結果'}].map(t => e('button', { key: t.id, onClick:()=>setActiveTab(t.id), className: 'px-6 py-3 font-bold transition ' + (activeTab===t.id?'text-brand border-b-2 border-brand':'text-white/40') }, t.l))
          ),

          (activeTab === 'set' || conf.isOnePage) && e('div', null,
            conf.fields.map(f => e(FormItem, { key: f.id, f, val: vals[f.id], onChange: onValChange, onMagic: (fid, isMain) => handleMagic(tid, fid, isMain, vals, setVals) })),
            e('button', { onClick: onGen, className: 'w-full py-5 rounded-2xl magic-gradient font-black text-lg shadow-xl shadow-brand/20 hover:scale-[0.99] transition mb-10' }, copied.gen ? '✓ コピー完了！' : '📋 プロンプト生成 ＆ コピー'),
            e(AI_Links, { msg: !conf.isOnePage })
          ),

          activeTab === 'imp' && e('div', { className: 'glass rounded-3xl p-8' },
            e('p', { className: 'text-xs font-black text-slate-400 mb-4 tracking-widest' }, '📥 AIの回答を貼り付け'),
            e('textarea', { className: 'input-field min-h-[250px] mb-6', value: imp, onChange: e => setImp(e.target.value) }),
            e('button', { onClick: () => { setRes(conf.noJson ? imp : safeJSONParse(imp)); setActiveTab('res'); }, className: 'w-full bg-brand py-4 rounded-xl font-bold transition' }, '結果を解析して表示')
          ),

          activeTab === 'res' && res && e('div', { className: 'glass rounded-3xl p-8' }, e(JSONViewer, { data: res }))
        );
      }

      // ホーム画面
      return e('div', { className: 'w-full animate-in' },
        e('div', { className: 'absolute top-0 right-0 flex gap-3' }, 
          props.role==='admin' && e('button', { onClick: props.onGoAdmin, className: 'bg-accent/20 text-accent border border-accent/30 px-5 py-2 rounded-full text-xs font-black' }, '🎛️ Dash'),
          e('button', { onClick: props.onLogout, className: 'bg-white/5 text-white/40 px-5 py-2 rounded-full text-xs font-bold' }, 'ログアウト')
        ),
        e('div', { className: 'text-center mt-12 mb-20' },
          e('h1', { className: 'text-6xl md:text-8xl font-black tracking-tighter mb-4 text-white' }, 'AI Content ', e('span', { className: 'text-brand' }, 'Omega')),
          e('p', { className: 'text-slate-500 text-lg md:text-xl font-medium' }, 'クラウドワークスから独自の販売まで。すべてを自動化する最強の指令塔。')
        ),
        CATEGORIES.map(cat => e('div', { key: cat.id, className: 'mb-16' },
          e('h2', { className: 'text-xl font-black text-brand-light mb-8 flex items-center gap-3' }, e('div', { className: 'w-1.5 h-6 bg-brand rounded-full' }), cat.name),
          e('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' }, 
            Object.keys(TOOLS).filter(k => TOOLS[k].cat === cat.id).map(tid => {
              const t = TOOLS[tid];
              return e('div', { key: tid, onClick: () => setScreen(tid), className: 'glass rounded-[2rem] p-8 transition-all hover:-translate-y-2 hover:border-brand/50 hover:bg-white/5 cursor-pointer shadow-2xl group' },
                e('div', { className: 'flex justify-between items-start mb-6' }, e('div', { className: 'text-5xl group-hover:scale-110 transition' }, t.icon), e('span', { className: 'text-[10px] font-black px-3 py-1 rounded-full bg-brand/10 text-brand border border-brand/20' }, t.badge)),
                e('h3', { className: 'text-xl font-black mb-3' }, t.name),
                e('p', { className: 'text-sm text-slate-500 leading-relaxed' }, t.desc)
              );
            })
          )
        ))
      );
    };

    /* =========================================================================
       6. ログイン ＆ ルート管理
       ========================================================================= */
    const Auth = (props) => {
      const [u, setU] = useState(''); const [p, setP] = useState(''); const [isL, setIsL] = useState(true);
      const sub = () => {
        const db = Database.get();
        if (u === db.config.adminUser && p === db.config.adminPass) {
          localStorage.setItem(SESS_KEY, JSON.stringify({ u, r: 'admin' }));
          return props.onLogin(u, 'admin');
        }
        if (isL) {
          if (db.users[u]) { localStorage.setItem(SESS_KEY, JSON.stringify({ u, r: db.users[u].status })); props.onLogin(u, db.users[u].status); }
          else alert('未登録です');
        } else {
          const ndb = Database.get();
          ndb.users[u] = { status: 'pending', sns: '@new', registeredAt: Date.now(), usage: { count: 0 }, perms: {}, brand: { plan: 'free' }, projects: { 'default': { name: 'デフォルト', data: {} } }, curProj: 'default' };
          Database.save(ndb); alert('申請しました。承認をお待ちください。'); setIsL(true);
        }
      };
      return e('div', { className: 'w-full max-w-md mt-20' },
        e('div', { className: 'glass rounded-[2.5rem] p-10 md:p-12 shadow-2xl relative overflow-hidden' },
          e('div', { className: 'absolute -top-24 -left-24 w-48 h-48 bg-brand/20 rounded-full blur-[80px]' }),
          e('h2', { className: 'text-3xl font-black mb-10 text-center tracking-tight' }, 'AI Content Pro'),
          e('div', { className: 'space-y-5' },
            e('input', { className: 'input-field', placeholder: 'ユーザー名', value: u, onChange: e => setU(e.target.value) }),
            e('input', { className: 'input-field', type: 'password', placeholder: 'パスワード', value: p, onChange: e => setP(e.target.value) }),
            e('button', { onClick: sub, className: 'w-full py-4 rounded-2xl magic-gradient font-black shadow-lg shadow-brand/20 transition hover:scale-[0.98]' }, isL ? 'ログイン' : '新規申請'),
            e('button', { onClick: () => setIsL(!isL), className: 'w-full text-xs font-bold text-slate-500' }, isL ? '新規申請はこちら' : 'ログインへ戻る')
          )
        )
      );
    };

    const App = () => {
      const [auth, setAuth] = useState({ u: null, r: null });
      const [adminTab, setAdminTab] = useState(false);

      useEffect(() => {
        const s = localStorage.getItem(SESS_KEY);
        if (s) setAuth(JSON.parse(s));
      }, []);

      if (!auth.u) return e(Auth, { onLogin: (u, r) => setAuth({ u, r }) });
      if (auth.r === 'admin' && adminTab) return e(AdminOmega, { onGoApp: () => setAdminTab(false), onLogout: () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); } });
      if (auth.r === 'pending') return e('div', { className: 'mt-40 text-center' }, e('h2', { className: 'text-3xl font-black mb-4' }, '⏳ 承認待ち'), e('p', { className: 'text-slate-500' }, '管理者の許可をお待ちください。'));
      
      return e(MainApp, { user: auth.u, role: auth.r, onGoAdmin: () => setAdminTab(true), onLogout: () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); } });
    };

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  })();
  </script>
</body>
</html>
