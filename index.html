<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホでのピンチズーム崩れを防ぎ、ネイティブアプリ化する設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Content Pro - Responsive Premium</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#0ea5e9', light: '#38bdf8', dark: '#0369a1', accent: '#f59e0b', danger: '#f43f5e', success: '#10b981' }
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out forwards',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards'
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        }
      }
    }
  </script>

  <style>
    /* ベース設定：スマホ最適化 */
    body {
      background-color: #020617; color: #f8fafc;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent; /* スマホタップ時の青いハイライトを消す */
      overflow-x: hidden;
      overscroll-behavior-y: none; /* スマホの引っ張り更新を防止 */
    }

    .grid-bg {
      position: fixed; inset: 0; z-index: -1;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    /* スマホ・PC共通の美しいガラスUI */
    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* 入力フォーム（スマホでフォーカス時にズームしないよう16px以上確保） */
    .input-base {
      width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 0.75rem; padding: 1rem; color: #fff; font-size: 16px; outline: none; transition: 0.3s;
    }
    .input-base:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* スマホ用ボトムナビゲーション保護エリア */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div id="root"></div>

  <script>
  (function() {
    'use strict';
    const el = React.createElement;
    const { useState, useEffect, Fragment } = React;

    // React Element Helpers
    const div = (props, ...children) => el('div', props, ...children);
    const span = (props, ...children) => el('span', props, ...children);
    const p = (props, ...children) => el('p', props, ...children);
    const h1 = (props, ...children) => el('h1', props, ...children);
    const h2 = (props, ...children) => el('h2', props, ...children);
    const h3 = (props, ...children) => el('h3', props, ...children);
    const button = (props, ...children) => el('button', props, ...children);
    const input = (props) => el('input', props);
    const textarea = (props) => el('textarea', props);
    const select = (props, ...children) => el('select', props, ...children);
    const option = (props, ...children) => el('option', props, ...children);

    /* =========================================================================
       1. データベース機構 (Auto-Save搭載)
       ========================================================================= */
    const DB_KEY = 'AICP_v40_Responsive';
    const SESS_KEY = 'AICP_v40_Session';

    const AppDB = {
      get: () => {
        let db = null;
        try { const raw = localStorage.getItem(DB_KEY); if (raw) db = JSON.parse(raw); } catch (e) {}
        if (!db || typeof db !== 'object') {
          db = {
            config: { adminU: 'admin', adminP: 'admin123', toolVisibility: {} },
            users: { 'admin': { status: 'approved', registeredAt: Date.now(), usage: { count: 0, date: '' }, perms: {}, brand: { plan: 'paid', name: '管理者' }, projects: { 'default': { name: 'デフォルト', data: {} } }, curProj: 'default' } },
            inquiries: []
          };
          localStorage.setItem(DB_KEY, JSON.stringify(db));
        }
        // 完全修復
        if (!db.config.toolVisibility) db.config.toolVisibility = {};
        if (!db.inquiries) db.inquiries = [];
        Object.keys(db.users).forEach(u => {
          let user = db.users[u];
          if (!user.projects) user.projects = { 'default': { name: 'デフォルト', data: {} } };
          if (!user.curProj || !user.projects[user.curProj]) user.curProj = 'default';
          if (!user.usage) user.usage = { count: 0, date: '' };
          if (!user.perms) user.perms = {};
          if (!user.brand) user.brand = { plan: 'free', name: '' };
          Object.keys(user.projects).forEach(pid => { if (!user.projects[pid].data) user.projects[pid].data = {}; });
        });
        return db;
      },
      save: (db) => { try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch (e) {} }
    };

    const MAGIC_DATA = {
      note: [
        { theme: "完全未経験からスマホ1台で月5万稼ぐ自動化", target: "スキルがない20代〜30代会社員", benefit: "会社に依存しない経済基盤と自由な時間", authority: "AIツールを駆使し副業月収30万の現役マーケター", price: "2,980", free: "1500", paid: "4000", guarantee: true }
      ]
    };
    const getRandomMagic = (tid) => { const pool = MAGIC_DATA[tid] || MAGIC_DATA['note']; return pool[Math.floor(Math.random() * pool.length)]; };

    /* =========================================================================
       2. ツール定義
       ========================================================================= */
    const TOOLS = {
      campaign: { cat: 'omega', icon: '👑', name: '全自動ファネル構築', desc: 'LP, SNS, LINEを一撃生成', fields: [{ id: 'prod', t: 'text', l: '商品名', magic: 'AI自動化ビジネス構築' }, { id: 'tgt', t: 'text', l: 'ターゲット', magic: '残業で疲れ果てた30代' }, { id: 'val', t: 'area', l: '提供価値', magic: '1日15分で収益を最大化する時短術' }], build: (v) => `商品「${v.prod}」を「${v.tgt}」に売る導線を作成せよ。価値: ${v.val}`, isOnePage: true },
      note: { cat: 'mon', icon: '📝', name: 'note記事 究極生成', desc: '文字数・価格を分離した最強記事', fields: [{ id: 'genre', t: 'select', l: 'ジャンル', opts: ['お金・副業', '美容・健康', '人間関係・恋愛', 'キャリア', '趣味'] }, { id: 'age', t: 'select', l: '年代', opts: ['20代', '30代', '40代', '全年齢'] }, { id: 'theme', t: 'text', l: 'テーマ', isMainMagic: true }, { id: 'target_detail', t: 'text', l: '悩み' }, { id: 'benefit', t: 'text', l: '得られる未来' }, { id: 'authority', t: 'text', l: '実績' }, { id: 'price', t: 'text', l: '価格(円)' }, { id: 'free_vol', t: 'text', l: '無料文字数' }, { id: 'paid_vol', t: 'text', l: '有料文字数' }, { id: 'guarantee', t: 'check', l: '返金保証アピール' }], build: (v) => `note記事執筆。ジャンル:${v.genre}, 年代:${v.age}, テーマ:${v.theme}, 悩み:${v.target_detail}, 未来:${v.benefit}, 実績:${v.authority}, 価格:${v.price}, 無料:${v.free_vol}字, 有料:${v.paid_vol}字. ${v.guarantee?'返金保証あり':''}`, isOnePage: true },
      cw_proposal: { cat: 'cw', icon: '🎯', name: 'CW提案文', desc: '採用率を極限まで高める', fields: [{ id: 'job', t: 'area', l: '募集要項(コピペ)' }, { id: 'skill', t: 'text', l: '自分の強み', isMainMagic: true }], build: (v) => `募集要項「${v.job}」に強み「${v.skill}」で提案文を作成せよ。` },
      cw_seo: { cat: 'cw', icon: '🔍', name: 'SEOライティング', desc: 'Google上位を狙う高品質記事', fields: [{ id: 'kw', t: 'text', l: 'キーワード' }, { id: 'must', t: 'text', l: '必須ワード' }], build: (v) => `「${v.kw}」で検索1位を狙うSEO記事を執筆せよ。必須: ${v.must}` },
      lp: { cat: 'mon', icon: '📄', name: '爆売れLP', desc: '高単価商品を成約させる', fields: [{ id: 'prod', t: 'text', l: '商品名・価格', isMainMagic: true }, { id: 'bene', t: 'area', l: 'ベネフィット' }], build: (v) => `商品「${v.prod}」のLP構成を作成せよ。特徴: ${v.bene}` },
      sns: { cat: 'sns', icon: '📱', name: 'SNS集客ポスト', desc: '反応が取れる投稿', fields: [{ id: 'platform', t: 'select', l: '媒体', opts: ['X', 'Threads'] }, { id: 'content', t: 'area', l: '発信内容' }], build: (v) => `「${v.platform}」向け投稿作成。内容: ${v.content}` },
      line: { cat: 'fun', icon: '💌', name: 'LINEステップ', desc: '5日間でファン化', fields: [{ id: 'prod', t: 'text', l: '販売商品' }, { id: 'detail', t: 'area', l: '詳細' }], build: (v) => `商品「${v.prod}」を売るLINE5日間ステップを作成。詳細: ${v.detail}` }
    };

    const CATEGORIES = [
      { id: 'omega', name: '🔥 オメガ特級' },
      { id: 'cw', name: '💼 クラウドワークス' },
      { id: 'mon', name: '📝 コンテンツ作成' },
      { id: 'sns', name: '🚀 SNS集客' },
      { id: 'fun', name: '💬 ファン化' }
    ];

    // --- Part 1 終了。UIコンポーネント群は Part 2 へ続きます ---
    /* =========================================================================
       3. 共通UIコンポーネント (スマホ/PC レスポンシブ完全対応)
       ========================================================================= */
    
    // エラーからシステムを守る絶対防護壁
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false }; }
      static getDerivedStateFromError(error) { return { hasError: true }; }
      render() {
        if (this.state.hasError) return div({ className: "p-10 text-center" }, h2({ className: "text-brand-danger font-black mb-4" }, "⚠️ 描画エラー"), p({ className: "text-sm text-slate-400 mb-6" }, "表示をリセットします。"), button({ onClick: () => window.location.reload(), className: "bg-white/10 px-6 py-2 rounded-xl" }, "再読み込み"));
        return this.props.children;
      }
    }

    const FormInput = ({ f, val, onChange, onMagic }) => {
      const isMagic = f.magic || f.isMainMagic;
      const value = val !== undefined ? val : (f.t === 'check' ? false : (f.opts ? f.opts[0] : ''));

      const header = div({ className: 'flex justify-between items-center mb-3' },
        span({ className: 'text-[11px] font-black text-slate-400 tracking-widest uppercase' }, f.l),
        isMagic ? button({ 
          onClick: () => onMagic(f.id, !!f.isMainMagic),
          className: 'bg-brand-accent/20 text-brand-accent border border-brand-accent/40 text-[10px] font-black px-4 py-1.5 rounded-full shadow-lg active:scale-95 transition'
        }, '✨ 魔法の杖') : null
      );

      let inputNode;
      if (f.t === 'text') inputNode = input({ className: 'input-base', value: value, placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
      else if (f.t === 'area') inputNode = textarea({ className: 'input-base min-h-[120px] resize-y', value: value, placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
      else if (f.t === 'select') inputNode = select({ className: 'input-base', value: value, onChange: e => onChange(f.id, e.target.value) }, f.opts.map(o => option({ key: o, value: o, className: 'bg-slate-900' }, o)));
      else if (f.t === 'check') inputNode = el('label', { className: 'flex items-center gap-4 cursor-pointer group p-2' }, 
        div({ className: 'w-12 h-7 bg-slate-800 rounded-full relative transition border border-white/10 group-hover:border-brand/50' }, 
          div({ className: 'absolute top-1 left-1 w-5 h-5 rounded-full transition ' + (value ? 'bg-brand left-6 shadow-[0_0_15px_rgba(56,189,248,0.5)]' : 'bg-slate-600') })
        ),
        input({ type: 'checkbox', className: 'hidden', checked: !!value, onChange: e => onChange(f.id, e.target.checked) }),
        span({ className: 'text-sm font-bold text-white/80' }, '機能を有効にする')
      );

      return div({ className: 'glass rounded-2xl p-6 mb-5 animate-slide-up' }, header, inputNode);
    };

    const DataViewer = ({ data }) => {
      if (typeof data === 'string') return p({ className: 'bg-black/40 border border-white/5 rounded-xl p-6 text-sm text-slate-200 whitespace-pre-wrap leading-relaxed font-medium' }, data);
      if (Array.isArray(data)) return div(null, data.map((item, i) => div({ key: i, className: 'mb-6 pb-6 border-b border-white/5 last:border-0' }, el(DataViewer, { data: item }))));
      if (typeof data === 'object' && data !== null) {
        return div(null, Object.keys(data).map(k => div({ key: k, className: 'mb-6' },
          span({ className: 'block text-brand-light text-[10px] font-black uppercase mb-2 tracking-[0.2em]' }, k),
          el(DataViewer, { data: data[k] })
        )));
      }
      return span(null, String(data));
    };

    /* =========================================================================
       4. ツールエンジン (Auto-Save 搭載)
       ========================================================================= */
    const ToolCore = ({ tid, user, role, onBack }) => {
      const conf = TOOLS[tid];
      const [db, setDb] = useState(AppDB.get());
      const uData = db.users[user];
      const pid = uData.curProj;
      const [vals, setVals] = useState(uData.projects[pid].data[tid] || {});
      const [tab, setTab] = useState('settings');
      const [copied, setCopied] = useState({});
      const [imp, setImp] = useState('');
      const [res, setRes] = useState(null);

      // Auto-Save: 入力するたびにDBへ自動保存。ブラウザが落ちても復元される。
      const update = (fid, v) => {
        const nv = { ...vals, [fid]: v };
        setVals(nv);
        if (role !== 'admin') {
          const ndb = AppDB.get();
          ndb.users[user].projects[pid].data[tid] = nv;
          AppDB.save(ndb);
        }
      };

      const handleMagic = (fid, isMain) => {
        if (isMain) {
          const magicSet = getRandomMagic(tid);
          if (tid === 'note') setVals({ ...vals, theme: magicSet.theme, target_detail: magicSet.target, benefit: magicSet.benefit, authority: magicSet.authority, price: magicSet.price, free_vol: magicSet.free, paid_vol: magicSet.paid, guarantee: magicSet.guarantee });
          else if (tid === 'lp') setVals({ ...vals, prod: magicSet.product, bene: magicSet.benefits });
          else if (tid === 'cw_proposal') setVals({ ...vals, job: magicSet.job, skill: magicSet.skill });
          else if (tid === 'campaign') setVals({ ...vals, prod: magicSet.prod, tgt: magicSet.tgt, val: magicSet.val });
        } else {
          const f = conf.fields.find(x => x.id === fid);
          if (f && f.magic) update(fid, f.magic);
        }
      };

      const onGenerate = () => {
        const plan = uData.brand.plan || 'free';
        const prefix = plan === 'paid' ? "【有料版AI（推論モード全開）】\n最高品質で出力せよ。\n\n" : "【無料版AI節約モード】\n途切れないよう簡潔に出力せよ。\n\n";
        const ctx = uData.brand.name ? `【発信者】${uData.brand.name}\n` : "";
        const prompt = prefix + ctx + conf.build(vals);
        
        if (navigator.clipboard) navigator.clipboard.writeText(prompt).catch(()=>{});
        setCopied({ gen: true }); setTimeout(() => setCopied({}), 2000);
        if (!conf.isOnePage) setTab('import');
      };

      const onImport = () => {
        if (conf.noJson) { setRes(imp); setTab('preview'); return; }
        try {
          const clean = imp.replace(/```(?:json)?\n?/gi, '').replace(/```/g, '').trim();
          const match = clean.match(/\{[\s\S]*\}/);
          setRes(JSON.parse(match ? match[0] : clean));
          setTab('preview'); setImp('');
        } catch (e) { alert("JSON形式ではありません。"); }
      };

      const header = div({ className: 'flex justify-between items-center mb-8 pb-6 border-b border-white/10 animate-fade-in' },
        div({ className: 'flex items-center gap-4' },
          button({ onClick: onBack, className: 'glass px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-white/10 transition' }, '← BACK'),
          div(null, h1({ className: 'text-2xl font-black text-white' }, conf.name), p({ className: 'text-[10px] text-brand font-bold uppercase tracking-widest mt-1' }, conf.desc))
        )
      );

      if (conf.isOnePage) {
        return div({ className: 'w-full max-w-4xl mx-auto pb-24 md:pb-10' },
          header,
          conf.fields.map(f => el(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic })),
          button({ onClick: onGenerate, className: 'w-full py-6 rounded-2xl btn-gradient text-white font-black text-xl shadow-2xl mt-4 mb-10' }, copied.gen ? '✓ コピー完了！' : '📋 生成 ＆ コピー'),
          div({ className: 'glass rounded-3xl p-8 animate-fade-in' },
            span({ className: 'block text-xs font-black text-slate-400 mb-4 tracking-[0.2em] uppercase' }, '📥 回答を貼り付けて保存'),
            textarea({ className: 'input-base min-h-[400px]', value: res || '', onChange: e => setRes(e.target.value) }),
            button({ onClick: () => { if(navigator.clipboard) navigator.clipboard.writeText(res||''); setCopied({ca:true}); setTimeout(()=>setCopied({}),2000); }, className: 'w-full bg-white/10 hover:bg-white/20 py-4 rounded-xl font-black mt-6 transition text-white' }, copied.ca ? '✓ コピーしました' : '📋 全文コピー')
          )
        );
      }

      return div({ className: 'w-full max-w-4xl mx-auto pb-24 md:pb-10' },
        header,
        div({ className: 'flex mb-10 border-b border-white/5 gap-2 overflow-x-auto hide-scrollbar' },
          [{id:'settings', l:'⚙️ 設定'}, {id:'import', l:'📥 読込'}, {id:'preview', l:'👁 結果'}].map(t =>
            button({ key: t.id, onClick: () => setTab(t.id), className: 'px-8 py-4 font-black transition-all ' + (tab===t.id ? 'text-brand border-b-2 border-brand' : 'text-white/30') }, t.l)
          )
        ),
        tab === 'settings' && div({ className: 'animate-slide-up' },
          conf.fields.map(f => el(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic })),
          button({ onClick: onGenerate, className: 'w-full py-6 rounded-2xl btn-gradient text-white font-black text-xl shadow-xl mt-4' }, copied.gen ? '✓ コピー完了！' : '📋 プロンプト生成 ＆ コピー')
        ),
        tab === 'import' && div({ className: 'glass rounded-3xl p-10 animate-slide-up' },
          span({ className: 'block text-xs font-black text-slate-400 mb-4' }, '📥 AIの回答を貼り付け'),
          textarea({ className: 'input-base min-h-[300px]', value: imp, onChange: e => setImp(e.target.value) }),
          button({ onClick: onImport, disabled: !imp.trim(), className: 'w-full bg-brand hover:bg-brand-dark py-4 rounded-xl font-black mt-8 text-white transition disabled:opacity-50' }, '解析を実行')
        ),
        tab === 'preview' && res && div({ className: 'glass rounded-3xl p-10 animate-slide-up' }, el(DataViewer, { data: res }))
      );
    };

    /* =========================================================================
       5. 管理者ダッシュボード
       ========================================================================= */
    const AdminDash = ({ onGoApp, onLogout }) => {
      const [db, setDb] = useState(AppDB.get());
      const [tab, setTab] = useState('users');
      const users = Object.keys(db.users).filter(k => k !== 'admin');
      
      const setVisible = (tid) => { const n = AppDB.get(); n.config.toolVisibility[tid] = !n.config.toolVisibility[tid]; AppDB.save(n); setDb(n); };
      const setStatus = (u, st) => { const n = AppDB.get(); n.users[u].status = st; AppDB.save(n); setDb(n); };

      return div({ className: 'w-full max-w-6xl mx-auto animate-fade-in pb-24 md:pb-10' },
        div({ className: 'flex justify-between items-center mb-10 pb-6 border-b border-white/10' },
          h1({ className: 'text-3xl font-black text-white tracking-tighter' }, '🎛️ DASHBOARD'),
          div({ className: 'hidden md:flex gap-3' },
            button({ onClick: onGoApp, className: 'btn-gradient text-white px-8 py-3 rounded-full font-black shadow-lg' }, '🚀 ツール起動'),
            button({ onClick: onLogout, className: 'bg-white/10 px-8 py-3 rounded-full font-black text-white/50' }, 'LOGOUT')
          )
        ),
        div({ className: 'flex gap-2 overflow-x-auto mb-10 border-b border-white/5 hide-scrollbar' },
          [{id:'users', l:'👥 ユーザー'}, {id:'tools', l:'🛠 ツール表示'}].map(t =>
            button({ key: t.id, onClick: () => setTab(t.id), className: 'px-8 py-4 text-sm font-black transition-all ' + (tab===t.id ? 'border-brand text-brand border-b-2' : 'text-slate-500 border-transparent border-b-2') }, t.l)
          )
        ),
        tab === 'tools' && div({ className: 'glass rounded-[2rem] p-10 animate-slide-up' },
          div({ className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4' },
            Object.keys(TOOLS).map(tid => el('label', { key: tid, className: 'flex justify-between bg-white/5 p-5 rounded-xl border border-white/5 cursor-pointer hover:bg-white/10 transition' },
              div({ className: 'flex gap-3' }, span({ className: 'text-xl' }, TOOLS[tid].icon), span({ className: 'font-bold text-white' }, TOOLS[tid].name)),
              input({ type: 'checkbox', className: 'w-6 h-6 accent-brand', checked: db.config.toolVisibility[tid] !== false, onChange: () => setVisible(tid) })
            ))
          )
        ),
        tab === 'users' && div({ className: 'glass rounded-[2rem] overflow-x-auto animate-slide-up' },
          el('table', { className: 'w-full text-left' },
            el('thead', { className: 'bg-white/5' }, el('tr', null, ['ユーザー名', '状態', '操作'].map(th => el('th', { key: th, className: 'p-6 text-[10px] font-black text-slate-500 uppercase' }, th)))),
            el('tbody', { className: 'divide-y divide-white/5' }, users.map(k => el('tr', { key: k, className: 'hover:bg-white/5 transition' },
              el('td', { className: 'p-6 font-bold text-white' }, k),
              el('td', { className: 'p-6' }, span({ className: 'px-3 py-1 rounded-full text-[10px] font-black ' + (db.users[k].status==='approved'?'bg-brand-success/20 text-brand-success':'bg-brand-danger/20 text-brand-danger') }, db.users[k].status.toUpperCase())),
              el('td', { className: 'p-6 flex gap-3' },
                db.users[k].status !== 'approved' && button({ onClick: () => setStatus(k, 'approved'), className: 'text-brand-success font-black text-xs' }, '許可'),
                button({ onClick: () => setStatus(k, 'rejected'), className: 'text-brand-danger font-black text-xs' }, 'BAN')
              )
            )))
          )
        ),
        // スマホ用ボトムナビ（管理者）
        div({ className: 'md:hidden fixed bottom-0 left-0 right-0 bg-[#020617]/90 backdrop-blur-md border-t border-white/10 flex justify-around p-4 pb-safe z-50' },
          button({ onClick: onGoApp, className: 'text-brand font-black text-xs flex flex-col items-center gap-1' }, span({ className: 'text-xl' }, '🚀'), 'ツール'),
          button({ onClick: onLogout, className: 'text-slate-500 font-black text-xs flex flex-col items-center gap-1' }, span({ className: 'text-xl' }, '🚪'), 'ログアウト')
        )
      );
    };

    /* =========================================================================
       6. ユーザーダッシュボード (スマホアプリ風 UI 搭載)
       ========================================================================= */
    const MainApp = (props) => {
      const [screen, setScreen] = useState('home');
      const db = AppDB.get();
      const uData = db.users[props.user];

      // ネイティブアプリ風 ボトムナビゲーション (スマホのみ表示)
      const BottomNav = () => div({ className: 'md:hidden fixed bottom-0 left-0 right-0 bg-[#020617]/95 backdrop-blur-xl border-t border-white/10 flex justify-around items-center p-3 pb-safe z-50' },
        button({ onClick: () => setScreen('home'), className: `flex flex-col items-center gap-1 transition ${screen==='home'?'text-brand scale-110':'text-slate-500'}` }, span({ className: 'text-2xl' }, '🏠'), span({ className: 'text-[10px] font-black' }, 'ホーム')),
        button({ onClick: () => setScreen('projects'), className: `flex flex-col items-center gap-1 transition ${screen==='projects'?'text-brand scale-110':'text-slate-500'}` }, span({ className: 'text-2xl' }, '📂'), span({ className: 'text-[10px] font-black' }, '案件/PJ')),
        button({ onClick: () => setScreen('settings'), className: `flex flex-col items-center gap-1 transition ${screen==='settings'?'text-brand scale-110':'text-slate-500'}` }, span({ className: 'text-2xl' }, '👤'), span({ className: 'text-[10px] font-black' }, '設定'))
      );

      if (screen === 'settings') {
        const [b, setB] = useState(uData.brand);
        return div({ className: 'w-full max-w-2xl mx-auto animate-slide-up pb-24 md:pb-10' },
          div({ className: 'flex items-center gap-5 mb-10 pb-6 border-b border-white/10' }, h1({ className: 'text-2xl font-black text-white' }, '👤 BRAND SETTING')),
          div({ className: 'glass rounded-[2.5rem] p-8 md:p-10 space-y-8' },
            div(null, span({ className: 'block text-xs font-black text-slate-500 mb-4' }, '🤖 AI PLAN'), select({ className: 'input-base', value: b.plan, onChange: e => setB({...b, plan: e.target.value}) }, option({value:'free', className:'bg-slate-900'}, '無料版 AI'), option({value:'paid', className:'bg-slate-900'}, '有料版 AI'))),
            div(null, span({ className: 'block text-xs font-black text-slate-500 mb-4' }, 'AUTHOR NAME'), input({ className: 'input-base', value: b.name, onChange: e => setB({...b, name: e.target.value}) })),
            button({ onClick: () => { const n=AppDB.get(); n.users[props.user].brand=b; AppDB.save(n); alert('保存完了'); setScreen('home'); }, className: 'w-full btn-gradient py-5 rounded-2xl font-black text-white shadow-xl' }, 'SAVE SETTING')
          ),
          el(BottomNav)
        );
      }

      if (screen === 'projects') {
        const [np, setNp] = useState('');
        return div({ className: 'w-full max-w-2xl mx-auto animate-slide-up pb-24 md:pb-10' },
          div({ className: 'flex items-center gap-5 mb-10 pb-6 border-b border-white/10' }, h1({ className: 'text-2xl font-black text-white' }, '📂 PROJECTS')),
          div({ className: 'flex gap-3 mb-8' }, 
            input({ className: 'input-base flex-1', placeholder: '新プロジェクト名', value: np, onChange: e => setNp(e.target.value) }), 
            button({ onClick: () => { if(!np.trim()) return; const id='p_'+Date.now(); const ndb=AppDB.get(); ndb.users[props.user].projects[id]={name:np,data:{}}; ndb.users[props.user].curProj=id; AppDB.save(ndb); setNp(''); }, className: 'btn-gradient text-white font-bold px-6 rounded-xl' }, '作成')
          ),
          div({ className: 'grid gap-4' }, Object.keys(uData.projects).map(k => {
            const p = uData.projects[k]; const isCur = k === uData.curProj;
            return div({ key: k, className: 'glass rounded-xl p-5 flex justify-between items-center ' + (isCur ? 'border-brand bg-brand/10' : '') }, 
              span({ className: 'font-bold ' + (isCur ? 'text-brand' : 'text-white') }, p.name + (isCur ? ' (選択中)' : '')),
              !isCur && button({ onClick: () => { const ndb=AppDB.get(); ndb.users[props.user].curProj=k; AppDB.save(ndb); setScreen('home'); }, className: 'bg-white/10 hover:bg-white/20 text-xs font-bold px-4 py-2 rounded-lg' }, '切替')
            );
          })),
          el(BottomNav)
        );
      }

      if (TOOLS[screen]) return el(Fragment, null, el(ToolCore, { tid: screen, user: props.user, role: props.role, onBack: () => setScreen('home') }), el(BottomNav));

      // PC用トップ右メニュー
      const TopMenuPC = () => div({ className: 'hidden md:flex fixed top-8 right-8 z-50 gap-3' },
        props.role === 'admin' && button({ onClick: props.onGoAdmin, className: 'bg-brand-accent text-white px-6 py-2.5 rounded-full text-[10px] font-black shadow-lg active:scale-95' }, '🎛️ DASHBOARD'),
        button({ onClick: () => setScreen('projects'), className: 'glass px-6 py-2.5 rounded-full text-[10px] font-black text-white/80 hover:text-white transition' }, '📂 ' + (uData.projects[uData.curProj]?.name || 'Project')),
        button({ onClick: () => setScreen('settings'), className: 'glass px-6 py-2.5 rounded-full text-[10px] font-black text-white/80 hover:text-white transition' }, '👤 BRAND'),
        button({ onClick: props.onLogout, className: 'bg-white/5 hover:bg-white/10 px-6 py-2.5 rounded-full text-[10px] font-black text-white/50 transition' }, 'LOGOUT')
      );

      return div({ className: 'w-full animate-fade-in pb-24 md:pb-10' },
        el(TopMenuPC),
        div({ className: 'text-center mt-12 md:mt-24 mb-16 px-4' },
          div({ className: 'inline-block glass px-6 py-2 rounded-full mb-8' }, span({ className: 'text-brand text-[10px] font-black tracking-[0.4em] uppercase' }, 'AI Content Pro Responsive')),
          h1({ className: 'text-5xl md:text-7xl font-black tracking-tighter mb-6 leading-tight text-white' }, 'Content ', span({ className: 'text-brand' }, 'Master')),
          p({ className: 'text-slate-400 text-sm md:text-base max-w-xl mx-auto leading-relaxed' }, 'クラウドワークスから独自のコンテンツ販売まで、スマホ1台で完結。')
        ),
        CATEGORIES.map(cat => {
          const visible = cat.tools.filter(tid => db.config.toolVisibility[tid] !== false);
          if (visible.length === 0) return null;
          return div({ key: cat.id, className: 'mb-16 max-w-6xl mx-auto px-4 md:px-8' },
            h2({ className: 'text-xl md:text-2xl font-black text-white mb-8 flex items-center gap-4' }, div({ className: 'w-2 h-8 bg-brand rounded-full' }), cat.name),
            div({ className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-8' },
              visible.map(tid => {
                const t = TOOLS[tid];
                return div({ key: tid, onClick: () => setScreen(tid), className: 'glass rounded-[2rem] p-8 transition duration-300 hover:-translate-y-2 hover:border-brand/40 cursor-pointer relative overflow-hidden group' },
                  div({ className: 'flex justify-between items-start mb-6' },
                    div({ className: 'text-5xl group-hover:scale-110 transition' }, t.icon),
                    t.badge ? span({ className: 'bg-brand/10 text-brand text-[10px] font-black px-3 py-1.5 rounded-lg border border-brand/20' }, t.badge) : null
                  ),
                  h3({ className: 'text-xl font-black mb-3 text-white/90 group-hover:text-white transition' }, t.name),
                  p({ className: 'text-sm text-slate-500' }, t.desc)
                );
              })
            )
          );
        }),
        el(BottomNav)
      );
    };

    /* =========================================================================
       7. ログイン画面 (美しく堅牢なUI)
       ========================================================================= */
    const AuthBox = ({ onLogin }) => {
      const [u, setU] = useState(''); const [pStr, setP] = useState('');
      const [isL, setIsL] = useState(true); const [err, setErr] = useState('');

      const login = () => {
        setErr(''); const name = u.trim();
        if (!name) return setErr('ユーザー名を入力してください');
        
        const db = AppDB.get();
        if (name === db.config.adminU) {
          if (pStr === db.config.adminP) {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: name, r: 'admin' }));
            onLogin(name, 'admin');
          } else setErr('パスワードが違います');
          return;
        }
        if (isL) {
          if (db.users[name] && db.users[name].status === 'approved') {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: name, r: 'approved' }));
            onLogin(name, 'approved');
          } else setErr('未登録か、承認待ちです。');
        } else {
          if (db.users[name]) return setErr('既に登録されています。');
          db.users[name] = { status: 'pending', registeredAt: Date.now(), usage: { count: 0, date: '' }, perms: {}, projects: { 'default': { name: 'デフォルト', data: {} } }, curProj: 'default', brand: { plan: 'free', name: '' } };
          AppDB.save(db); alert('申請が完了しました。承認をお待ちください。'); setIsL(true);
        }
      };

      return div({ className: 'w-full max-w-md mx-auto mt-20 md:mt-32 animate-in px-4' },
        div({ className: 'glass-panel rounded-[2.5rem] p-10 md:p-12 shadow-2xl text-center' },
          h2({ className: 'text-3xl font-black mb-10 tracking-tight text-white' }, 'AI Content Pro'),
          div({ className: 'flex bg-black/40 p-1.5 rounded-xl mb-8' },
            button({ onClick: () => { setIsL(true); setErr(''); }, className: 'flex-1 py-3 rounded-lg text-sm font-bold transition ' + (isL ? 'bg-brand text-white' : 'text-white/50') }, 'ログイン'),
            button({ onClick: () => { setIsL(false); setErr(''); }, className: 'flex-1 py-3 rounded-lg text-sm font-bold transition ' + (!isL ? 'bg-brand text-white' : 'text-white/50') }, '新規申請')
          ),
          div({ className: 'space-y-5' },
            input({ className: 'input-base text-center', placeholder: 'USER NAME', value: u, onChange: e => setU(e.target.value) }),
            input({ className: 'input-base text-center', type: 'password', placeholder: 'PASSWORD', value: pStr, onChange: e => setP(e.target.value) }),
            err ? p({ className: 'text-brand-danger text-xs font-bold' }, '❌ ' + err) : null,
            button({ onClick: login, className: 'w-full btn-gradient py-4 rounded-2xl text-white font-black text-lg shadow-xl mt-4' }, isL ? 'LOGIN' : 'APPLY')
          )
        )
      );
    };

    /* =========================================================================
       8. Root マウント
       ========================================================================= */
    const App = () => {
      const [auth, setAuth] = useState({ u: null, r: null });
      const [goAdmin, setGoAdmin] = useState(false);

      useEffect(() => {
        const session = localStorage.getItem(SESS_KEY);
        if (session) setAuth(JSON.parse(session));
      }, []);

      if (!auth.u) return el(AuthBox, { onLogin: (u, r) => setAuth({ u, r }) });
      if (auth.r === 'admin' && goAdmin) return el(AdminDash, { onGoApp: () => setGoAdmin(false), onLogout: () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); } });
      
      return el(MainApp, { user: auth.u, role: auth.r, onLogout: () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); }, onGoAdmin: () => setGoAdmin(true) });
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(el(ErrorBoundary, null, el(App)));

  })();
  </script>
</body>
</html>
