  <style>
    /* 基本リセットとフォント設定 */

      -webkit-font-smoothing: antialiased;
    }
    
    /* 美しいグリッド背景 */
    .grid-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

      z-index: -1;
      pointer-events: none;
    }

    /* カスタムスクロールバー */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

    .input-field {

      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);

    /* アニメーション */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  <script>
  (function() {
    'use strict';

    // Reactの基本関数
    const e = React.createElement;
    const useState = React.useState;
    const useEffect = React.useEffect;
    const Fragment = React.Fragment;

    /* =========================================================================
       1. データベース管理システム (自己修復機能付き)
       ========================================================================= */
    const DB_KEY = 'AICP_v34_DB';
    const SESS_KEY = 'AICP_v34_Session';
    const DAILY_LIMIT = 3;
    const UNLOCKED_BY_DEFAULT = ['note', 'research', 'lp', 'affiliate', 'backend', 'bonus'];

    const Database = {
      get: function() {
        let db = null;
        try { const data = localStorage.getItem(DB_KEY); if (data) db = JSON.parse(data); } catch (error) {}

        if (!db || typeof db !== 'object') {
          db = {
            admin: { p: 'admin123' },
            users: { 'admin': { status: 'approved', sns: '@admin', registeredAt: Date.now(), usage: { date: '', count: 0 }, perms: {}, brand: { plan: 'paid', name: '管理者', target: '', tone: '' }, projects: { 'default': { name: '管理者領域', data: {} } }, curProj: 'default' } },
            inquiries: []
          };
          localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        // 自動修復（クラッシュ防止）
        if (!db.admin) db.admin = { p: 'admin123' };
        if (!db.users) db.users = {};
        if (!db.inquiries) db.inquiries = [];

        Object.keys(db.users).forEach(username => {
          let user = db.users[username];
          if (!user.usage) user.usage = { date: '', count: 0 };
          if (!user.perms) user.perms = {};
          if (!user.brand) user.brand = { plan: 'free', name: '', target: '', tone: '' };
          if (!user.projects || typeof user.projects !== 'object') user.projects = { 'default': { name: 'デフォルト', data: {} } };
          if (!user.curProj || !user.projects[user.curProj]) user.curProj = Object.keys(user.projects)[0] || 'default';
          Object.keys(user.projects).forEach(pid => { if (!user.projects[pid].data) user.projects[pid].data = {}; });
        });

        return db;
      },
      save: function(db) { try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch (error) {} }
    };

    const copyToClipboard = (text, stateObj, setStateFunc, key) => {
      try {
        if (navigator.clipboard) navigator.clipboard.writeText(text).catch(() => {});
        setStateFunc(Object.assign({}, stateObj, { [key]: true }));
        setTimeout(() => setStateFunc(prevState => Object.assign({}, prevState, { [key]: false })), 2000);
      } catch (err) {}
    };

    const safeJSONParse = (text) => {
      if (!text || typeof text !== 'string') return null;
      try {
        const clean = text.replace(/```(?:json)?\n?/gi, '').replace(/```/g, '').trim();
        const match = clean.match(/\{[\s\S]*\}/);
        if (match) { try { return JSON.parse(match[0]); } catch(e) {} }
        return JSON.parse(clean);
      } catch (err) { return null; }
    };

    const formatDate = (timestamp) => {
      if (!timestamp) return '-';
      const d = new Date(timestamp);
      return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' + ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);

       2. ツール定義 ＆ 魔法の杖 (Magic) プロンプト
       ========================================================================= */

    /* =========================================================================
       3. UIコンポーネント (魔法の杖付き FormField)
       ========================================================================= */

    const FormField = function(props) {
      const field = props.field;
      const value = props.value;
      const onChange = props.onChange;
      
      const val = value !== undefined ? value : (field.type === 'checkbox' ? false : (field.options ? field.options[0] : ''));
      
      const handleMagic = function() {
        if (field.magic) onChange(field.magic);
      };

      let inputElement;
      if (field.type === 'text') {
        inputElement = e('input', { className: 'input-field', value: val, placeholder: field.placeholder || '', onChange: function(ev) { onChange(ev.target.value); } });
      } else if (field.type === 'textarea') {
        inputElement = e('textarea', { className: 'input-field', style: { minHeight: '120px', resize: 'vertical' }, value: val, placeholder: field.placeholder || '', onChange: function(ev) { onChange(ev.target.value); } });
      } else if (field.type === 'select') {
        inputElement = e('select', { className: 'input-field', value: val, onChange: function(ev) { onChange(ev.target.value); } }, 
          field.opts.map(function(opt) { return e('option', { key: opt, value: opt, className: 'bg-slate-900' }, opt); })
        );
      } else if (field.type === 'checkbox') {
        inputElement = e('label', { className: 'flex items-center gap-3 cursor-pointer mt-2' }, 
          e('input', { type: 'checkbox', className: 'w-5 h-5 rounded', checked: val, onChange: function(ev) { onChange(ev.target.checked); } }),
          e('span', { className: 'text-sm font-bold text-white' }, field.label)
        );
      }

      // ラベルと魔法の杖ボタンの行
      const labelRow = e('div', { className: 'flex justify-between items-center mb-3' },
        e('span', { className: 'block text-xs font-bold text-slate-400 tracking-wider' }, field.label),
        field.magic ? e('button', { 
          className: 'bg-brand-accent bg-opacity-20 text-brand-accent border border-brand-accent border-opacity-40 hover:bg-opacity-30 text-[10px] font-black px-3 py-1.5 rounded-md transition flex items-center shadow-sm', 
          onClick: handleMagic 
        }, '✨ 魔法の杖') : null
      );

      return e('div', { className: 'glass-panel rounded-xl p-5 mb-4 animate-fade' }, 
        labelRow,
        inputElement
      );
    };

    const JSONViewer = function(props) {
      const data = props.data;
      if (typeof data === 'string') {
        return e('p', { className: 'bg-black bg-opacity-40 border border-slate-700 rounded-lg p-4 text-sm text-slate-200 whitespace-pre-wrap leading-relaxed' }, data);
      }
      if (Array.isArray(data)) {
        return e('div', null, data.map(function(item, index) {
          return e('div', { key: index, className: 'mb-4 pb-4 border-b border-dashed border-slate-700' }, e(JSONViewer, { data: item }));
        }));
      }
      if (typeof data === 'object' && data !== null) {
        return e('div', null, Object.keys(data).map(function(key) {
          return e('div', { key: key, className: 'mb-3' }, 
            e('span', { className: 'block text-brand text-xs font-bold mb-1' }, key),
            e(JSONViewer, { data: data[key] })
          );
        }));
      }
      return e('span', null, String(data));
    };

    const LauncherLinks = function(props) {
      return e('div', { className: 'bg-brand bg-opacity-10 border border-brand border-opacity-30 rounded-xl p-5 my-6 text-center animate-fade' }, 
        e('p', { className: 'text-brand text-sm font-bold mb-4' }, '👇 下のリンクからWeb版AIを開いて送信してください'),
        e('div', { className: 'flex flex-wrap justify-center gap-3 mb-3' }, 
          e('a', { href: 'https://www.perplexity.ai/', target: '_blank', className: 'flex-1 min-w-[120px] bg-white bg-opacity-10 hover:bg-opacity-20 border border-white border-opacity-10 transition rounded-lg py-3 text-sm font-bold text-white' }, '🔍 Perplexity'),
          e('a', { href: 'https://chatgpt.com/', target: '_blank', className: 'flex-1 min-w-[120px] bg-white bg-opacity-10 hover:bg-opacity-20 border border-white border-opacity-10 transition rounded-lg py-3 text-sm font-bold text-white' }, '🟢 ChatGPT'),
          e('a', { href: 'https://claude.ai/', target: '_blank', className: 'flex-1 min-w-[120px] bg-white bg-opacity-10 hover:bg-opacity-20 border border-white border-opacity-10 transition rounded-lg py-3 text-sm font-bold text-white' }, '🟠 Claude')
        ),
        props.showImportMessage ? e('p', { className: 'text-xs text-white text-opacity-50 mt-4' }, '回答が完了したら、すべてコピーして「📥 読込」タブに貼り付けてください。') : null
      );
    };

    /* =========================================================================
       4. ツール実行エンジン
       ========================================================================= */
    const ToolRunner = function(props) {
      const tid = props.toolId;
      const conf = TOOLS[tid];
      const user = props.user;
      const role = props.role;

      if (!conf) return e('div', { className: 'text-center text-red-500 mt-10 font-bold' }, 'ツールの読み込みに失敗しました。');

      const [db, setDb] = useState(Database.get());
      const uData = db.users[user] || {};
      const pid = uData.curProj || 'default';
      const pData = (uData.projects && uData.projects[pid] && uData.projects[pid].data && uData.projects[pid].data[tid]) ? uData.projects[pid].data[tid] : {};

      const [inputs, setInputs] = useState(pData);
      const [activeTab, setActiveTab] = useState('settings');
      const [copied, setCopied] = useState({});
      const [showLinks, setShowLinks] = useState(false);
      const [importText, setImportText] = useState('');
      const [resultData, setResultData] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');

      const handleInputChange = function(fieldId, val) {
        const newInputs = Object.assign({}, inputs, { [fieldId]: val });
        setInputs(newInputs);
        if (role !== 'admin') {
          const newDb = Database.get();
          if (!newDb.users[user].projects[pid].data) newDb.users[user].projects[pid].data = {};
          newDb.users[user].projects[pid].data[tid] = newInputs;
          Database.save(newDb);
        }
      };

      const handleGenerate = function() {
        let canAccess = false;
        if (role === 'admin' || (uData.perms && uData.perms[tid])) {
          canAccess = true;
        } else {
          const today = new Date().toDateString();
          if (uData.usage && uData.usage.date !== today) canAccess = true;
          else if (uData.usage && uData.usage.count < DAILY_LIMIT) canAccess = true;
        }

        if (!canAccess) {
          alert('本日の無料枠（' + DAILY_LIMIT + '回）を終了しました。\n無制限利用をご希望の場合は管理者へお問い合わせください。');
          return;
        }

        if (role !== 'admin' && !(uData.perms && uData.perms[tid])) {
          const newDb = Database.get();
          const today = new Date().toDateString();
          if (newDb.users[user].usage.date !== today) {
            newDb.users[user].usage = { date: today, count: 0 };
          }
          newDb.users[user].usage.count++;
          Database.save(newDb);
        }

        const plan = (uData.brand && uData.brand.plan) ? uData.brand.plan : 'free';
        let brandContext = '';
        if (uData.brand && uData.brand.name) {
          brandContext = '【発信者情報(文体に反映)】名前:' + uData.brand.name + ' ターゲット:' + (uData.brand.target || '') + ' 文体:' + (uData.brand.tone || '') + '\n\n';
        }

        const basePrompt = conf.buildPrompt(inputs, brandContext);
        const prefix = plan === 'paid' 
          ? '【システム設定: 有料AIモード】\nあなたは高度な推論とWeb検索が可能な状態です。複雑な指示にも完璧に従い、最高品質の出力をしてください。\n\n'
          : '【システム設定: 無料AIモード】\nあなたは出力制限がある環境です。回答が途切れないよう、簡潔に要点を絞って出力してください。\n\n';
        
        copyToClipboard(prefix + basePrompt, copied, setCopied, 'gen');
        setShowLinks(true);
        if (!conf.noJsonParse && !conf.isOnePage) {
          setActiveTab('import');
        }
      };

      const handleImport = function() {
        if (conf.noJsonParse) {
          setResultData(importText);
          setActiveTab('preview');
          setImportText('');
          return;
        }
        setErrorMsg('');
        const parsed = safeJSONParse(importText);
        if (parsed) {
          setResultData(parsed);
          setActiveTab('preview');
          setImportText('');
        } else {
          setErrorMsg('JSONフォーマットエラーです。AIの出力をそのまま貼り付けてください。');
        }
      };

      const HeaderUI = e('div', { className: 'flex justify-between items-center mb-6 pb-4 border-b border-white border-opacity-10' }, 
        e('div', { className: 'flex items-center gap-4' }, 
          e('button', { className: 'bg-white bg-opacity-10 hover:bg-opacity-20 text-white px-4 py-2 rounded-lg text-sm font-bold transition', onClick: props.onBack }, '← 戻る'),
          e('h1', { className: 'text-xl font-black' }, conf.name)
        )
      );

      const TutorialUI = e('div', { className: 'bg-brand bg-opacity-10 border border-brand border-opacity-30 rounded-xl p-5 mb-6' }, 
        e('p', { className: 'text-brand text-sm font-bold mb-2 flex items-center gap-2' }, '💡 使い方と目的'),
        e('p', { className: 'text-xs text-white text-opacity-80 leading-relaxed whitespace-pre-wrap' }, conf.tutorial)
      );

      // --- 1画面完結UI (note, campaign等) ---
      if (conf.isOnePage) {
        return e('div', { className: 'w-full max-w-3xl mx-auto' }, 
          HeaderUI, TutorialUI,
          conf.fields.map(function(f) {
            return e(FormField, { key: f.id, field: f, value: inputs[f.id], onChange: function(v) { handleInputChange(f.id, v); } });
          }),
          e('button', { 
            className: 'w-full bg-gradient-to-r from-brand-dark to-brand text-white font-black py-4 rounded-xl shadow-lg hover:scale-95 transition mt-4 mb-6', 
            onClick: handleGenerate 
          }, copied['gen'] ? '✓ コピー完了！AIへ送信してください' : '📋 プロンプト生成 ＆ コピー'),
          showLinks ? e(LauncherLinks, { showImportMessage: false }) : null,
          e('div', { className: 'glass-panel rounded-xl p-6 mt-8' }, 
            e('span', { className: 'block text-xs font-bold text-slate-400 mb-3' }, '📥 AIの回答を貼り付けて保管・編集'),
            e('textarea', { className: 'input-field', style: { minHeight: '300px' }, value: resultData || '', onChange: function(ev) { setResultData(ev.target.value); } }),
            e('button', { 
              className: 'w-full bg-white bg-opacity-10 hover:bg-opacity-20 text-white font-bold py-3 rounded-lg mt-4 transition', 
              onClick: function() { copyToClipboard(resultData || '', copied, setCopied, 'cAll'); } 
            }, copied['cAll'] ? '✓ コピー完了' : '📋 全文コピー')
          )
        );
      }

      // --- 通常ツール UI (タブ式) ---
      return e('div', { className: 'w-full max-w-3xl mx-auto' }, 
        HeaderUI,
        e('div', { className: 'flex overflow-x-auto border-b border-white border-opacity-10 mb-8 gap-2' }, 
          [ {id: 'settings', label: '⚙️ 条件設定', disabled: false}, {id: 'import', label: '📥 AI回答読込', disabled: false}, {id: 'preview', label: '👁 結果確認', disabled: !resultData} ].map(function(t) {
            return e('button', {
              key: t.id,
              disabled: t.disabled,
              onClick: function() { if (!t.disabled) setActiveTab(t.id); },
              className: 'px-6 py-3 text-sm font-bold whitespace-nowrap border-b-2 transition ' + (activeTab === t.id ? 'text-brand border-brand' : 'text-white text-opacity-40 border-transparent hover:text-opacity-60') + (t.disabled ? ' opacity-30 cursor-not-allowed' : '')
            }, t.label);
          })
        ),
        activeTab === 'settings' ? e('div', { className: 'animate-fade' }, 
          TutorialUI,
          conf.fields.map(function(f) {
            return e(FormField, { key: f.id, field: f, value: inputs[f.id], onChange: function(v) { handleInputChange(f.id, v); } });
          }),
          e('button', { 
            className: 'w-full bg-gradient-to-r from-brand-dark to-brand text-white font-black py-4 rounded-xl shadow-lg hover:scale-95 transition mt-4 mb-6', 
            onClick: handleGenerate 
          }, copied['gen'] ? '✓ コピー完了！' : '📋 プロンプト生成 ＆ コピー'),
          showLinks ? e(LauncherLinks, { showImportMessage: !conf.noJsonParse }) : null
        ) : null,
        activeTab === 'import' ? e('div', { className: 'glass-panel rounded-xl p-6 animate-fade' }, 
          e('span', { className: 'block text-xs font-bold text-slate-400 mb-3' }, '📥 AIの出力を貼り付け'),
          e('textarea', { className: 'input-field', style: { minHeight: '200px' }, value: importText, onChange: function(ev) { setImportText(ev.target.value); } }),
          errorMsg ? e('div', { className: 'bg-red-500 bg-opacity-10 border border-red-500 border-opacity-30 text-red-400 p-4 rounded-lg text-sm mt-4 font-bold' }, '❌ ' + errorMsg) : null,
          e('button', { 
            className: 'w-full bg-brand hover:bg-brand-dark text-white font-bold py-4 rounded-lg mt-6 transition disabled:opacity-50', 
            disabled: !importText.trim(), 
            onClick: handleImport 
          }, 'システムに反映して結果を見る')
        ) : null,
        activeTab === 'preview' && resultData ? e('div', { className: 'glass-panel rounded-xl p-6 animate-fade' }, 
          e(JSONViewer, { data: resultData })
        ) : null
      );
    };

    /* =========================================================================
       5. 認証 ＆ 管理ダッシュボード
       ========================================================================= */
    const AuthScreen = function(props) {
      const [isLogin, setIsLogin] = useState(true);
      const [un, setUn] = useState('');
      const [pw, setPw] = useState('');
      const [sns, setSns] = useState('');
      const [err, setErr] = useState('');
      const [isAdminMode, setIsAdminMode] = useState(false);

      const handleUnChange = function(e) {
        const val = e.target.value;
        setUn(val);
        const db = Database.get();
        setIsAdminMode(val === db.admin.u || val === 'admin');
      };

      const handleSubmit = function() {
        setErr('');
        const u = un.trim();
        if (!u) return setErr('ユーザー名を入力してください');
        
        const db = Database.get();
        const adminU = db.admin.u || 'admin';

        if (isAdminMode) {
          if (pw === db.admin.p) {
            localStorage.setItem(SESS_KEY, JSON.stringify({u: adminU, r: 'admin'}));
            props.onLogin(adminU, 'admin');
          } else { setErr('パスワードが違います'); }
          return;
        }

        if (isLogin) {
          if (!db.users[u]) return setErr('未登録のユーザー名です。新規申請を行ってください。');
          localStorage.setItem(SESS_KEY, JSON.stringify({u: u, r: db.users[u].status}));
          props.onLogin(u, db.users[u].status);
        } else {
          if (db.users[u]) return setErr('既に登録されている名前です。ログインしてください。');
          const s = sns.trim();
          if (!s || s.indexOf('@') === -1) return setErr('SNSアカウントは @ を含めて正確に入力してください');
          
          db.users[u] = {
            status: 'pending', sns: s, registeredAt: Date.now(),
            usage: {date: '', count: 0}, perms: {},
            brand: {plan: 'free', name: '', target: '', tone: ''},
            projects: {'default': {name: 'デフォルト', data: {}}},
            curProj: 'default'
          };
          Database.save(db);
          localStorage.setItem(SESS_KEY, JSON.stringify({u: u, r: 'pending'}));
          props.onLogin(u, 'pending');
        }
      };

      return e('div', { className: 'w-full max-w-md mx-auto mt-10 md:mt-20 animate-fade' }, 
        e('div', { className: 'glass-panel rounded-2xl p-8 md:p-10 text-center shadow-2xl relative overflow-hidden' }, 
          e('h2', { className: 'text-3xl font-black mb-2 tracking-tight text-white' }, 'AI Content Pro'),
          e('p', { className: 'text-brand font-bold text-sm mb-8 tracking-widest uppercase' }, 'SaaS Edition v34'),
          
          !isAdminMode ? e('div', { className: 'flex bg-black bg-opacity-40 p-1.5 rounded-xl mb-8' }, 
            e('button', { onClick: function(){ setIsLogin(true); setErr(''); }, className: 'flex-1 py-3 rounded-lg text-sm font-bold transition ' + (isLogin ? 'bg-brand text-white shadow-lg' : 'text-white text-opacity-50 hover:text-opacity-100') }, 'ログイン'),
            e('button', { onClick: function(){ setIsLogin(false); setErr(''); }, className: 'flex-1 py-3 rounded-lg text-sm font-bold transition ' + (!isLogin ? 'bg-brand text-white shadow-lg' : 'text-white text-opacity-50 hover:text-opacity-100') }, '新規申請')
          ) : null,
          
          e('div', { className: 'space-y-4 mb-8' }, 
            e('input', { className: 'input-field', placeholder: 'ユーザー名', value: un, onChange: handleUnChange }),
            (!isLogin && !isAdminMode) ? e('input', { className: 'input-field animate-fade', placeholder: 'SNSアカウント (@必須)', value: sns, onChange: function(ev){ setSns(ev.target.value); } }) : null,
            isAdminMode ? e('input', { className: 'input-field animate-fade', type: 'password', placeholder: '管理者パスワード', value: pw, onChange: function(ev){ setPw(ev.target.value); } }) : null
          ),
          
          err ? e('div', { className: 'bg-red-500 bg-opacity-10 border border-red-500 border-opacity-30 text-red-400 p-4 rounded-xl text-sm mb-8 font-bold' }, '❌ ' + err) : null,
          
          e('button', { 
            className: 'w-full bg-gradient-to-r from-brand-dark to-brand text-white font-black py-4 rounded-xl shadow-lg hover:scale-95 transition', 
            onClick: handleSubmit 
          }, isAdminMode ? '管理者としてログイン' : (isLogin ? 'ログイン' : '申請して待機画面へ'))
        )
      );
    };

        ),
        
        e('div', { className: 'text-center mt-20 md:mt-28 mb-16' }, 
          e('div', { className: 'inline-block bg-brand bg-opacity-20 border border-brand border-opacity-40 text-brand text-xs font-black px-5 py-2 rounded-full mb-8 tracking-widest uppercase shadow-[0_0_15px_rgba(56,189,248,0.3)]' }, 'AI Content Pro v34'),
          e('h1', { className: 'text-5xl md:text-7xl font-black mb-6 tracking-tight text-white drop-shadow-lg' }, 'AI Content ', e('br', { className: 'md:hidden' }), e('span', { className: 'text-brand drop-shadow-[0_0_20px_rgba(56,189,248,0.4)]' }, 'Platform')),
          e('p', { className: 'text-slate-400 text-base md:text-lg max-w-2xl mx-auto leading-relaxed' }, '商品企画から集客、販売、ファン化まで。', e('br'), 'すべてのマーケティングを完全自動化するSaaS司令塔。')
        ),
        
        props.role !== 'admin' ? e('div', { className: 'flex justify-center gap-5 mb-20' }, 
          e('button', { className: 'glass-panel hover:bg-opacity-10 text-base font-bold px-8 py-4 rounded-xl transition flex items-center gap-3', onClick: function(){ setScreen('projects'); } }, '📂 プロジェクト切替'),
          e('button', { className: 'glass-panel hover:bg-opacity-10 text-base font-bold px-8 py-4 rounded-xl transition flex items-center gap-3', onClick: function(){ setScreen('settings'); } }, '👤 ブランド＆AI設定')
        ) : null,
        
        e('div', { className: 'max-w-6xl mx-auto' }, 
          CATEGORIES.map(function(cat) {
            return e('div', { key: cat.name, className: 'mb-16' }, 
              e('h2', { className: 'text-xl font-black text-white mb-8 flex items-center gap-4' }, 
                e('div', { className: 'w-10 h-1.5 bg-brand rounded-full' }), cat.name
              ),
              e('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6' }, 
                cat.tools.map(function(tid) {
                  const t = TOOLS[tid];
                  const canAccess = UNLOCKED_BY_DEFAULT.includes(tid) || props.role === 'admin' || (uData.perms && uData.perms[tid]);
                  
                  return e('div', {
                    key: tid,
                    className: 'glass-panel rounded-2xl p-7 transition duration-300 group ' + (canAccess ? 'hover:-translate-y-2 hover:border-brand hover:border-opacity-50 hover:bg-white hover:bg-opacity-5 cursor-pointer shadow-xl hover:shadow-brand/20' : 'opacity-50 grayscale cursor-not-allowed'),
                    onClick: function() {
                      if (canAccess) setScreen(tid);
                      else alert('🔒 この機能はロックされています。\n利用するには管理者への申請・アップグレードが必要です。');
                    }
                  }, 
                    e('div', { className: 'flex justify-between items-start mb-5' }, 
                      e('div', { className: 'text-4xl bg-white bg-opacity-5 w-16 h-16 rounded-2xl flex items-center justify-center group-hover:scale-110 transition shadow-inner' }, t.icon),
                      e('div', { className: 'flex flex-col items-end gap-2' }, 
                        !canAccess ? e('span', { className: 'bg-slate-700 text-white text-[11px] font-black px-3 py-1.5 rounded-lg' }, '🔒 ロック') : 
                        (props.role === 'admin' || (uData.perms && uData.perms[tid])) ? e('span', { className: 'bg-brand-success text-white text-[11px] font-black px-3 py-1.5 rounded-lg shadow-[0_0_15px_rgba(16,185,129,0.5)]' }, '✨ 無制限') : 
                        e('span', { className: 'bg-indigo-500 text-white text-[11px] font-black px-3 py-1.5 rounded-lg' }, '無料枠対象'),
                        t.badge ? e('span', { className: 'text-[11px] font-black px-3 py-1.5 rounded-lg border ' + (t.badge === '神機能' ? 'bg-brand-danger bg-opacity-20 border-brand-danger border-opacity-40 text-brand-danger' : 'bg-brand bg-opacity-20 border-brand border-opacity-40 text-brand') }, t.badge) : null
                      )
                    ),
                    e('h3', { className: 'text-lg font-black mb-3 text-white text-opacity-90 group-hover:text-white transition' }, t.name),
                    e('p', { className: 'text-sm text-slate-400 leading-relaxed group-hover:text-slate-300 transition' }, t.desc)
                  );
                })
              )
            );
          })
        )
      );
    };

    /* =========================================================================
       9. Root コンポーネント
       ========================================================================= */
    const App = function() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null);
      const [goAdmin, setGoAdmin] = useState(false);
      const [showMan, setShowMan] = useState(false);

      useEffect(function() {
        try {
          const sStr = localStorage.getItem(SESS_KEY);
          if (sStr) {
            const s = JSON.parse(sStr);
            if (s && s.u) {
              const db = Database.get();
              if (s.r === 'admin') {
                if (s.u === (db.admin.u || 'admin')) { setUser(s.u); setRole('admin'); setGoAdmin(true); } 
                else { localStorage.removeItem(SESS_KEY); }
              } else {
                if (db.users[s.u]) { setUser(s.u); setRole(db.users[s.u].status); } 
                else { localStorage.removeItem(SESS_KEY); }
              }
            }
          }
        } catch(e) {}
      }, []);

      const handleLogout = function() { localStorage.removeItem(SESS_KEY); setUser(null); setRole(null); setGoAdmin(false); };

      const checkStatus = function() {
        try {
          const s = JSON.parse(localStorage.getItem(SESS_KEY) || '{}');
          if (s.u) { const db = Database.get(); if (db.users[s.u]) setRole(db.users[s.u].status); }
        } catch(e) {}
      };

      if (!user) return e(AuthScreen, { onLogin: function(usr, rol) { setUser(usr); setRole(rol); if (rol === 'admin') setGoAdmin(true); } });
      if (role === 'admin' && goAdmin) return e(AdminDashboard, { onLogout: handleLogout, onGoApp: function(){ setGoAdmin(false); } });

      if (role === 'pending' || role === 'rejected') {
        const ManualUI = function() {
          return e('div', { className: 'fixed inset-0 bg-black bg-opacity-80 z-[999] flex items-center justify-center p-4 backdrop-blur-sm', onClick: function(){setShowMan(false);} }, 
            e('div', { className: 'bg-[#0f172a] border border-white border-opacity-10 rounded-2xl p-6 md:p-8 w-full max-w-lg shadow-2xl', onClick: function(ev){ ev.stopPropagation(); } }, 
              e('div', { className: 'flex justify-between items-center mb-6 pb-4 border-b border-white border-opacity-10' }, 
                e('h2', { className: 'text-brand text-lg font-black m-0' }, '📖 マニュアル'), e('button', { onClick: function(){setShowMan(false);}, className: 'text-2xl text-white text-opacity-50 hover:text-opacity-100 transition' }, '×')
              ),
              e('div', { className: 'text-sm text-slate-200 leading-relaxed' }, 
                e('p', { className: 'mb-4' }, '本ツールは最新AIを操作するSaaSプラットフォームです。'),
                e('button', { className: 'w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 rounded-xl transition', onClick: function(){setShowMan(false);} }, '閉じる')
              )
            )
          );
        };
        return e('div', { className: 'page-container' }, 
          showMan ? e(ManualUI) : null,
          e('div', { className: 'grid-bg' }), 
          e('div', { className: 'content-wrapper auth-container', style: { marginTop: '80px' } }, 
            e('h2', { className: 'text-3xl font-black mb-6 text-white' }, role === 'rejected' ? '🚫 拒否' : '⏳ 承認待ち'),
            e('p', { className: 'text-slate-400 text-base mb-10' }, role === 'rejected' ? '管理者に制限されています。' : '管理者の許可をお待ちください。'),
            e('button', { className: 'w-full bg-brand bg-opacity-10 border border-brand border-opacity-30 text-brand font-bold py-4 rounded-xl hover:bg-opacity-20 transition mb-6', onClick: function(){setShowMan(true);} }, '📖 承認待ちの間にマニュアルを読む'),
            e('button', { className: 'btn-primary mb-6', onClick: checkStatus }, 'ステータスを更新'),
            e('button', { className: 'w-full text-slate-500 hover:text-white text-sm font-bold transition', onClick: handleLogout }, 'ログアウト')
          )
        );
      }

      if (role === 'approved' || (role === 'admin' && !goAdmin)) return e(MainDashboard, { user: user, role: role, onLogout: handleLogout, onGoAdmin: function(){ setGoAdmin(true); } });
      return null;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));

  })();
  </script>
</body>
</html>
