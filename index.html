function getAdmin() { var d = localStorage.getItem(DB_KEY_ADMIN); if(d) return JSON.parse(d); var init = {u:'admin', p:'admin123'}; localStorage.setItem(DB_KEY_ADMIN, JSON.stringify(init)); return init; }

function AuthScreen(props) {
  var [mode, setMode] = useState('user'); // 'user' or 'admin'
  var [isLogin, setIsLogin] = useState(true); // true = Login, false = Register
  var [un, setUn] = useState(''); var [pw, setPw] = useState(''); var [sns, setSns] = useState(''); var [err, setErr] = useState('');
  
  function handleSubmit() {
    setErr(''); var u = un.trim(); if (!u) { setErr('ユーザー名を入力してください'); return; }
    var db = JSON.parse(localStorage.getItem(DB_KEY_USERS) || '{}');
    var admin = getAdmin();

    if (mode === 'admin') {
      if (u === admin.u && pw === admin.p) { localStorage.setItem(DB_KEY_CURRENT, JSON.stringify({u:u, r:'admin'})); props.onLogin(u, 'admin'); } else { setErr('認証に失敗しました'); }
    } else {
      if (u === admin.u) { setErr('この名前は使用できません'); return; }
      
      if (isLogin) {
        // ログイン処理
        if (!db[u]) { setErr('登録されていないユーザー名です。新規申請を行ってください。'); return; }
        localStorage.setItem(DB_KEY_CURRENT, JSON.stringify({u:u, r:db[u].status})); props.onLogin(u, db[u].status);
      } else {
        // 新規登録処理
        if (db[u]) { setErr('既に登録されているユーザー名です。ログインしてください。'); return; }
        var s = sns.trim();
        if (!s || s.indexOf('@') === -1) { setErr('SNSアカウントは @ を含めて正確に入力してください'); return; }
        db[u] = { status: 'pending', date: Date.now(), sns: s }; 
        localStorage.setItem(DB_KEY_USERS, JSON.stringify(db));
        localStorage.setItem(DB_KEY_CURRENT, JSON.stringify({u:u, r:'pending'})); props.onLogin(u, 'pending');
      }
    }
  }

  return h('div', {className:'pg'}, h('div',{className:'grid-bg'}), 
    h('div', {className:'z1 auth-box'}, 
      h('h2', null, 'AI Content Pro'), h('p', null, '会員専用プラットフォーム'), 
      h('div', {style:{display:'flex', gap:10, marginBottom:20}}, 
        h('button', {onClick:function(){setMode('user');setErr('');}, style:{flex:1, padding:'8px', borderRadius:8, border:'none', background:mode==='user'?'#38bdf8':'rgba(255,255,255,.1)', color:'#fff', fontWeight:700, cursor:'pointer'}}, '一般ユーザー'), 
        h('button', {onClick:function(){setMode('admin');setErr('');}, style:{flex:1, padding:'8px', borderRadius:8, border:'none', background:mode==='admin'?'#e94560':'rgba(255,255,255,.1)', color:'#fff', fontWeight:700, cursor:'pointer'}}, '管理者ログイン') 
      ), 
      mode === 'user' ? h('div', {className:'auth-tabs'}, 
        h('button', {className:'auth-tab ' + (isLogin?'auth-tab-on':''), onClick:function(){setIsLogin(true);setErr('');}}, 'ログイン'),
        h('button', {className:'auth-tab ' + (!isLogin?'auth-tab-on':''), onClick:function(){setIsLogin(false);setErr('');}}, '新規利用申請')
      ) : null,
      h('input', {className:'inp', style:{marginBottom:12}, type:'text', placeholder:'ユーザー名', value:un, onChange:function(e){setUn(e.target.value);}}), 
      (mode === 'user' && !isLogin) ? h('input', {className:'inp', style:{marginBottom:12}, type:'text', placeholder:'SNSアカウント (例: @note_ai_pro)', value:sns, onChange:function(e){setSns(e.target.value);}}) : null,

// ── ルート管理 (認証ラッピング) ──
function Root() {
  var [user, setUser] = useState(null);
  var [role, setRole] = useState(null); // 'pending', 'approved', 'rejected', 'admin'
  var [forceAdminDash, setForceAdminDash] = useState(false);

  useEffect(function() {
    var sessionStr = localStorage.getItem(DB_KEY_CURRENT);
    if (sessionStr) {
      var session = JSON.parse(sessionStr);
      if (session.r === 'admin') { 
        setUser(session.u); setRole('admin'); setForceAdminDash(true);
      } else {
        var db = JSON.parse(localStorage.getItem(DB_KEY_USERS) || '{}');
        if (db[session.u]) { setUser(session.u); setRole(db[session.u].status); } 
        else { localStorage.removeItem(DB_KEY_CURRENT); }
      }
    }
  }, []);

  function handleLogout() { localStorage.removeItem(DB_KEY_CURRENT); setUser(null); setRole(null); setForceAdminDash(false); }

  if (!user) return h(AuthScreen, { onLogin: function(u, r) { setUser(u); setRole(r); if(r==='admin') setForceAdminDash(true); } });
  if (role === 'admin' && forceAdminDash) return h(AdminDashboard, { onLogout: handleLogout, onGoApp: function(){setForceAdminDash(false);} });
  if (role === 'pending' || role === 'rejected') return h(PendingScreen, { 
    rejected: role === 'rejected',
    onCheck: function() { var db = JSON.parse(localStorage.getItem(DB_KEY_USERS) || '{}'); setRole(db[user].status); }, 
    onLogout: handleLogout 
  });
  if (role === 'approved' || (role === 'admin' && !forceAdminDash)) return h(MainApp, { role: role, onLogout: handleLogout, onGoAdmin: function(){setForceAdminDash(true);} });
  return null;
}

var root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(Root,null));

})();
