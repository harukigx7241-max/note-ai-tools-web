<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#0d0d1a;color:#fff;min-height:100vh;line-height:1.6;overflow-x:hidden;-webkit-text-size-adjust:100%}
button,input,textarea,select{font-family:inherit}
button{-webkit-tap-highlight-color:transparent;tap-highlight-color:transparent}
a{-webkit-tap-highlight-color:transparent}
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;position:relative;overflow-x:hidden;background:linear-gradient(135deg,#0d0d1a,#1a0a2e 50%,#0a1628)}
.landing-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.lz1{position:relative;z-index:1}
.landing-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:6px 18px;font-size:11px;font-weight:700;letter-spacing:.15em;color:rgba(255,255,255,.7);margin-bottom:28px}
.landing-title{font-size:clamp(48px,10vw,84px);font-weight:900;line-height:1.05;text-align:center;margin-bottom:18px}
.landing-title span{color:#e94560}
.landing-sub{font-size:15px;color:rgba(255,255,255,.5);text-align:center;line-height:1.8;margin-bottom:24px}
.ai-badges{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:36px}
.ai-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:6px 14px;font-size:13px;font-weight:600}
.ai-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tool-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;width:100%;max-width:840px;margin-bottom:32px}
.tool-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:22px 18px;cursor:pointer;transition:background .2s,transform .2s;text-align:left}
.tool-card:hover{background:rgba(255,255,255,.08);border-color:rgba(233,69,96,.4);transform:translateY(-2px)}
.tc-icon{font-size:28px;margin-bottom:8px}
.tc-name{font-size:15px;font-weight:800;color:#fff;margin-bottom:5px}
.tc-desc{font-size:12px;color:rgba(255,255,255,.4);line-height:1.6}
.tc-badge{display:inline-block;background:rgba(233,69,96,.2);border:1px solid rgba(233,69,96,.4);border-radius:100px;padding:2px 8px;font-size:9px;color:#e94560;font-weight:800;letter-spacing:.1em;margin-bottom:8px}
.theme-box{width:100%;max-width:840px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px;margin-bottom:24px}
.box-label{font-size:11px;font-weight:800;color:rgba(255,255,255,.45);letter-spacing:.1em;margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:14px}
.chip{padding:7px 13px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s}
.chip:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.chip-on{background:rgba(233,69,96,.2);border-color:rgba(233,69,96,.6);color:#fff}
.chip-age-on{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.6);color:#fff}
.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-bottom:14px}
.theme-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:13px;color:rgba(255,255,255,.8);line-height:1.5;text-align:left;transition:all .15s}
.theme-item:hover{background:rgba(255,255,255,.08);border-color:rgba(233,69,96,.35)}
.theme-item-on{background:rgba(233,69,96,.12);border-color:rgba(233,69,96,.6)}
.theme-num{font-size:11px;font-weight:800;color:rgba(255,255,255,.25);min-width:16px;flex-shrink:0}
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.sw-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:9px 11px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.65);margin-bottom:5px;transition:all .12s;line-height:1.5}
.sw-item:hover{background:rgba(255,255,255,.08)}
.sw-item-sit{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.5);color:#fff}
.sw-item-wry{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.4);color:#fff}
.sw-col-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);margin-bottom:7px}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-back-sm{padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.55);font-size:13px;cursor:pointer}
.btn-reload{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.btn-primary{padding:11px 26px;border-radius:10px;background:linear-gradient(135deg,#e94560,#c2185b);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(233,69,96,.4)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-go{width:100%;padding:15px;border-radius:12px;background:linear-gradient(135deg,#e94560,#c2185b);border:none;color:#fff;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 5px 18px rgba(233,69,96,.4)}
.loading-txt{text-align:center;padding:18px;color:rgba(255,255,255,.4);font-size:13px}
.contact-box{width:100%;max-width:580px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:24px}
.ci{width:100%;padding:11px 13px;margin-bottom:9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:16px;outline:none}
.ci:focus{border-color:rgba(233,69,96,.5)}
.ci-ta{resize:vertical;min-height:100px}
.btn-send{width:100%;padding:13px;border-radius:8px;background:linear-gradient(135deg,#e94560,#c2185b);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer}
.app-wrap{min-height:100vh;background:linear-gradient(135deg,#0d0d1a,#1a0a2e 50%,#0a1628)}
.app-hd{background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.07);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;position:-webkit-sticky;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.app-hd-l{display:flex;align-items:center;gap:10px}
.back-btn{padding:7px 13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:7px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.app-title{font-size:16px;font-weight:900;color:#fff;margin:0}
.app-sub{font-size:11px;color:rgba(255,255,255,.35);margin:2px 0 0}
.aibadge{background:linear-gradient(135deg,#e94560,#c2185b);border-radius:5px;padding:2px 8px;font-size:10px;font-weight:800;letter-spacing:.07em}
.key-btn{padding:7px 13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:7px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.app-body{max-width:740px;margin:0 auto;padding:18px 14px}
.dark-tabs{background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);display:flex;overflow-x:auto}
.tab-btn{padding:12px 16px;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.35);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-on{color:#fff;border-bottom-color:#e94560}
.tab-btn:disabled{opacity:.25;cursor:not-allowed}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:16px 18px;margin-bottom:12px}
.lbl{color:rgba(255,255,255,.55);font-size:11px;font-weight:700;letter-spacing:.1em;display:block;margin-bottom:10px}
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:16px;outline:none;padding:11px 13px}
.inp:focus{border-color:rgba(233,69,96,.5)}
.hint{font-size:11px;color:rgba(255,255,255,.28);margin-top:5px}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:6px 12px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s}
.pill:hover{background:rgba(255,255,255,.1)}
.pill-on{background:rgba(233,69,96,.2);border-color:rgba(233,69,96,.5);color:#fff}
.warn{background:rgba(255,180,0,.09);border:1px solid rgba(255,180,0,.3);border-radius:9px;padding:11px 13px;font-size:12px;color:#fcd34d;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.err{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.3);border-radius:9px;padding:11px 13px;font-size:13px;color:#f87171;margin-bottom:10px}
.gen-btn{width:100%;border-radius:12px;border:none;cursor:pointer;position:relative;overflow:hidden}
.gen-btn:disabled{cursor:not-allowed}
.gen-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);border-radius:12px}
.gen-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(233,69,96,.35)}
.gen-inner{position:relative;z-index:2;padding:17px 22px;display:flex;flex-direction:column;align-items:center;gap:5px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#1a1a2e;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:26px 22px;width:100%;max-width:400px}
.ai-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.ai-card{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 7px;text-align:center;cursor:pointer;transition:all .15s}
.ai-card-on{border-color:#e94560;background:rgba(255,255,255,.1)}
.ai-icon{font-size:20px;margin-bottom:4px}
.ai-name{font-size:11px;font-weight:700;color:#fff}
.ai-status{font-size:10px;margin-top:2px}
.preview-box{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,.4)}
.post-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;overflow:hidden;margin-bottom:9px}
.post-hd{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.post-body{padding:11px 14px;max-height:100px;overflow-y:auto;font-size:13px;color:rgba(255,255,255,.5);white-space:pre-wrap;line-height:1.7}
.copy-btn{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}
.edit-ta{width:100%;min-height:480px;padding:13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:11px;color:#fff;font-size:16px;line-height:1.8;resize:vertical;outline:none}
@media(max-width:540px){
  .landing-title{font-size:44px}
  .sw-grid{grid-template-columns:1fr}
  .ai-grid{grid-template-columns:repeat(2,1fr)}
  .tool-cards{grid-template-columns:repeat(2,1fr)}
  .theme-grid{grid-template-columns:1fr}
  .app-title{font-size:14px}
  .tc-desc{display:none}
  .app-body{padding:14px 10px}
  .modal-box{padding:20px 16px}
  .theme-box{padding:16px 12px}
  .contact-box{padding:18px 14px}
  .card{padding:14px 14px}
  .gen-inner{padding:14px 16px}
  .btn-row{gap:8px}
  .btn-primary{padding:10px 18px;font-size:13px}
  .dark-tabs{-webkit-overflow-scrolling:touch}
  .edit-ta{min-height:300px;font-size:14px}
}
</style>

// 管理者統計
// ─────────────────────────────────────────────
var ADM_CFG = ‘noteAiAdminConfig_v1’;
var ADM_QUE = ‘noteAiAdminQueue_v1’;
function loadAdmCfg() {
try { return JSON.parse(localStorage.getItem(ADM_CFG) || ‘{}’); } catch(e) { return {}; }
}
var _flushing = false;
function enqueueEvent(type, payload) {
try {
var q = JSON.parse(localStorage.getItem(ADM_QUE) || ‘[]’);
q.push({ type: type, payload: payload, time: new Date().toISOString() });
if (q.length > 100) q = q.slice(-100);
localStorage.setItem(ADM_QUE, JSON.stringify(q));
} catch(e) {}
setTimeout(flushQueue, 500);
}
function flushQueue() {
if (_flushing) return;
var cfg = loadAdmCfg();
if (!cfg.pat || !cfg.owner || !cfg.repo) return;
_flushing = true;
var q;
try { q = JSON.parse(localStorage.getItem(ADM_QUE) || ‘[]’); } catch(e) { q = []; }
if (!q.length) { _flushing = false; return; }
var path = cfg.path || ‘data.json’;
var url  = ‘https://api.github.com/repos/’ + cfg.owner + ‘/’ + cfg.repo + ‘/contents/’ + path;
var hd   = { ‘Authorization’: ’Bearer ’ + cfg.pat, ‘Accept’: ‘application/vnd.github+json’ };
fetch(url, { headers: hd })
.then(function(gr) {
var prom;
if (gr.ok) prom = gr.json();
else       prom = Promise.resolve(null);
return prom;
})
.then(function(gd) {
var stats = { totalAccess:0, totalGenerate:0, lastAccess:null, byTool:{}, byAi:{}, byTheme:{}, dailyAccess:{}, history:[] };
var sha = null;
if (gd) {
try { stats = JSON.parse(atob(gd.content.replace(/\n/g, ‘’))); sha = gd.sha; } catch(e) {}
}
q.forEach(function(ev) {
if (ev.type === ‘access’) {
stats.totalAccess = (stats.totalAccess || 0) + 1;
stats.lastAccess  = ev.time;
var day = ev.time.slice(0, 10);
if (!stats.dailyAccess) stats.dailyAccess = {};
stats.dailyAccess[day] = (stats.dailyAccess[day] || 0) + 1;
} else if (ev.type === ‘generate’) {
stats.totalGenerate = (stats.totalGenerate || 0) + 1;
if (!stats.byAi)   stats.byAi = {};
if (!stats.byTool) stats.byTool = {};
stats.byAi[ev.payload.ai]     = (stats.byAi[ev.payload.ai] || 0) + 1;
stats.byTool[ev.payload.tool] = (stats.byTool[ev.payload.tool] || 0) + 1;
if (ev.payload.theme) {
if (!stats.byTheme) stats.byTheme = {};
stats.byTheme[ev.payload.theme] = (stats.byTheme[ev.payload.theme] || 0) + 1;
}
if (!stats.history) stats.history = [];
stats.history.unshift({ time: ev.time, ai: ev.payload.ai, tool: ev.payload.tool, theme: ev.payload.theme || ‘’ });
if (stats.history.length > 100) stats.history = stats.history.slice(0, 100);
}
});
var body = {
message: ‘Update stats’,
content: btoa(unescape(encodeURIComponent(JSON.stringify(stats, null, 2))))
};
if (sha) body.sha = sha;
return fetch(url, {
method: ‘PUT’,
headers: Object.assign({}, hd, { ‘Content-Type’: ‘application/json’ }),
body: JSON.stringify(body)
});
})
.then(function(pr) {
if (pr && pr.ok) localStorage.removeItem(ADM_QUE);
_flushing = false;
})
.catch(function() { _flushing = false; });
}
function recordAccess()           { enqueueEvent(‘access’, {}); }
function recordGenerate(ai, tool, theme) { enqueueEvent(‘generate’, { ai: ai, tool: tool, theme: theme || ‘’ }); }
recordAccess();

function callClaude(msgs, sys, max) {
var key = getKey(‘claude’);
if (!key) return Promise.reject(new Error(‘Claude APIキー未設定’));
var body = { model: ‘claude-sonnet-4-20250514’, max_tokens: max, messages: msgs };
if (sys) body.system = sys;
return fetch(‘https://api.anthropic.com/v1/messages’, {
method: ‘POST’,
headers: {
‘Content-Type’: ‘application/json’,
‘x-api-key’: key,
‘anthropic-version’: ‘2023-06-01’,
‘anthropic-dangerous-direct-browser-access’: ‘true’
},
body: JSON.stringify(body)
}).then(function(r) {
if (!r.ok) return r.json().catch(function(){return{};}).then(function(e) { throw new Error((e.error && e.error.message) || (‘Claude APIエラー ’ + r.status)); });
return r.json();
}).then(function(d) {
return d.content.filter(function(c){return c.type===‘text’;}).map(function(c){return c.text;}).join(’’);
});
}

function callGemini(msgs, sys, max) {
var key = getKey(‘gemini’);
if (!key) return Promise.reject(new Error(‘Gemini APIキー未設定’));
var models = [‘gemini-2.5-pro-exp-03-25’,‘gemini-2.0-flash’,‘gemini-1.5-flash’];
var contents = msgs.map(function(m) {
return { role: m.role === ‘assistant’ ? ‘model’ : ‘user’, parts: [{ text: m.content }] };
});
var body = { contents: contents, generationConfig: { maxOutputTokens: max } };
if (sys) body.systemInstruction = { parts: [{ text: sys }] };
function tryModel(i) {
if (i >= models.length) return Promise.reject(new Error(‘Gemini 全モデル失敗’));
return fetch(‘https://generativelanguage.googleapis.com/v1beta/models/’ + models[i] + ‘:generateContent?key=’ + key, {
method: ‘POST’, headers: { ‘Content-Type’: ‘application/json’ }, body: JSON.stringify(body)
}).then(function(r) {
if (!r.ok) {
if (r.status === 404 || r.status === 429) return tryModel(i + 1);
return r.json().catch(function(){return{};}).then(function(e) { throw new Error((e.error && e.error.message) || ‘Gemini APIエラー’); });
}
return r.json();
}).then(function(d) {
var parts = d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts;
return (parts || []).map(function(p){return p.text||’’;}).join(’’);
});
}
return tryModel(0);
}

function callChatGPT(msgs, sys, max) {
var key = getKey(‘chatgpt’);
if (!key) return Promise.reject(new Error(‘ChatGPT APIキー未設定’));
var messages = sys ? [{ role: ‘system’, content: sys }].concat(msgs) : msgs;
return fetch(‘https://api.openai.com/v1/chat/completions’, {
method: ‘POST’,
headers: { ‘Content-Type’: ‘application/json’, ‘Authorization’: ’Bearer ’ + key },
body: JSON.stringify({ model: ‘gpt-4o’, max_tokens: max, messages: messages })
}).then(function(r) {
if (!r.ok) return r.json().catch(function(){return{};}).then(function(e) { throw new Error((e.error && e.error.message) || (’ChatGPT APIエラー ’ + r.status)); });
return r.json();
}).then(function(d) {
return (d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content) || ‘’;
});
}

function callGrok(msgs, sys, max) {
var key = getKey(‘grok’);
if (!key) return Promise.reject(new Error(‘Grok APIキー未設定’));
var models   = [‘grok-3’, ‘grok-2’];
var messages = sys ? [{ role: ‘system’, content: sys }].concat(msgs) : msgs;
function tryModel(i) {
if (i >= models.length) return Promise.reject(new Error(‘Grok 全モデル失敗’));
return fetch(‘https://api.x.ai/v1/chat/completions’, {
method: ‘POST’,
headers: { ‘Content-Type’: ‘application/json’, ‘Authorization’: ’Bearer ’ + key },
body: JSON.stringify({ model: models[i], max_tokens: max, messages: messages })
}).then(function(r) {
if (!r.ok) {
if (r.status === 404) return tryModel(i + 1);
return r.json().catch(function(){return{};}).then(function(e) { throw new Error((e.error && e.error.message) || ‘Grok APIエラー’); });
}
return r.json();
}).then(function(d) {
return (d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content) || ‘’;
});
}
return tryModel(0);
}

function callAI(aiId, msgs, sys, max) {
if (aiId === ‘claude’)  return callClaude(msgs, sys, max);
if (aiId === ‘gemini’)  return callGemini(msgs, sys, max);
if (aiId === ‘chatgpt’) return callChatGPT(msgs, sys, max);
if (aiId === ‘grok’)    return callGrok(msgs, sys, max);
return Promise.reject(new Error(’不明なAI: ’ + aiId));
}

function readFileText(file) {
if (!file) return Promise.resolve(’’);
if (file.name.toLowerCase().indexOf(’.docx’) >= 0 && typeof mammoth !== ‘undefined’) {
return file.arrayBuffer().then(function(buf) {
return mammoth.extractRawText({ arrayBuffer: buf });
}).then(function(res) { return res.value; });
}
return new Promise(function(resolve, reject) {
var r = new FileReader();
r.onload  = function(e) { resolve(e.target.result); };
r.onerror = reject;
r.readAsText(file, ‘utf-8’);
});
}

function BonusGenerator(props) {
var onBack = props.onBack;
var showApiS    = useState(false);         var showApi    = showApiS[0];    var setShowApi    = showApiS[1];
var aiIdS       = useState(‘claude’);      var aiId       = aiIdS[0];       var setAiId       = aiIdS[1];
var themeS      = useState(BONUS_THEMES[0]);var theme     = themeS[0];      var setTheme      = themeS[1];
var ageS        = useState(BONUS_AGES[4]); var age        = ageS[0];        var setAge        = ageS[1];
var artTextS    = useState(’’);            var artText    = artTextS[0];    var setArtText    = artTextS[1];
var artFileS    = useState(null);          var artFile    = artFileS[0];    var setArtFile    = artFileS[1];
var loadingS    = useState(false);         var loading    = loadingS[0];    var setLoading    = loadingS[1];
var errorS      = useState(’’);            var error      = errorS[0];      var setError      = errorS[1];
var suggestionsS= useState([]);            var suggestions= suggestionsS[0];var setSuggestions= suggestionsS[1];
var selectedS   = useState([]);            var selected   = selectedS[0];   var setSelected   = selectedS[1];
var resultsS    = useState({});            var results    = resultsS[0];    var setResults    = resultsS[1];
var aiRef = useRef(aiId);
aiRef.current = aiId;

function handleFile(e) {
var file = e.target.files && e.target.files[0];
if (!file) return;
setArtFile(file);
readFileText(file).then(function(t){ setArtText(t); }).catch(function(e){ setError(‘ファイル読み込みエラー: ’ + e.message); });
}
function handleAnalyze() {
var id = aiRef.current;
if (!artText.trim()) { setError(‘記事テキストを入力またはアップロードしてください’); return; }
setError(’’); setLoading(true); setSuggestions([]); setSelected([]); setResults({});
var prompt = ‘以下のnote記事を分析して、購入者向けの特典コンテンツを8つ提案してください。\n\n【ジャンル】’ + theme + ‘\n【ターゲット年齢】’ + age + ‘\n\n’ + artText.slice(0, 3000) + ‘\n\n出力形式（JSONのみ・前置きなし）:\n{“suggestions”:[{“id”:“1”,“title”:“特典タイトル”,“type”:“checklist”,“desc”:“内容説明（30文字以内）”}]}\n\ntypeは checklist/template/ebook/audio/video のいずれか’;
callAI(id, [{ role:‘user’, content:prompt }], null, 1200)
.then(function(res) {
try {
var clean = res.replace(/`json/g,'').replace(/`/g,’’).trim();
var m     = clean.match(/{[\s\S]*}/);
var p     = JSON.parse(m ? m[0] : clean);
if (p.suggestions && p.suggestions.length > 0) setSuggestions(p.suggestions);
else throw new Error(‘提案が取得できませんでした’);
} catch(e) { setError(‘解析エラー。もう一度お試しください。’); }
setLoading(false);
})
.catch(function(e) { setError(e.message); setLoading(false); });
}
function handleGenBonus(s) {
var id = aiRef.current;
setLoading(true);
var prompt = ‘以下の特典コンテンツを作成してください。\n\n元記事（要約）:\n’ + artText.slice(0, 2000) + ’\n\n特典タイトル: ’ + s.title + ’\nターゲット: ’ + age + ‘\n\n実際に使える完成度で作成してください。’;
callAI(id, [{ role:‘user’, content:prompt }], null, 2000)
.then(function(res) {
recordGenerate(id, ‘bonus’, ‘’);
setResults(function(r){ var n = Object.assign({}, r); n[s.id] = res; return n; });
setLoading(false);
})
.catch(function(e) { setError(e.message); setLoading(false); });
}
function downloadXlsx() {
if (typeof XLSX === ‘undefined’) { alert(‘XLSXライブラリが読み込まれていません’); return; }
var rows = selected.map(function(id) {
var s = suggestions.find(function(x){ return x.id === id; });
return { ‘タイトル’: s ? s.title : ‘’, ‘内容’: results[id] || ‘’ };
});
var ws = XLSX.utils.json_to_sheet(rows);
var wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, ‘特典’);
XLSX.writeFile(wb, ‘bonus_’ + Date.now() + ‘.xlsx’);
}

{isSel && <span style={{ color:’#e94560’, fontSize:13, fontWeight:900 }}>✓</span>}
</div>

}

navigator.clipboard.writeText(text).catch(function(){});
setCopied(function(c){ var n = Object.assign({}, c); n[key] = true; return n; });
setTimeout(function(){ setCopied(function(c){ var n = Object.assign({}, c); n[key] = false; return n; }); }, 2000);

function handleGenerate() {
var id = aiRef.current;
setError(’’); setLoading(true); setPrompts([]);
var useLabels = uses.map(function(u){ return (IMG_USES.find(function(x){ return x.id === u; }) || { label:u }).label; }).join(’・’);

callAI(id, [{ role:‘user’, content:prompt }], null, 1000)
.then(function(res) {
try {
var clean = res.replace(/`json/g,'').replace(/`/g,’’).trim();
var m     = clean.match(/{[\s\S]*}/);
var p     = JSON.parse(m ? m[0] : clean);
if (p.prompts && p.prompts.length > 0) {
recordGenerate(id, ‘image’, ‘’);
setPrompts(p.prompts);
} else throw new Error(‘プロンプトが取得できませんでした’);
} catch(e) { setError(‘解析エラー。もう一度お試しください。’); }
setLoading(false);
})
.catch(function(e) { setError(e.message); setLoading(false); });
}

</div>

</div>
);
})}
</div>
