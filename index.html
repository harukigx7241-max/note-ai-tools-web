function doRichCopyText(text, copiedState, setCopiedState, key) { if (!navigator.clipboard || !window.ClipboardItem || typeof marked === 'undefined') { doCopyText(text, copiedState, setCopiedState, key); return; } try { var htmlContent = marked.parse(text); var blobHtml = new Blob([htmlContent], { type: "text/html" }); var blobText = new Blob([text], { type: "text/plain" }); var item = new ClipboardItem({ "text/plain": blobText, "text/html": blobHtml }); navigator.clipboard.write([item]).then(function(){ var n=Object.assign({},copiedState);n[key]=true;setCopiedState(n); setTimeout(function(){var n2=Object.assign({},copiedState);n2[key]=false;setCopiedState(n2);},2000); }).catch(function(){ doCopyText(text, copiedState, setCopiedState, key); }); } catch (e) { doCopyText(text, copiedState, setCopiedState, key); } }
