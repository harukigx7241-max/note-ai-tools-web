<!DOCTYPE html>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#0ea5e9', light: '#38bdf8', dark: '#0369a1', accent: '#f59e0b', danger: '#f43f5e', success: '#10b981' }

  <style>
    body { background-color: #020617; color: #f8fafc; font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; overflow-x: hidden; }
    .grid-bg {
      position: fixed; inset: 0; z-index: -1;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glass-panel {
      background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .input-base {
      width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 0.75rem; padding: 1rem; color: #fff; font-size: 0.95rem; outline: none; transition: 0.2s;
    }
    .input-base:focus { border-color: #38bdf8; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }

    .btn-gradient:hover { filter: brightness(1.1); transform: translateY(-2px); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div id="root"></div>

  <script>
  (function() {
    'use strict';

    /* =========================================================================
       1. React Element Helpers (クラッシュを物理的に防ぐための安全な記述法)
       ========================================================================= */
    const el = React.createElement;
    const { useState, useEffect, Component, Fragment } = React;

    const div = (props, ...children) => el('div', props, ...children);
    const span = (props, ...children) => el('span', props, ...children);
    const p = (props, ...children) => el('p', props, ...children);
    const h1 = (props, ...children) => el('h1', props, ...children);
    const h2 = (props, ...children) => el('h2', props, ...children);
    const h3 = (props, ...children) => el('h3', props, ...children);
    const button = (props, ...children) => el('button', props, ...children);
    const input = (props) => el('input', props);
    const textarea = (props) => el('textarea', props);
    const select = (props, ...children) => el('select', props, ...children);
    const option = (props, ...children) => el('option', props, ...children);
    const label = (props, ...children) => el('label', props, ...children);
    const a = (props, ...children) => el('a', props, ...children);
    const table = (props, ...children) => el('table', props, ...children);
    const thead = (props, ...children) => el('thead', props, ...children);
    const tbody = (props, ...children) => el('tbody', props, ...children);
    const tr = (props, ...children) => el('tr', props, ...children);
    const th = (props, ...children) => el('th', props, ...children);
    const td = (props, ...children) => el('td', props, ...children);

    /* =========================================================================
       2. Error Boundary (画面真っ白を絶対に防ぐ防護壁)
       ========================================================================= */
    class ErrorBoundary extends Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, errorInfo: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true };
      }
      componentDidCatch(error, errorInfo) {
        console.error("システムエラーを検知:", error, errorInfo);
        this.setState({ errorInfo: error.toString() });
      }
      render() {
        if (this.state.hasError) {
          return div({ className: "min-h-screen flex items-center justify-center p-6" },
            div({ className: "glass-panel p-8 rounded-2xl max-w-xl w-full text-center" },
              h2({ className: "text-2xl font-black text-brand-danger mb-4" }, "⚠️ システムエラーが発生しました"),
              p({ className: "text-slate-300 text-sm mb-6 leading-relaxed" }, "データの不整合により画面を描画できませんでした。以下のボタンを押してデータを初期化してください。"),
              div({ className: "bg-black/50 p-4 rounded-lg text-left overflow-auto text-xs text-slate-500 mb-6 font-mono" }, this.state.errorInfo),
              button({ 
                className: "btn-gradient w-full py-3 rounded-xl font-bold text-white",
                onClick: () => { localStorage.clear(); window.location.reload(); }
              }, "システムをリセットして復旧する")
            )
          );
        }
        return this.props.children;
      }
    }

    /* =========================================================================
       3. データベース管理 (絶対安全・自己修復型)
       ========================================================================= */
    const DB_KEY = 'AICP_v39_Secure_DB';
    const SESS_KEY = 'AICP_v39_Session';
    const DAILY_LIMIT = 3;
    const SYS_VERSION = 'v39.0.0 Stable';

    const AppDB = {
      get: () => {
        let db = null;
        try {
          const raw = localStorage.getItem(DB_KEY);
          if (raw) db = JSON.parse(raw);
        } catch (e) { console.error("DB Load Error", e); }

        if (!db || typeof db !== 'object') {
          db = {
            config: { adminU: 'admin', adminP: 'admin123', toolVisibility: {} },
            users: {
              'admin': { status: 'approved', registeredAt: Date.now(), usage: { count: 0, date: '' }, perms: {}, brand: { plan: 'paid', name: '管理者' }, projects: { 'default': { name: '管理者領域', data: {} } }, curProj: 'default' }
            },
            inquiries: []
          };
          localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        if (!db.config) db.config = { adminU: 'admin', adminP: 'admin123', toolVisibility: {} };
        if (!db.config.toolVisibility) db.config.toolVisibility = {};
        if (!db.inquiries) db.inquiries = [];

        Object.keys(db.users).forEach(u => {
          let user = db.users[u];
          if (!user.projects || typeof user.projects !== 'object') user.projects = { 'default': { name: 'デフォルト', data: {} } };
          if (!user.curProj || !user.projects[user.curProj]) user.curProj = Object.keys(user.projects)[0] || 'default';
          if (!user.usage) user.usage = { count: 0, date: '' };
          if (!user.perms) user.perms = {};
          if (!user.brand) user.brand = { plan: 'free', name: '' };
          
          Object.keys(user.projects).forEach(pid => {
            if (!user.projects[pid].data) user.projects[pid].data = {};
          });
        });

        return db;
      },
      save: (db) => {
        try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch (e) { console.error("DB Save Error", e); }
      }
    };

    const copyText = (text, state, setState, key) => {
      if (navigator.clipboard) navigator.clipboard.writeText(text).catch(()=>{});
      setState({ ...state, [key]: true });
      setTimeout(() => setState(prev => ({ ...prev, [key]: false })), 2000);
    };

    const safeJSONParse = (text) => {
      if (!text) return null;
      try {
        const clean = text.replace(/```(?:json)?\n?/gi, '').replace(/```/g, '').trim();
        const match = clean.match(/\{[\s\S]*\}/);
        if (match) { try { return JSON.parse(match[0]); } catch(e) {} }
        return JSON.parse(clean);
      } catch (e) { return null; }
    };

    /* =========================================================================
       4. 魔法の杖（自動入力）用ナレッジベース
       ========================================================================= */
    const MAGIC_DATA = {
      note: [
        { theme: "完全未経験からスマホ1台で月5万を稼ぐ自動収益化の極意", target: "副業に興味はあるがスキルがなく、何から始めていいか分からない会社員", benefit: "会社に依存しない自由な経済基盤と、場所を選ばず働けるライフスタイル", authority: "AIツールを駆使し、半年で副業月収30万円を達成した現役マーケター", price: "2,980", free: "1500", paid: "4000", guarantee: true },
        { theme: "残業ゼロで月5万。AIによる「家事としての副業」時短術", target: "子供との時間を大切にしたいが、今の給料だけでは将来が不安なワーママ・パパ", benefit: "時間的な余裕を削ることなく、教育資金と心のゆとりを手に入れる未来", authority: "3人の子供を育てながら、AI自動化で週3時間の労働で月10万稼ぐ主婦", price: "1,980", free: "2000", paid: "5000", guarantee: false },
        { theme: "逆転劇。個人の経験を「デジタル資産」に変える教科書", target: "今の会社に一生いるつもりはないが、一歩踏み出す勇気が出ないベテラン社員", benefit: "これまでの経験が最高のコンテンツになり、将来の不安が自信に変わる", authority: "独立後、AIを相棒に1人で年商2000万を稼ぐ起業家", price: "4,980", free: "3000", paid: "7000", guarantee: true }
      ],
      lp: [
        { product: "AIコンテンツビジネス完全マスター講座（定価: 198,000円）", benefits: "単にお金が稼げるだけでなく、心に余裕が生まれ、週末に大切な人と外食を楽しめるようになり、会社に依存しない自分に自信が持てるようになる" }
      ],
      cw: [
        { job: "【急募】AIに関するSEOブログ記事作成（文字単価1.5円〜）", skill: "最新AI（Claude/ChatGPT）のプロンプトエンジニアリングを熟知しており、検索意図を網羅した高品質な記事を、他者の半分の時間で納品可能です。専用の校正ツールも使用し、品質を担保します。" }
      ]
    };

    const getRandomMagic = (toolId) => {
      const pool = MAGIC_DATA[toolId] || MAGIC_DATA['note'];
      return pool[Math.floor(Math.random() * pool.length)];
    };

    /* =========================================================================
       5. ツール・カテゴリ定義
       ========================================================================= */
    const TOOLS = {
      campaign: {
        cat: 'omega', icon: '👑', name: '全自動ファネル構築', badge: '特級', desc: '商品名からLP, SNS, LINEを一撃生成',
        tut: '【目的】商品のコンセプトから、集客・販売の全導線を一貫して生成します。',
        fields: [
          { id: 'prod', t: 'text', l: '商品名・テーマ', magic: 'AI自動化コンテンツビジネス構築プログラム' },
          { id: 'tgt', t: 'text', l: 'ターゲット層', magic: '毎日残業で疲れ果て、現状を変えたい30代会社員' },
          { id: 'val', t: 'area', l: '提供価値の詳細', magic: 'AIを部下のように使い、1日の作業を15分に短縮しながら収益を最大化する時短術' }
        ],
        build: (v) => `商品「${v.prod}」を「${v.tgt}」に売る導線（LP、SNS3種、LINE5日分）を作成せよ。価値: ${v.val}`, isOnePage: true
      },
      note: {
        cat: 'mon', icon: '📝', name: 'note記事 究極生成', badge: '必須', desc: '文字数・価格を分離した最強の記事作成',
        tut: '【目的】読者の悩みに寄り添い、解決策を提示する有料記事を作成します。一番上の魔法の杖を押すと、全ての項目が連動して埋まります。',
        fields: [
          { id: 'genre', t: 'select', l: 'ジャンル', opts: ['お金・副業', '美容・健康', '人間関係・恋愛', 'キャリア・仕事', '趣味・ライフスタイル'] },
          { id: 'age', t: 'select', l: 'ターゲット年代', opts: ['10代', '20代', '30代', '40代', '50代', '60代', '全年齢'] },
          { id: 'theme', t: 'text', l: '記事テーマ', isMainMagic: true },
          { id: 'target_detail', t: 'text', l: '具体的な読者の悩み' },
          { id: 'benefit', t: 'text', l: '読者が得られる未来' },
          { id: 'authority', t: 'text', l: '著者の実績・権威性' },
          { id: 'price', t: 'text', l: '販売価格 (円)' },
          { id: 'free_vol', t: 'text', l: '無料部分の文字数' },
          { id: 'paid_vol', t: 'text', l: '有料部分の文字数' },
          { id: 'guarantee', t: 'check', l: '返金保証をアピール' }
        ],
        build: (v) => `note有料記事をプロデュースせよ。ジャンル:${v.genre}, 年代:${v.age}, テーマ:${v.theme}, ターゲット:${v.target_detail}, 未来:${v.benefit}, 実績:${v.authority}, 価格:${v.price}円, 無料部分:${v.free_vol}字, 有料部分:${v.paid_vol}字. ${v.guarantee?'返金保証を含める':''}`, isOnePage: true
      },
      cw_proposal: {
        cat: 'cw', icon: '🎯', name: 'CW案件獲得 提案文', badge: '神機能', desc: 'クラウドワークスの採用率を極限まで高める',
        tut: '【目的】募集要項に対する完璧な提案文を生成します。',
        fields: [
          { id: 'job', t: 'area', l: '募集要項 (コピペ)' },
          { id: 'skill', t: 'text', l: '自分の強み', isMainMagic: true }
        ],
        build: (v) => `募集要項「${v.job}」に対し、私の強み「${v.skill}」を活かした提案文を作成せよ。`
      },
      cw_seo: {
        cat: 'cw', icon: '🔍', name: 'SEO特化ライティング', badge: '稼げる', desc: 'Google上位を狙う高品質な記事執筆',
        tut: '【目的】クラウドワークスの記事作成案件を高速で完遂します。',
        fields: [ { id: 'kw', t: 'text', l: 'メインキーワード' }, { id: 'must', t: 'text', l: '必須ワード' } ],
        build: (v) => `「${v.kw}」で検索1位を狙うSEO記事を執筆せよ。必須: ${v.must}`
      },
      lp: {
        cat: 'mon', icon: '📄', name: '爆売れLP作成', badge: '', desc: '高単価商品を成約させるセールスレター',
        tut: '【目的】商品を販売するためのランディングページ（LP）の構成を作ります。',
        fields: [ { id: 'prod', t: 'text', l: '商品名・価格', isMainMagic: true }, { id: 'bene', t: 'area', l: 'ベネフィット' } ],
        build: (v) => `商品「${v.prod}」のLP構成を作成せよ。特徴: ${v.bene}`
      },
      closing: {
        cat: 'mon', icon: '💰', name: '心理的クロージング', badge: 'NEW', desc: '「検討します」を撃破する成約台本',
        tut: '【目的】顧客の「言い訳」を論理的・感情的に潰すための台本です。',
        fields: [ { id: 'obj', t: 'area', l: '顧客の反論・言い訳', magic: '「価格が高い」「自分には難しそう」「時間がない」' } ],
        build: (v) => `顧客の反論「${v.obj}」を解消し、成約に導く台本を作れ。`
      },
      sns: {
        cat: 'sns', icon: '📱', name: 'SNS集客ポスト', badge: '', desc: 'X/Threadsで反応が取れる投稿',
        tut: '【目的】SNSでバズを引き起こす投稿文を生成します。',
        fields: [ { id: 'platform', t: 'select', l: '媒体', opts: ['X', 'Threads'] }, { id: 'content', t: 'area', l: '発信内容' } ],
        build: (v) => `「${v.platform}」向けの投稿を作成せよ。内容: ${v.content}`
      },
      line: {
        cat: 'fun', icon: '💌', name: 'LINE教育ステップ', badge: '', desc: '5日間でファン化して販売する自動導線',
        tut: '【目的】LINE登録者に商品を自動販売するシナリオを作成します。',
        fields: [ { id: 'prod', t: 'text', l: '販売商品' }, { id: 'detail', t: 'area', l: '詳細' } ],
        build: (v) => `商品「${v.prod}」を売るLINE5日間ステップを作成せよ。詳細: ${v.detail}`
      }
    };

    const CATEGORIES = [
      { id: 'omega', name: '🔥 オメガ特級ツール (全自動)' },
      { id: 'cw', name: '💼 クラウドワークス・仕事完遂' },
      { id: 'mon', name: '📝 コンテンツ作成 ＆ 販売' },
      { id: 'sns', name: '🚀 集客 ＆ SNSアカウント設計' },
      { id: 'fun', name: '💬 ファン化 ＆ セールス自動化' }
    ];

    const DEF_UNLOCKED = ['campaign', 'note', 'cw_proposal', 'cw_seo', 'lp', 'sns', 'line', 'closing'];

    /* =========================================================================
       6. 共通UIコンポーネント (エラー回避の関数型コンポーネント)
       ========================================================================= */

    const FormInput = ({ f, val, onChange, onMagic }) => {
      const isMagic = f.magic || f.isMainMagic;
      const value = val !== undefined ? val : (f.t === 'check' ? false : (f.opts ? f.opts[0] : ''));

      const header = div({ className: 'flex justify-between items-center mb-3' },
        span({ className: 'text-[11px] font-black text-slate-400 tracking-widest uppercase' }, f.l),
        isMagic ? button({ 
          onClick: () => onMagic(f.id, !!f.isMainMagic),
          className: 'bg-gradient-to-r from-brand-accent to-red-500 text-white text-[10px] font-black px-4 py-1.5 rounded-full shadow-lg active:scale-95 transition hover:brightness-110'
        }, '✨ 魔法の杖') : null
      );

      let inputNode;
      if (f.t === 'text') {
        inputNode = input({ className: 'input-base', value: value, placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
      } else if (f.t === 'area') {
        inputNode = textarea({ className: 'input-base min-h-[120px] resize-y', value: value, placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
      } else if (f.t === 'select') {
        inputNode = select({ className: 'input-base', value: value, onChange: e => onChange(f.id, e.target.value) }, 
          f.opts.map(o => option({ key: o, value: o, className: 'bg-slate-900' }, o))
        );
      } else if (f.t === 'check') {
        inputNode = label({ className: 'flex items-center gap-3 cursor-pointer p-2 group' }, 
          div({ className: 'w-10 h-6 bg-slate-800 rounded-full relative transition border border-white/10' }, 
            div({ className: 'absolute top-1 left-1 w-4 h-4 rounded-full transition ' + (value ? 'bg-brand left-5' : 'bg-slate-500') })
          ),
          input({ type: 'checkbox', className: 'hidden', checked: !!value, onChange: e => onChange(f.id, e.target.checked) }),
          span({ className: 'text-sm font-bold text-white/80' }, '有効にする')
        );
      }

      return div({ className: 'glass-panel rounded-2xl p-6 mb-5 animate-in' }, header, inputNode);
    };

    const DataViewer = ({ data }) => {
      if (typeof data === 'string') return p({ className: 'bg-black/40 border border-white/5 rounded-xl p-6 text-sm text-slate-200 whitespace-pre-wrap leading-relaxed' }, data);
      if (Array.isArray(data)) return div(null, data.map((item, i) => div({ key: i, className: 'mb-6 pb-6 border-b border-white/5 last:border-0' }, el(DataViewer, { data: item }))));
      if (typeof data === 'object' && data !== null) {
        return div(null, Object.keys(data).map(k => div({ key: k, className: 'mb-5' },
          span({ className: 'block text-brand-light text-[11px] font-black uppercase mb-2 tracking-widest' }, k),
          el(DataViewer, { data: data[k] })
        )));
      }
      return span(null, String(data));
    };

    /* =========================================================================
       7. ツール実行エンジン
       ========================================================================= */
    const ToolCore = ({ tid, user, role, onBack }) => {
      const conf = TOOLS[tid];
      const [db, setDb] = useState(AppDB.get());
      const uData = db.users[user];
      const pid = uData.curProj;
      const [vals, setVals] = useState(uData.projects[pid].data[tid] || {});
      const [activeTab, setActiveTab] = useState('settings');
      const [copied, setCopied] = useState({});
      const [imp, setImp] = useState('');
      const [res, setRes] = useState(null);
      const [err, setErr] = useState('');

      const update = (fid, v) => {
        const nv = { ...vals, [fid]: v };
        setVals(nv);
        if (role !== 'admin') {
          const ndb = AppDB.get();
          ndb.users[user].projects[pid].data[tid] = nv;
          AppDB.save(ndb);
        }
      };

      const handleMagic = (fid, isMain) => {
        if (isMain) {
          let magicSet;
          if (tid === 'note') {
            magicSet = getRandomMagic('note');
            setVals({ ...vals, theme: magicSet.theme, target_detail: magicSet.target, benefit: magicSet.benefit, authority: magicSet.authority, price: magicSet.price, free_vol: magicSet.free, paid_vol: magicSet.paid, guarantee: magicSet.guarantee });
          } else if (tid === 'lp') {
            magicSet = getRandomMagic('lp');
            setVals({ ...vals, prod: magicSet.product, bene: magicSet.benefits });
          } else if (tid === 'cw_proposal') {
            magicSet = getRandomMagic('cw');
            setVals({ ...vals, job: magicSet.job, skill: magicSet.skill });
          } else {
            const f = conf.fields.find(x => x.id === fid);
            if(f && f.magic) update(fid, f.magic);
          }
        } else {
          const f = conf.fields.find(x => x.id === fid);
          if (f && f.magic) update(fid, f.magic);
        }
      };

      const onGenerate = () => {
        let canAccess = false;
        if (role === 'admin' || uData.perms[tid]) canAccess = true;
        else if (uData.usage.date !== new Date().toDateString() || uData.usage.count < DAILY_LIMIT) canAccess = true;

        if (!canAccess) { alert('本日の無料枠を終了しました。'); return; }

        if (role !== 'admin' && !uData.perms[tid]) {
          const ndb = AppDB.get();
          const today = new Date().toDateString();
          if (ndb.users[user].usage.date !== today) ndb.users[user].usage = { date: today, count: 0 };
          ndb.users[user].usage.count++;
          AppDB.save(ndb);
        }

        const plan = uData.brand.plan || 'free';
        const prefix = plan === 'paid' ? "【有料版AIモード（リミッター解除）】\n" : "【無料版AI節約モード】\n";
        const ctx = uData.brand.name ? `【発信者】${uData.brand.name}\n\n` : "";
        const prompt = prefix + ctx + conf.build(vals) + "\n\n【ルール】前置き不要、指定フォーマットのみ出力。";
        
        copyText(prompt, copied, setCopied, 'gen');
        if (!conf.isOnePage) setActiveTab('import');
      };

      const onImport = () => {
        setErr('');
        const parsed = safeJSONParse(imp);
        if (parsed) { setRes(parsed); setActiveTab('preview'); setImp(''); }
        else setErr("JSON形式ではありません。");
      };

      const header = div({ className: 'flex justify-between items-center mb-8 pb-6 border-b border-white/10 animate-in' },
        div({ className: 'flex items-center gap-4' },
          button({ onClick: onBack, className: 'glass-panel px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-white/10 transition' }, '← BACK'),
          div(null, h1({ className: 'text-2xl font-black text-white' }, conf.name), p({ className: 'text-xs text-brand font-bold uppercase tracking-widest mt-1' }, conf.desc))
        )
      );

      if (conf.isOnePage) {
        return div({ className: 'w-full max-w-4xl mx-auto' },
          header,
          div({ className: 'bg-brand/5 border border-brand/20 rounded-2xl p-6 mb-8' }, p({ className: 'text-sm text-brand-light font-bold' }, '💡 ' + conf.tut)),
          conf.fields.map(f => el(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic })),
          button({ onClick: onGenerate, className: 'w-full py-6 rounded-2xl btn-gradient text-white font-black text-xl shadow-xl mt-4 mb-10' }, copied.gen ? '✓ コピー完了！AIへ送信してください' : '📋 プロンプト生成 ＆ コピー'),
          div({ className: 'glass-panel rounded-3xl p-8 animate-in' },
            span({ className: 'block text-xs font-black text-slate-400 mb-4 tracking-[0.2em] uppercase' }, '📥 AIの回答を貼り付けて保存・編集'),
            textarea({ className: 'input-base min-h-[400px]', value: res || '', onChange: e => setRes(e.target.value) }),
            button({ onClick: () => copyText(res, copied, setCopied, 'ca'), className: 'w-full bg-white/10 hover:bg-white/20 py-4 rounded-xl font-bold mt-6 transition text-white' }, copied.ca ? '✓ コピーしました' : '📋 全文コピー')
          )
        );
      }

      return div({ className: 'w-full max-w-4xl mx-auto' },
        header,
        div({ className: 'flex mb-10 border-b border-white/5 gap-2 overflow-x-auto hide-scrollbar' },
          [{id:'settings', l:'⚙️ 設定'}, {id:'import', l:'📥 読込'}, {id:'preview', l:'👁 結果'}].map(t =>
            button({ key: t.id, onClick: () => setActiveTab(t.id), className: 'px-8 py-4 font-black transition-all ' + (activeTab===t.id ? 'text-brand border-b-2 border-brand' : 'text-white/30') }, t.l)
          )
        ),
        activeTab === 'settings' && div({ className: 'animate-in' },
          div({ className: 'bg-brand/5 border border-brand/20 rounded-2xl p-6 mb-8' }, p({ className: 'text-sm text-brand-light font-bold' }, '💡 ' + conf.desc)),
          conf.fields.map(f => el(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic })),
          button({ onClick: onGenerate, className: 'w-full py-6 rounded-2xl btn-gradient text-white font-black text-xl shadow-xl mt-4' }, copied.gen ? '✓ コピー完了！' : '📋 プロンプト生成 ＆ コピー')
        ),
        activeTab === 'import' && div({ className: 'glass-panel rounded-3xl p-10 animate-in' },
          span({ className: 'block text-xs font-black text-slate-400 mb-4' }, '📥 AIの回答をそのまま貼り付けてください'),
          textarea({ className: 'input-base min-h-[300px]', value: imp, onChange: e => setImp(e.target.value) }),
          err && p({ className: 'text-brand-danger text-sm font-bold mt-4' }, '❌ ' + err),
          button({ onClick: onImport, disabled: !imp.trim(), className: 'w-full bg-brand hover:bg-brand-dark py-4 rounded-xl font-black mt-8 text-white transition disabled:opacity-50' }, '解析を実行')
        ),
        activeTab === 'preview' && res && div({ className: 'glass-panel rounded-3xl p-10 animate-in' }, el(DataViewer, { data: res }))
      );
    };

    /* =========================================================================
       8. 管理者ダッシュボード
       ========================================================================= */
    const AdminDash = ({ onGoApp, onLogout }) => {
      const [db, setDb] = useState(AppDB.get());
      const [tab, setTab] = useState('users');

      const users = Object.keys(db.users).filter(k => k !== 'admin');
      
      const setVisible = (tid) => { 
        const n = AppDB.get(); 
        n.config.toolVisibility[tid] = !n.config.toolVisibility[tid]; 
        AppDB.save(n); setDb(n); 
      };
      const setStatus = (u, st) => { 
        const n = AppDB.get(); 
        n.users[u].status = st; 
        AppDB.save(n); setDb(n); 
      };

      return div({ className: 'w-full max-w-6xl mx-auto animate-in' },
        div({ className: 'flex flex-col md:flex-row justify-between items-center mb-10 gap-6 pb-6 border-b border-white/10' },
          h1({ className: 'text-3xl font-black text-white tracking-tighter' }, '🎛️ DASHBOARD'),
          div({ className: 'flex gap-3' },
            button({ onClick: onGoApp, className: 'btn-gradient text-white px-8 py-3 rounded-full font-black shadow-lg transition' }, '🚀 ツール起動'),
            button({ onClick: onLogout, className: 'bg-white/10 hover:bg-white/20 px-8 py-3 rounded-full font-black text-white/50 transition' }, 'LOGOUT')
          )
        ),
        div({ className: 'flex gap-2 overflow-x-auto mb-10 border-b border-white/5 hide-scrollbar' },
          [{id:'users', l:'👥 ユーザー'}, {id:'tools', l:'🛠 ツール表示'}].map(t =>
            button({ key: t.id, onClick: () => setTab(t.id), className: 'px-8 py-4 text-sm font-black transition-all ' + (tab===t.id ? 'border-brand text-brand border-b-2' : 'text-slate-500 border-b-2 border-transparent') }, t.l)
          )
        ),
        tab === 'tools' && div({ className: 'glass-panel rounded-[2rem] p-10 animate-in' },
          p({ className: 'text-brand-accent font-bold mb-6' }, '⚠️ チェックを外したツールはユーザー画面から非表示になります。'),
          div({ className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4' },
            Object.keys(TOOLS).map(tid => label({ key: tid, className: 'flex items-center justify-between bg-white/5 p-5 rounded-xl border border-white/5 cursor-pointer hover:bg-white/10 transition' },
              div({ className: 'flex items-center gap-3' }, span({ className: 'text-xl' }, TOOLS[tid].icon), span({ className: 'font-bold text-white' }, TOOLS[tid].name)),
              input({ type: 'checkbox', className: 'w-6 h-6 accent-brand', checked: db.config.toolVisibility[tid] !== false, onChange: () => setVisible(tid) })
            ))
          )
        ),
        tab === 'users' && div({ className: 'glass-panel rounded-[2rem] overflow-hidden animate-in' },
          el('table', { className: 'w-full text-left' },
            el('thead', { className: 'bg-white/5' }, el('tr', null, ['ユーザー名', '状態', '操作'].map(th => el('th', { key: th, className: 'p-6 text-[10px] font-black text-slate-500 uppercase' }, th)))),
            el('tbody', { className: 'divide-y divide-white/5' }, users.map(k => el('tr', { key: k, className: 'hover:bg-white/5 transition' },
              el('td', { className: 'p-6 font-bold text-white' }, k),
              el('td', { className: 'p-6' }, span({ className: 'px-3 py-1 rounded-full text-[10px] font-black ' + (db.users[k].status==='approved'?'bg-brand-success/20 text-brand-success':'bg-brand-danger/20 text-brand-danger') }, db.users[k].status.toUpperCase())),
              el('td', { className: 'p-6 flex gap-3' },
                db.users[k].status !== 'approved' ? button({ onClick: () => setStatus(k, 'approved'), className: 'text-brand-success font-black text-xs' }, '許可') : null,
                button({ onClick: () => setStatus(k, 'rejected'), className: 'text-brand-danger font-black text-xs' }, 'BAN')
              )
            )))
          )
        ),
        div({ className: 'mt-20 text-center opacity-50' }, p({ className: 'text-[10px] font-black text-brand-gold tracking-[0.4em] uppercase' }, 'System Version: ' + SYS_VERSION))
      );
    };

    /* =========================================================================
       9. ユーザーダッシュボード
       ========================================================================= */
    const MainApp = (props) => {
      const [screen, setScreen] = useState('home');
      const db = AppDB.get();
      const uData = db.users[props.user];

      if (TOOLS[screen]) return el(ToolCore, { tid: screen, user: props.user, role: props.role, onBack: () => setScreen('home') });

      const usage = (uData.usage.date === new Date().toDateString()) ? uData.usage.count : 0;

      return div({ className: 'w-full animate-in' },
        div({ className: 'absolute top-4 right-4 md:top-8 md:right-8 z-50 flex flex-wrap gap-3 justify-end' },
          props.role === 'admin' ? button({ onClick: props.onGoAdmin, className: 'bg-brand-accent text-white px-6 py-2.5 rounded-full text-[10px] font-black shadow-lg shadow-brand-accent/30 active:scale-95' }, '🎛️ DASHBOARD') : null,
          div({ className: 'glass-panel px-6 py-2.5 rounded-full text-[10px] font-black text-white/50 border-white/10' }, 'LIMIT: ' + usage + '/' + DAILY_LIMIT),
          button({ onClick: props.onLogout, className: 'bg-white/5 hover:bg-white/10 px-6 py-2.5 rounded-full text-[10px] font-black text-white/50 transition' }, 'LOGOUT')
        ),
        div({ className: 'text-center mt-20 mb-28 px-4' },
          div({ className: 'inline-block glass-panel px-6 py-2 rounded-full mb-10' }, span({ className: 'text-brand text-[10px] font-black tracking-[0.4em] uppercase' }, 'AI Content Pro Stable')),
          h1({ className: 'text-5xl md:text-7xl font-black tracking-tighter mb-8 leading-tight text-white' }, 'Content ', span({ className: 'text-brand' }, 'Master')),
          p({ className: 'text-slate-400 text-base max-w-2xl mx-auto leading-relaxed' }, 'クラウドワークスから独自のコンテンツ販売まで、すべてを完全自動化。')
        ),
        CATEGORIES.map(cat => {
          const visible = Object.keys(TOOLS).filter(k => TOOLS[k].cat === cat.id && db.config.toolVisibility[k] !== false);
          if (visible.length === 0) return null;
          return div({ key: cat.id, className: 'mb-20 max-w-6xl mx-auto px-4' },
            h2({ className: 'text-xl font-black text-white mb-10 flex items-center gap-4' }, div({ className: 'w-2 h-8 bg-brand rounded-full' }), cat.name),
            div({ className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' },
              visible.map(tid => {
                const t = TOOLS[tid];
                const can = DEF_UNLOCKED.includes(tid) || props.role === 'admin' || uData.perms[tid];
                return div({ key: tid, onClick: () => { if(can) setScreen(tid); else alert('🔒 ロックされています'); }, className: 'glass-panel rounded-[2rem] p-8 transition duration-300 hover:-translate-y-2 hover:border-brand/40 cursor-pointer relative overflow-hidden group ' + (can ? '' : 'opacity-50 grayscale') },
                  div({ className: 'flex justify-between items-start mb-8' },
                    div({ className: 'text-5xl group-hover:scale-110 transition' }, t.icon),
                    t.badge ? span({ className: 'bg-brand/10 text-brand text-[10px] font-black px-3 py-1.5 rounded-lg border border-brand/20' }, t.badge) : null
                  ),
                  h3({ className: 'text-xl font-black mb-3 text-white/90 group-hover:text-white transition' }, t.name),
                  p({ className: 'text-sm text-slate-500' }, t.desc)
                );
              })
            )
          );
        })
      );
    };

    /* =========================================================================
       10. ログインUI (中央配置のシンプルボックス / 完全復旧)
       ========================================================================= */
    const AuthBox = ({ onLogin }) => {
      const [u, setU] = useState('');
      const [pStr, setP] = useState('');
      const [isL, setIsL] = useState(true);
      const [err, setErr] = useState('');

      const login = () => {
        setErr('');
        const name = u.trim();
        if (!name) return setErr('ユーザー名を入力してください');
        
        const db = AppDB.get();
        if (name === db.config.adminU) {
          if (pStr === db.config.adminP) {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: name, r: 'admin' }));
            onLogin(name, 'admin');
          } else setErr('パスワードが違います');
          return;
        }

        if (isL) {
          if (db.users[name]) {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: name, r: db.users[name].status }));
            onLogin(name, db.users[name].status);
          } else setErr('未登録です。新規申請してください。');
        } else {
          if (db.users[name]) return setErr('既に登録されています。');
          db.users[name] = { status: 'pending', registeredAt: Date.now(), usage: { count: 0, date: '' }, perms: {}, projects: { 'default': { name: 'デフォルト', data: {} } }, curProj: 'default', brand: { plan: 'free', name: '' } };
          AppDB.save(db);
          alert('申請が完了しました。承認をお待ちください。');
          setIsL(true);
        }
      };

      return div({ className: 'w-full max-w-md mx-auto mt-32 animate-in px-4' },
        div({ className: 'glass-panel rounded-[2.5rem] p-10 md:p-12 shadow-2xl text-center relative overflow-hidden' },
          h2({ className: 'text-3xl font-black mb-12 tracking-tight text-white' }, 'AI Content Pro'),
          div({ className: 'flex bg-black/40 p-1.5 rounded-xl mb-8' },
            button({ onClick: () => { setIsL(true); setErr(''); }, className: 'flex-1 py-3 rounded-lg text-sm font-bold transition ' + (isL ? 'bg-brand text-white' : 'text-white/50') }, 'ログイン'),
            button({ onClick: () => { setIsL(false); setErr(''); }, className: 'flex-1 py-3 rounded-lg text-sm font-bold transition ' + (!isL ? 'bg-brand text-white' : 'text-white/50') }, '新規申請')
          ),
          div({ className: 'space-y-5' },
            input({ className: 'input-base text-center', placeholder: 'USER NAME', value: u, onChange: e => setU(e.target.value) }),
            input({ className: 'input-base text-center', type: 'password', placeholder: 'PASSWORD', value: pStr, onChange: e => setP(e.target.value) }),
            err ? p({ className: 'text-brand-danger text-xs font-bold' }, '❌ ' + err) : null,
            button({ onClick: login, className: 'w-full btn-gradient py-4 rounded-2xl text-white font-black text-lg shadow-xl mt-4' }, isL ? 'LOGIN' : 'APPLY')
          )
        )
      );
    };

    /* =========================================================================
       11. 承認待ち・拒否画面
       ========================================================================= */
    const PendingScreen = ({ role, onLogout }) => {
      const check = () => window.location.reload();
      return div({ className: "min-h-screen flex items-center justify-center p-6 animate-in" },
        div({ className: "glass-panel p-10 rounded-3xl max-w-md w-full text-center" },
          h2({ className: "text-3xl font-black mb-6 text-white" }, role === 'rejected' ? '🚫 アクセス拒否' : '⏳ 承認待ち'),
          p({ className: "text-slate-400 mb-8" }, role === 'rejected' ? '管理者に制限されています。' : '管理者の許可をお待ちください。'),
          button({ onClick: check, className: "w-full btn-gradient py-4 rounded-2xl text-white font-black mb-4 shadow-xl" }, 'ステータスを更新'),
          button({ onClick: onLogout, className: "w-full text-slate-500 font-bold hover:text-white transition" }, 'ログアウト')
        )
      );
    };

    /* =========================================================================
       12. Root マウント
       ========================================================================= */
    const App = () => {
      const [auth, setAuth] = useState({ u: null, r: null });
      const [goAdmin, setGoAdmin] = useState(false);

      useEffect(() => {
        const session = localStorage.getItem(SESS_KEY);
        if (session) setAuth(JSON.parse(session));
      }, []);

      const onLogout = () => {
        localStorage.removeItem(SESS_KEY);
        setAuth({ u: null, r: null });
        setGoAdmin(false);
      };

      if (!auth.u) return el(AuthBox, { onLogin: (u, r) => setAuth({ u, r }) });
      if (auth.r === 'admin' && goAdmin) return el(AdminDash, { onGoApp: () => setGoAdmin(false), onLogout: onLogout });
      if (auth.r === 'pending' || auth.r === 'rejected') return el(PendingScreen, { role: auth.r, onLogout: onLogout });
      
      return el(MainApp, { user: auth.u, role: auth.r, onLogout: onLogout, onGoAdmin: () => setGoAdmin(true) });
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    // ErrorBoundary でラップし、アプリ全体のクラッシュを完全に防ぐ
    root.render(el(ErrorBoundary, null, el(App)));

  })();
  </script>
</body>
</html>
