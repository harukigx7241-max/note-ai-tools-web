<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>note AI Tools</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#0d0d1a;color:#fff;min-height:100vh}
button,input,textarea,select{font-family:inherit}

/* LANDING */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 16px 60px;position:relative;overflow-x:hidden;background:linear-gradient(135deg,#0d0d1a 0%,#1a0a2e 50%,#0a1628 100%)}
.landing-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.landing-badge{position:relative;z-index:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:6px 18px;font-size:11px;font-weight:700;letter-spacing:.15em;color:rgba(255,255,255,.7);margin-bottom:28px}
.landing-title{position:relative;z-index:1;font-size:clamp(52px,10vw,88px);font-weight:900;line-height:1;text-align:center;margin-bottom:20px}
.landing-title span{color:#e94560}
.landing-sub{position:relative;z-index:1;font-size:15px;color:rgba(255,255,255,.5);text-align:center;line-height:1.8;margin-bottom:28px}
.ai-badges{position:relative;z-index:1;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:40px}
.ai-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:6px 14px;font-size:13px;font-weight:600}
.ai-dot{width:8px;height:8px;border-radius:50%}

/* TOOL CARDS */
.tool-cards-landing{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;width:100%;max-width:860px;margin-bottom:36px}
.tool-card-landing{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:24px 20px;cursor:pointer;transition:all .2s;text-align:left}
.tool-card-landing:hover{background:rgba(255,255,255,.08);border-color:rgba(233,69,96,.4);transform:translateY(-2px)}
.tool-card-icon{font-size:30px;margin-bottom:10px}
.tool-card-name{font-size:15px;font-weight:800;color:#fff;margin-bottom:6px}
.tool-card-desc{font-size:12px;color:rgba(255,255,255,.4);line-height:1.6}

/* THEME PROPOSAL */
.theme-section{position:relative;z-index:1;width:100%;max-width:860px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px;margin-bottom:28px}
.section-label{font-size:11px;font-weight:800;color:rgba(255,255,255,.45);letter-spacing:.1em;margin-bottom:14px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;justify-content:center}
.chip{padding:7px 14px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s}
.chip:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.chip.on{background:rgba(233,69,96,.2);border-color:rgba(233,69,96,.6);color:#fff}
.chip.age-on{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.6);color:#fff}
.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;margin-bottom:16px}
.theme-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.8);line-height:1.5;text-align:left}
.theme-card:hover{background:rgba(255,255,255,.08);border-color:rgba(233,69,96,.35)}
.theme-card.on{background:rgba(233,69,96,.12);border-color:rgba(233,69,96,.6)}
.theme-num{font-size:11px;font-weight:800;color:rgba(255,255,255,.25);min-width:18px}
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.sw-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:9px 11px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.65);margin-bottom:6px;transition:all .12s;line-height:1.5}
.sw-item:hover{background:rgba(255,255,255,.08)}
.sw-item.sit-on{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.5);color:#fff}
.sw-item.wry-on{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.4);color:#fff}
.sw-col-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);margin-bottom:8px}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-back{padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.55);font-size:13px;cursor:pointer}
.btn-reload{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.btn-decide{padding:11px 26px;border-radius:10px;background:linear-gradient(135deg,#e94560,#c2185b);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(233,69,96,.4)}
.btn-decide:disabled{opacity:.4;cursor:not-allowed}
.btn-start{width:100%;padding:15px;border-radius:12px;background:linear-gradient(135deg,#e94560,#c2185b);border:none;color:#fff;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 5px 20px rgba(233,69,96,.4)}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{text-align:center;padding:20px;color:rgba(255,255,255,.4);font-size:13px}

/* CONTACT */
.contact-box{position:relative;z-index:1;width:100%;max-width:600px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:28px 24px;margin-bottom:28px}
.contact-input{width:100%;padding:11px 13px;margin-bottom:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;font-size:14px;outline:none;font-family:inherit}
.contact-input:focus{border-color:rgba(233,69,96,.5)}
.contact-textarea{resize:vertical;min-height:110px}
.btn-send{width:100%;padding:13px;border-radius:9px;background:linear-gradient(135deg,#e94560,#c2185b);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer}

/* APP WRAP */
.app-wrap{min-height:100vh;background:linear-gradient(135deg,#0d0d1a 0%,#1a0a2e 50%,#0a1628 100%)}
.app-header{background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.07);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
.app-header-left{display:flex;align-items:center;gap:10px}
.back-btn{padding:7px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.app-title{font-size:17px;font-weight:900;color:#fff;margin:0}
.app-sub{font-size:11px;color:rgba(255,255,255,.35);margin:2px 0 0}
.key-btn{padding:8px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.app-body{max-width:760px;margin:0 auto;padding:20px 14px}
.app-badge{background:linear-gradient(135deg,#e94560,#c2185b);border-radius:6px;padding:3px 9px;font-size:10px;font-weight:800;letter-spacing:.08em}

/* TABS */
.dark-tabs{background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);display:flex;overflow-x:auto}
.tab-btn{padding:12px 18px;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.35);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-btn.on{color:#fff;border-bottom-color:#e94560}
.tab-btn:disabled{opacity:.25;cursor:not-allowed}

/* CARD */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.lbl{color:rgba(255,255,255,.55);font-size:11px;font-weight:700;letter-spacing:.1em;display:block;margin-bottom:12px}
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;font-size:14px;outline:none;padding:11px 13px;font-family:inherit}
.inp:focus{border-color:rgba(233,69,96,.5)}
.hint{font-size:11px;color:rgba(255,255,255,.28);margin-top:6px}
.pill{padding:6px 13px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s}
.pill.on{background:rgba(233,69,96,.2);border-color:rgba(233,69,96,.5);color:#fff}
.pill-row{display:flex;flex-wrap:wrap;gap:7px}

/* GENERATE BTN */
.gen-btn{width:100%;border-radius:13px;border:none;cursor:pointer;position:relative;overflow:hidden;transition:opacity .15s}
.gen-btn:disabled{opacity:.6;cursor:not-allowed}
.gen-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(233,69,96,.35);transition:width .5s}
.gen-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);border-radius:13px}
.gen-inner{position:relative;z-index:2;padding:18px 24px;display:flex;flex-direction:column;align-items:center;gap:6px}

/* WARN */
.warn{background:rgba(255,180,0,.09);border:1px solid rgba(255,180,0,.3);border-radius:10px;padding:12px 14px;font-size:12px;color:#fcd34d;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.err{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 14px;font-size:13px;color:#f87171;margin-bottom:12px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#1a1a2e;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:28px 24px;width:100%;max-width:420px}

/* PREVIEW */
.preview-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.4)}
.preview-free-hd{background:#f0fdf4;border-bottom:2px solid #86efac;padding:8px 20px}
.preview-paid-wall{background:linear-gradient(135deg,#1a1a2e,#0f3460);margin:0 20px 20px;border-radius:12px;padding:28px 20px;text-align:center;color:#fff}
.preview-price-tag{background:linear-gradient(135deg,#e94560,#c2185b);display:inline-block;border-radius:50px;padding:9px 28px;font-size:15px;font-weight:800}
.copy-btn{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s}

/* RANGE */
input[type=range]{accent-color:#e94560;width:100%}

/* POST TAB */
.post-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;margin-bottom:10px}
.post-card-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.post-card-body{padding:12px 16px;max-height:110px;overflow-y:auto;font-size:13px;color:rgba(255,255,255,.5);white-space:pre-wrap;line-height:1.7}

/* NOTE OPEN BTN */
.note-open-btn{display:block;text-align:center;background:linear-gradient(135deg,#41c9b4,#0ea5e9);color:#fff;text-decoration:none;padding:13px;border-radius:12px;font-size:14px;font-weight:800;margin-top:6px}

/* BONUS */
.bonus-result{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.bonus-check{display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:8px}

/* AI SELECTOR */
.ai-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ai-card{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:11px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s}
.ai-card.on{border-color:currentColor;background:rgba(255,255,255,.1)}
.ai-card-icon{font-size:22px;margin-bottom:5px}
.ai-card-name{font-size:11px;font-weight:700}
.ai-card-status{font-size:10px;margin-top:3px}

/* RESPONSIVE */
@media(max-width:560px){
.landing-title{font-size:48px}
.sw-grid{grid-template-columns:1fr}
.ai-grid{grid-template-columns:repeat(2,1fr)}
.tool-cards-landing{grid-template-columns:repeat(2,1fr)}
.theme-grid{grid-template-columns:1fr}
.app-title{font-size:14px}
.tool-card-desc{display:none}
}
</style>

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

/* ── レスポンシブ ── */
function useIsMobile(){
const [m,setM] = useState(window.innerWidth<=520);
useEffect(()=>{
const h=()=>setM(window.innerWidth<=520);
window.addEventListener(‘resize’,h);
return ()=>window.removeEventListener(‘resize’,h);
},[]);
return m;
}

/* ── 定数 ── */
const AI_LIST = [
{id:‘claude’,  label:‘Claude’,  color:’#e07b39’, icon:‘🟠’},
{id:‘gemini’,  label:‘Gemini’,  color:’#4285f4’, icon:‘🔵’},
{id:‘chatgpt’, label:‘ChatGPT’, color:’#10a37f’, icon:‘🟢’},
{id:‘grok’,    label:‘Grok’,    color:’#6b7280’, icon:‘⚫’},
];
const KEY_STORE = ‘noteAiKeys_v2’;
const loadKeys = ()=>{ try{return JSON.parse(localStorage.getItem(KEY_STORE)||’{}’)}catch{return {}} };
const saveKey  = (id,v)=>{ const k=loadKeys(); k[id]=v; localStorage.setItem(KEY_STORE,JSON.stringify(k)); };
const getKey   = id => loadKeys()[id]||’’;

/* ── API呼び出し ── */
async function callClaude(msgs,sys,max){
const key=getKey(‘claude’); if(!key) throw new Error(‘Claude APIキー未設定’);
const body={model:‘claude-sonnet-4-20250514’,max_tokens:max,messages:msgs};
if(sys) body.system=sys;
const r=await fetch(‘https://api.anthropic.com/v1/messages’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’,‘x-api-key’:key,‘anthropic-version’:‘2023-06-01’,‘anthropic-dangerous-direct-browser-access’:‘true’},
body:JSON.stringify(body)
});
if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error((e.error&&e.error.message)||‘Claude APIエラー ‘+r.status);}
const d=await r.json();
return d.content.filter(c=>c.type===‘text’).map(c=>c.text).join(’’);
}

async function callGemini(msgs,sys,max){
const key=getKey(‘gemini’); if(!key) throw new Error(‘Gemini APIキー未設定’);
const models=[‘gemini-2.5-pro-exp-03-25’,‘gemini-2.0-flash’,‘gemini-1.5-flash’];
const contents=msgs.map(m=>({role:m.role===‘assistant’?‘model’:‘user’,parts:[{text:m.content}]}));
const body={contents,generationConfig:{maxOutputTokens:max}};
if(sys) body.systemInstruction={parts:[{text:sys}]};
async function tryModel(i){
if(i>=models.length) throw new Error(‘Gemini 全モデル失敗’);
const r=await fetch(‘https://generativelanguage.googleapis.com/v1beta/models/’+models[i]+’:generateContent?key=’+key,{
method:‘POST’,headers:{‘Content-Type’:‘application/json’},body:JSON.stringify(body)
});
if(!r.ok){ if(r.status===404||r.status===429) return tryModel(i+1); const e=await r.json().catch(()=>({})); throw new Error((e.error&&e.error.message)||‘Gemini APIエラー’); }
const d=await r.json();
return ((d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts)||[]).map(p=>p.text||’’).join(’’);
}
return tryModel(0);
}

async function callChatGPT(msgs,sys,max){
const key=getKey(‘chatgpt’); if(!key) throw new Error(‘ChatGPT APIキー未設定’);
const messages=sys?[{role:‘system’,content:sys},…msgs]:[…msgs];
const r=await fetch(‘https://api.openai.com/v1/chat/completions’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’,‘Authorization’:’Bearer ’+key},
body:JSON.stringify({model:‘gpt-4o’,max_tokens:max,messages})
});
if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error((e.error&&e.error.message)||‘ChatGPT APIエラー ‘+r.status);}
const d=await r.json();
return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||’’;
}

async function callGrok(msgs,sys,max){
const key=getKey(‘grok’); if(!key) throw new Error(‘Grok APIキー未設定’);
const models=[‘grok-3’,‘grok-2’];
const messages=sys?[{role:‘system’,content:sys},…msgs]:[…msgs];
async function tryModel(i){
if(i>=models.length) throw new Error(‘Grok 全モデル失敗’);
const r=await fetch(‘https://api.x.ai/v1/chat/completions’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’,‘Authorization’:‘Bearer ‘+key},
body:JSON.stringify({model:models[i],max_tokens:max,messages})
});
if(!r.ok){ if(r.status===404) return tryModel(i+1); const e=await r.json().catch(()=>({})); throw new Error((e.error&&e.error.message)||‘Grok APIエラー’); }
const d=await r.json();
return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||’’;
}
return tryModel(0);
}

function callAI(aiId,msgs,sys,max){
if(aiId===‘claude’)  return callClaude(msgs,sys,max);
if(aiId===‘gemini’)  return callGemini(msgs,sys,max);
if(aiId===‘chatgpt’) return callChatGPT(msgs,sys,max);
if(aiId===‘grok’)    return callGrok(msgs,sys,max);
throw new Error(’不明なAI: ’+aiId);
}

/* ── 管理者統計（軽量版） ── */
const ADM_CFG = ‘noteAiAdminConfig_v1’;
const ADM_QUE = ‘noteAiAdminQueue_v1’;
const loadCfg = ()=>{ try{return JSON.parse(localStorage.getItem(ADM_CFG)||’{}’)}catch{return {}} };
let _flushing=false;

function enqueueEvent(type,payload){
try{
const q=JSON.parse(localStorage.getItem(ADM_QUE)||’[]’);
q.push({type,payload,time:new Date().toISOString()});
localStorage.setItem(ADM_QUE,JSON.stringify(q.slice(-100)));
}catch{}
setTimeout(flushQueue,300);
}

async function flushQueue(){
if(_flushing) return;
const cfg=loadCfg();
if(!cfg.pat||!cfg.owner||!cfg.repo) return;
_flushing=true;
try{
const q=JSON.parse(localStorage.getItem(ADM_QUE)||’[]’);
if(!q.length){_flushing=false;return;}
const path=cfg.path||‘data.json’;
const url=‘https://api.github.com/repos/’+cfg.owner+’/’+cfg.repo+’/contents/’+path;
const hd={‘Authorization’:‘Bearer ‘+cfg.pat,‘Accept’:‘application/vnd.github+json’};
const gr=await fetch(url,{headers:hd});
let stats={totalAccess:0,totalGenerate:0,lastAccess:null,byTool:{},byAi:{},byTheme:{},dailyAccess:{},history:[]};
let sha=null;
if(gr.ok){const gd=await gr.json();stats=JSON.parse(atob(gd.content.replace(/\n/g,’’)));sha=gd.sha;}
q.forEach(ev=>{
if(ev.type===‘access’){
stats.totalAccess=(stats.totalAccess||0)+1;
stats.lastAccess=ev.time;
const day=ev.time.slice(0,10);
stats.dailyAccess=stats.dailyAccess||{};
stats.dailyAccess[day]=(stats.dailyAccess[day]||0)+1;
const days=Object.keys(stats.dailyAccess).sort();
if(days.length>60) days.slice(0,days.length-60).forEach(k=>delete stats.dailyAccess[k]);
} else if(ev.type===‘generate’){
stats.totalGenerate=(stats.totalGenerate||0)+1;
stats.byAi=stats.byAi||{};stats.byAi[ev.payload.ai]=(stats.byAi[ev.payload.ai]||0)+1;
stats.byTool=stats.byTool||{};stats.byTool[ev.payload.tool]=(stats.byTool[ev.payload.tool]||0)+1;
if(ev.payload.theme){stats.byTheme=stats.byTheme||{};stats.byTheme[ev.payload.theme]=(stats.byTheme[ev.payload.theme]||0)+1;}
stats.history=stats.history||[];
stats.history.unshift({time:ev.time,ai:ev.payload.ai,tool:ev.payload.tool,theme:ev.payload.theme||’’});
if(stats.history.length>100) stats.history=stats.history.slice(0,100);
}
});

function buildPrompt({theme,topic,tone,price,freeWC,paidWC,age,situation,worry}){

}[age]||’’;

async function readFileText(file){
if(!file) return ‘’;
if(file.name.toLowerCase().endsWith(’.docx’)&&typeof mammoth!==‘undefined’){
const buf=await file.arrayBuffer();
const res=await mammoth.extractRawText({arrayBuffer:buf});
return res.value;
}
return new Promise((res,rej)=>{
const r=new FileReader();
r.onload=e=>res(e.target.result);
r.onerror=rej;
r.readAsText(file,‘utf-8’);
});
}

function genThemes(gid,prev){
const ai=getBestAi();
const gl=(GENRES.find(g=>g.id===gid)||{}).label||gid;
const clean=gl.replace(/[^\u3040-\u30FF\u4E00-\u9FFF\uFF00-\uFFEFa-zA-Z\s]/g,’’).trim();
setThLoading(true);setThemes([]);setThIdx(-1);
if(!ai){setThemes(FB_THEMES[gid]||FB_THEMES.other);setThLoading(false);return;}
const exclude=prev&&prev.length>0?’\n以下のテーマは除外:\n’+prev.slice(-20).join(’\n’):’’;
const prompt=‘note有料記事のテーマを10個生成してください。\nジャンル: ‘+clean+’\n条件: 購入したくなる魅力的なタイトル（25〜40文字）、読者の悩みを解決する具体的な内容’+exclude+’\n出力形式（JSONのみ）:\n{“themes”:[“テーマ1”,“テーマ2”,“テーマ3”,“テーマ4”,“テーマ5”,“テーマ6”,“テーマ7”,“テーマ8”,“テーマ9”,“テーマ10”]}’;
callAI(ai,[{role:‘user’,content:prompt}],null,600)
.then(res=>{
try{
const m=res.replace(/`json/g,'').replace(/`/g,’’).trim().match(/{[\s\S]*}/);
const p=JSON.parse(m?m[0]:res);
const arr=Array.isArray(p.themes)?p.themes.slice(0,10):[];
setThemes(arr.length>=5?arr:(FB_THEMES[gid]||FB_THEMES.other));
}catch{setThemes(FB_THEMES[gid]||FB_THEMES.other);}
setThLoading(false);
})
.catch(()=>{setThemes(FB_THEMES[gid]||FB_THEMES.other);setThLoading(false);});
}

function genSitWorry(gid,aid){
const ai=getBestAi();
const gl=(GENRES.find(g=>g.id===gid)||{}).label||gid;
const al=(AGES.find(a=>a.id===aid)||{}).label||aid;
const clean=gl.replace(/[^\u3040-\u30FF\u4E00-\u9FFF\uFF00-\uFFEFa-zA-Z\s]/g,’’).trim();
setSwLoading(true);setSugSit([]);setSugWorry([]);setSelSit(-1);setSelWry(-1);
if(!ai){setSugSit(FB_SIT[gid]||FB_SIT.other);setSugWorry(FB_WORRY[gid]||FB_WORRY.other);setSwLoading(false);return;}
const prompt=‘note記事のターゲット読者の「状況」と「悩み」を5件ずつ生成してください。\nジャンル: ‘+clean+’ / 年齢: ‘+al+’\n出力形式（JSONのみ）:\n{“situations”:[“状況1”,“状況2”,“状況3”,“状況4”,“状況5”],“worries”:[“悩み1”,“悩み2”,“悩み3”,“悩み4”,“悩み5”]}’;
callAI(ai,[{role:‘user’,content:prompt}],null,600)
.then(res=>{
try{
const m=res.replace(/`json/g,'').replace(/`/g,’’).trim().match(/{[\s\S]*}/);
const p=JSON.parse(m?m[0]:res);
const sits=Array.isArray(p.situations)?p.situations.slice(0,5):[];
const wrys=Array.isArray(p.worries)?p.worries.slice(0,5):[];
setSugSit(sits.length>=3?sits:(FB_SIT[gid]||FB_SIT.other));
setSugWorry(wrys.length>=3?wrys:(FB_WORRY[gid]||FB_WORRY.other));
}catch{setSugSit(FB_SIT[gid]||FB_SIT.other);setSugWorry(FB_WORRY[gid]||FB_WORRY.other);}
setSwLoading(false);
})
.catch(()=>{setSugSit(FB_SIT[gid]||FB_SIT.other);setSugWorry(FB_WORRY[gid]||FB_WORRY.other);setSwLoading(false);});
}
