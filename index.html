    document.addEventListener('keydown', e => {

         (e.ctrlKey && ['U', 'u', 'S', 's'].includes(e.key))) {

    /* =========================================================================
       3. Error Boundary
       ========================================================================= */
    class ErrorBoundary extends Component {
      constructor(props) { super(props); this.state = { hasError: false, errorInfo: null, stack: null }; }
      static getDerivedStateFromError(error) { return { hasError: true }; }
      componentDidCatch(error, errorInfo) { 
        this.setState({ errorInfo: error.toString(), stack: errorInfo.componentStack }); 
        logError('React ErrorBoundary', error.toString(), errorInfo.componentStack);
      }

    };

      if (el) {
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(el);
        selection.removeAllRanges();
        selection.addRange(range);
        try {
          document.execCommand('copy');
          setState(prev => ({ ...prev, [key]: true }));
          setTimeout(() => setState(prev => ({ ...prev, [key]: false })), 2000);

    const renderMarkdown = (text) => {
      if (!text) return { __html: '' };
      let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html = html.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      html = html.replace(/^\- (.*$)/gim, '<ul><li>$1</li></ul>');
      html = html.replace(/<\/ul>\n*<ul>/gim, '');
      html = html.replace(/\n/g, '<br/>');
      html = html.replace(/【(.*?)】/g, '<strong style="color:#0ea5e9;">【$1】</strong>');
      return { __html: html };
    };

      if (!text) return { title: '', free: '', paid: '', tags: '', url: '', toc: '' };
      let title = '', free = '', paid = '', tags = '', url = '';
      
      const titleMatch = text.match(/【タイトル】\n([\s\S]*?)(?=【無料エリア】|$)/);

            tocLines.push(indent + heading);
          }
        });
        return tocLines.join('\n');

        build: (v) => `# 指示\nあなたはDRM（ダイレクト・レスポンス・マーケティング）の達人です。\n以下の【商品情報】を販売するために、公式LINE登録者を5日間かけて教育し、最終日に販売へ繋げる「ステップ配信」のシナリオとメッセージ本文を作成してください。\n\n# 商品情報\n- 販売商品: ${v.prod}\n- 商品の詳細: ${v.detail}\n\n# 条件\n- 売り込み感を出さず、価値提供と信頼構築を先行させること。\n- 日が進むにつれて「自分にも必要だ」というパラダイムシフトを起こす構成にすること。\n\n# 出力フォーマット\n1日目〜5日目までの「配信の目的」と「メッセージ本文」を出力してください。`, isOnePage: true },
      
      funnel: { cat: 'fun', icon: '📉', name: 'ファネル診断コンサル', desc: '売上が上がらない原因を数字から特定',
        manual: '**【ツールの目的】**\n各プロセスの数字を入れると、AIが離脱の原因（ボトルネック）を特定し、改善策を出します。',
        fields: [ { id: 'num', t: 'area', l: '各工程の数字（インプレッション等）', ph: '例:\n・Xのインプレッション: 100,000\n・LPへのクリック: 100\n・商品購入: 0' } ],
        build: (v) => `# 指示\nあなたはデータ分析に強い凄腕のマーケティングコンサルタントです。\n以下の【ファネルの数字】を分析し、どこに致命的なボトルネック（離脱ポイント）があるかを特定し、具体的な改善策を提案してください。\n\n# ファネルの数字\n${v.num}\n\n# 出力フォーマット\n1. ボトルネックの特定（なぜ売上が上がっていないか）\n2. CVR（遷移率・成約率）の評価\n3. 今すぐ実行すべき具体的な改善アクション（3つ）`, isOnePage: true },
      
      reply: { cat: 'fun', icon: '✨', name: 'LINE/DM 神返信', desc: '読者の心を掴む完璧な返信文を作成',
        manual: '**【ツールの目的】**\n問い合わせや相談に対して、相手に寄り添いながら信頼関係を構築し、商品への興味を高める「完璧な返信文」を作成します。',
        fields: [ { id: 'msg', t: 'area', l: '相手のメッセージ', ph: '例: 教材に興味があるのですが、パソコン初心者でも大丈夫でしょうか？' } ],
        build: (v) => `# 指示\nあなたはカスタマーサクセスとクロージングのプロです。\n見込み客から送られてきた以下の【メッセージ】に対し、信頼関係を構築しつつ、最終的な行動（商品購入やアポ獲得）へ誘導する完璧な返信文を作成してください。\n\n# 相手のメッセージ\n${v.msg}\n\n# 条件\n- 相手の不安や状況に深く共感すること。\n- 押し売り感を出さず、「あなたのための提案」として自然に誘導すること。\n\n# 出力フォーマット\nトーン（熱量や距離感）の異なる3パターンの返信文を出力してください。`, isOnePage: true },
      
      interview: { cat: 'fun', icon: '🎤', name: 'AIインタビュー', desc: 'AIの質問に答えて一次情報を抽出',
        manual: '**【ツールの目的】**\n「何を書けばいいかわからない」時に、AIが記者となってあなたにインタビューを行います。',
        fields: [ { id: 'theme', t: 'text', l: 'テーマ', ph: '例: 挫折しない英語学習法について' } ],
        build: (v) => `# 指示\nあなたはプロの編集者・インタビュアーです。\n私（ユーザー）から【テーマ】に関する独自の経験や一次情報を引き出し、最終的に高品質な記事を書き上げるためのインタビューを行ってください。\n\n# テーマ\n${v.theme}\n\n# 条件・ルール\n- 一度に全ての質問をせず、必ず「1問ずつ」質問してください。\n- 私が答えたら、その回答を深堀りする質問か、次の質問に移ってください。`, isOnePage: true },
      
      journey: { cat: 'fun', icon: '🗺️', name: 'カスタマージャーニー', desc: '認知から購入までの戦略マップを作成',
        manual: '**【ツールの目的】**\nターゲットが商品を購入するまでの「心理と行動の変化」をマップ化して戦略を明確にします。',
        fields: [ 
          { id: 'tgt', t: 'text', l: 'ターゲット', ph: '例: 婚活に疲れた30代女性' }, 
          { id: 'prod', t: 'text', l: '商品', ph: '例: パーソナル婚活コンサルティング' } 
        ],
        build: (v) => `# 指示\nあなたはマーケティング戦略家です。\n【ターゲット】が【商品】を認知し、興味を持ち、比較検討し、購入に至るまでの心理と行動のプロセスを「カスタマージャーニーマップ」として作成してください。\n\n# 入力情報\n- ターゲット: ${v.tgt}\n- 商品・サービス: ${v.prod}\n\n# 出力フォーマット\n以下の各フェーズについて「顧客の行動」「顧客の思考・感情」「企業側が提供すべきコンテンツ・施策」をMarkdownで出力してください。\n1. 認知（課題への気付き）\n2. 情報収集・興味関心\n3. 比較・検討\n4. 決断・購入`, isOnePage: true },
      
      webdev: { cat: 'fun', icon: '💻', name: 'Webアプリ開発支援', desc: 'アイデアからWebツールの要件定義とHTML構成',
        manual: '**【ツールの目的】**\nアイデアを文字にするだけで、AIがプログラミングの要件定義と構成コードを作成します。',
        fields: [ { id: 'idea', t: 'area', l: '作りたいツール案', ph: '例: 食材を入力すると、AIがレシピを提案してくれるWebアプリ' } ],
        build: (v) => `# 指示\nあなたはフルスタックの天才エンジニアであり、プロダクトマネージャーです。\nユーザーの【ツール案】を実現するための、要件定義と1枚のHTML（JavaScript, CSS含む）で動くプロトタイプコードの構造を設計してください。\n\n# ツール案\n${v.idea}\n\n# 出力フォーマット\n1. 必要な機能の要件定義\n2. UI/UXの設計案\n3. プロトタイプとなるベースコード（HTML/TailwindCSS/JS）`, isOnePage: true }
    };

    const DEF_UNLOCKED = Object.keys(TOOLS);

    const CATEGORIES = [
      { id: 'omega', name: '🔥 オメガ特級ツール (全自動)' },
      { id: 'mon', name: '📝 コンテンツ作成 ＆ 販売' },
      { id: 'cw', name: '💼 クラウドワークス・仕事完遂' },
      { id: 'sns', name: '🚀 集客 ＆ SNSアカウント設計' },
      { id: 'fun', name: '💬 ファン化 ＆ セールス自動化' }
    ];

    /* =========================================================================
       6. 共通UIコンポーネント
       ========================================================================= */
    const FormInput = ({ f, val, onChange, onMagic }) => {
      const isMagic = f.magic || f.isMainMagic;
      const value = val !== undefined ? val : (f.t === 'check' ? false : (f.opts ? f.opts[0] : ''));

      const renderInput = () => {
        if (f.t === 'text') return input({ className: 'input-base', value: value, placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
        if (f.t === 'area') return textarea({ className: 'input-base min-h-[120px] resize-y', value: value, placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
        if (f.t === 'select') return select({ className: 'input-base', value: value, onChange: e => onChange(f.id, e.target.value) }, f.opts.map(o => option({ key: o, value: o, className: 'bg-slate-900' }, o)));
        if (f.t === 'check') return label({ className: 'flex items-center gap-3 cursor-pointer p-2' }, 
          div({ className: 'w-10 h-6 bg-slate-800 rounded-full relative transition border border-white/10' }, 
            div({ className: 'absolute top-1 left-1 w-4 h-4 rounded-full transition ' + (value ? 'bg-brand left-5' : 'bg-slate-500') })
          ),
          input({ type: 'checkbox', className: 'hidden', checked: !!value, onChange: e => onChange(f.id, e.target.checked) }),
          span({ className: 'text-sm font-bold text-white/80' }, '機能を有効にする')
        );
        return null;
      };

      return div({ className: 'glass-panel rounded-2xl p-4 md:p-6 mb-4 md:mb-5 animate-in w-full' },
        div({ className: 'flex flex-col sm:flex-row justify-between sm:items-center mb-3 gap-2' },
          span({ className: 'text-[11px] md:text-xs font-black text-slate-400 tracking-widest uppercase break-words' }, f.l),
          isMagic ? button({ 
            onClick: () => onMagic(f.id, !!f.isMainMagic),
            className: 'bg-gradient-to-r from-brand-accent to-red-500 text-white text-[10px] md:text-xs font-black px-4 py-1.5 rounded-full shadow-lg active:scale-95 transition hover:brightness-110 self-start sm:self-auto shrink-0'
          }, '✨ 魔法の杖') : null
        ),
        renderInput()
      );
    };

    /* =========================================================================
       7. ツール実行エンジン
       ========================================================================= */
    const ToolCore = ({ tid, user, role, onBack }) => {
      const conf = TOOLS[tid];
      const [db, setDb] = useState(AppDB.get());
      const uData = db.users[user];
      const pid = uData.curProj;
      const [vals, setVals] = useState(uData.projects[pid].data[tid] || {});
      const [aiModel, setAiModel] = useState(uData.settings?.aiModel || 'chatgpt_free');
      const [copied, setCopied] = useState({});
      
      const [res, setRes] = useState(uData.projects[pid].data[tid]?.res || '');
      const [resTab, setResTab] = useState('edit');
      const [showManual, setShowManual] = useState(false); 
      const [generatedPrompt, setGeneratedPrompt] = useState('');

      useEffect(() => { window.scrollTo(0, 0); }, []);

      const update = (fid, v) => {
        const nv = { ...vals, [fid]: v };
        setVals(nv);
        if (role !== 'admin') {
          const ndb = AppDB.get();
          ndb.users[user].projects[pid].data[tid] = nv;
          AppDB.save(ndb);
        }
      };

      const updateRes = (v) => {
        setRes(v);
        if (role !== 'admin') {
          const ndb = AppDB.get();
          if (!ndb.users[user].projects[pid].data[tid]) ndb.users[user].projects[pid].data[tid] = {};
          ndb.users[user].projects[pid].data[tid].res = v;
          AppDB.save(ndb);
        }
      };

      const handleClear = () => {
        if (confirm('入力内容とAIの回答をすべてリセットしますか？')) {
          setVals({});
          setGeneratedPrompt('');
          updateRes('');
        }
      };

      const handleMagic = (fid, isMain) => {
        if (isMain) {
          const currentVals = { ...vals };
          conf.fields.forEach(f => {
            if (f.t === 'select' && currentVals[f.id] === undefined) currentVals[f.id] = f.opts[0];
          });
          const magicSet = getRandomMagic(tid, currentVals);
          if (magicSet) {
            const newVals = { ...currentVals };
            Object.keys(magicSet).forEach(k => { 
                if(k !== 'age' && k !== 'genre') newVals[k] = magicSet[k];
            });
            setVals(newVals);
          }
        } else {
          const f = conf.fields.find(x => x.id === fid);
          if (tid === 'closing' && fid === 'obj') {
             const pool = MAGIC_DATA.closing_obj;
             update(fid, pool[Math.floor(Math.random() * pool.length)]);
          } else if (f && f.magic) {
             update(fid, f.magic);
          }
        }
      };

      const onGenerate = () => {
        const userLimit = uData.customLimit !== null && uData.customLimit !== undefined ? uData.customLimit : db.config.defaultDailyLimit;
        let canAccess = false;
        
        if (role === 'admin') canAccess = true;
        else {
          const systemVisible = db.config.toolVisibility[tid] !== false;
          const isMaintenance = db.config.toolMaintenance[tid] === true;
          const userPerm = uData.perms[tid];
          const isPermitted = userPerm !== undefined ? userPerm : DEF_UNLOCKED.includes(tid);
          if (systemVisible && isPermitted && !isMaintenance) {
             if (userLimit === -1) canAccess = true;
             else if (uData.usage.date !== new Date().toDateString() || uData.usage.count < userLimit) canAccess = true;
          }
        }

        if (!canAccess) { alert('本日の無料枠を終了したか、このツールを利用できない状態です。'); return; }

        if (role !== 'admin') {
          const ndb = AppDB.get();
          const today = new Date().toDateString();
          if (ndb.users[user].usage.date !== today) ndb.users[user].usage = { date: today, count: 0 };
          ndb.users[user].usage.count++;
          AppDB.save(ndb);
        }

        const prefix = getAIPrefix(aiModel);
        const prompt = prefix + "\n" + conf.build(vals) + "\n\n【最終出力ルール】\n・AIとしての前置き、挨拶、要約などは一切不要です。\n・指定されたフォーマットの本文のみを直接出力してください。";
        
        setGeneratedPrompt(prompt);
        copyText(prompt, copied, setCopied, 'gen');
      };

      const generateNotePromo = (type) => {
        const parsed = parseNoteRes(res);
        const targetTitle = parsed.title || vals.theme || "（未定のタイトル）";
        let prompt = '';
        if (type === 'thumb') {
          prompt = `以下のnote記事の内容にマッチするサムネイル（アイキャッチ）用の画像生成プロンプトを作成せよ。\n出力するプロンプトは画像生成AI（Midjourney等）でそのまま使える英語のプロンプトにすること。高画質で魅力的なライティングを指定せよ。\n\n記事タイトル: ${targetTitle}\n記事のテーマ: ${vals.theme || "（未設定）"}`;
        } else if (type === 'sns') {
          prompt = `以下のnote記事を宣伝し、購入（または閲覧）を促すSNS（X, Threads）用の投稿文を3パターン作成せよ。\n記事タイトル: ${targetTitle}\nターゲット: ${vals.target_detail || "（未設定）"}\nベネフィット: ${vals.benefit || "（未設定）"}`;
        }
        setGeneratedPrompt(prompt);
        window.scrollTo({top: 300, behavior: 'smooth'});
        copyText(prompt, copied, setCopied, type);
      };

      const header = div({ className: 'flex flex-col sm:flex-row justify-between sm:items-start sm:items-center mb-6 md:mb-8 pb-4 md:pb-6 border-b border-white/10 animate-in gap-4 pt-4 relative' },
        div({ className: 'flex items-center gap-3 md:gap-4 w-full sm:w-auto' },
          button({ onClick: onBack, className: 'glass-panel px-4 py-2 md:px-5 md:py-2.5 rounded-xl text-xs md:text-sm font-bold hover:bg-white/10 transition shrink-0' }, '← BACK'),
          div(null, h1({ className: 'text-xl md:text-2xl font-black text-white break-words' }, conf.name), p({ className: 'text-[10px] md:text-xs text-brand font-bold uppercase tracking-widest mt-1 break-words' }, conf.desc))
        ),
        div({ className: 'flex items-center gap-2 self-end sm:self-auto' },
          button({ onClick: () => setShowManual(true), className: 'bg-brand/20 text-brand border border-brand/30 hover:bg-brand/30 px-3 py-1.5 md:px-4 md:py-2 rounded-lg text-xs md:text-sm font-bold transition flex items-center gap-1' }, '📖 使い方を見る')
        )
      );

      const manualModal = showManual ? div({ className: 'fixed inset-0 z-[200] flex items-center justify-center bg-black/80 p-4 md:p-6 animate-in' },
        div({ className: 'glass-panel rounded-2xl md:rounded-[2rem] max-w-2xl w-full p-6 md:p-10 relative max-h-[90vh] overflow-y-auto' },
          button({ onClick: () => setShowManual(false), className: 'absolute top-4 right-4 md:top-6 md:right-6 text-slate-400 hover:text-white text-xl md:text-2xl font-bold' }, '✕'),
          h3({ className: 'text-xl md:text-2xl font-black text-brand-light mb-6 flex items-center gap-2 border-b border-white/10 pb-4' }, '📖 使い方マニュアル'),
          div({ 
            className: 'text-sm md:text-base text-slate-300 leading-relaxed whitespace-pre-wrap', 
            dangerouslySetInnerHTML: renderMarkdown(conf.manual || 'このツールのマニュアルは準備中です。') 
          }),
          button({ onClick: () => setShowManual(false), className: 'w-full btn-gradient py-3 md:py-4 rounded-xl font-black mt-8 text-white text-sm md:text-base shadow-lg' }, '閉じる')
        )
      ) : null;

      const aiModelSelector = div({ className: 'glass-panel rounded-2xl p-4 md:p-6 mb-4 md:mb-5 animate-in w-full border-brand/40 bg-brand/5' },
        div({ className: 'flex flex-col sm:flex-row justify-between sm:items-center mb-3 gap-2' },
          span({ className: 'text-[11px] md:text-xs font-black text-brand-light tracking-widest uppercase break-words' }, '🤖 使用するAIモデル (全ツール共通設定)'),
        ),
        select({ 
          className: 'input-base !bg-black/60', 
          value: aiModel, 
          onChange: (e) => {
            const newModel = e.target.value;
            setAiModel(newModel);
            const ndb = AppDB.get();
            if(!ndb.users[user].settings) ndb.users[user].settings = {};
            ndb.users[user].settings.aiModel = newModel;
            AppDB.save(ndb);
          }
        },
          option({ value: 'chatgpt_free' }, 'ChatGPT (無料版)'),
          option({ value: 'chatgpt_paid' }, 'ChatGPT Plus (有料版)'),
          option({ value: 'claude_free' }, 'Claude 3 (無料版)'),
          option({ value: 'claude_paid' }, 'Claude 3 Pro (有料版)'),
          option({ value: 'gemini_free' }, 'Gemini (無料版)'),
          option({ value: 'gemini_paid' }, 'Gemini Advanced (有料版)')
        )
      );

      const parsedNoteData = tid === 'note' ? parseNoteRes(res) : {};

      return div({ className: 'w-full max-w-4xl mx-auto px-4 sm:px-6 lg:px-8' },
        manualModal,
        header,
        aiModelSelector,
        div({ className: 'space-y-4' }, conf.fields.map(f => el(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic }))),
        
        div({ className: 'flex justify-end mt-2 mb-4' },
          button({ onClick: handleClear, className: 'text-xs md:text-sm text-slate-400 hover:text-white transition flex items-center gap-1' }, '🗑️ 入力内容をクリア')
        ),

        button({ onClick: onGenerate, className: 'w-full py-4 md:py-6 rounded-2xl btn-gradient text-white font-black text-lg md:text-xl shadow-xl mt-4 break-words' }, copied.gen ? '✓ プロンプトを生成しました' : '📋 プロンプトを生成する'),
        
        generatedPrompt && div({ className: 'glass-panel rounded-2xl p-4 md:p-6 mt-6 mb-10 animate-in border-brand/50 relative' },
          span({ className: 'block text-[10px] md:text-xs font-black text-brand-light tracking-widest uppercase mb-3' }, '📝 生成されたプロンプト (AIに投げる前に自由に編集・肉付けできます)'),
          textarea({ className: 'input-base min-h-[200px] text-sm leading-relaxed !bg-black/50', value: generatedPrompt, onChange: e => setGeneratedPrompt(e.target.value) }),
          button({ onClick: () => copyText(generatedPrompt, copied, setCopied, 'manual_copy'), className: 'w-full bg-brand hover:bg-brand-dark py-3 md:py-4 rounded-xl font-bold mt-4 transition text-white text-sm md:text-base shadow' }, copied.manual_copy ? '✓ コピーしました' : '📋 このプロンプトをコピーしてAIへ貼り付け')
        ),
        
        div({ className: 'mb-8 md:mb-10' }), 

        div({ className: 'glass-panel rounded-3xl p-6 md:p-8 animate-in w-full mb-10' },
          div({ className: 'flex justify-between items-end mb-6 border-b border-white/10 pb-4 overflow-x-auto hide-scrollbar' },
            div({ className: 'flex gap-2 min-w-max' },
              button({ onClick: () => setResTab('edit'), className: `px-3 py-2 md:px-4 md:py-2 text-xs md:text-sm font-bold rounded-lg transition ${resTab === 'edit' ? 'bg-brand text-white' : 'text-slate-400 hover:bg-white/5'}` }, '✍️ 編集 (Markdown)'),
              button({ onClick: () => setResTab('preview'), className: `px-3 py-2 md:px-4 md:py-2 text-xs md:text-sm font-bold rounded-lg transition ${resTab === 'preview' ? 'bg-brand text-white' : 'text-slate-400 hover:bg-white/5'}` }, '👁️ プレビュー'),
              tid === 'note' && button({ onClick: () => setResTab('post'), className: `px-3 py-2 md:px-4 md:py-2 text-xs md:text-sm font-bold rounded-lg transition ${resTab === 'post' ? 'bg-brand text-white' : 'text-slate-400 hover:bg-white/5'}` }, '🚀 noteへ投稿')
            ),
            res && div({ className: 'shrink-0 ml-4' },
              span({ className: 'text-xs md:text-sm text-slate-400 font-bold bg-black/40 px-3 py-1.5 rounded-lg' }, `📝 ${res.length}文字`)
            )
          ),
          
          resTab === 'edit' ? div({ className: 'space-y-4 animate-in' },
            span({ className: 'block text-[10px] md:text-xs font-black text-slate-400 tracking-[0.2em] uppercase mb-2' }, '📥 AIの回答を貼り付けて保存・編集'),
            textarea({ className: 'input-base min-h-[300px] md:min-h-[400px] text-sm md:text-base leading-relaxed', value: res, onChange: e => updateRes(e.target.value), placeholder: 'ここにAIからの回答を貼り付けてください。Markdownでの記述がプレビュー画面に反映されます。' }),

    const MainApp = (props) => {

      useEffect(() => { window.scrollTo(0, 0); }, [screen]);

      const openTool = (tid) => {
        const isMaintenance = db.config.toolMaintenance[tid] === true;
        const userPerm = uData.perms[tid];
        const isPermitted = props.role === 'admin' || (userPerm !== undefined ? userPerm : DEF_UNLOCKED.includes(tid));
        
        if (isMaintenance && props.role !== 'admin') {
          alert('現在メンテナンス中です。ご迷惑をおかけします。');
          return;
        }
        if (!isPermitted) {
          alert('🔒 管理者によってロックされています');
          return;
        }

        const ndb = AppDB.get();
        let recent = ndb.users[props.user].recentTools || [];
        recent = recent.filter(t => t !== tid); 
        recent.unshift(tid); 
        if (recent.length > 6) recent.pop(); 
        ndb.users[props.user].recentTools = recent;
        AppDB.save(ndb);

        setScreen(tid);
      };

      const toggleCat = (catId) => {
        setExpandedCats(prev => ({ ...prev, [catId]: !prev[catId] }));
      };

      if (TOOLS[screen]) return el(ToolCore, { tid: screen, user: props.user, role: props.role, onBack: () => setScreen('home') });

      const usage = (uData.usage.date === new Date().toDateString()) ? uData.usage.count : 0;

            ),
            div({ className: 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 md:gap-4' },
              recentVisible.map(tid => {

                const isMaintenance = db.config.toolMaintenance[tid] === true;
                const userPerm = uData.perms[tid];
                const isPermitted = props.role === 'admin' || (userPerm !== undefined ? userPerm : DEF_UNLOCKED.includes(tid));

                div({ className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 border-t border-white/10 pt-6 md:pt-8' },
                  visible.map(tid => {
                    const t = TOOLS[tid];
                    const isMaintenance = db.config.toolMaintenance[tid] === true;
                    const userPerm = uData.perms[tid];
                    const isPermitted = props.role === 'admin' || (userPerm !== undefined ? userPerm : DEF_UNLOCKED.includes(tid));
                    const canAccess = props.role === 'admin' || (isPermitted && !isMaintenance);

                    return div({ 
                        key: tid, 
                        onClick: () => openTool(tid), 
                        className: 'bg-black/30 border border-white/5 rounded-2xl p-6 md:p-8 transition duration-300 hover:-translate-y-1 hover:border-brand/40 hover:bg-white/5 cursor-pointer relative overflow-hidden group ' + (canAccess?'':'opacity-50 grayscale') 
                      },
                        div({ className: 'flex justify-between items-start mb-4 md:mb-6' },
                          div({ className: 'text-4xl md:text-5xl group-hover:scale-110 transition' }, t.icon),
                          isMaintenance ? span({ className: 'bg-brand-danger/20 text-brand-danger text-[9px] md:text-[10px] font-black px-2 py-1 md:px-3 md:py-1.5 rounded-lg border border-brand-danger/30 shrink-0' }, '🚧 メンテ中') :
                          t.badge && span({ className: 'bg-brand/10 text-brand text-[9px] md:text-[10px] font-black px-2 py-1 md:px-3 md:py-1.5 rounded-lg border border-brand/20 shrink-0' }, t.badge)

       ========================================================================= */
    const AuthBox = (props) => {
      const [nickname, setNickname] = useState('');

      const handleXIdChange = (e) => {
        let val = e.target.value;
        if (!val.startsWith('@')) val = '@' + val.replace(/@/g, '');
        setXId(val);
      };

      const login = () => {
        setErr('');
        const n = nickname.trim();
        const x = xId.trim();
        
        const db = AppDB.get();
        if (n === db.config.adminU && x.replace('@', '') === db.config.adminP) {
          localStorage.setItem(SESS_KEY, JSON.stringify({ u: 'admin', r: 'admin' }));
          props.onLogin('admin', 'admin');
          return;
        }

        if (!n) return setErr('Xのニックネーム（表示名）を入力してください');
        if (!x || x === '@') return setErr('Xのユーザー名（@ID）を入力してください');

        if (isL) {
          if (db.users[x] && db.users[x].status === 'approved' && db.users[x].nickname === n) {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: x, r: 'approved' }));
            props.onLogin(x, 'approved');
          } else {
            setErr('登録情報が見つからないか、管理者の承認待ち、または権利剥奪状態です。');
          }
        } else {
          if (!agreed) return setErr('利用規約に同意してください。');
          
          if (db.users[x]) return setErr('この@ユーザー名は既に登録されています。');
          db.users[x] = { nickname: n, status: 'pending', registeredAt: Date.now(), usage: { count: 0, date: '' }, perms: {}, brand: { plan: 'free', name: '' }, projects: { 'default': { name: 'デフォルト', data: {} } }, curProj: 'default', settings: { aiModel: 'chatgpt_free' }, recentTools: [], customLimit: null };
          AppDB.save(db);

          setIsL(true);
        }

          button({ onClick: () => setShowTerms(false), className: 'absolute top-4 right-4 text-slate-400 hover:text-white text-xl font-bold' }, '✕'),
          h3({ className: 'text-lg md:text-xl font-black text-white mb-4 border-b border-white/10 pb-4' }, '📜 AI Content Pro 利用規約'),
          div({ className: 'overflow-y-auto pr-2 text-xs md:text-sm text-slate-300 leading-relaxed space-y-4 flex-1' },
            p(null, '本ツール（以下「本サービス」といいます）を利用する全てのユーザーは、以下の規約に同意したものとみなします。本サービスは厳重なセキュリティで監視されており、違反行為が発覚した場合は即座にアクセス権を剥奪し、状況により法的措置を取る場合があります。'),
            
            h4({ className: 'font-bold text-white mt-4' }, '第1条（禁止事項）'),
            p(null, 'ユーザーは、本サービスの利用にあたり、以下の行為をしてはなりません。'),
            el('ul', { className: 'list-disc pl-5 space-y-1' },
              el('li', null, '本サービスのアクセスURL、ログイン情報（XのID等）を第三者に共有、譲渡、または貸与する行為。'),
              el('li', null, '本サービスのソースコードの閲覧、抽出、複製、改変、リバースエンジニアリング、またはそれらを試みる行為。'),

              el('li', null, '本サービスを通じて生成したプロンプトや出力結果を、ツールそのものの機能として再販する行為（生成された「記事」や「構成」を自分のコンテンツとして販売することは許可されています）。')
            ),

            h4({ className: 'font-bold text-white mt-4' }, '第2条（権利の剥奪と免責）'),
            el('ul', { className: 'list-disc pl-5 space-y-1' },
              el('li', null, '管理者は、ユーザーが本規約に違反したと判断した場合、事前の通知なく当該ユーザーの利用権利を永久に剥奪できるものとします。'),
              el('li', null, '本サービスを利用して生じた一切の損害（生成AIの出力内容によるトラブル等を含む）について、管理者は一切の責任を負いません。')
            )

          div({ className: 'mt-6 pt-4 border-t border-white/10 text-center' },

          )

      return div({ className: 'w-full max-w-md mx-auto mt-16 md:mt-24 animate-in px-4 pb-10' },
        termsModal,
        div({ className: 'glass-panel rounded-3xl md:rounded-[2.5rem] p-8 md:p-12 shadow-2xl text-center relative overflow-hidden' },

      const [goAdmin, setGoAdmin] = useState(false);

      useEffect(() => {
        const session = localStorage.getItem(SESS_KEY);
        if (session) setAuth(JSON.parse(session));
      }, []);

      if (!auth.u) return el(AuthBox, { onLogin: (u, r) => setAuth({ u, r }) });
      if (auth.r === 'admin' && goAdmin) return el(AdminDash, { onGoApp: () => setGoAdmin(false), onLogout: () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); } });
      
      return el(MainApp, { user: auth.u, role: auth.r, onLogout: () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); }, onGoAdmin: () => setGoAdmin(true) });
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(el(ErrorBoundary, null, el(App)));

  })();
  </script>
</body>
</html>
