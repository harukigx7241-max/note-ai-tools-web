<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Content Pro (SaaS Edition)</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    /* =========================================
       Base Reset & Typography
       ========================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #0d0d1a;
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }
    button, input, textarea, select {
      font-family: inherit;
      font-size: 14px;
      color: #ffffff;
      outline: none;
      border: none;
    }
    button { cursor: pointer; background: transparent; }
    a { text-decoration: none; color: inherit; }

    /* =========================================
       Layout & Background
       ========================================= */
    .page-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px 80px;
      position: relative;
      background: linear-gradient(135deg, #0d0d1a, #1a0a2e 50%, #0a1628);
    }
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .content-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 920px;
    }

    /* =========================================
       Headers & Text
       ========================================= */
    .main-title {
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 10px;
    }
    .main-title span { color: #38bdf8; }
    .main-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      margin-bottom: 24px;
    }
    .category-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #38bdf8;
      border-bottom: 2px solid rgba(56, 189, 248, 0.2);
      padding-bottom: 6px;
    }

    /* =========================================
       Cards & Dashboard Grid
       ========================================= */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-bottom: 30px;
    }
    .tool-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .tool-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(56, 189, 248, 0.4);
      transform: translateY(-2px);
    }
    .tool-card.locked {
      opacity: 0.6;
      filter: grayscale(100%);
    }
    .tool-card.locked:hover {
      transform: none;
      border-color: rgba(255, 255, 255, 0.08);
    }
    .tc-icon { font-size: 24px; margin-bottom: 6px; }
    .tc-name { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .tc-desc { font-size: 12px; color: rgba(255, 255, 255, 0.5); line-height: 1.4; }

    /* Badges */
    .badge-container { display: flex; gap: 6px; margin-bottom: 8px; }
    .badge-main {
      background: rgba(56, 189, 248, 0.15);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 50px;
      padding: 3px 10px;
      font-size: 10px;
      color: #38bdf8;
      font-weight: 800;
    }
    .badge-main.red { background: rgba(233, 69, 96, 0.15); border-color: rgba(233, 69, 96, 0.3); color: #e94560; }
    .badge-status { font-size: 10px; padding: 3px 10px; border-radius: 50px; font-weight: 800; }
    .badge-status.locked { background: #64748b; color: #ffffff; }
    .badge-status.unlimited { background: #10b981; color: #ffffff; }
    .badge-status.free { background: #6366f1; color: #ffffff; }

    /* =========================================
       Form UI Components
       ========================================= */
    .form-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .form-label {
      font-size: 12px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.7);
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      transition: all 0.2s;
    }
    .form-input:focus {
      border-color: #38bdf8;
      background: rgba(255, 255, 255, 0.08);
    }
    
    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
      transition: all 0.2s;
      width: 100%;
      text-align: center;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .btn-sub {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-sub:hover { background: rgba(255, 255, 255, 0.12); }
    
    .btn-copy {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 700;
      transition: all 0.15s;
    }
    .btn-copy:hover { background: rgba(255, 255, 255, 0.15); }
    .btn-copy.success { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); color: #4ade80; }

    /* Flex Layouts */
    .flex-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .flex-1 { flex: 1; min-width: 220px; }
    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    /* =========================================
       Tool UI specifics
       ========================================= */
    .tutorial-panel {
      background: rgba(56, 189, 248, 0.05);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 18px;
    }
    .tutorial-title { font-size: 13px; font-weight: 800; color: #38bdf8; margin-bottom: 8px; display: flex; alignItems: center; gap: 6px; }
    .tutorial-body { font-size: 12px; color: rgba(255, 255, 255, 0.7); line-height: 1.6; white-space: pre-wrap; }

    .tool-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 16px;
    }
    .tabs-container {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 20px;
      gap: 8px;
    }
    .tab-item {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.5);
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .tab-item.active { color: #38bdf8; border-bottom-color: #38bdf8; }

    .result-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 13px;
      font-weight: 700;
      background: rgba(0, 0, 0, 0.2);
    }
    .result-body {
      padding: 16px;
      max-height: 500px;
      overflow-y: auto;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
      white-space: pre-wrap;
      line-height: 1.8;
    }
    .json-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      white-space: pre-wrap;
      color: #e2e8f0;
      margin-bottom: 12px;
      font-family: monospace;
    }

    /* =========================================
       Modals & Auth
       ========================================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-content {
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .auth-container {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 30px 24px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    
    /* Admin Table */
    .admin-table-wrapper {
      width: 100%;
      overflow-x: auto;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .admin-table th, .admin-table td {
      padding: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      text-align: left;
    }
    .admin-table th { font-weight: 800; color: #94a3b8; }

    @media(max-width: 560px) {
      .main-title { font-size: 28px; }
      .tool-grid { grid-template-columns: 1fr; }
      .admin-table th, .admin-table td { padding: 8px 6px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
  (function(){
    'use strict';
    const e = React.createElement;
    const { useState, useEffect, useCallback, Fragment } = React;

    /* =========================================================================
       1. システム定数 ＆ データベース初期化 (絶対安全仕様)
       ========================================================================= */
    const DB_KEY = 'AICP_v29_DB'; // 完全クリーンな環境にするための新しいキー
    const SESS_KEY = 'AICP_v29_Sess';
    const DAILY_LIMIT = 3;

    // デフォルトでアンロックされているツールのID
    const DEF_UNLOCKED = ['note', 'research', 'lp', 'affiliate', 'backend', 'bonus'];

    // データベースの取得と完全な構造保証
    function getDB() {
      let db = null;
      try {
        const stored = localStorage.getItem(DB_KEY);
        if(stored) db = JSON.parse(stored);
      } catch(err) {
        console.error("DB Parse Error", err);
      }

      // DBが存在しない、または構造が壊れている場合は初期化
      if (!db || typeof db !== 'object') {
        db = {
          admin: { p: 'admin123' },
          users: {
            'admin': { 
              status: 'approved', 
              sns: '@admin', 
              date: Date.now(), 
              usage: { date: '', count: 0 }, 
              perms: {}, 
              brand: { plan: 'paid', name: '管理者', target: '', tone: '' }, 
              projects: { 'default': { name: '管理者領域', data: {} } }, 
              curProj: 'default' 
            }
          },
          inqs: []
        };
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        return db;
      }

      // 【安全装置】各ユーザーのデータ構造の欠落を完全に補完する
      if (!db.admin) db.admin = { p: 'admin123' };
      if (!db.users) db.users = {};
      if (!db.inqs) db.inqs = [];

      Object.keys(db.users).forEach(u => {
        const user = db.users[u];
        if (!user.usage) user.usage = { date: '', count: 0 };
        if (!user.perms) user.perms = {};
        if (!user.brand) user.brand = { plan: 'free', name: '', target: '', tone: '' };
        if (!user.projects) user.projects = { 'default': { name: 'デフォルト', data: {} } };
        if (!user.curProj || !user.projects[user.curProj]) {
          user.curProj = Object.keys(user.projects)[0] || 'default';
          if (!user.projects[user.curProj]) {
            user.projects['default'] = { name: 'デフォルト', data: {} };
            user.curProj = 'default';
          }
        }
      });
      return db;
    }

    function saveDB(db) {
      try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } 
      catch(e) { console.error("DB Save Error", e); }
    }

    // コピー機能（安全なクリップボードAPI呼び出し）
    function doCopy(text, stateObj, setStateFunc, key) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(()=>{});
        }
        const newState = { ...stateObj, [key]: true };
        setStateFunc(newState);
        setTimeout(() => {
          const revertState = { ...stateObj, [key]: false };
          setStateFunc(revertState);
        }, 2000);
      } catch (err) {
        console.error(err);
      }
    }

    // JSONパーサー（堅牢化）
    function parseJ(text) {
      if (!text) return null;
      try {
        const clean = text.replace(/```(?:json)?\n?/gi, '').replace(/```/g, '').trim();
        const match = clean.match(/\{[\s\S]*\}/);
        if (match) {
          try { return JSON.parse(match[0]); } catch(err) {}
        }
        return JSON.parse(clean);
      } catch (err) {
        return null;
      }
    }

    // 日付フォーマット
    function fmtD(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${('0'+d.getHours()).slice(-2)}:${('0'+d.getMinutes()).slice(-2)}`;
    }

    /* =========================================================================
       2. ツール定義 ＆ プロンプト設計
       ========================================================================= */
    const T_CATS = [
      { n: '📝 コンテンツ作成 ＆ マネタイズ', t: ['note', 'research', 'lp', 'affiliate', 'backend', 'bonus'] },
      { n: '🚀 SNS集客 ＆ アカウント設計', t: ['profile', 'sns', 'video', 'image'] },
      { n: '💬 ファン化 ＆ 自動化', t: ['magnet', 'line', 'funnel', 'reply', 'interview', 'journey'] },
      { n: '💻 開発 ＆ その他', t: ['webdev'] }
    ];

    const rJ = '\n\n【ルール】前置きなしで以下のJSONフォーマットのみ出力してください:\n';
    const TOOLS = {
      note: { 
        i: '📝', n: 'note記事生成', b: '必須', d: '売れる記事構成と本文を作成', 
        tut: '読者の悩みに寄り添い、解決策を提示する有料記事を作成します。\n【提案】「30代向け」などターゲットを絞り、文字数は無料1000字・有料3000字程度に設定すると読みやすくなります。',
        f: [
          {id: 't1', t: 'input', l: 'テーマ (自由入力)', ph: '例: 副業で月5万稼ぐ方法'},
          {id: 't2', t: 'input', l: 'ターゲット層・悩み', ph: '例: 忙しくて時間がない会社員'},
          {id: 't3', t: 'input', l: '価格・文字数目安', ph: '例: 980円・3000字'},
          {id: 'chk', t: 'check', l: '有料パートの最後に、購入者特典の案内を含める'}
        ],
        build: (v, b) => `${b}テーマ「${v.t1}」、悩み「${v.t2}」向けにnote有料記事を作成してください。価格/文字数目安:${v.t3}\n${v.chk ? '※有料パートの最後に特典の受け取り案内を魅力的に含めること\n' : ''}【厳守】前置きなしで以下のMarkdownフォーマットのみ出力。\n---TITLES---\n1.タイトル案...\n---FREE_START---\n無料本文...\n---FREE_END---\n---PAID_START---\n有料本文...\n---PAID_END---`,
        isNote: true // UIを1画面完結にするフラグ
      },
      research: { 
        i: '⚔️', n: '競合リサーチ', b: '神機能', d: '弱点とブルーオーシャンを発見', 
        tut: '売れているライバルの教材から「欠けている要素」を見つけます。\n【提案】自分の強みに「未経験から1ヶ月で達成」などを入れると強烈な差別化になります。',
        f: [
          {id: 't1', t: 'area', l: 'ライバルの教材の目次・セールス文'},
          {id: 't2', t: 'input', l: '自分の強み(任意)'}
        ],
        build: (v, b) => `${b}以下のライバル教材を分析し、弱点と私の強み「${v.t2}」を活かした勝てる商品コンセプト(ブルーオーシャン)を3つ提案してください。\n【ライバル情報】\n${v.t1}${rJ}{"concepts":[{"title":"コンセプト名","weakness":"ライバルの弱点","strategy":"勝つための戦略"}]}`
      },
      lp: { 
        i: '📄', n: '爆売れLP作成', b: '必須', d: '高単価を売るセールスレター', 
        tut: '商品を販売するためのランディングページ（LP）の構成を作ります。\n【提案】ベネフィットには「月5万稼げる」だけでなく「週末に外食に行ける」のように感情的な未来を書くと売れます。',
        f: [
          {id: 't1', t: 'input', l: '商品名・価格'},
          {id: 't2', t: 'area', l: '商品のベネフィット・特徴'}
        ],
        build: (v, b) => `${b}商品「${v.t1}」を売るLP構成を作成してください。特徴: ${v.t2}${rJ}{"hero":"キャッチコピー","empathy":["共感1..."],"benefits":["利点1..."],"offer":"オファー内容"}`
      },
      affiliate: { 
        i: '🔗', n: 'アフィリエイト', b: '', d: '商品レビュー＆SNS誘導', 
        tut: '他人の商品を売るためのレビュー記事と誘導ポストを作ります。\n【提案】推しポイントには「実際に使ってどう変わったか」という自分の体験談を必ず入れてください。',
        f: [
          {id: 't1', t: 'input', l: '商品名・URL'},
          {id: 't2', t: 'input', l: 'ターゲット層'},
          {id: 't3', t: 'area', l: '推しポイント・体験談'}
        ],
        build: (v, b) => `${b}商品「${v.t1}」をターゲット「${v.t2}」に売るレビュー記事構成とSNS誘導文を作成してください。推し: ${v.t3}${rJ}{"article":{"title":"タイトル","sections":["見出し1..."]},"sns_posts":["ポスト1..."]}`
      },
      backend: { 
        i: '💎', n: '高単価バックエンド', b: '', d: '30万円〜の商材企画', 
        tut: 'フロント商品購入者へ売る高単価企画を作ります。\n【提案】価格は「30万円・6ヶ月間」など具体的にし、提供価値に「通話サポート無制限」などを入れると成約率が上がります。',
        f: [
          {id: 't1', t: 'input', l: '想定価格・形式'},
          {id: 't2', t: 'area', l: 'ベースとなる知識・元記事'}
        ],
        build: (v, b) => `${b}以下の知識をベースに、価格「${v.t1}」の高額商品企画を3つ作成してください。\n${v.t2}${rJ}{"plans":[{"title":"商品名","detail":"詳細","pitch":"セールス文"}]}`
      },
      bonus: { 
        i: '🎁', n: '購入者特典生成', b: '', d: '記事から特典アイデア作成', 
        tut: '商品の購入率を上げる「おまけ」を提案します。\n【提案】チェックリスト、テンプレートなど、すぐに使える形式の特典が喜ばれます。',
        f: [ {id: 't1', t: 'area', l: '元記事テキスト'} ],
        build: (v, b) => `${b}以下の記事を分析し、購入者特典を8つ提案してください。\n${v.t1}${rJ}{"suggestions":[{"title":"特典タイトル","type":"種類","desc":"説明"}]}`
      },
      profile: { 
        i: '👤', n: 'アカウント設計', b: '', d: 'バズるプロフ・名前生成', 
        tut: 'SNSのコンセプトとプロフ文を作ります。\n【提案】「実績ゼロ」であっても「これから挑戦する過程を発信」と書けば共感を生むアカウントになります。',
        f: [

    /* =========================================================================
       3. 共通UIコンポーネント (エラーを防ぐ安全な展開)

    // フォーム入力部品
    const InputField = ({f, v, onChange}) => {
      if (f.t === 'input') {
        return e('div', {className: 'form-card'}, 
          e('span', {className: 'form-label'}, f.l), 
          e('input', {className: 'form-input', value: v, placeholder: f.ph||'', onChange: (ev) => onChange(ev.target.value)})
        );
      }
      if (f.t === 'area') {
        return e('div', {className: 'form-card'}, 
          e('span', {className: 'form-label'}, f.l), 
          e('textarea', {className: 'form-input', style: {minHeight: 100, resize: 'vertical'}, value: v, placeholder: f.ph||'', onChange: (ev) => onChange(ev.target.value)})
        );
      }
      if (f.t === 'select') {
        return e('div', {className: 'form-card'}, 
          e('span', {className: 'form-label'}, f.l), 
          e('select', {className: 'form-input', value: v, onChange: (ev) => onChange(ev.target.value)}, 
            f.opts.map(o => e('option', {key: o, value: o}, o))
          )
        );
      }
      if (f.t === 'check') {
        return e('div', {className: 'form-card flex-row', style: {alignItems: 'center'}}, 
          e('input', {type: 'checkbox', checked: v, onChange: (ev) => onChange(ev.target.checked), style: {width: 18, height: 18}}), 
          e('span', {style: {fontWeight: 700}}, f.l)
        );
      }
      return null;
    };

    // JSON結果の再帰的描画
    const RenderJSON = ({obj}) => {
      if (typeof obj === 'string') {
        return e('p', {className: 'res-box'}, obj);
      }
      if (Array.isArray(obj)) {
        return e('div', null, 
          obj.map((item, index) => e('div', {key: index, style: {marginBottom: 12, paddingBottom: 12, borderBottom: '1px dashed #334155'}}, 
            e(RenderJSON, {obj: item})
          ))
        );
      }
      if (typeof obj === 'object' && obj !== null) {
        return e('div', null, 
          Object.keys(obj).map(key => e('div', {key: key, style: {marginBottom: 10}}, 
            e('span', {style: {color: '#38bdf8', fontSize: 12, fontWeight: 800, display: 'block', marginBottom: 4}}, key), 
            e(RenderJSON, {obj: obj[key]})
          ))
        );
      }
      return e('span', null, String(obj));
    };

    // プロンプトをAIプランでラップ
    const wrapPrompt = (plan, basePrompt) => {
      const prefix = plan === 'paid' 
        ? '【システム設定: 有料AIモード】\nあなたは高度な推論とWeb検索が可能な状態です。複雑な指示にも完璧に従い最高品質の出力をしてください。\n\n' 
        : '【システム設定: 無料AIモード】\nあなたは出力制限がある環境です。途切れないように簡潔に要点を絞って出力してください。\n\n';

    // Web AIへのランチャーリンク

    /* =========================================================================
       4. メインツールエンジン (全機能をここで安全に処理)
       ========================================================================= */
    const ToolEngine = ({tid, user, role, onBack}) => {
      const tConf = TOOLS[tid];
      if (!tConf) {
        return e('div', {className: 'z1'}, e('p', null, 'ツールの読み込みエラー'));
      }

      const [tab, setTab] = useState('settings');
      const [copied, setCopied] = useState({});
      const [showLinks, setShowLinks] = useState(false);
      const [impText, setImpText] = useState('');
      const [resData, setResData] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');

      // ユーザーのプロジェクトデータの安全な取得
      const db = getDB();
      const uData = db.users[user];
      const pid = uData.curProj;
      const initialVals = (uData.projects[pid] && uData.projects[pid].data[tid]) ? uData.projects[pid].data[tid] : {};
      const [vals, setVals] = useState(initialVals);

      const updateVal = (id, val) => {
        const newVals = { ...vals, [id]: val };
        setVals(newVals);
        if (role !== 'admin') {
          const newDb = getDB();
          if (!newDb.users[user].projects[pid].data) newDb.users[user].projects[pid].data = {};
          newDb.users[user].projects[pid].data[tid] = newVals;
          saveDB(newDb);
        }
      };

      const checkAuth = () => {
        if (role === 'admin') return true;
        if (uData.perms && uData.perms[tid]) return true;
        const today = new Date().toDateString();
        if (uData.usage.date !== today) return true;
        return uData.usage.count < DAILY_LIMIT;
      };

      const handleGenerate = () => {
        if (!checkAuth()) {
          alert(`本日の無料枠(${DAILY_LIMIT}回)を終了しました。\n無制限利用は管理者にお問い合わせください。`);
          return;
        }

        // 回数消費処理
        if (role !== 'admin' && !(uData.perms && uData.perms[tid])) {
          const newDb = getDB();
          const today = new Date().toDateString();
          if (newDb.users[user].usage.date !== today) {
            newDb.users[user].usage = { date: today, count: 0 };
          }
          newDb.users[user].usage.count++;
          saveDB(newDb);
        }

        let brandStr = '';
        const plan = (uData.brand && uData.brand.plan) ? uData.brand.plan : 'free';
        if (uData.brand && uData.brand.name) {
          brandStr = `【発信者情報(文体反映)】名前:${uData.brand.name} ターゲット:${uData.brand.target||''} 文体:${uData.brand.tone||''}\n\n`;
        }

        const rawPrompt = tConf.build(vals, brandStr);
        const finalPrompt = wrapPrompt(plan, rawPrompt);

        doCopy(finalPrompt, copied, setCopied, 'gen');
        setShowLinks(true);
        if (!tConf.noJson && !tConf.isNote) {
          setTab('import');
        }
      };

      const handleImport = () => {
        if (tConf.noJson) {
          setResData(impText);
          setTab('preview');
          setImpText('');
          return;
        }
        setErrorMsg('');
        const parsed = parseJ(impText);
        if (parsed) {
          setResData(parsed);
          setTab('preview');
          setImpText('');
        } else {
          setErrorMsg('JSONフォーマットエラー。AIの出力をそのまま貼り付けてください。');
        }
      };

      // Note用の1画面完結UI
      if (tConf.isNote) {
        return e('div', {className: 'z1'},
          e('div', {className: 'tool-header'}, 
            e('div', {className: 'flex-row', style:{alignItems:'center'}}, 
              e('button', {className: 'btn-sub', onClick: onBack}, '← 戻る'), 
              e('h1', {className: 'app-ttl'}, tConf.n)
            )
          ),
          e('div', {className: 'tutorial-panel'}, 
            e('div', {className: 'tutorial-title'}, '💡 使い方'), 
            e('div', {className: 'tutorial-body'}, tConf.tut)
          ),
          tConf.f.map(field => {
            let val = vals[field.id];
            if (val === undefined) {
              if (field.t === 'check') val = false;
              else if (field.opts) val = field.opts[0];
              else val = '';
            }
            return e(InputField, { key: field.id, f: field, v: val, onChange: (v) => updateVal(field.id, v) });
          }),
          e('button', {className: 'btn-primary', style: {marginTop: 10, marginBottom: 20}, onClick: handleGenerate}, 
            copied['gen'] ? '✓ コピー完了' : '📋 プロンプト生成＆コピー'
          ),
          showLinks && e(WebLinks, {msg: false}),
          e('div', {className: 'form-card'}, 
            e('span', {className: 'form-label'}, '📥 AIの回答を貼り付け'), 
            e('textarea', {className: 'form-input', style: {minHeight: 200}, value: resData||'', onChange: (ev) => setResData(ev.target.value)}), 
            e('button', {className: 'btn-sub', style: {width: '100%', marginTop: 10}, onClick: () => doCopy(resData||'', copied, setCopied, 'cpAll')}, 
              copied['cpAll'] ? '✓ コピー済み' : '📋 全文コピー'
            )
          )
        );
      }

      // 通常ツールのタブUI
      return e('div', {className: 'z1'},
        e('div', {className: 'tool-header'}, 
          e('div', {className: 'flex-row', style:{alignItems:'center'}}, 
            e('button', {className: 'btn-sub', onClick: onBack}, '← 戻る'), 
            e('h1', {className: 'app-ttl'}, tConf.n)

              className: `tab-item ${tab === t.id ? 'active' : ''}`, 
              disabled: t.disabled,
              onClick: () => { if (!t.disabled) setTab(t.id); }
            }, t.label)
          )
        ),
        tab === 'settings' && e('div', null,
          e('div', {className: 'tutorial-panel'}, 
            e('div', {className: 'tutorial-title'}, '💡 使い方'), 
            e('div', {className: 'tutorial-body'}, tConf.tut)
          ),
          tConf.f.map(field => {
            let val = vals[field.id];
            if (val === undefined) {
              if (field.t === 'check') val = false;
              else if (field.opts) val = field.opts[0];
              else val = '';

            copied['gen'] ? '✓ コピー完了' : '📋 プロンプト生成'

          showLinks && e(WebLinks, {msg: !tConf.noJson})
        ),
        tab === 'import' && e('div', null, 
          e('div', {className: 'form-card'}, 
            e('span', {className: 'form-label'}, '📥 AIの出力を貼り付け'), 
            e('textarea', {className: 'form-input', style: {minHeight: 150}, value: impText, onChange: (ev) => setImpText(ev.target.value)}),

        tab === 'preview' && resData && e('div', {className: 'form-card'}, e(RenderJSON, {obj: resData}))
      );
    };


    /* =========================================================================

      const [tone, setTone] = useState(b.tone || '');
      const [plan, setPlan] = useState(b.plan || 'free');

      const handleSave = () => {
        if (user !== 'admin') {
          const newDb = getDB();
          newDb.users[user].brand = { name, target, tone, plan };
          saveDB(newDb);
        }
        alert('保存しました');
        onBack();
      };

      return e('div', {className: 'z1'}, 
        e('div', {className: 'tool-header'}, 
          e('div', {className: 'flex-row', style:{alignItems:'center'}}, 
            e('button', {className: 'btn-sub', onClick: onBack}, '← 戻る'),

          e('div', {className: 'tutorial-body'}, 'ここで登録した情報は全ツールのプロンプトに自動で埋め込まれます。\n使用しているAIのプランに合わせてプロンプトが最適化されます。')
        ),
        e('div', {className: 'form-card'}, 
          e('span', {className: 'form-label'}, '🤖 使用しているAIプラン'), 
          e('select', {className: 'form-input', value: plan, onChange: (ev) => setPlan(ev.target.value)}, 
            e('option', {value: 'free'}, '無料版 (ChatGPT Free 等)'), 
            e('option', {value: 'paid'}, '有料版 (ChatGPT Plus 等)')
          )
        ),
        e('div', {className: 'form-card'}, 
          e('span', {className: 'form-label'}, '発信者名・肩書き'), 
          e('input', {className: 'form-input', value: name, onChange: (ev) => setName(ev.target.value)})
        ),
        e('div', {className: 'form-card'}, 
          e('span', {className: 'form-label'}, 'メインのターゲット層'), 
          e('input', {className: 'form-input', value: target, onChange: (ev) => setTarget(ev.target.value)})
        ),
        e('div', {className: 'form-card'}, 
          e('span', {className: 'form-label'}, '文体のクセ・ルール (例:絵文字多め)'), 
          e('textarea', {className: 'form-input', style: {minHeight: 80}, value: tone, onChange: (ev) => setTone(ev.target.value)})
        ),
        e('button', {className: 'btn-primary', onClick: handleSave}, '保存する')
      );
    };

    const ProjectManager = ({user, onBack}) => {
      const [db, setDb] = useState(getDB());
      const uData = db.users[user];
      const [newProj, setNewProj] = useState('');

      const handleCreate = () => {
        if (!newProj.trim() || user === 'admin') return;
        const id = 'p_' + Date.now();
        const newDb = getDB();
        newDb.users[user].projects[id] = { name: newProj, data: {} };
        newDb.users[user].curProj = id;
        saveDB(newDb);
        setDb(newDb);
        setNewProj('');
      };

      const handleSwitch = (id) => {
        if (user === 'admin') return;
        const newDb = getDB();
        newDb.users[user].curProj = id;
        saveDB(newDb);
        setDb(newDb);
        onBack();
      };

      return e('div', {className: 'z1'}, 
        e('div', {className: 'tool-header'}, 
          e('div', {className: 'flex-row', style:{alignItems:'center'}}, 
            e('button', {className: 'btn-sub', onClick: onBack}, '← 戻る'), 
            e('h1', {className: 'app-ttl'}, '📁 プロジェクト管理')
          )
        ),
        e('div', {className: 'tutorial-panel'}, 
          e('div', {className: 'tutorial-body'}, '案件ごとにデータを分けて保存できます。')
        ),
        e('div', {className: 'flex-row', style: {marginBottom: 20}}, 
          e('input', {className: 'form-input flex-1', placeholder: '新プロジェクト名', value: newProj, onChange: (ev) => setNewProj(ev.target.value)}), 
          e('button', {className: 'btn-primary', style: {width: 'auto'}, onClick: handleCreate, disabled: user === 'admin'}, '作成')
        ),
        Object.keys(uData.projects).map(k => {
          const p = uData.projects[k];
          const isCur = k === uData.curProj;
          return e('div', {key: k, className: 'form-card flex-row', style: {justifyContent: 'space-between', alignItems: 'center', borderColor: isCur ? '#38bdf8' : 'rgba(255,255,255,0.08)'}}, 
            e('span', {style: {fontWeight: 700, color: isCur ? '#38bdf8' : '#ffffff'}}, p.name + (isCur ? ' (選択中)' : '')), 
            !isCur && e('button', {className: 'btn-sub', onClick: () => handleSwitch(k)}, '切り替え')
          );
        })
      );
    };


    /* =========================================================================
       6. モーダル ＆ 認証画面
       ========================================================================= */
    const ManualModal = ({onClose}) => {
      return e('div', {className: 'modal-overlay', onClick: onClose}, 
        e('div', {className: 'modal-content', onClick: (ev) => ev.stopPropagation()}, 
          e('div', {className: 'tool-header', style: {marginBottom: 16, paddingBottom: 10}}, 
            e('h2', {style: {color: '#38bdf8', fontSize: 18, margin: 0}}, '📖 マニュアル'), 
            e('button', {onClick: onClose, style: {fontSize: 24, background: 'none', border: 'none', color: '#888'}}, '×')
          ),
          e('div', {style: {fontSize: 13, lineHeight: 1.7}}, 
            e('p', {style: {marginBottom: 12}}, '最新AIを操作する「完全無料」のプロンプト生成ツールです。'), 
            e('div', {className: 'tutorial-panel'}, 
              e('strong', {style: {color: '#fbbf24', display: 'block', marginBottom: 6}}, '🚀 使い方 (3ステップ)'), 
              '1. ツールの【⚙️ 設定】で条件を入れプロンプトをコピー。\n2. ChatGPT等を開き、そのまま送信。\n3. 回答をすべてコピーし、【📥 読込】に貼り付け！'
            ), 
            e('div', {className: 'tutorial-panel', style: {borderColor: 'rgba(56,189,248,0.4)'}}, 
              e('strong', {style: {color: '#38bdf8', display: 'block', marginBottom: 6}}, '🤖 無料版・有料版どちらを使うべき？'), 
              '本格的に稼ぐなら', e('strong', {style: {color: '#f43f5e'}}, '「有料版一択」'), 'です。無料版は長文で途切れやすく、Web検索も弱いためです。\n※「マイ・ブランド設定」で有料版を選ぶと、AIの能力を引き出す専用プロンプトに自動で切り替わります。'
            ), 
            e('button', {className: 'btn-primary', onClick: onClose}, '理解して使う')
          )
        )
      );
    };

    const InquiryModal = ({user, onClose}) => {
      const [type, setType] = useState(INQ_TYPES[0]);
      const [content, setContent] = useState('');
      const [sent, setSent] = useState(false);

      const handleSend = () => {
        if (!content.trim()) return;
        const newDb = getDB();
        newDb.inqs.push({ id: Date.now(), user: user, type: type, content: content, date: Date.now(), status: 'unread' });
        saveDB(newDb);
        setSent(true);
        setTimeout(onClose, 2000);
      };

      return e('div', {className: 'modal-overlay', onClick: onClose}, 
        e('div', {className: 'modal-content', onClick: (ev) => ev.stopPropagation()}, 
          e('div', {className: 'tool-header', style: {marginBottom: 16, paddingBottom: 10}}, 
            e('h2', {style: {color: '#f59e0b', fontSize: 18, margin: 0}}, '💬 管理者へ問合せ'), 
            e('button', {onClick: onClose, style: {fontSize: 24, background: 'none', border: 'none', color: '#888'}}, '×')
          ),
          sent ? e('div', {style: {textAlign: 'center', color: '#4ade80', fontWeight: 800, padding: '30px 0'}}, '送信完了しました！') : 
          e('div', null, 
            e('div', {className: 'form-card'}, 
              e('span', {className: 'form-label'}, '種別'), 
              e('select', {className: 'form-input', value: type, onChange: (ev) => setType(ev.target.value)}, 
                INQ_TYPES.map(o => e('option', {key: o, value: o}, o))
              )
            ), 
            e('div', {className: 'form-card'}, 
              e('span', {className: 'form-label'}, '内容'), 
              e('textarea', {className: 'form-input', style: {minHeight: 120}, value: content, onChange: (ev) => setContent(ev.target.value)})
            ), 
            e('button', {className: 'btn-primary', style: {background: 'linear-gradient(135deg, #f59e0b, #d97706)'}, disabled: !content.trim(), onClick: handleSend}, '送信する')
          )
        )
      );
    };

    const AuthScreen = ({onLogin}) => {
      const [isLogin, setIsLogin] = useState(true);
      const [un, setUn] = useState('');
      const [pw, setPw] = useState('');
      const [sns, setSns] = useState('');
      const [err, setErr] = useState('');

      const handleSubmit = () => {
        setErr('');
        const u = un.trim();
        if (!u) return setErr('ユーザー名を入力してください');
        
        const db = getDB();

        // Admin認証
        if (u === 'admin') {
          if (pw === db.admin.p) {
            localStorage.setItem(SESS_KEY, JSON.stringify({u: u, r: 'admin'}));
            onLogin(u, 'admin');
          } else {
            setErr('パスワードが違います');
          }
          return;
        }

        // 一般ユーザー認証
        if (isLogin) {
          if (!db.users[u]) return setErr('未登録のユーザー名です');
          localStorage.setItem(SESS_KEY, JSON.stringify({u: u, r: db.users[u].status}));
          onLogin(u, db.users[u].status);
        } else {
          if (db.users[u]) return setErr('登録済みの名前です');
          const s = sns.trim();
          if (!s || !s.includes('@')) return setErr('SNSアカウントは @ を含めてください');
          
          db.users[u] = {
            status: 'pending', sns: s, date: Date.now(),
            usage: {date: '', count: 0}, perms: {},
            brand: {plan: 'free', name: '', target: '', tone: ''},
            projects: {'default': {name: 'デフォルト', data: {}}},
            curProj: 'default'
          };
          saveDB(db);
          localStorage.setItem(SESS_KEY, JSON.stringify({u: u, r: 'pending'}));
          onLogin(u, 'pending');
        }
      };

      return e('div', {className: 'page-container'}, 
        e('div', {className: 'grid-bg'}), 
        e('div', {className: 'content-wrapper auth-container'}, 
          e('h2', {style: {fontSize: 24, fontWeight: 900, marginBottom: 4}}, 'AI Content Pro'), 
          e('p', {style: {color: '#38bdf8', fontWeight: 700, marginBottom: 24}}, 'SaaS Edition v29'), 
          e('div', {className: 'flex-row', style: {background: 'rgba(0,0,0,0.3)', padding: 4, borderRadius: 8, marginBottom: 24}}, 
            e('button', {onClick: () => {setIsLogin(true); setErr('');}, style: {flex: 1, padding: '10px', borderRadius: 6, background: isLogin ? '#38bdf8' : 'transparent', color: isLogin ? '#fff' : '#888', fontWeight: 700}}, 'ログイン'), 
            e('button', {onClick: () => {setIsLogin(false); setErr('');}, style: {flex: 1, padding: '10px', borderRadius: 6, background: !isLogin ? '#38bdf8' : 'transparent', color: !isLogin ? '#fff' : '#888', fontWeight: 700}}, '新規申請')
          ), 
          e('input', {className: 'form-input', style: {marginBottom: 14}, placeholder: 'ユーザー名 (adminで管理者)', value: un, onChange: (ev) => setUn(ev.target.value)}), 
          (!isLogin && un !== 'admin') && e('input', {className: 'form-input', style: {marginBottom: 14}, placeholder: 'SNSアカウント (@必須)', value: sns, onChange: (ev) => setSns(ev.target.value)}), 
          un === 'admin' && e('input', {className: 'form-input', style: {marginBottom: 14}, type: 'password', placeholder: '管理者パスワード', value: pw, onChange: (ev) => setPw(ev.target.value)}), 
          err && e('div', {className: 'error-box'}, err), 
          e('button', {className: 'btn-primary', style: {marginTop: 10}, onClick: handleSubmit}, isLogin ? 'ログイン' : '申請して待機画面へ')
        )
      );
    };

    const AdminDashboard = ({onGoApp, onLogout}) => {
      const [db, setDb] = useState(getDB());
      const [tab, setTab] = useState('users');
      const [expUser, setExpUser] = useState(null);

      const updateStatus = (u, st) => { const newDb = getDB(); newDb.users[u].status = st; saveDB(newDb); setDb(newDb); };
      const togglePerm = (u, tid) => { const newDb = getDB(); newDb.users[u].perms[tid] = !newDb.users[u].perms[tid]; saveDB(newDb); setDb(newDb); };
      const markRead = (id) => { const newDb = getDB(); const iq = newDb.inqs.find(x => x.id === id); if(iq) { iq.status = 'read'; saveDB(newDb); setDb(newDb); } };

      const userKeys = Object.keys(db.users).filter(k => k !== 'admin');
      const inqs = db.inqs || [];

      return e('div', {className: 'page-container'}, 
        e('div', {className: 'grid-bg'}), 
        e('div', {className: 'content-wrapper'}, 
          e('div', {className: 'tool-header'}, 
            e('h1', {className: 'app-ttl'}, '🎛️ 管理画面'), 
            e('div', {className: 'flex-row'}, 
              e('button', {className: 'btn-primary', style: {padding: '8px 16px', fontSize: 13, width: 'auto'}, onClick: onGoApp}, '🚀 ツールへ'), 
              e('button', {className: 'btn-sub', onClick: onLogout}, 'ログアウト')
            )
          ), 
          e('div', {className: 'tabs-container'}, 
            e('button', {className: `tab-item ${tab === 'users' ? 'active' : ''}`, onClick: () => setTab('users')}, '👥 ユーザー管理'), 
            e('button', {className: `tab-item ${tab === 'inqs' ? 'active' : ''}`, onClick: () => setTab('inqs')}, `📩 問い合わせ (${inqs.filter(x => x.status === 'unread').length})`)
          ), 
          tab === 'users' ? e('div', {className: 'form-card admin-table-wrapper'}, 
            e('table', {className: 'admin-table'}, 
              e('thead', null, 
                e('tr', null, e('th', null, 'User'), e('th', null, 'SNS'), e('th', null, 'Status'), e('th', null, 'Action'))
              ), 
              e('tbody', null, 
                userKeys.sort((a,b) => db.users[b].date - db.users[a].date).map(k => {
                  const u = db.users[k];
                  const isExp = expUser === k;
                  return e(Fragment, {key: k}, 
                    e('tr', null, 
                      e('td', {style: {fontWeight: 800}}, k), 
                      e('td', {style: {color: '#38bdf8'}}, u.sns), 
                      e('td', {style: {color: u.status === 'approved' ? '#4ade80' : '#f87171'}}, u.status), 
                      e('td', null, 
                        u.status !== 'approved' && e('button', {className: 'btn-sub', style: {background: '#16a34a', color: '#fff', marginRight: 6}, onClick: () => updateStatus(k, 'approved')}, '許可'), 
                        u.status === 'approved' && e('button', {className: 'btn-sub', style: {marginRight: 6}, onClick: () => setExpUser(isExp ? null : k)}, '🔑 権限'), 
                        u.status !== 'rejected' && e('button', {className: 'btn-sub', style: {background: '#e11d48', color: '#fff'}, onClick: () => updateStatus(k, 'rejected')}, 'Ban')
                      )
                    ), 
                    isExp && e('tr', null, 
                      e('td', {colSpan: 4, style: {background: 'rgba(0,0,0,0.3)'}}, 
                        e('p', {style: {fontSize: 11, color: '#fbbf24', marginBottom: 8}}, 'チェックしたツールは無制限になります'), 
                        e('div', {className: 'flex-row'}, 
                          Object.keys(TOOLS).map(tid => 
                            e('label', {key: tid, style: {fontSize: 12, display: 'flex', alignItems: 'center', gap: 6}}, 
                              e('input', {type: 'checkbox', checked: !!(u.perms && u.perms[tid]), onChange: () => togglePerm(k, tid)}), 
                              TOOLS[tid].n
                            )
                          )
                        )
                      )
                    )
                  );
                })
              )
            )
          ) : e('div', null, 
            inqs.sort((a,b) => b.date - a.date).map(iq => 
              e('div', {key: iq.id, className: 'form-card', style: {borderLeft: iq.status === 'unread' ? '3px solid #f59e0b' : ''}}, 
                e('div', {className: 'flex-row', style: {justifyContent: 'space-between', marginBottom: 8}}, 
                  e('span', {style: {fontWeight: 800, color: '#38bdf8'}}, `${iq.user} (${iq.type})`), 
                  e('span', {style: {fontSize: 11, color: '#888'}}, fmtD(iq.date))
                ), 
                e('p', {style: {whiteSpace: 'pre-wrap', fontSize: 13}}, iq.content), 
                iq.status === 'unread' && e('button', {className: 'btn-sub', style: {marginTop: 10}, onClick: () => markRead(iq.id)}, '既読にする')
              )
            )
          )
        )
      );
    };

    const MainApp = ({user, role, onLogout, onGoAdmin}) => {
      const [screen, setScreen] = useState('home');
      const [showMan, setShowMan] = useState(false);
      const [showInq, setShowInq] = useState(false);

      const db = getDB();
      const uData = db.users[user];

      if (screen === 'brand') return e(BrandSettings, {user: user, onBack: () => setScreen('home')});
      if (screen === 'proj') return e(ProjectManager, {user: user, onBack: () => setScreen('home')});
      if (TOOLS[screen]) return e(ToolEngine, {toolId: screen, user: user, role: role, onBack: () => setScreen('home')});

      const pName = uData.projects[uData.curProj] ? uData.projects[uData.curProj].name : 'Proj';
      const today = new Date().toDateString();
      const uStr = (uData.usage.date === today ? uData.usage.count : 0) + '/' + DAILY_LIMIT;

      return e('div', {className: 'page-container'}, 
        showMan && e(ManualModal, {onClose: () => setShowMan(false)}), 
        showInq && e(InquiryModal, {user: user, onClose: () => setShowInq(false)}), 
        
        e('div', {style: {position: 'absolute', top: 16, right: 16, zIndex: 100, display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'flex-end'}}, 
          role === 'admin' && e('button', {className: 'btn-sub', style: {background: '#f59e0b', border: 'none', color: '#fff'}, onClick: onGoAdmin}, '🎛️管理'), 
          role !== 'admin' && e('div', {className: 'btn-sub'}, '📂 ' + pName), 
          role !== 'admin' && e('div', {className: 'btn-sub'}, '本日: ' + uStr + '回'), 
          role !== 'admin' && e('button', {className: 'btn-sub', style: {color: '#f59e0b', borderColor: '#f59e0b'}, onClick: () => setShowInq(true)}, '💬 問合せ'), 
          e('button', {className: 'btn-sub', onClick: () => setShowMan(true)}, '📖'), 
          e('button', {className: 'btn-sub', onClick: onLogout}, 'ログアウト')
        ),
        
        e('div', {className: 'grid-bg'}), 
        e('div', {className: 'badge-main', style: {marginTop: 50, marginBottom: 16}}, 'AI Content Pro v29'), 
        e('h1', {className: 'main-title'}, 'AI Content', e('br'), e('span', null, 'Platform')), 
        e('p', {className: 'main-subtitle'}, 'コンテンツ作成からSNS集客まで完全自動化'), 
        
        role !== 'admin' && e('div', {className: 'flex-row', style: {justifyContent: 'center', marginBottom: 40}}, 
          e('button', {className: 'btn-sub', onClick: () => setScreen('proj')}, '📂 プロジェクト切替'), 
          e('button', {className: 'btn-sub', onClick: () => setScreen('brand')}, '👤 マイ・ブランド設定')
        ),
        
        e('div', {className: 'content-wrapper'}, 
          CATS.map(c => 
            e('div', {key: c.n, style: {marginBottom: 30}}, 
              e('h2', {className: 'category-title'}, c.n), 
              e('div', {className: 'tool-grid'}, 
                c.t.map(tid => {
                  const t = TOOLS[tid];
                  const canAccess = DEF_UNLOCKED.includes(tid) || role === 'admin' || (uData.perms && uData.perms[tid]);
                  
                  return e('div', {
                    key: tid, 
                    className: `tool-card ${canAccess ? '' : 'locked'}`, 
                    onClick: () => {
                      if (canAccess) setScreen(tid);
                      else alert('🔒 この機能はロックされています。管理者にお問い合わせください。');
                    }
                  }, 
                    e('div', {className: 'badge-container'}, 
                      !canAccess ? e('div', {className: 'badge-status locked'}, '🔒 ロック') : 
                      (role === 'admin' || (uData.perms && uData.perms[tid])) ? e('div', {className: 'badge-status unlimited'}, '✨ 無制限') : 
                      e('div', {className: 'badge-status free'}, '無料枠対象'), 
                      t.b && e('div', {className: `badge-main ${t.b === '神機能' ? 'red' : ''}`, style: {margin: 0}}, t.b)
                    ), 
                    e('div', {className: 'tc-icon'}, t.i), 
                    e('div', {className: 'tc-name'}, t.n), 
                    e('div', {className: 'tc-desc'}, t.d)
                  );
                })
              )
            )
          )
        )
      );
    };

    // ── Root ──
    const Root = () => {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null);
      const [goAdmin, setGoAdmin] = useState(false);
      const [showMan, setShowMan] = useState(false);

      // 安全なセッション復元
      useEffect(() => {
        try {
          const sStr = localStorage.getItem(SESS_KEY);
          if (sStr) {
            const s = JSON.parse(sStr);
            if (s && s.u) {
              if (s.r === 'admin') {
                setUser(s.u); setRole('admin'); setGoAdmin(true);
              } else {
                const db = getDB();
                if (db.users[s.u]) {
                  setUser(s.u); setRole(db.users[s.u].status);
                } else {
                  localStorage.removeItem(SESS_KEY);
                }
              }
            }
          }
        } catch(e) {}
      }, []);

      const handleLogout = () => {
        localStorage.removeItem(SESS_KEY);
        setUser(null); setRole(null); setGoAdmin(false);
      };

      const checkStatus = () => {
        try {
          const s = JSON.parse(localStorage.getItem(SESS_KEY) || '{}');
          if (s.u) {
            const db = getDB();
            if (db.users[s.u]) setRole(db.users[s.u].status);
          }
        } catch(e) {}
      };

      if (!user) {
        return e(AuthScreen, {onLogin: (usr, rol) => {
          setUser(usr); setRole(rol); if (rol === 'admin') setGoAdmin(true);
        }});
      }

      if (role === 'admin' && goAdmin) {
        return e(AdminDashboard, {onLogout: handleLogout, onGoApp: () => setGoAdmin(false)});
      }

      if (role === 'pending' || role === 'rejected') {
        return e('div', null, 
          showMan && e(ManualModal, {onClose: () => setShowMan(false)}), 
          e('div', {className: 'page-container'}, 
            e('div', {className: 'grid-bg'}), 
            e('div', {className: 'content-wrapper auth-container'}, 
              e('h2', {style: {fontSize: 24, fontWeight: 900, marginBottom: 8}}, role === 'rejected' ? '🚫 拒否' : '⏳ 承認待ち'), 
              e('p', {style: {color: 'rgba(255,255,255,0.6)', marginBottom: 20}}, role === 'rejected' ? '管理者に制限されています。' : '管理者の許可をお待ちください。'), 
              e('button', {className: 'btn-sub', style: {width: '100%', marginBottom: 16, borderColor: '#38bdf8', color: '#38bdf8'}, onClick: () => setShowMan(true)}, '📖 承認待ちの間にマニュアルを読む'), 
              e('button', {className: 'btn-primary', style: {marginBottom: 12}, onClick: checkStatus}, 'ステータス更新'), 
              e('button', {className: 'btn-sub', style: {width: '100%'}, onClick: handleLogout}, 'ログアウト')
            )
          )
        );
      }

      if (role === 'approved' || (role === 'admin' && !goAdmin)) {
        return e(MainApp, {user: user, role: role, onLogout: handleLogout, onGoAdmin: () => setGoAdmin(true)});
      }

      return null;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(Root, null));

  })();
  </script>
</body>
</html>
