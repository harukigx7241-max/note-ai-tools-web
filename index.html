<!DOCTYPE html>  
<html lang="ja">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">  
  <title>AI Content Pro - Ultimate SaaS Edition</title>  
    
  <script src="https://cdn.tailwindcss.com"></script>  
    
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>  
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>  
  
  <script>  
    tailwind.config = {  
      theme: {  
        extend: {  
          colors: {  
            brand: { DEFAULT: '#0ea5e9', light: '#38bdf8', dark: '#0369a1', accent: '#f59e0b', danger: '#f43f5e', success: '#10b981' },
            bg: { DEFAULT: '#020617', panel: '#0f172a', input: '#00000066' }
          }  
        }  
      }  
    }  
  </script>  
  
  <script>  
    document.addEventListener('contextmenu', e => e.preventDefault());  
    document.addEventListener('keydown', e => {  
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.upper())) || (e.ctrlKey && ['U','S'].includes(e.key.upper()))) e.preventDefault();
    });  
  </script>  
  
  <style>  
    body { background-color: #020617; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif; overflow: hidden; height: 100vh; }  
    .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }  
    .input-base { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 0.75rem; padding: 1rem; color: #fff; font-size: 15px; outline: none; transition: 0.2s; }  
    .input-base:focus { border-color: #38bdf8; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }  
    .btn-gradient { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); transition: 0.3s; color: white; font-weight: bold; }  
    .btn-gradient:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }  
    .btn-gradient:active:not(:disabled) { transform: translateY(1px); }
    .btn-gradient:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }  
    
    .preview-content h1 { font-size: 1.7rem; font-weight: 900; margin: 1.5em 0 0.5em; border-bottom: 1px solid #cbd5e1; padding-bottom: 0.3em; color: #000; }  
    .preview-content h2 { font-size: 1.4rem; font-weight: 800; margin: 1.5em 0 0.5em; padding-left: 0.5em; border-left: 4px solid #0ea5e9; color: #111; }  
    .preview-content h3 { font-size: 1.1rem; font-weight: 700; margin: 1.2em 0 0.5em; color: #222; }  
    .preview-content p { margin-bottom: 1em; line-height: 1.8; color: #333; }  
    .preview-content strong { font-weight: 900; color: #0ea5e9; }  
    .preview-content ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 1em; color: #333; }  
    .preview-content li { margin-bottom: 0.3em; }  
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }  
    .animate-in { animation: fadeIn 0.3s ease-out forwards; }  
  </style>  
</head>  
<body>  
  <div id="root"></div>  
  
  <script>  
  (function() {  
    'use strict';  
    const el = React.createElement;  
    const { useState, useEffect, Component, Fragment, useRef } = React;  
    const div = (pr, ...c) => el('div', pr, ...c);  
    const span = (pr, ...c) => el('span', pr, ...c);  
    const button = (pr, ...c) => el('button', pr, ...c);  
    const h1 = (pr, ...c) => el('h1', pr, ...c);
    const h2 = (pr, ...c) => el('h2', pr, ...c);
    const h3 = (pr, ...c) => el('h3', pr, ...c);
    const p = (pr, ...c) => el('p', pr, ...c);
    const label = (pr, ...c) => el('label', pr, ...c);
    const input = (pr, ...c) => el('input', pr, ...c);
    const option = (pr, ...c) => el('option', pr, ...c);
  
    const DB_KEY = 'AICP_v70_BYOK_DB';   
    const SESS_KEY = 'AICP_v70_Session';  
    const SYS_VERSION = 'v70.1.0 SaaS Beta';  
  
    const AppDB = {  
      get: () => {  
        let db = null;  
        try { db = JSON.parse(localStorage.getItem(DB_KEY)); } catch (e) {}  
        if (!db) {  
          db = {   
            config: { adminU: 'admin', adminP: 'admin123' },   
            users: { 'admin': { nickname: '管理者', status: 'approved', usage: { count: 0 }, perms: {}, settings: { aiModel: 'chatgpt_free', keys: {openai:'', anthropic:'', google:''} }, curProj: 'default', projects: { 'default': { name: '管理者領域', data: {} } } } }   
          };  
          localStorage.setItem(DB_KEY, JSON.stringify(db));  
        }  
        Object.keys(db.users).forEach(u => {
            if(!db.users[u].settings) db.users[u].settings = { aiModel: 'chatgpt_free' };
            if(!db.users[u].settings.keys) db.users[u].settings.keys = {openai:'', anthropic:'', google:''};
        });
        return db;  
      },  
      save: (db) => { try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch (e) {} }  
    };  
  
    const getAIPrefix = (modelId) => {  
      const isPaid = modelId.includes('paid');  
      let aiName = modelId.includes('claude') ? 'Claude' : modelId.includes('gemini') ? 'Gemini' : 'ChatGPT';
      let spec = isPaid ? '有料版(最上位モデル)です。最高の創造性を発揮してください。' : '無料版です。簡潔かつ的確に要求を満たしてください。';
      return `【システム指示：${aiName} ${spec}】\nあなたは世界トップクラスの専門家（AI）アシ কূটনীতিকです。\n`;  
    };  
  
    const renderMarkdown = (text) => {  
      if (!text) return { __html: '' };  
      let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');  
      html = html.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');  
      html = html.replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold mt-4 mb-2">$1</h3>');  
      html = html.replace(/^## (.*$)/gim, '<h2 class="text-xl font-black mt-6 mb-3 border-l-4 border-brand pl-2">$1</h2>');  
      html = html.replace(/^# (.*$)/gim, '<h1 class="text-2xl font-black mt-8 mb-4 border-b border-gray-200 pb-2">$1</h1>');  
      html = html.replace(/^\- (.*$)/gim, '<ul class="list-disc pl-5 mb-2"><li>$1</li></ul>');  
      html = html.replace(/<\/ul>\n*<ul class="list-disc pl-5 mb-2">/gim, '');  
      html = html.replace(/\n/g, '<br/>');  
      return { __html: html };  
    };  
  
    const TOOLS = {  
      note: { cat: 'mon', icon: '📝', name: 'note記事 究極生成', desc: '売れるnote記事を、各LLM経由で爆速執筆。', 
        fields: [
          { id: 'theme', t: 'text', l: '記事テーマ', ph: '例: スマホ1台で月5万稼ぐ極意', isMainMagic: true },
          { id: 'target', t: 'area', l: '読者の悩み', ph: '例: 副業したいがスキルがない30代会社員' },
          { id: 'guarantee', t: 'check', l: '返金保証をアピール' }
        ],
        build: (v) => `# note記事執筆指示\nテーマ「${v.theme}」について、読者の悩み「${v.target}」を解決し、共感を生んで購入を促す高品質なnote有料記事を執筆してください。\nPASONAの法則を用いて感情を動かしてください。\n${v.guarantee ? '※返金保証があることを強くアピールしてください。' : ''}` 
      },  
      lp: { cat: 'mon', icon: '📄', name: '爆売れLP作成', desc: '高単価商品を一撃で成約させるセールスコピー。',
        fields: [
          { id: 'prod', t: 'text', l: '商品名・価格', ph: '例: AIコンサル (10万円)', isMainMagic: true },
          { id: 'bene', t: 'area', l: '最強のベネフィット', ph: '例: 会社に依存せず自由な収入と時間を手に入れる' }
        ],
        build: (v) => `# LP作成指示\n商品「${v.prod}」を販売するためのランディングページ構成とコピーを作成してください。\nベネフィット「${v.bene}」を強調し、読者の抱える痛みに共感し、この商品こそが唯一の解決策であると確信させる構成にしてください。`
      },  
      sns: { cat: 'sns', icon: '📱', name: 'SNS無限集客ポスト', desc: 'バズと集客を両立する投稿文を生成。',
        fields: [
          { id: 'platform', t: 'select', l: '媒体', opts: ['X(Twitter)', 'Threads'] },
          { id: 'content', t: 'area', l: '伝えたい内容', ph: '例: 継続が大事。完璧を目指さない。' }
        ],
        build: (v) => `# ${v.platform}投稿作成指示\n「${v.content}」という内容をもとに、インプレッションとエンゲージメントが爆発する投稿文を3パターン作成してください。\nスマホでの読みやすさ、フック（最初の1行）のインパクトを最大化してください。`
      },
      image: { cat: 'sns', icon: '🎨', name: '画像生成AIプロンプト', desc: 'Midjourney等向けの英語の「呪文」を作成。', isImagePrompt: true, 
        fields: [ { id: 'desc', t: 'text', l: '描きたい内容', ph: '例: サイバーパンクな未来の東京' } ],
        build: (v) => v.desc
      },
      line: { cat: 'fun', icon: '💌', name: 'LINE教育ステップ', desc: '5日間でファン化して販売する自動導線。',
        fields: [
          { id: 'prod', t: 'text', l: '販売商品', ph: '例: 動画編集教材' },
          { id: 'story', t: 'area', l: 'どん底からの成功ストーリー', ph: '例: 手取り15万から独立して月商100万' }
        ],
        build: (v) => `# LINE教育ステップ作成指示\n商品「${v.prod}」を販売するために、公式LINE登録者を5日間教育しファン化するシナリオを作成してください。\nユーザーのストーリー「${v.story}」を織り込み、信頼構築からオファーまで繋げてください。`
      },
      webdev: { cat: 'fun', icon: '💻', name: 'Webアプリ開発支援', desc: 'アイデアからプロトタイプのコードを生成。',
        fields: [ { id: 'idea', t: 'area', l: '作りたいツール案', ph: '例: 食材からレシピを提案するAIアプリ' } ],
        build: (v) => `# Webアプリ開発指示\nアイデア「${v.idea}」を実現するための、要件定義と1枚のHTML（JavaScript, CSS含む）で動くプロトタイプコードの構造を設計してください。`
      }
    };  
  
    const CATEGORIES = [  
      { id: 'mon', name: '📝 コンテンツ作成 ＆ 販売' },  
      { id: 'sns', name: '🚀 集客 ＆ 画像生成' },  
      { id: 'fun', name: '💬 セールス自動化 ＆ 開発' }  
    ];  
  
    const LoadingCircle = () => div({ className: 'w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin' });
    const ErrorAlert = ({ msg }) => div({ className: 'p-4 bg-brand-danger/10 border border-brand-danger/30 rounded-xl text-brand-danger text-sm font-bold animate-in' }, `⚠️ エラー: ${msg}`);

    const FormInput = ({ f, val, onChange, onMagic, isMagicLoading }) => {  
      const isMainMagic = f.isMainMagic;  
      const value = val !== undefined ? val : (f.t === 'check' ? false : (f.opts ? f.opts[0] : ''));  
  
      const inputEl = () => {  
        if (f.t === 'text') return el('input', { className: 'input-base', value, placeholder: f.ph||'', onChange: e => onChange(f.id, e.target.value) });  
        if (f.t === 'area') return el('textarea', { className: 'input-base min-h-[100px] resize-y text-sm', value, placeholder: f.ph||'', onChange: e => onChange(f.id, e.target.value) });  
        if (f.t === 'select') return el('select', { className: 'input-base text-sm', value, onChange: e => onChange(f.id, e.target.value) }, f.opts.map(o => el('option', { key: o, value: o, className: 'bg-bg-panel' }, o)));  
        if (f.t === 'check') return el('label', { className: 'flex items-center gap-3 cursor-pointer p-2' },   
          div({ className: 'w-10 h-6 bg-gray-700 rounded-full relative transition' },   
            div({ className: 'absolute top-1 left-1 w-4 h-4 rounded-full transition ' + (value ? 'bg-brand left-5' : 'bg-gray-400') })  
          ),  
          el('input', { type: 'checkbox', className: 'hidden', checked: !!value, onChange: e => onChange(f.id, e.target.checked) }),  
          span({ className: 'text-sm font-bold text-slate-300' }, '機能を有効にする')  
        );  
        return null;  
      };  
  
      return div({ className: 'mb-6 animate-in relative' },  
        isMagicLoading && isMainMagic && div({ className: 'absolute inset-0 bg-black/60 z-10 rounded-2xl flex items-center justify-center backdrop-blur-sm' }, el(LoadingCircle)),
        div({ className: 'flex justify-between items-center mb-2 gap-2' },  
          span({ className: 'text-xs font-black text-slate-400 tracking-wider' }, f.l),  
          isMainMagic && button({   
            onClick: () => onMagic(f.id),  
            disabled: isMagicLoading,
            className: 'bg-gradient-to-r from-brand-accent to-red-500 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg hover:brightness-110 transition disabled:opacity-50'  
          }, '✨ 魔法で入力')
        ),  
        inputEl()  
      );  
    };  
  
    const UserSettingModal = ({ user, onClose }) => {
        const [db, setDb] = useState(AppDB.get());
        const uData = db.users[user];
        const [keys, setKeys] = useState(uData.settings.keys);
        const [aiModel, setAiModel] = useState(uData.settings.aiModel);

        const save = () => {
            const ndb = AppDB.get();
            ndb.users[user].settings.keys = keys;
            ndb.users[user].settings.aiModel = aiModel;
            AppDB.save(ndb);
            onClose();
            window.location.reload(); 
        };

        const keyInput = (lang, provider, ph) => div({ className: 'mb-4' },
            label({ className: 'block text-xs font-bold text-slate-400 mb-1.5' }, `${lang} APIキー (${provider})`),
            el('input', { type: 'password', className: 'input-base !py-2.5 text-sm font-mono', placeholder: ph, value: keys[provider], onChange: e => setKeys({...keys, [provider]: e.target.value}) })
        );

        return div({ className: 'fixed inset-0 z-[200] flex items-center justify-center bg-black/80 p-4 animate-in' },
            div({ className: 'glass-panel rounded-3xl max-w-xl w-full p-8 relative flex flex-col max-h-[90vh]' },
                button({ onClick: onClose, className: 'absolute top-5 right-5 text-slate-400 hover:text-white text-xl font-bold transition' }, '✕'),
                h3({ className: 'text-xl font-black text-white mb-6 pb-4 border-b border-white/10' }, '⚙️ 個人設定 (APIキー登録)'),
                div({ className: 'overflow-y-auto flex-1 pr-3 hide-scrollbar' },
                    p({ className: 'text-xs text-brand-accent mb-6 bg-brand-accent/10 p-4 rounded-xl border border-brand-accent/20 leading-relaxed' }, '🔑 ここで登録したキーはブラウザ内にのみ保存されます。用途に応じて各AIがあなたのキーで動作します(BYOK)。'),
                    keyInput('OpenAI (ChatGPT)', 'openai', 'sk-...'),
                    keyInput('Anthropic (Claude)', 'anthropic', 'sk-ant-...'),
                    keyInput('Google (Gemini)', 'google', 'AIza...'),
                    div({ className: 'mt-8 pt-6 border-t border-white/10' },
                        label({ className: 'block text-xs font-bold text-slate-400 mb-1.5' }, '🤖 デフォルトAIモデル'),
                        el('select', { className: 'input-base !py-2.5 text-sm', value: aiModel, onChange: e => setAiModel(e.target.value) },
                            option({ value: 'chatgpt_free' }, 'ChatGPT (無料版)'),
                            option({ value: 'chatgpt_paid' }, 'ChatGPT Plus (有料版)'),
                            option({ value: 'claude_free' }, 'Claude 3 (無料版)'),
                            option({ value: 'claude_paid' }, 'Claude 3 Pro (有料版)'),
                            option({ value: 'gemini_free' }, 'Gemini (無料版)'),
                            option({ value: 'gemini_paid' }, 'Gemini Advanced (有料版)')
                        )
                    )
                ),
                button({ onClick: save, className: 'w-full btn-gradient py-4 rounded-xl font-black mt-6 shadow-xl' }, '保存して閉じる')
            )
        );
    };

    const ToolCore = ({ tid, user, role, onBack }) => {  
      const conf = TOOLS[tid];  
      const [db, setDb] = useState(AppDB.get());  
      const uData = db.users[user];  
      const userKeys = uData.settings.keys;
      const [vals, setVals] = useState(uData.projects[uData.curProj].data[tid] || {});  
      const [copied, setCopied] = useState({});  
      const [res, setRes] = useState(uData.projects[uData.curProj].data[tid]?.res || '');  
      const [error, setError] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [isMagicLoading, setIsMagicLoading] = useState(false);
      const [aiModel, setAiModel] = useState(uData.settings.aiModel);
      const [imageAI, setImageAI] = useState('openai');

      useEffect(() => { window.scrollTo(0, 0); }, []);  
  
      const updateRes = (v) => {  
        setRes(v);  
        if (role !== 'admin') {  
          const ndb = AppDB.get();  
          if (!ndb.users[user].projects[uData.curProj].data[tid]) ndb.users[user].projects[uData.curProj].data[tid] = {};  
          ndb.users[user].projects[uData.curProj].data[tid].res = v;  
          AppDB.save(ndb);  
        }  
      };  
  
      const handleMagic = async (fid) => {  
        setIsMagicLoading(true);  setError('');
        const keysToSend = { openai: userKeys.openai };
        const reqFields = conf.fields.map(f => ({ id: f.id, l: f.l, ph: f.ph||"" }));
        try {
            const response = await fetch('/api/magic_generate', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tool_id: tid, fields: reqFields, user_keys: keysToSend, target_fid: fid })
            });
            const data = await response.json();
            if (data.status === 'success') {
                const newVals = { ...vals, ...data.data };
                setVals(newVals);
                if (role !== 'admin') {  
                    const ndb = AppDB.get(); ndb.users[user].projects[uData.curProj].data[tid] = newVals; AppDB.save(ndb);  
                }
            } else { setError(data.message); }
        } catch (e) { setError('通信エラー: Pythonサーバーと接続できません。'); }
        setIsMagicLoading(false);
      };  
  
      const handleGenerate = async () => {  
        setIsLoading(true); setError('');
        const isImage = conf.isImagePrompt;
        const prefix = isImage ? "" : getAIPrefix(aiModel);
        const fullPrompt = prefix + conf.build(vals);
        let keysToSend = {};
        let aiProvider = 'openai';

        if(isImage) {
            aiProvider = imageAI; 
            keysToSend = { [aiProvider]: userKeys[aiProvider] };
        } else {
            keysToSend = { openai: userKeys.openai };
        }

        try {
            const endpoint = isImage ? '/api/magic_generate' : '/api/auto_generate';
            const body = isImage ? 
                { tool_id: tid, fields: conf.fields.map(f=>({...f, val:vals[f.id]||""})), user_keys: keysToSend, prompt_instruction: aiProvider } :
                { prompt: fullPrompt, user_api_key: keysToSend.openai, ai_model: aiModel };

            const response = await fetch(endpoint, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
            });
            const data = await response.json();
            if (data.status === 'success') {
                updateRes(isImage ? data.data : data.result);
            } else { setError(data.message); }
        } catch (e) { setError('通信エラー: Pythonサーバーと接続できません。'); }
        setIsLoading(false);
      };  
  
      const copy = (text, key) => {
          if (navigator.clipboard) navigator.clipboard.writeText(text);
          setCopied({...copied, [key]: true});
          setTimeout(() => setCopied(prev => ({...prev, [key]: false})), 2000);
      };

      return div({ className: 'flex flex-col lg:flex-row h-full animate-in' },  
        div({ className: 'w-full lg:w-[400px] border-r border-white/10 p-6 md:p-8 overflow-y-auto hide-scrollbar shrink-0' },
          div({ className: 'flex items-center gap-3 mb-8' },
              button({ onClick: onBack, className: 'glass-panel px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-white/10' }, '←'),
              h2({ className: 'text-xl font-black text-white' }, conf.name)
          ),
          div({ className: 'space-y-6' }, 
              conf.fields.map(f => el(FormInput, { 
                  key: f.id, f, val: vals[f.id], 
                  onChange: (id, v) => {
                      const nv = { ...vals, [id]: v };
                      setVals(nv);
                      if (role !== 'admin') {  
                          const ndb = AppDB.get(); ndb.users[user].projects[uData.curProj].data[tid] = nv; AppDB.save(ndb);  
                      }
                  }, onMagic: handleMagic, isMagicLoading 
              }))
          ),
          button({ onClick: () => { setVals({}); updateRes(''); setError(''); }, className: 'text-xs text-slate-500 hover:text-white mt-4 w-full text-right' }, '🗑️ クリア'),

          conf.isImagePrompt && div({ className: 'mt-8 pt-6 border-t border-white/10' },
              label({ className: 'block text-xs font-bold text-slate-400 mb-2' }, '🔮 プロンプトを作成するAIを選択 (BYOK)'),
              div({ className: 'flex gap-2' },
                  ['openai', 'anthropic', 'google'].map(p => button({
                      key: p, onClick: () => setImageAI(p),
                      className: `flex-1 py-2 rounded-lg text-xs font-bold border transition ${imageAI === p ? 'bg-brand/20 border-brand text-white' : 'bg-black/30 border-white/5 text-slate-400 hover:bg-white/5'}`
                  }, p.toUpperCase()))
              )
          ),

          button({ onClick: handleGenerate, disabled: isLoading || isMagicLoading, className: 'w-full btn-gradient py-4 rounded-xl font-black mt-8 text-lg flex items-center justify-center gap-3 shadow-2xl shadow-brand/20'
          }, isLoading ? [el(LoadingCircle), '魔法をかけています...'] : [`✨ ${conf.isImagePrompt?'呪文':'コンテンツ'}を全自動生成`]),
          error && div({ className: 'mt-4' }, el(ErrorAlert, { msg: error }))
        ),

        div({ className: 'flex-1 bg-black p-6 md:p-10 overflow-y-auto hide-scrollbar' },
            res ? div({ className: 'animate-in' },
                div({ className: 'flex justify-between items-center mb-6' },
                    h3({ className: 'text-sm font-black text-slate-400 uppercase tracking-wider' }, '👀 生成結果'),
                    div({ className: 'flex gap-2' },
                        button({ onClick: () => copy(res, 'raw'), className: `glass-panel px-4 py-2 rounded-lg text-xs font-bold transition ${copied.raw ? 'text-brand-success' : 'text-slate-300'}` }, copied.raw ? '✓' : '📋 Rawコピー'),
                        !conf.isImagePrompt && button({ onClick: () => {
                            const el = document.getElementById('preview-content');
                            if(el) {
                                const range = document.createRange(); range.selectNodeContents(el);
                                const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
                                document.execCommand('copy'); sel.removeAllRanges(); copy('', 'rich');
                            }
                        }, className: `btn-gradient px-4 py-2 rounded-lg text-xs font-bold transition ${copied.rich ? 'border-brand-success' : ''}` }, copied.rich ? '✓ コピー済' : '📋 装飾コピー')
                    )
                ),
                div({ id: 'preview-content', className: 'bg-white p-6 md:p-8 rounded-2xl shadow-inner min-h-[400px] overflow-x-auto ' + (conf.isImagePrompt ? 'font-mono text-sm text-black whitespace-pre-wrap bg-gray-100' : 'preview-content text-black') }, 
                    conf.isImagePrompt ? res : div({ dangerouslySetInnerHTML: renderMarkdown(res) })
                )
            ) : div({ className: 'flex h-full items-center justify-center text-center p-10' },
                div({ className: 'text-slate-600' },
                    div({ className: 'text-6xl mb-4' }, conf.icon),
                    div({ className: 'font-bold' }, '左側のフォームを入力して'),
                    div({ className: 'font-bold' }, '「全自動生成」ボタンを押してください')
                )
            )
        )
      );
    };  
  
    const MainApp = (props) => {  
      const [screen, setScreen] = useState('home');  
      const [showSettings, setShowSettings] = useState(false);
      const db = AppDB.get();  
      const uData = db.users[props.user];  
  
      useEffect(() => { window.scrollTo(0, 0); }, [screen]);  

      const openTool = (tid) => {  
        const isPermitted = props.role === 'admin' || (uData.perms[tid] !== undefined ? uData.perms[tid] : true);  
        if (!isPermitted) return alert('🔒 このツールはロックされています');  
        setScreen(tid);  
      };  
  
      if (TOOLS[screen]) return el(ToolCore, { tid: screen, user: props.user, role: props.role, onBack: () => setScreen('home') });  
  
      const Sidebar = () => div({ className: 'w-[260px] h-full bg-bg-panel border-r border-white/10 p-6 flex flex-col shrink-0' },
          div({ className: 'flex items-center gap-2 mb-10' }, 
              div({ className: 'w-3 h-8 bg-brand rounded-full' }),
              h1({ className: 'text-2xl font-black text-white tracking-tighter' }, 'AICP Pro')
          ),
          div({ className: 'flex-1 space-y-2 overflow-y-auto hide-scrollbar' },
              CATEGORIES.map(cat => [
                  h2({ key: 'h-'+cat.id, className: 'text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mt-6 mb-2 ml-2' }, cat.name),
                  Object.keys(TOOLS).filter(k=>TOOLS[k].cat===cat.id).map(tid => button({
                      key: tid, onClick: () => openTool(tid),
                      className: 'w-full text-left p-3 rounded-lg text-sm font-bold flex items-center gap-3 hover:bg-white/5 transition ' + (screen===tid?'bg-brand/10 text-white':'text-slate-300')
                  }, span({className:'text-lg'}, TOOLS[tid].icon), TOOLS[tid].name))
              ])
          ),
          div({ className: 'mt-10 pt-6 border-t border-white/10 space-y-3' },
              button({ onClick: () => setShowSettings(true), className: 'w-full bg-white/5 hover:bg-white/10 p-3 rounded-lg text-sm font-bold text-slate-300 flex items-center gap-3 transition' }, '⚙️ 個人設定'),
              button({ onClick: props.onLogout, className: 'w-full text-left p-3 rounded-lg text-sm font-bold text-slate-500 hover:text-white transition' }, '👋 ログアウト')
          )
      );

      return div({ className: 'flex h-full animate-in' },  
        el(Sidebar),
        showSettings && el(UserSettingModal, { user: props.user, onClose: () => setShowSettings(false) }),
        div({ className: 'flex-1 bg-bg h-full p-8 md:p-12 overflow-y-auto hide-scrollbar' },
            screen === 'home' && div({ className: 'max-w-6xl mx-auto' },
                div({ className: 'mb-12' },
                    h1({ className: 'text-4xl md:text-5xl font-black text-white mb-3 tracking-tight' }, `こんにちは、${uData.nickname}さん`),
                    p({ className: 'text-slate-400 text-lg' }, '今日はどのコンテンツを作成しますか？サイドバーからツールを選択してください。')
                ),
                CATEGORIES.map(cat => div({ key: 'p-'+cat.id, className: 'mb-12' },
                    h2({ className: 'text-xl font-black text-slate-200 mb-6' }, cat.name),
                    div({ className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' },
                        Object.keys(TOOLS).filter(k=>TOOLS[k].cat===cat.id).map(tid => {
                            const t = TOOLS[tid];
                            return div({ key: tid, onClick: () => openTool(tid), className: 'glass-panel p-6 rounded-2xl cursor-pointer hover:-translate-y-1 hover:border-brand/40 transition-all group' },
                                div({ className: 'flex justify-between items-start mb-4' },
                                    div({ className: 'text-4xl group-hover:scale-110 transition' }, t.icon),
                                    t.cat==='mon'&&span({className:'bg-brand/10 text-brand text-[10px] font-black px-3 py-1 rounded-full'},'収益化')
                                ),
                                h3({ className: 'text-lg font-black text-white mb-2' }, t.name),
                                p({ className: 'text-xs text-slate-400 leading-relaxed line-clamp-2' }, t.desc)
                            );
                        })
                    )
                ))
            )
        )
      );  
    };  
  
    const AuthBox = (props) => {  
      const [nickname, setNickname] = useState('');  
      const [pass, setPass] = useState('');  
      const [err, setErr] = useState('');  
  
      const login = () => {  
        setErr('');  
        const db = AppDB.get();  
        if (nickname === db.config.adminU && pass === db.config.adminP) {  
          localStorage.setItem(SESS_KEY, JSON.stringify({ u: 'admin', r: 'admin' }));  
          props.onLogin('admin', 'admin');  
          return;  
        }  
        if(nickname && db.users[nickname] && db.users[nickname].status === 'approved') {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: nickname, r: 'approved' }));
            props.onLogin(nickname, 'approved');
        } else { setErr('ニックネームまたはパスワードが違います。'); }
      };  
  
      return div({ className: 'w-full h-full flex items-center justify-center p-4' },  
        div({ className: 'glass-panel rounded-3xl p-10 md:p-16 shadow-2xl text-center max-w-lg w-full' },  
          h2({ className: 'text-3xl font-black mb-12 tracking-tight text-white' }, 'AI Content Pro'),  
          div({ className: 'space-y-5 text-left' },  
            input({ className: 'input-base text-center', placeholder: 'ニックネーム', value: nickname, onChange: e => setNickname(e.target.value) }),  
            input({ type: 'password', className: 'input-base text-center font-mono', placeholder: 'パスワード', value: pass, onChange: e => setPass(e.target.value) }),  
            err && p({ className: 'text-brand-danger text-xs font-bold text-center' }, err),  
            button({ onClick: login, className: 'w-full btn-gradient py-4 rounded-xl text-lg mt-4' }, 'ログインする')  
          )  
        )  
      );  
    };  
  
    const App = () => {  
      const [auth, setAuth] = useState({ u: null, r: null });  
      useEffect(() => {  
        const session = localStorage.getItem(SESS_KEY);  
        if (session) setAuth(JSON.parse(session));  
      }, []);  
  
      if (!auth.u) return el(AuthBox, { onLogin: (u, r) => setAuth({ u, r }) });  
      return el(MainApp, { user: auth.u, role: auth.r, onLogout: () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); } });  
    };  
  
    ReactDOM.createRoot(document.getElementById('root')).render(el(App));  
  })();  
  </script>  
</body>  
</html>
