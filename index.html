  (function() {

    /* =========================================================================

       ========================================================================= */
    const el = React.createElement;
    const { useState, useEffect, Component } = React;

    const div = (props, ...children) => el('div', props, ...children);
    const span = (props, ...children) => el('span', props, ...children);

    const h1 = (props, ...children) => el('h1', props, ...children);

    const input = (props) => el('input', props);
    const textarea = (props) => el('textarea', props);
    const select = (props, ...children) => el('select', props, ...children);
    const option = (props, ...children) => el('option', props, ...children);
    const label = (props, ...children) => el('label', props, ...children);

    /* =========================================================================
       2. Error Boundary (絶対防護壁)
       【機能説明】システム内で予期せぬエラーが起きても、画面を真っ白にさせず復旧ボタンを出す機能。
       ========================================================================= */
    class ErrorBoundary extends Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, errorInfo: null };
      }
      static getDerivedStateFromError(error) { return { hasError: true }; }
      componentDidCatch(error, errorInfo) {
        console.error("システムエラーを検知:", error, errorInfo);
        this.setState({ errorInfo: error.toString() });
      }
      render() {
        if (this.state.hasError) {
          return div({ className: "min-h-screen flex items-center justify-center p-4 md:p-6" },
            div({ className: "glass-panel p-6 md:p-8 rounded-2xl max-w-xl w-full text-center" },
              h2({ className: "text-xl md:text-2xl font-black text-brand-danger mb-4" }, "⚠️ システムエラーが発生しました"),

                className: "btn-gradient w-full py-3 rounded-xl font-bold text-white",
                onClick: () => { localStorage.clear(); window.location.reload(); }
              }, "システムをリセットして復旧する")

        }
        return this.props.children;
      }

    /* =========================================================================
       6. 共通UIコンポーネント (フォームや表示周り)
       【機能説明】各ツール共通で使用される入力枠の生成やデザインを行います。
       ========================================================================= */
    const FormInput = ({ f, val, onChange, onMagic }) => {
      const isMagic = f.magic || f.isMainMagic;
      const value = val !== undefined ? val : (f.t === 'check' ? false : (f.opts ? f.opts[0] : ''));

      const renderInput = () => {
        if (f.t === 'text') return input({ className: 'input-base', value: value, placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
        if (f.t === 'area') return textarea({ className: 'input-base min-h-[120px] resize-y', value: value, placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
        if (f.t === 'select') return select({ className: 'input-base', value: value, onChange: e => onChange(f.id, e.target.value) }, f.opts.map(o => option({ key: o, value: o, className: 'bg-slate-900' }, o)));
        if (f.t === 'check') return label({ className: 'flex items-center gap-3 cursor-pointer p-2' }, 
          div({ className: 'w-10 h-6 bg-slate-800 rounded-full relative transition border border-white/10' }, 
            div({ className: 'absolute top-1 left-1 w-4 h-4 rounded-full transition ' + (value ? 'bg-brand left-5' : 'bg-slate-500') })
          ),
          input({ type: 'checkbox', className: 'hidden', checked: !!value, onChange: e => onChange(f.id, e.target.checked) }),
          span({ className: 'text-sm font-bold text-white/80' }, '機能を有効にする')
        );
        return null;
      };

      return div({ className: 'glass-panel rounded-2xl p-4 md:p-6 mb-4 md:mb-5 animate-in w-full' },
        div({ className: 'flex flex-col sm:flex-row justify-between sm:items-center mb-3 gap-2' },
          span({ className: 'text-[11px] md:text-xs font-black text-slate-400 tracking-widest uppercase break-words' }, f.l),
          isMagic ? button({ 
            onClick: () => onMagic(f.id, !!f.isMainMagic),
            className: 'bg-gradient-to-r from-brand-accent to-red-500 text-white text-[10px] md:text-xs font-black px-4 py-1.5 rounded-full shadow-lg active:scale-95 transition hover:brightness-110 self-start sm:self-auto shrink-0'
          }, '✨ 魔法の杖') : null
        ),
        renderInput()
      );
    };

    /* =========================================================================
       7. ツール実行エンジン
       【機能説明】選択したツールの入力項目を表示し、プロンプトを構築してクリップボードにコピーします。
       ========================================================================= */
    const ToolCore = ({ tid, user, role, onBack }) => {
      const conf = TOOLS[tid];
      const [db, setDb] = useState(AppDB.get());
      const uData = db.users[user];
      const pid = uData.curProj;
      const [vals, setVals] = useState(uData.projects[pid].data[tid] || {});
      const [copied, setCopied] = useState({});
      const [res, setRes] = useState(null);

      const update = (fid, v) => {
        const nv = { ...vals, [fid]: v };
        setVals(nv);
        if (role !== 'admin') {
          const ndb = AppDB.get();
          ndb.users[user].projects[pid].data[tid] = nv;
          AppDB.save(ndb);
        }
      };

      // 【機能説明】魔法の杖 ガチャシステム＆動的連動のコアロジック
      const handleMagic = (fid, isMain) => {
        if (isMain) {
          const magicSet = getRandomMagic(tid);
          if (magicSet) {
            const newVals = { ...vals };
            Object.keys(magicSet).forEach(k => { newVals[k] = magicSet[k]; });
            setVals(newVals);
          }
        } else {
          const f = conf.fields.find(x => x.id === fid);
          if (tid === 'closing' && fid === 'obj') {
             const pool = MAGIC_DATA.closing_obj;
             update(fid, pool[Math.floor(Math.random() * pool.length)]);
          } else if (f && f.magic) {
             update(fid, f.magic);
          }
        }
      };

      const onGenerate = () => {
        let canAccess = false;
        if (role === 'admin' || uData.perms[tid]) canAccess = true;
        else if (uData.usage.date !== new Date().toDateString() || uData.usage.count < DAILY_LIMIT) canAccess = true;

        if (!canAccess) { alert('本日の無料枠を終了しました。'); return; }

        if (role !== 'admin' && !uData.perms[tid]) {
          const ndb = AppDB.get();
          const today = new Date().toDateString();
          if (ndb.users[user].usage.date !== today) ndb.users[user].usage = { date: today, count: 0 };
          ndb.users[user].usage.count++;
          AppDB.save(ndb);
        }

        const prefix = "【AIモード起動】\n";
        const prompt = prefix + conf.build(vals) + "\n\n【ルール】前置き不要、指定フォーマットのみ出力。";
        copyText(prompt, copied, setCopied, 'gen');
      };

      const header = div({ className: 'flex flex-col sm:flex-row justify-between sm:items-center mb-6 md:mb-8 pb-4 md:pb-6 border-b border-white/10 animate-in gap-4' },
        div({ className: 'flex items-center gap-3 md:gap-4' },
          button({ onClick: onBack, className: 'glass-panel px-4 py-2 md:px-5 md:py-2.5 rounded-xl text-xs md:text-sm font-bold hover:bg-white/10 transition shrink-0' }, '← BACK'),
          div(null, h1({ className: 'text-xl md:text-2xl font-black text-white break-words' }, conf.name), p({ className: 'text-[10px] md:text-xs text-brand font-bold uppercase tracking-widest mt-1 break-words' }, conf.desc))
        )
      );

      return div({ className: 'w-full max-w-4xl mx-auto px-4 sm:px-6 lg:px-8' },
        header,
        conf.tut && div({ className: 'bg-brand/5 border border-brand/20 rounded-2xl p-4 md:p-6 mb-6 md:mb-8 break-words' }, p({ className: 'text-xs md:text-sm text-brand-light font-bold' }, '💡 ' + conf.tut)),
        div({ className: 'space-y-4' }, conf.fields.map(f => el(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic }))),
        button({ onClick: onGenerate, className: 'w-full py-4 md:py-6 rounded-2xl btn-gradient text-white font-black text-lg md:text-xl shadow-xl mt-4 mb-8 md:mb-10 break-words' }, copied.gen ? '✓ コピー完了！AIへ送信してください' : '📋 プロンプト生成 ＆ コピー'),
        div({ className: 'glass-panel rounded-3xl p-6 md:p-8 animate-in w-full' },
          span({ className: 'block text-[10px] md:text-xs font-black text-slate-400 mb-4 tracking-[0.2em] uppercase break-words' }, '📥 AIの回答を貼り付けて保存・編集'),
          textarea({ className: 'input-base min-h-[300px] md:min-h-[400px]', value: res || '', onChange: e => setRes(e.target.value) }),
          button({ onClick: () => copyText(res, copied, setCopied, 'ca'), className: 'w-full bg-white/10 hover:bg-white/20 py-3 md:py-4 rounded-xl font-black mt-6 transition text-white text-sm md:text-base' }, copied.ca ? '✓ コピーしました' : '📋 全文コピー')
        )
      );
    };

            button({ onClick: props.onLogout, className: 'flex-1 md:flex-none bg-white/10 hover:bg-white/20 px-4 md:px-8 py-2 md:py-3 rounded-full text-sm md:text-base font-black text-white/50 transition' }, 'LOGOUT')
          )
        ),
        div({ className: 'flex gap-2 overflow-x-auto mb-6 md:mb-10 border-b border-white/5 hide-scrollbar whitespace-nowrap' },
          [{id:'users', l:'👥 ユーザー'}, {id:'tools', l:'🛠 ツール表示'}].map(t =>

        ),
        tab === 'tools' && div({ className: 'glass-panel rounded-2xl md:rounded-[2rem] p-4 md:p-10 animate-in' },

          div({ className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4' },
            Object.keys(TOOLS).map(tid => label({ key: tid, className: 'flex items-center justify-between bg-white/5 p-4 md:p-5 rounded-xl border border-white/5 cursor-pointer hover:bg-white/10 transition' },
              div({ className: 'flex items-center gap-3 overflow-hidden' }, span({ className: 'text-lg md:text-xl shrink-0' }, TOOLS[tid].icon), span({ className: 'font-bold text-white text-xs md:text-sm truncate' }, TOOLS[tid].name)),

        tab === 'users' && div({ className: 'glass-panel rounded-2xl md:rounded-[2rem] overflow-hidden animate-in overflow-x-auto' },

            el('tbody', { className: 'divide-y divide-white/5' }, users.map(k => el('tr', { key: k, className: 'hover:bg-white/5 transition' },
              el('td', { className: 'p-4 md:p-6 font-bold text-white text-xs md:text-sm' }, k),

              el('td', { className: 'p-4 md:p-6 flex gap-2 md:gap-3' },
                db.users[k].status !== 'approved' && button({ onClick: () => setStatus(k, 'approved'), className: 'text-brand-success font-black text-[10px] md:text-xs bg-white/5 px-2 py-1 rounded' }, '許可'),
                button({ onClick: () => setStatus(k, 'rejected'), className: 'text-brand-danger font-black text-[10px] md:text-xs bg-white/5 px-2 py-1 rounded' }, 'BAN')
              )
            )))
          )
        ),
        div({ className: 'mt-10 md:mt-20 text-center opacity-50 pb-10' }, p({ className: 'text-[9px] md:text-[10px] font-black text-brand-gold tracking-[0.2em] md:tracking-[0.4em] uppercase' }, 'System Version: ' + SYS_VERSION))
      );

    /* =========================================================================
       9. ユーザーダッシュボード (メインメニュー)
       【機能説明】全33のツールをカテゴリーごとに並べて表示し、クリックでそのツール画面へ遷移させます。
       ========================================================================= */
    const MainApp = (props) => {
      const [screen, setScreen] = useState('home');
      const db = AppDB.get();
      const uData = db.users[props.user];

      if (TOOLS[screen]) return el(ToolCore, { tid: screen, user: props.user, role: props.role, onBack: () => setScreen('home') });

      const usage = (uData.usage.date === new Date().toDateString()) ? uData.usage.count : 0;

      return div({ className: 'w-full animate-in relative' },
        div({ className: 'absolute top-2 right-2 md:top-6 md:right-8 z-50 flex flex-wrap gap-2 justify-end max-w-full px-2' },
          props.role === 'admin' && button({ onClick: props.onGoAdmin, className: 'bg-brand-accent text-white px-3 py-1.5 md:px-6 md:py-2.5 rounded-full text-[9px] md:text-[10px] font-black shadow-lg shadow-brand-accent/30 active:scale-95' }, '🎛️ 管理'),
          div({ className: 'glass-panel px-3 py-1.5 md:px-6 md:py-2.5 rounded-full text-[9px] md:text-[10px] font-black text-white/50 border-white/10' }, 'LIMIT: ' + usage + '/' + DAILY_LIMIT),
          button({ onClick: props.onLogout, className: 'bg-white/5 hover:bg-white/10 px-3 py-1.5 md:px-6 md:py-2.5 rounded-full text-[9px] md:text-[10px] font-black text-white/50 transition' }, 'LOGOUT')
        ),
        div({ className: 'text-center mt-16 md:mt-20 mb-16 md:mb-28 px-4' },
          div({ className: 'inline-block glass-panel px-4 md:px-6 py-1.5 md:py-2 rounded-full mb-6 md:mb-10' }, span({ className: 'text-brand text-[9px] md:text-[10px] font-black tracking-[0.2em] md:tracking-[0.4em] uppercase' }, 'AI Content Pro Stable')),
          h1({ className: 'text-4xl md:text-7xl font-black tracking-tighter mb-4 md:mb-8 leading-tight text-white' }, 'Content ', span({ className: 'text-brand' }, 'Master')),
          p({ className: 'text-slate-400 text-xs md:text-base max-w-2xl mx-auto leading-relaxed' }, 'クラウドワークスから独自のコンテンツ販売まで、すべてを完全自動化。')
        ),
        div({ className: 'px-4 sm:px-6 lg:px-8' }, 
          CATEGORIES.map(cat => {
            const visible = Object.keys(TOOLS).filter(k => TOOLS[k].cat === cat.id && db.config.toolVisibility[k] !== false);
            if (visible.length === 0) return null;
            return div({ key: cat.id, className: 'mb-12 md:mb-20 max-w-6xl mx-auto' },
              h2({ className: 'text-lg md:text-xl font-black text-white mb-6 md:mb-10 flex items-center gap-3 md:gap-4' }, div({ className: 'w-1.5 md:w-2 h-6 md:h-8 bg-brand rounded-full' }), cat.name),
              div({ className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6' },
                visible.map(tid => {
                  const t = TOOLS[tid];
                  const can = DEF_UNLOCKED.includes(tid) || props.role==='admin' || uData.perms[tid];
                  return div({ key: tid, onClick: () => { if(can) setScreen(tid); else alert('🔒 ロックされています'); }, className: 'glass-panel rounded-2xl md:rounded-[2rem] p-6 md:p-8 transition duration-300 hover:-translate-y-1 hover:border-brand/40 cursor-pointer relative overflow-hidden group ' + (can?'':'opacity-50 grayscale') },
                    div({ className: 'flex justify-between items-start mb-6 md:mb-8' },
                      div({ className: 'text-4xl md:text-5xl group-hover:scale-110 transition' }, t.icon),
                      t.badge && span({ className: 'bg-brand/10 text-brand text-[9px] md:text-[10px] font-black px-2 py-1 md:px-3 md:py-1.5 rounded-lg border border-brand/20 shrink-0' }, t.badge)
                    ),
                    h3({ className: 'text-lg md:text-xl font-black mb-2 md:mb-3 text-white/90 group-hover:text-white transition break-words' }, t.name),
                    p({ className: 'text-xs md:text-sm text-slate-500 break-words' }, t.desc)
                  );
                })
              )
            );
          })
        )
      );
    };

    /* =========================================================================
       10. ログインUI (認証と新規登録)
       【機能説明】ユーザーの識別とログイン処理を行います。admin/admin123で管理者画面へ。
       ========================================================================= */
    const AuthBox = (props) => {
      const [u, setU] = useState('');
      const [pStr, setP] = useState('');
      const [isL, setIsL] = useState(true);
      const [err, setErr] = useState('');

      const login = () => {
        setErr('');
        const name = u.trim();
        if (!name) return setErr('ユーザー名を入力してください');
        
        const db = AppDB.get();
        if (name === db.config.adminU) {
          if (pStr === db.config.adminP) {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: name, r: 'admin' }));
            props.onLogin(name, 'admin');
          } else setErr('パスワードが違います');
          return;
        }

        if (isL) {
          if (db.users[name] && db.users[name].status === 'approved') {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: name, r: 'approved' }));
            props.onLogin(name, 'approved');
          } else setErr('未登録か、承認待ちです。');
        } else {
          if (db.users[name]) return setErr('既に登録されています。');
          db.users[name] = { status: 'pending', registeredAt: Date.now(), usage: { count: 0, date: '' }, perms: {}, brand: { plan: 'free', name: '' }, projects: { 'default': { name: 'デフォルト', data: {} } }, curProj: 'default' };
          AppDB.save(db);
          alert('申請が完了しました。承認をお待ちください。');
          setIsL(true);
        }
      };

      return div({ className: 'w-full max-w-md mx-auto mt-20 md:mt-32 animate-in px-4' },
        div({ className: 'glass-panel rounded-3xl md:rounded-[2.5rem] p-8 md:p-12 shadow-2xl text-center relative overflow-hidden' },
          h2({ className: 'text-2xl md:text-3xl font-black mb-10 md:mb-12 tracking-tight text-white' }, 'AI Content Pro'),
          div({ className: 'flex bg-black/40 p-1 md:p-1.5 rounded-xl mb-6 md:mb-8' },
            button({ onClick: () => { setIsL(true); setErr(''); }, className: 'flex-1 py-2 md:py-3 rounded-lg text-xs md:text-sm font-bold transition ' + (isL ? 'bg-brand text-white' : 'text-white/50') }, 'ログイン'),
            button({ onClick: () => { setIsL(false); setErr(''); }, className: 'flex-1 py-2 md:py-3 rounded-lg text-xs md:text-sm font-bold transition ' + (!isL ? 'bg-brand text-white' : 'text-white/50') }, '新規申請')
          ),
          div({ className: 'space-y-4 md:space-y-5' },
            input({ className: 'input-base text-center', placeholder: 'USER NAME', value: u, onChange: e => setU(e.target.value) }),
            input({ className: 'input-base text-center', type: 'password', placeholder: 'PASSWORD', value: pStr, onChange: e => setP(e.target.value) }),
            err && p({ className: 'text-brand-danger text-[10px] md:text-xs font-bold' }, '❌ ' + err),
            button({ onClick: login, className: 'w-full btn-gradient py-3 md:py-4 rounded-xl md:rounded-2xl text-white font-black text-base md:text-lg shadow-xl mt-2 md:mt-4' }, isL ? 'LOGIN' : 'APPLY')
          )
        )
      );
    };

    /* =========================================================================
       11. Root マウント (起点)
       【機能説明】アプリの起動ポイント。セッションを確認し、どの画面を出すか決定します。
       ========================================================================= */
    const App = () => {
      const [auth, setAuth] = useState({ u: null, r: null });
      const [goAdmin, setGoAdmin] = useState(false);

      useEffect(() => {
        const session = localStorage.getItem(SESS_KEY);
        if (session) setAuth(JSON.parse(session));
      }, []);

      if (!auth.u) return el(AuthBox, { onLogin: (u, r) => setAuth({ u, r }) });
      if (auth.r === 'admin' && goAdmin) return el(AdminDash, { onGoApp: () => setGoAdmin(false), onLogout: () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); } });
      
      return el(MainApp, { user: auth.u, role: auth.r, onLogout: () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); }, onGoAdmin: () => setGoAdmin(true) });
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(el(ErrorBoundary, null, el(App)));

  })();
  </script>
</body>
</html>
