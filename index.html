      yt_script: { cat: 'sns', icon: '▶️', name: 'YouTube対話シナリオ', badge: '', desc: 'ゆっくり・ずんだもん等の掛け合い台本', fields: [{ id: 'theme', t: 'text', l: '解説テーマ' }, { id: 'char', t: 'text', l: 'キャラ設定 (例: 博識なAと初心者のB)' }], build: (v) => `テーマ「${v.theme}」、キャラ「${v.char}」で、YouTube用の対話形式シナリオ（10分尺想定）を作成せよ。` },
      image: { cat: 'sns', icon: '🖼️', name: '画像生成AIプロンプト', badge: '', desc: '美しいAI美女や風景の英語プロンプト', fields: [{ id: 'desc', t: 'text', l: '描きたい内容' }], build: (v) => `「${v.desc}」を描くためのMidjourney用英語プロンプトを5つ作成せよ。` },
      eye_catch: { cat: 'sns', icon: '🎨', name: 'アイキャッチ構成デザイン', badge: '', desc: 'クリックされるサムネイルの構成案', fields: [{ id: 'title', t: 'text', l: '記事/動画のタイトル' }], build: (v) => `タイトル「${v.title}」のクリック率を最大化するサムネイル（アイキャッチ）の構成案（キャッチコピー、配置、配色、画像イメージ）を作成せよ。` },

      // --- 💬 ファン化 ＆ 自動セールス ---
      magnet: { cat: 'fun', icon: '🎁', name: '無料プレゼント量産', badge: '', desc: 'LINE登録率を爆上げする特典', fields: [{ id: 'know', t: 'area', l: 'ノウハウ' }], build: (v) => `ノウハウ「${v.know}」から、強力なリードマグネット（無料特典）の企画と目次を作成せよ。` },
      line: { cat: 'fun', icon: '💌', name: 'LINE教育ステップ', badge: '', desc: '5日間でファン化して販売する自動導線', fields: [ { id: 'prod', t: 'text', l: '販売商品' }, { id: 'detail', t: 'area', l: '詳細' } ], build: (v) => `商品「${v.prod}」を売るLINE5日間ステップを作成。詳細: ${v.detail}` },
      funnel: { cat: 'fun', icon: '🩺', name: 'ファネル診断コンサル', badge: '', desc: '売上が上がらない原因を特定', fields: [{ id: 'num', t: 'area', l: '各工程の数字（インプ、クリック等）' }], build: (v) => `以下の数字からファネルのボトルネックを診断し、改善策を出せ。数字: ${v.num}` },
      reply: { cat: 'fun', icon: '💬', name: 'LINE/DM 神返信', badge: '', desc: '読者の心を掴む完璧な返信文', fields: [{ id: 'msg', t: 'area', l: '相手のメッセージ' }], build: (v) => `メッセージ「${v.msg}」に対する神返信を3パターン作成せよ。` },
      interview: { cat: 'fun', icon: '🗣️', name: 'AIインタビュー', badge: '', desc: 'AIの質問に答えて一次情報を抽出', fields: [{ id: 'theme', t: 'text', l: 'テーマ' }], build: (v) => `私に「${v.theme}」についてインタビューを行い、最終的に記事構成を作れ。`, noJson: true },
      journey: { cat: 'fun', icon: '🗺️', name: 'カスタマージャーニー', badge: '', desc: '認知から購入までの戦略マップ', fields: [{ id: 'tgt', t: 'text', l: 'ターゲット' }, { id: 'prod', t: 'text', l: '商品' }], build: (v) => `ターゲット「${v.tgt}」が商品「${v.prod}」を買うまでのカスタマージャーニーマップを作成せよ。` },
      webdev: { cat: 'fun', icon: '💻', name: 'Webアプリ開発支援', badge: '', desc: 'アイデアからHTML構成を生成', fields: [{ id: 'idea', t: 'area', l: '作りたいツール' }], build: (v) => `アイデア「${v.idea}」から、1枚のHTMLで動くWebツールの要件定義とコード構造案を作成せよ。` }
    };

    const CATEGORIES = [
      { id: 'omega', name: '🔥 オメガ特級ツール (全自動 & お詫び神機能)' },
      { id: 'mon', name: '📝 コンテンツ作成 ＆ 販売' },
      { id: 'cw', name: '💼 クラウドワークス・仕事完遂' },
      { id: 'sns', name: '🚀 集客 ＆ SNSアカウント設計' },
      { id: 'fun', name: '💬 ファン化 ＆ 自動セールス' }
    ];

    // 全ツールの初期解放（管理者が非表示にしない限り全て使える）
    const ALL_TOOL_IDS = Object.keys(TOOLS);

    // --- Part 1 はここまで。安全に分割し、続きのUIレンダリングコードに繋ぎます ---
    /* =========================================================================
       5. 共通UIコンポーネント (ネイティブReact関数・エラー回避)
       ========================================================================= */

    const FormInput = ({ f, val, onChange, onMagic }) => {
      const isMagic = f.magic || f.isMainMagic;
      const value = val !== undefined ? val : (f.t === 'check' ? false : (f.opts ? f.opts[0] : ''));

      const header = div({ className: 'flex justify-between items-center mb-3' },
        span({ className: 'text-[11px] font-black text-slate-400 tracking-widest uppercase' }, f.l),
        isMagic ? button({ 
          onClick: () => onMagic(f.id, !!f.isMainMagic),
          className: 'bg-gradient-to-r from-brand-accent to-red-500 text-white text-[10px] font-black px-4 py-1.5 rounded-full shadow-lg active:scale-95 transition hover:brightness-110'
        }, '✨ 魔法の杖') : null
      );

      let inputNode;
      if (f.t === 'text') {
        inputNode = input({ className: 'input-base', value: value, placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
      } else if (f.t === 'area') {
        inputNode = textarea({ className: 'input-base min-h-[120px] resize-y', value: value, placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
      } else if (f.t === 'select') {
        inputNode = select({ className: 'input-base', value: value, onChange: e => onChange(f.id, e.target.value) }, 
          f.opts.map(o => option({ key: o, value: o, className: 'bg-slate-900' }, o))
        );
      } else if (f.t === 'check') {
        inputNode = label({ className: 'flex items-center gap-3 cursor-pointer p-2 group' }, 
          div({ className: 'w-10 h-6 bg-slate-800 rounded-full relative transition border border-white/10' }, 
            div({ className: 'absolute top-1 left-1 w-4 h-4 rounded-full transition ' + (value ? 'bg-brand left-5' : 'bg-slate-500') })
          ),
          input({ type: 'checkbox', className: 'hidden', checked: !!value, onChange: e => onChange(f.id, e.target.checked) }),
          span({ className: 'text-sm font-bold text-white/80' }, '有効にする')
        );
      }

      return div({ className: 'glass-panel rounded-2xl p-6 mb-5 animate-in' }, header, inputNode);
    };

    const DataViewer = ({ data }) => {
      if (typeof data === 'string') return p({ className: 'bg-black/40 border border-white/5 rounded-xl p-6 text-sm text-slate-200 whitespace-pre-wrap leading-relaxed' }, data);
      if (Array.isArray(data)) return div(null, data.map((item, i) => div({ key: i, className: 'mb-6 pb-6 border-b border-white/5 last:border-0' }, el(DataViewer, { data: item }))));
      if (typeof data === 'object' && data !== null) {
        return div(null, Object.keys(data).map(k => div({ key: k, className: 'mb-5' },
          span({ className: 'block text-brand-light text-[11px] font-black uppercase mb-2 tracking-widest' }, k),
          el(DataViewer, { data: data[k] })
        )));
      }
      return span(null, String(data));
    };

    /* =========================================================================
       6. ツール実行エンジン (ToolCore)
       ========================================================================= */
    const ToolCore = ({ tid, user, role, onBack }) => {
      const conf = TOOLS[tid];
      const [db, setDb] = useState(AppDB.get());
      const uData = db.users[user];
      const pid = uData.curProj;
      const [vals, setVals] = useState(uData.projects[pid].data[tid] || {});
      const [activeTab, setActiveTab] = useState('settings');
      const [copied, setCopied] = useState({});
      const [imp, setImp] = useState('');
      const [res, setRes] = useState(null);
      const [err, setErr] = useState('');

      const update = (fid, v) => {
        const nv = { ...vals, [fid]: v };
        setVals(nv);
        if (role !== 'admin') {
          const ndb = AppDB.get();
          ndb.users[user].projects[pid].data[tid] = nv;
          AppDB.save(ndb);
        }
      };

      const handleMagic = (fid, isMain) => {
        if (isMain) {
          const magicSet = getMagic(tid);
          if (tid === 'note') {
            setVals({ ...vals, theme: magicSet.theme, target_detail: magicSet.target, benefit: magicSet.benefit, authority: magicSet.authority, price: magicSet.price, free_vol: magicSet.free, paid_vol: magicSet.paid, guarantee: magicSet.guarantee });
          } else if (tid === 'campaign') {
            setVals({ ...vals, prod: magicSet.prod, tgt: magicSet.tgt, val: magicSet.val });
          } else if (tid === 'cw_proposal') {
            setVals({ ...vals, job: magicSet.job, skill: magicSet.skill });
          } else if (tid === 'lp') {
            setVals({ ...vals, prod: magicSet.product, bene: magicSet.benefits });
          } else {
             const f = conf.fields.find(x => x.id === fid);
             if(f && f.magic) update(fid, f.magic);
          }
        } else {
          const f = conf.fields.find(x => x.id === fid);
          if (f && f.magic) update(fid, f.magic);
        }
      };

      const onGenerate = () => {
        let canAccess = false;
        if (role === 'admin' || uData.perms[tid]) canAccess = true;
        else if (uData.usage.date !== new Date().toDateString() || uData.usage.count < DAILY_LIMIT) canAccess = true;

        if (!canAccess) { alert('本日の無料枠を終了しました。'); return; }

        if (role !== 'admin' && !uData.perms[tid]) {
          const ndb = AppDB.get();
          const today = new Date().toDateString();
          if (ndb.users[user].usage.date !== today) ndb.users[user].usage = { date: today, count: 0 };
          ndb.users[user].usage.count++;
          AppDB.save(ndb);
        }

        const plan = uData.brand.plan || 'free';
        const prefix = plan === 'paid' ? "【有料版AIモード（推論・リミッター解除）】\n" : "【無料版AI節約モード】\n";
        const ctx = uData.brand.name ? `【発信者】${uData.brand.name}\n\n` : "";
        const prompt = prefix + ctx + conf.build(vals) + "\n\n【ルール】前置き不要。";
        
        if (navigator.clipboard) navigator.clipboard.writeText(prompt).catch(()=>{});
        setCopied({ gen: true });
        setTimeout(() => setCopied({}), 2000);
        if (!conf.isOnePage) setActiveTab('import');
      };

      const onImport = () => {
        setErr('');
        if (conf.noJson) { setRes(imp); setActiveTab('preview'); return; }
        
        try {
           const clean = imp.replace(/```(?:json)?\n?/gi, '').replace(/```/g, '').trim();
           const match = clean.match(/\{[\s\S]*\}/);
           const parsed = JSON.parse(match ? match[0] : clean);
           setRes(parsed); setActiveTab('preview'); setImp('');
        } catch (e) {
           setErr("JSON形式ではありません。AIの回答をそのまま貼り付けてください。");
        }
      };

      const header = div({ className: 'flex justify-between items-center mb-8 pb-6 border-b border-white/10 animate-in' },
        div({ className: 'flex items-center gap-4' },
          button({ onClick: onBack, className: 'glass-panel px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-white/10 transition' }, '← BACK'),
          div(null, h1({ className: 'text-2xl font-black text-white' }, conf.name), p({ className: 'text-xs text-brand font-bold uppercase tracking-widest mt-1' }, conf.desc))
        )
      );

      if (conf.isOnePage) {
        return div({ className: 'w-full max-w-4xl mx-auto pb-10' },
          header,
          div({ className: 'bg-brand/5 border border-brand/20 rounded-2xl p-6 mb-8' }, p({ className: 'text-sm text-brand-light font-bold' }, '💡 ' + conf.tut)),
          conf.fields.map(f => el(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic })),
          button({ onClick: onGenerate, className: 'w-full py-6 rounded-2xl btn-gradient text-white font-black text-xl shadow-xl mt-4 mb-10' }, copied.gen ? '✓ コピー完了！AIへ送信してください' : '📋 プロンプト生成 ＆ コピー'),
          div({ className: 'glass-panel rounded-3xl p-8 animate-in' },
            span({ className: 'block text-xs font-black text-slate-400 mb-4 tracking-[0.2em] uppercase' }, '📥 AIの回答を貼り付けて保存・編集'),
            textarea({ className: 'input-base min-h-[400px]', value: res || '', onChange: e => setRes(e.target.value) }),
            button({ onClick: () => { if(navigator.clipboard) navigator.clipboard.writeText(res||''); setCopied({ca:true}); setTimeout(()=>setCopied({}),2000); }, className: 'w-full bg-white/10 hover:bg-white/20 py-4 rounded-xl font-black mt-6 transition text-white' }, copied.ca ? '✓ コピーしました' : '📋 全文コピー')
          )
        );
      }

      return div({ className: 'w-full max-w-4xl mx-auto pb-10' },
        header,
        div({ className: 'flex mb-10 border-b border-white/5 gap-2 overflow-x-auto hide-scrollbar' },
          [{id:'settings', l:'⚙️ 設定'}, {id:'import', l:'📥 読込'}, {id:'preview', l:'👁 結果'}].map(t =>
            button({ key: t.id, onClick: () => setActiveTab(t.id), className: 'px-8 py-4 font-black transition-all ' + (activeTab===t.id ? 'text-brand border-b-2 border-brand' : 'text-white/30') }, t.l)
          )
        ),
        activeTab === 'settings' && div({ className: 'animate-in' },
          div({ className: 'bg-brand/5 border border-brand/20 rounded-2xl p-6 mb-8' }, p({ className: 'text-sm text-brand-light font-bold' }, '💡 ' + conf.desc)),
          conf.fields.map(f => el(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic })),
          button({ onClick: onGenerate, className: 'w-full py-6 rounded-2xl btn-gradient text-white font-black text-xl shadow-xl mt-4' }, copied.gen ? '✓ コピー完了！' : '📋 プロンプト生成 ＆ コピー')
        ),
        activeTab === 'import' && div({ className: 'glass-panel rounded-3xl p-10 animate-in' },
          span({ className: 'block text-xs font-black text-slate-400 mb-4' }, '📥 AIの回答をそのまま貼り付けてください'),
          textarea({ className: 'input-base min-h-[300px]', value: imp, onChange: e => setImp(e.target.value) }),
          err && p({ className: 'text-brand-danger text-sm font-bold mt-4' }, '❌ ' + err),
          button({ onClick: onImport, disabled: !imp.trim(), className: 'w-full bg-brand hover:bg-brand-dark py-4 rounded-xl font-black mt-8 text-white transition disabled:opacity-50' }, '解析を実行')
        ),
        activeTab === 'preview' && res && div({ className: 'glass-panel rounded-3xl p-10 animate-in' }, el(DataViewer, { data: res }))
      );
    };

    /* =========================================================================
       7. ユーザーダッシュボード (MainApp)
       ========================================================================= */
    const MainApp = (props) => {
      const [screen, setScreen] = useState('home');
      const db = AppDB.get();
      const uData = db.users[props.user];

      if (TOOLS[screen]) return el(ToolCore, { tid: screen, user: props.user, role: props.role, onBack: () => setScreen('home') });

      const usage = (uData.usage.date === new Date().toDateString()) ? uData.usage.count : 0;

      return div({ className: 'w-full animate-in pb-20' },
        div({ className: 'fixed top-4 right-4 md:top-8 md:right-8 z-50 flex gap-3' },
          div({ className: 'glass-panel px-6 py-2.5 rounded-full text-[10px] font-black text-white/50 border-white/10' }, 'LIMIT: ' + usage + '/' + DAILY_LIMIT),
          button({ onClick: props.onLogout, className: 'bg-white/5 hover:bg-white/10 px-6 py-2.5 rounded-full text-[10px] font-black text-white/50 transition' }, 'LOGOUT')
        ),
        div({ className: 'text-center mt-20 mb-28 px-4' },
          div({ className: 'inline-block glass-panel px-6 py-2 rounded-full mb-10' }, span({ className: 'text-brand text-[10px] font-black tracking-[0.4em] uppercase' }, 'AI Content Pro Omega')),
          h1({ className: 'text-5xl md:text-7xl font-black tracking-tighter mb-8 leading-tight text-white' }, 'Content ', span({ className: 'text-brand' }, 'Master')),
          p({ className: 'text-slate-400 text-base max-w-2xl mx-auto leading-relaxed' }, 'クラウドワークスから独自のコンテンツ販売まで、すべてを完全自動化。')
        ),
        CATEGORIES.map(cat => {
          // 管理者が非表示にしたツールは除外
          const visibleTools = (cat.tools || Object.keys(TOOLS).filter(k=>TOOLS[k].cat===cat.id)).filter(tid => db.config.toolVisibility[tid] !== false);
          if (visibleTools.length === 0) return null;
          
          return div({ key: cat.id, className: 'mb-20 max-w-6xl mx-auto px-4' },
            h2({ className: 'text-xl font-black text-white mb-10 flex items-center gap-4' }, div({ className: 'w-2 h-8 bg-brand rounded-full' }), cat.name),
            div({ className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' },
              visibleTools.map(tid => {
                const t = TOOLS[tid];
                const can = ALL_TOOL_IDS.includes(tid) || props.role === 'admin' || uData.perms[tid];
                return div({ key: tid, onClick: () => { if(can) setScreen(tid); else alert('🔒 ロックされています'); }, className: 'glass-panel rounded-[2rem] p-8 transition duration-300 hover:-translate-y-2 hover:border-brand/40 cursor-pointer relative overflow-hidden group ' + (can ? '' : 'opacity-50 grayscale') },
                  div({ className: 'flex justify-between items-start mb-8' },
                    div({ className: 'text-5xl group-hover:scale-110 transition' }, t.icon),
                    t.badge ? span({ className: 'bg-brand/10 text-brand text-[10px] font-black px-3 py-1.5 rounded-lg border border-brand/20' }, t.badge) : null
                  ),
                  h3({ className: 'text-xl font-black mb-3 text-white/90 group-hover:text-white transition' }, t.name),
                  p({ className: 'text-sm text-slate-500' }, t.desc)
                );
              })
            )
          );
        })
      );
    };

    /* =========================================================================
       8. 管理者ダッシュボード (ログイン画面直下に配置)
       ========================================================================= */
    const AdminDash = () => {
      const [db, setDb] = useState(AppDB.get());
      const [tab, setTab] = useState('users');
      const users = Object.keys(db.users).filter(k => k !== 'admin');
      
      const setVisible = (tid) => { const n = AppDB.get(); n.config.toolVisibility[tid] = !n.config.toolVisibility[tid]; AppDB.save(n); setDb(n); };
      const setStatus = (u, st) => { const n = AppDB.get(); n.users[u].status = st; AppDB.save(n); setDb(n); };

      return div({ className: 'w-full max-w-6xl mx-auto animate-in mt-16 px-4' },
        div({ className: 'glass-panel rounded-[3rem] p-10' },
          div({ className: 'flex justify-between items-center mb-10 pb-6 border-b border-white/10' },
            h2({ className: 'text-2xl font-black text-brand-accent tracking-tighter' }, '🎛️ ADMIN PORTAL')
          ),
          div({ className: 'flex gap-2 overflow-x-auto mb-10 border-b border-white/5 hide-scrollbar' },
            [{id:'users', l:'👥 ユーザー'}, {id:'tools', l:'🛠 ツール表示設定'}].map(t =>
              button({ key: t.id, onClick: () => setTab(t.id), className: 'px-8 py-4 text-sm font-black transition-all ' + (tab===t.id ? 'border-brand-accent text-brand-accent border-b-2' : 'text-slate-500 border-transparent border-b-2') }, t.l)
            )
          ),
          tab === 'tools' && div({ className: 'animate-in' },
            p({ className: 'text-brand-accent font-bold mb-6' }, '⚠️ チェックを外したツールはユーザー画面から非表示になります。'),
            div({ className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4' },
              ALL_TOOL_IDS.map(tid => {
                const t = TOOLS[tid];
                if(!t) return null;
                return label({ key: tid, className: 'flex items-center justify-between bg-white/5 p-5 rounded-xl border border-white/5 cursor-pointer hover:bg-white/10 transition' },
                  div({ className: 'flex items-center gap-3' }, span({ className: 'text-xl' }, t.icon), span({ className: 'font-bold text-white' }, t.name)),
                  input({ type: 'checkbox', className: 'w-6 h-6 accent-brand-accent', checked: db.config.toolVisibility[tid] !== false, onChange: () => setVisible(tid) })
                );
              })
            )
          ),
          tab === 'users' && div({ className: 'overflow-hidden animate-in' },
            el('table', { className: 'w-full text-left' },
              el('thead', { className: 'bg-white/5' }, el('tr', null, ['ユーザー名', '状態', '操作'].map(th => el('th', { key: th, className: 'p-6 text-[10px] font-black text-slate-500 uppercase' }, th)))),
              el('tbody', { className: 'divide-y divide-white/5' }, users.map(k => el('tr', { key: k, className: 'hover:bg-white/5 transition' },
                el('td', { className: 'p-6 font-bold text-white' }, k),
                el('td', { className: 'p-6' }, span({ className: 'px-3 py-1 rounded-full text-[10px] font-black ' + (db.users[k].status==='approved'?'bg-brand-success/20 text-brand-success':(db.users[k].status==='pending'?'bg-brand-accent/20 text-brand-accent':'bg-brand-danger/20 text-brand-danger')) }, db.users[k].status.toUpperCase())),
                el('td', { className: 'p-6 flex gap-3' },
                  db.users[k].status !== 'approved' && button({ onClick: () => setStatus(k, 'approved'), className: 'text-brand-success font-black text-xs hover:underline' }, '許可'),
                  button({ onClick: () => setStatus(k, 'rejected'), className: 'text-brand-danger font-black text-xs hover:underline' }, 'BAN')
                )
              )))
            )
          ),
          div({ className: 'mt-10 text-center opacity-50' }, p({ className: 'text-[10px] font-black text-brand-gold tracking-[0.4em] uppercase' }, 'System Version: v41.0.0 Perfect Omega'))
        )
      );
    };

    /* =========================================================================
       9. ログイン画面 ＆ 統合ビュー
       ========================================================================= */
    const AuthView = ({ onLogin }) => {
      const [u, setU] = useState('');
      const [pStr, setP] = useState('');
      const [isL, setIsL] = useState(true);
      const [err, setErr] = useState('');
      const [isAdminLogged, setIsAdminLogged] = useState(false);

      const login = () => {
        setErr('');
        const name = u.trim();
        if (!name) return setErr('ユーザー名を入力してください');
        
        const db = AppDB.get();
        if (name === db.config.adminU) {
          if (pStr === db.config.adminP) {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: name, r: 'admin' }));
            setIsAdminLogged(true); // 管理者ログイン成功フラグ
            onLogin(name, 'admin'); // 一応MainAppにも渡すが、AdminDashも表示
          } else setErr('パスワードが違います');
          return;
        }

        if (isL) {
          if (db.users[name]) {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: name, r: db.users[name].status }));
            onLogin(name, db.users[name].status);
          } else setErr('未登録です。新規申請してください。');
        } else {
          if (db.users[name]) return setErr('既に登録されています。');
          db.users[name] = { status: 'pending', registeredAt: Date.now(), usage: { count: 0, date: '' }, perms: {}, projects: { 'default': { name: 'デフォルト', data: {} } }, curProj: 'default', brand: { plan: 'free', name: '' } };
          AppDB.save(db);
          alert('申請が完了しました。管理者の承認をお待ちください。');
          setIsL(true);
        }
      };

      // 管理者としてログイン成功した場合は、ダッシュボードのみ表示するか、
      // ユーザー画面とダッシュボードの両方を表示するか。
      // ご要望により「ログイン画面の下にダッシュボードを作成」を実現。
      // ただしログイン成功後はログイン箱自体を消すのが一般的ですが、
      // 今回は「管理者ログイン中は AdminDash のみ表示」とします（MainAppのトップボタンで切り替えるより直感的）。
      
      if (isAdminLogged) {
         return div(null,
            div({ className: 'w-full max-w-md mx-auto mt-10 px-4 text-center' },
              button({ onClick: () => { localStorage.removeItem(SESS_KEY); setIsAdminLogged(false); onLogin(null, null); }, className: 'text-sm text-slate-500 hover:text-white underline' }, 'ログアウトして戻る')
            ),
            el(AdminDash)
         );
      }

      return div({ className: 'w-full pb-20' },
        div({ className: 'max-w-md mx-auto mt-24 animate-in px-4' },
          div({ className: 'glass-panel rounded-[3rem] p-10 md:p-14 shadow-2xl text-center' },
            h2({ className: 'text-3xl font-black mb-12 tracking-tight text-white' }, 'AI Content Pro'),
            div({ className: 'flex bg-black/40 p-1.5 rounded-xl mb-8' },
              button({ onClick: () => { setIsL(true); setErr(''); }, className: 'flex-1 py-3 rounded-lg text-sm font-bold transition ' + (isL ? 'bg-brand text-white' : 'text-white/50') }, 'ログイン'),
              button({ onClick: () => { setIsL(false); setErr(''); }, className: 'flex-1 py-3 rounded-lg text-sm font-bold transition ' + (!isL ? 'bg-brand text-white' : 'text-white/50') }, '新規申請')
            ),
            div({ className: 'space-y-5' },
              input({ className: 'input-base text-center', placeholder: 'USER NAME', value: u, onChange: e => setU(e.target.value) }),
              input({ className: 'input-base text-center', type: 'password', placeholder: 'PASSWORD', value: pStr, onChange: e => setP(e.target.value) }),
              err ? p({ className: 'text-brand-danger text-xs font-bold' }, '❌ ' + err) : null,
              button({ onClick: login, className: 'w-full btn-gradient py-4 rounded-2xl text-white font-black text-lg shadow-xl mt-4' }, isL ? 'LOGIN' : 'APPLY')
            )
          )
        ),
        
        // 管理者用ログイン前であっても、「ログイン画面の下」に管理ダッシュボードの
        // エントリーポイント（簡易表示や説明）を置くことも可能ですが、
        // セキュリティ上、管理者がログイン（isAdminLogged = true）した時のみ表示させています。
        // もし「未ログイン状態でも管理者用入り口を下に見せたい」場合は、ここにボタン等を置きます。
        div({ className: 'text-center mt-10' }, 
           p({ className: 'text-[10px] text-slate-600 tracking-widest' }, '※管理者は admin / admin123 でログインしてください')
        )
      );
    };

    /* =========================================================================
       10. 承認待ち・拒否画面
       ========================================================================= */
    const PendingScreen = ({ role, onLogout }) => {
      return div({ className: "min-h-screen flex items-center justify-center p-6 animate-in" },
        div({ className: "glass-panel p-10 rounded-3xl max-w-md w-full text-center" },
          h2({ className: "text-3xl font-black mb-6 text-white" }, role === 'rejected' ? '🚫 アクセス拒否' : '⏳ 承認待ち'),
          p({ className: "text-slate-400 mb-8" }, role === 'rejected' ? '管理者に制限されています。' : '管理者の許可をお待ちください。'),
          button({ onClick: () => window.location.reload(), className: "w-full btn-gradient py-4 rounded-2xl text-white font-black mb-4" }, 'ステータスを更新'),
          button({ onClick: onLogout, className: "text-sm text-slate-500 font-bold hover:text-white underline" }, 'ログアウト')
        )
      );
    };

    /* =========================================================================
       11. Root マウント
       ========================================================================= */
    const App = () => {
      const [auth, setAuth] = useState({ u: null, r: null });

      useEffect(() => {
        const session = localStorage.getItem(SESS_KEY);
        if (session) {
          const parsed = JSON.parse(session);
          setAuth(parsed);
        }
      }, []);

      const onLogout = () => {
        localStorage.removeItem(SESS_KEY);
        setAuth({ u: null, r: null });
      };

      if (!auth.u) return el(AuthView, { onLogin: (u, r) => setAuth({ u, r }) });
      
      // 管理者がログインした場合は、AuthView 内で AdminDash を描画するようにしているため、
      // ここでは r === 'admin' の処理はAuthView側か、または直接AdminDashを返すかを選択します。
      // ご要望「ログイン画面の下に作成」に最も近いUXとして、管理者はログイン成功と同時に
      // ダッシュボード専用画面に移行させます。
      if (auth.r === 'admin') return el(AdminDash, { onGoApp: () => {}, onLogout: onLogout });

      if (auth.r === 'pending' || auth.r === 'rejected') return el(PendingScreen, { role: auth.r, onLogout: onLogout });
      
      return el(MainApp, { user: auth.u, role: auth.r, onLogout: onLogout });
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(el(ErrorBoundary, null, el(App)));

  })();
  </script>
</body>
</html>
