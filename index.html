      fix: function(db) {
        // 構造的クラッシュ防止（すべてのユーザーの全階層を保証）

    /* =========================================================================

       ========================================================================= */
    const TOOLS = {
      campaign: { cat: 'omega', name: '全自動ファネル構築', icon: '👑', badge: 'Omega', desc: '商品名からLP, SNS, LINEの全導線を一気通貫で生成', fields: [{id:'p', t:'text', l:'商品・サービス名'},{id:'t', t:'text', l:'ターゲット層'},{id:'v', t:'area', l:'提供価値の詳細'}], build: (v)=>`マーケティングファネルを構築せよ。商品:${v.p} ターゲット:${v.t} 価値:${v.v}`, isOnePage: true },

          { id: 'free_vol', t: 'text', l: '無料部分の想定文字数' },
          { id: 'paid_vol', t: 'text', l: '有料部分の想定文字数' },
          { id: 'guarantee', t: 'check', l: '返金保証(24時間)を強くアピールする' }
        ],
        build: (v)=>`note有料記事を執筆。ジャンル:${v.genre}, 年代:${v.age}, テーマ:${v.theme}, ターゲット:${v.target_detail}, 未来:${v.benefit}, 実績:${v.authority}, 価格:${v.price}, 無料:${v.free_vol}, 有料:${v.paid_vol}. ${v.guarantee?'返金保証あり':''}`, isOnePage: true 
      },
      cw_proposal: { cat: 'cw', name: '案件獲得キラー提案文', icon: '🎯', desc: 'CW採用率90%超を叩き出す論理的な提案文', fields: [{id:'j', t:'area', l:'案件の募集要項'},{id:'s', t:'text', l:'自分の強み'}], build: (v)=>`クラウドワークスの提案文を作成せよ。募集文:${v.j} 私の強み:${v.s}` },

      video: { cat: 'sns', name: 'ショート動画台本', icon: '🎥', desc: 'TikTok/YouTubeで離脱されない台本', fields: [{id:'t', t:'area', l:'内容'}], build: (v)=>`60秒動画台本を作れ。` },
      image: { cat: 'sns', name: '画像生成AI呪文', icon: '🖼️', desc: '美しいAI美女や風景の英語プロンプト', fields: [{id:'t', t:'text', l:'指示'}], build: (v)=>`Midjourney用プロンプトを5つ作れ。` },

    const CATEGORY_LIST = [

    /* =========================================================================
       3. 共通UIパーツ (React.createElement 形式)
       ========================================================================= */

    const FormInput = function(props) {
      const { f, val, onChange, onMagic } = props;
      const isMagic = f.magic || f.isMainMagic;

      const header = h('div', { className: 'flex justify-between items-center mb-3' },
        h('span', { className: 'text-[11px] font-black text-slate-400 tracking-[0.2em] uppercase' }, f.l),
        isMagic && h('button', { 
          onClick: function(){ onMagic(f.id, !!f.isMainMagic); },
          className: 'magic-btn text-white text-[10px] font-black px-4 py-1.5 rounded-full shadow-lg active:scale-95'
        }, '✨ 魔法の杖')
      );

      let input;
      if (f.t === 'text') {
        input = h('input', { className: 'input-box', value: val || '', placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
      } else if (f.t === 'area') {
        input = h('textarea', { className: 'input-box min-h-[140px] resize-y', value: val || '', placeholder: f.ph || '', onChange: e => onChange(f.id, e.target.value) });
      } else if (f.t === 'select') {
        input = h('select', { className: 'input-box cursor-pointer', value: val || f.opts[0], onChange: e => onChange(f.id, e.target.value) },
          f.opts.map(o => h('option', { key: o, value: o, className: 'bg-slate-900' }, o))
        );
      } else if (f.t === 'check') {
        input = h('label', { className: 'flex items-center gap-4 cursor-pointer group p-2' },
          h('div', { className: 'w-12 h-7 bg-slate-800 rounded-full relative transition border border-white/10 group-hover:border-brand/50' },
            h('div', { className: 'absolute top-1 left-1 w-5 h-5 rounded-full transition ' + (val ? 'bg-brand left-6 shadow-[0_0_15px_rgba(56,189,248,0.5)]' : 'bg-slate-600') })
          ),
          h('input', { type: 'checkbox', className: 'hidden', checked: !!val, onChange: e => onChange(f.id, e.target.checked) }),
          h('span', { className: 'text-sm font-bold text-white/80' }, '機能を有効にする')
        );
      }

      return h('div', { className: 'glass rounded-2xl p-6 mb-6 animate-slide-in' }, header, input);
    };

    const DataDisplay = function(props) {
      const { data } = props;
      if (typeof data === 'string') return h('p', { className: 'bg-black/40 border border-white/5 rounded-xl p-6 text-sm text-slate-200 whitespace-pre-wrap leading-loose font-medium' }, data);

      if (typeof data === 'object' && data !== null) {
        return h('div', null, Object.keys(data).map(k => h('div', { key: k, className: 'mb-6' },
          h('span', { className: 'block text-brand-light text-[10px] font-black uppercase mb-2 tracking-[0.2em]' }, k),
          h(DataDisplay, { data: data[k] })
        )));
      }
      return h('span', null, String(data));
    };

    /* =========================================================================
       4. ツールエンジン (絶対不壊コア)
       ========================================================================= */
    const ToolCore = function(props) {
      const { tid, user, role, onBack } = props;
      const conf = TOOLS[tid];
      
      const [db, setDb] = useState(AppStorage.get());
      const uData = db.users[user];
      const pid = uData.curProj;
      const [vals, setVals] = useState(uData.projects[pid].data[tid] || {});

      const [copied, setCopied] = useState({});
      const [imp, setImp] = useState('');
      const [res, setRes] = useState(null);
      const [error, setError] = useState('');

      const update = function(fid, v) {
        const nv = Object.assign({}, vals, { [fid]: v });
        setVals(nv);
        const newDb = AppStorage.get();
        newDb.users[user].projects[pid].data[tid] = nv;
        AppStorage.save(newDb);
      };

      const handleMagic = function(fid, isMain) {
        if (isMain) {
          const genre = vals.genre || 'お金・副業';
          const age = vals.age || '30代';
          const pool = MEGA_KNOWLEDGE[genre] ? (MEGA_KNOWLEDGE[genre][age] || MEGA_KNOWLEDGE[genre]['全年齢']) : MEGA_KNOWLEDGE['お金・副業']['全年齢'];
          const concept = pool[Math.floor(Math.random() * pool.length)];
          
          const newVals = Object.assign({}, vals, {
            theme: concept.theme,
            target_detail: age + 'の' + concept.target,
            benefit: concept.benefit,
            authority: concept.authority,
            price: concept.price,
            free_vol: concept.free,
            paid_vol: concept.paid,
            guarantee: concept.guarantee
          });
          setVals(newVals);
          update('theme', concept.theme); 
        } else {
          const fieldObj = conf.fields.find(x => x.id === fid);
          if (fieldObj && fieldObj.magic) update(fid, fieldObj.magic);
        }
      };

      const onGenerate = function() {
        const aiPlan = uData.brand.plan || 'free';
        const brand = uData.brand || {};
        const systemPrompt = aiPlan === 'paid' ? 
          "【システム: 有料版AI（最新モデル・検索・推論リミッター解除）】\nあなたは世界トップクラスのマーケターとして、高度な心理学と最新のトレンドを分析し、最高品質の出力を生成してください。\n\n" : 
          "【システム: 無料版AI（文字数節約・要約モード）】\n出力が途切れないよう、装飾を最小限にし、核心を突く内容のみを論理的に出力してください。\n\n";
        
        const context = brand.name ? `【著者情報】${brand.name} ターゲット:${brand.target}\n\n` : "";
        const prompt = systemPrompt + context + conf.build(vals);
        
        if (navigator.clipboard) navigator.clipboard.writeText(prompt);
        setCopied({ gen: true });
        setTimeout(() => setCopied({}), 2000);
        if (!conf.isOnePage) setTab('import');
      };

      const onImport = function() {
        if (conf.noJson) { setRes(imp); setTab('view'); return; }
        const parsed = safeJSONParse(imp);
        if (parsed) { setRes(parsed); setTab('view'); setImp(''); }
        else setError("JSON解析に失敗しました。AIの回答をそのまま貼り付けてください。");
      };

      const header = h('div', { className: 'flex justify-between items-center mb-10 pb-6 border-b border-white/10 animate-fade' },
        h('div', { className: 'flex items-center gap-5' },
          h('button', { onClick: onBack, className: 'glass px-5 py-2.5 rounded-xl text-sm font-black hover:bg-white/10 transition' }, '← BACK'),
          h('div', null, h('h1', { className: 'text-2xl font-black' }, conf.name), h('p', { className: 'text-xs text-slate-500 font-bold uppercase tracking-widest' }, conf.desc))
        )
      );

      // --- UI ---
      if (conf.isOnePage) {
        return h('div', { className: 'w-full max-w-4xl mx-auto' },
          header,
          h('div', { className: 'bg-brand/5 border border-brand/20 rounded-2xl p-6 mb-10' }, h('p', { className: 'text-sm text-brand-light font-bold italic' }, '💡 使い方: ' + conf.tut)),
          conf.fields.map(f => h(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic })),
          h('button', { onClick: onGenerate, className: 'w-full py-6 rounded-2xl btn-gradient text-white font-black text-xl shadow-2xl mb-12' }, copied.gen ? '✓ プロンプトをコピーしました！' : '📋 プロンプトを生成 ＆ コピー'),
          h('div', { className: 'glass-strong rounded-3xl p-10 animate-fade' },
            h('span', { className: 'block text-xs font-black text-slate-400 mb-5 tracking-[0.3em] uppercase' }, '📥 AIの回答をここに貼り付けて保存'),
            h('textarea', { className: 'input-box min-h-[450px]', value: res || '', onChange: e => setRes(e.target.value) }),
            h('button', { onClick: () => { if(navigator.clipboard) navigator.clipboard.writeText(res); setCopied({ca:true}); setTimeout(()=>setCopied({}),2000); }, className: 'w-full bg-white/5 hover:bg-white/10 py-4 rounded-xl font-black mt-6 transition' }, copied.ca ? '✓ 全文をコピーしました' : '📋 全文コピー')
          )
        );
      }

      return h('div', { className: 'w-full max-w-4xl mx-auto' },
        header,
        h('div', { className: 'flex mb-10 border-b border-white/5 gap-2 overflow-x-auto hide-scrollbar' },
          [{id:'input', l:'⚙️ 設定'}, {id:'import', l:'📥 読込'}, {id:'view', l:'👁 結果'}].map(t =>
            h('button', { key: t.id, onClick: () => setTab(t.id), className: 'px-8 py-4 font-black transition-all ' + (tab===t.id ? 'text-brand border-b-2 border-brand' : 'text-white/30') }, t.l)
          )
      ),
        tab === 'input' && h('div', { className: 'animate-slide-in' },
          h('div', { className: 'bg-brand/5 border border-brand/20 rounded-2xl p-6 mb-10' }, h('p', { className: 'text-sm text-brand-light font-bold' }, conf.tut)),
          conf.fields.map(f => h(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic })),
          h('button', { onClick: onGenerate, className: 'w-full py-6 rounded-2xl btn-gradient text-white font-black text-xl shadow-2xl' }, copied.gen ? '✓ コピー完了！' : '📋 プロンプト生成 ＆ コピー')
        ),
        tab === 'import' && h('div', { className: 'glass rounded-3xl p-10 animate-slide-in' },
          h('span', { className: 'block text-xs font-black text-slate-400 mb-5' }, '📥 AIの回答をそのまま貼り付けてください'),
          h('textarea', { className: 'input-box min-h-[300px]', value: imp, onChange: e => setImp(e.target.value) }),
          error && h('p', { className: 'text-brand-danger text-sm font-bold mt-5' }, '❌ ' + error),
          h('button', { onClick: onImport, disabled: !imp.trim(), className: 'w-full bg-brand py-4 rounded-xl font-black mt-8 shadow-lg transition disabled:opacity-50' }, '解析を実行')
        ),
        tab === 'view' && res && h('div', { className: 'glass rounded-3xl p-10 animate-slide-in' }, h(DataDisplay, { data: res }))
      );
    };

    /* =========================================================================
       5. 管理者：オメガ・ダッシュボード (収益 ＆ 可視化)
       ========================================================================= */
    const AdminDash = function(props) {
      const [db, setDb] = useState(AppStorage.get());
      const [tab, setTab] = useState('analytics');
      const [expU, setExpU] = useState(null);

      const users = Object.keys(db.users).filter(k => k !== 'admin');
      const premium = users.filter(k => Object.keys(db.users[k].perms || {}).length > 0).length;
      const mrr = premium * 9800;

      const setVisible = (tid) => {
        const n = AppStorage.get();
        n.config.toolVisibility[tid] = !n.config.toolVisibility[tid];
        AppStorage.save(n); setDb(n);
      };

      const setStatus = (u, st) => {
        const n = AppStorage.get(); n.users[u].status = st; AppStorage.save(n); setDb(n);
      };

      const Stat = (l, v, c) => h('div', { className: 'glass p-8 rounded-[2.5rem] flex-1' }, h('p', { className: 'text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest' }, l), h('p', { className: 'text-4xl font-black ' + c }, v));

      return h('div', { className: 'w-full max-w-6xl mx-auto animate-fade' },
        h('div', { className: 'flex flex-col md:flex-row justify-between items-center mb-12 gap-6 pb-8 border-b border-white/10' },
          h('h1', { className: 'text-4xl font-black italic tracking-tighter' }, '💎 PRIME DASH'),
          h('div', { className: 'flex gap-4' },
            h('button', { onClick: props.onGoApp, className: 'magic-btn text-white px-8 py-3 rounded-full font-black shadow-xl active:scale-95 transition' }, '🚀 ツール起動'),
            h('button', { onClick: props.onLogout, className: 'bg-white/10 hover:bg-white/20 px-8 py-3 rounded-full font-black text-white/50 transition' }, 'LOGOUT')
          )
        ),
        
        h('div', { className: 'flex gap-2 overflow-x-auto mb-10 border-b border-white/5 hide-scrollbar' },
          [{id:'analytics', l:'📊 収益分析'}, {id:'users', l:'👥 顧客管理'}, {id:'tools', l:'🛠 ツール表示'}, {id:'inqs', l:'📩 問い合わせ'}].map(t =>
            h('button', { key: t.id, onClick: () => setTab(t.id), className: 'px-8 py-5 text-sm font-black transition-all border-b-2 ' + (tab===t.id ? 'border-brand text-brand shadow-[0_4px_10px_rgba(56,189,248,0.2)]' : 'border-transparent text-slate-500') }, t.l)
          )
        ),

        tab === 'analytics' && h('div', { className: 'animate-slide-in space-y-8' },
          h('div', { className: 'flex flex-col md:flex-row gap-6' },
            Stat('月間見込み収益 (MRR)', `¥${mrr.toLocaleString()}`, 'text-brand-success'),
            Stat('累計登録ユーザー', users.length + '名', 'text-white'),
            Stat('プレミアム転換率', Math.round((premium/users.length||0)*100) + '%', 'text-brand-gold')
          ),
          h('div', { className: 'glass p-10 rounded-[3rem] text-center' },
            h('h2', { className: 'text-xl font-bold mb-4' }, '💳 Stripe決済モジュール'),
            h('p', { className: 'text-sm text-slate-500 max-w-md mx-auto mb-8' }, '決済完了時にAPIで自動的にツール権限を付与する仕組みをここに統合可能です。'),
            h('button', { className: 'bg-indigo-600/50 text-white/40 px-10 py-4 rounded-2xl font-black cursor-not-allowed border border-white/10' }, 'SETTING API (COMING SOON)')
          )
        ),

        tab === 'tools' && h('div', { className: 'glass rounded-[3rem] p-10 animate-slide-in' },
          h('p', { className: 'text-brand-accent font-black mb-8 flex items-center gap-3' }, h('span', { className: 'text-2xl' }, '⚠️'), 'チェックを外したツールは、一般ユーザーには表示されなくなります。'),
          h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4' },
            Object.keys(TOOLS).map(tid => h('label', { key: tid, className: 'flex items-center justify-between glass p-5 rounded-2xl cursor-pointer hover:bg-white/5 transition' },
              h('div', { className: 'flex items-center gap-4' }, h('span', { className: 'text-2xl' }, TOOLS[tid].icon), h('span', { className: 'font-bold' }, TOOLS[tid].name)),
              h('input', { type: 'checkbox', className: 'toggle-checkbox hidden', checked: db.config.toolVisibility[tid] !== false, onChange: () => setVisible(tid) }),
              h('div', { className: 'toggle-label w-12 h-6 bg-slate-700 rounded-full relative p-1 transition' }, h('div', { className: 'toggle-dot w-4 h-4 bg-white rounded-full transition shadow' }))
            ))
          )
        ),

        tab === 'users' && h('div', { className: 'glass rounded-[3rem] overflow-hidden animate-slide-in' },
          h('table', { className: 'w-full text-left' },
            h('thead', { className: 'bg-white/5' }, h('tr', null, ['顧客名', 'SNS', '状態', '操作'].map(th => h('th', { className: 'p-6 text-[10px] font-black text-slate-500 uppercase tracking-widest' }, th)))),
            h('tbody', { className: 'divide-y divide-white/5' }, users.map(k => h('tr', { key: k, className: 'hover:bg-white/5 transition' },
              h('td', { className: 'p-6 font-bold text-white' }, k),
              h('td', { className: 'p-6 text-brand-light font-mono' }, db.users[k].sns),
              h('td', { className: 'p-6' }, h('span', { className: 'px-4 py-1.5 rounded-full text-[10px] font-black ' + (db.users[k].status==='approved'?'bg-brand-success/20 text-brand-success':'bg-brand-accent/20 text-brand-accent') }, db.users[k].status.toUpperCase())),
              h('td', { className: 'p-6 flex gap-3' },
                db.users[k].status !== 'approved' && h('button', { onClick: () => setStatus(k, 'approved'), className: 'text-brand-success font-black text-xs hover:underline' }, '許可'),
                h('button', { onClick: () => setStatus(k, 'rejected'), className: 'text-brand-danger font-black text-xs hover:underline' }, 'BAN')
              )
            )))
          )
        ),

        // フッター: ゴールド・バージョン
        h('div', { className: 'mt-20 py-10 border-t border-white/5 text-center' },
          h('div', { className: 'inline-block px-6 py-2 rounded-full border border-brand-gold/30 bg-brand-gold/10' }, 
            h('p', { className: 'text-brand-gold text-[10px] font-black tracking-[0.5em] uppercase animate-glow' }, 'System Kernel: ' + VERSION)
          )
        )
      );
    };

    /* =========================================================================
       6. メインアプリケーション (ユーザーダッシュボード)
       ========================================================================= */
    const MainApp = function(props) {
      const [screen, setScreen] = useState('home');
      const db = AppStorage.get();
      const uData = db.users[props.user];

      if (screen === 'settings') {
        const [b, setB] = useState(uData.brand);
        return h('div', { className: 'w-full max-w-2xl mx-auto animate-slide-in' },
          h('div', { className: 'flex items-center gap-5 mb-12 pb-6 border-b border-white/10' }, h('button', { onClick: () => setScreen('home'), className: 'glass px-5 py-2 rounded-xl text-sm font-black' }, '← BACK'), h('h1', { className: 'text-3xl font-black' }, '👤 BRAND SETTING')),
          h('div', { className: 'glass rounded-[2.5rem] p-10 space-y-8' },
            h('div', null, h('span', { className: 'block text-xs font-black text-slate-500 mb-4 tracking-widest' }, '🤖 AI PLAN'), h('select', { className: 'input-box', value: b.plan, onChange: e => setB(Object.assign({}, b, {plan: e.target.value})) }, h('option', {value:'free'}, '無料版 AI'), h('option', {value:'paid'}, '有料版 AI'))),
            h('div', null, h('span', { className: 'block text-xs font-black text-slate-500 mb-4 tracking-widest' }, 'AUTHOR NAME'), h('input', { className: 'input-box', value: b.name, onChange: e => setB(Object.assign({}, b, {name: e.target.value})) })),
            h('button', { onClick: () => { const n=AppStorage.get(); n.users[props.user].brand=b; AppStorage.save(n); alert('保存完了'); setScreen('home'); }, className: 'w-full btn-gradient py-5 rounded-2xl font-black shadow-xl shadow-brand/20' }, 'SAVE SETTING')
          )
        );
      }

      if (TOOLS[screen]) return h(ToolCore, { tid: screen, user: props.user, role: props.role, onBack: () => setScreen('home') });

      const usageCount = (uData.usage.date === new Date().toDateString()) ? uData.usage.count : 0;

      return h('div', { className: 'w-full animate-fade' },
        // アクションバー
        h('div', { className: 'fixed top-4 right-4 md:top-8 md:right-8 z-50 flex gap-3' },
          props.role === 'admin' && h('button', { onClick: props.onGoAdmin, className: 'bg-brand-accent text-white px-6 py-2.5 rounded-full text-[10px] font-black shadow-xl shadow-brand-accent/30 active:scale-95' }, '💎 DASHBOARD'),
          h('div', { className: 'glass px-6 py-2.5 rounded-full text-[10px] font-black text-white/50 border-white/10' }, 'LIMIT: ' + usageCount + '/' + LIMIT),
          h('button', { onClick: props.onLogout, className: 'bg-white/5 hover:bg-white/10 px-6 py-2.5 rounded-full text-[10px] font-black transition text-white/40' }, 'LOGOUT')
        ),

        // ヒーローセクション
        h('div', { className: 'text-center mt-20 mb-28 animate-slide-in' },
          h('div', { className: 'inline-block glass px-6 py-2 rounded-full mb-10' }, h('span', { className: 'magic-text-gradient text-[10px] font-black tracking-[0.6em] uppercase animate-glow' }, 'AI Content Pro Prime')),
          h('h1', { className: 'text-6xl md:text-8xl font-black tracking-tighter mb-8 leading-tight text-white' }, 'Master of ', h('br', {className:'md:hidden'}), h('span', { className: 'text-brand drop-shadow-[0_0_30px_rgba(56,189,248,0.4)]' }, 'Commerce')),
          h('p', { className: 'text-slate-500 text-lg md:text-xl max-w-3xl mx-auto leading-relaxed' }, 'クラウドワークス案件の完遂から、独自のコンテンツ販売まで。', h('br'), 'すべてを完全自動化し、あなたのビジネスを異次元へ引き上げる司令塔。'),
          h('div', { className: 'flex justify-center gap-6 mt-16' },
            h('button', { onClick: () => setScreen('settings'), className: 'glass px-10 py-5 rounded-2xl font-black text-sm hover:bg-white/10 transition shadow-2xl flex items-center gap-4 group' }, h('span', { className: 'text-2xl group-hover:rotate-12 transition' }, '👤'), 'BRAND & AI SETTING')
          )
        ),

        // カテゴリ別ツール一覧
        CATEGORY_LIST.map(cat => {
          const visible = Object.keys(TOOLS).filter(k => TOOLS[k].cat === cat.id && db.config.toolVisibility[k] !== false);
          if (visible.length === 0) return null;
          return h('div', { key: cat.id, className: 'mb-24' },
            h('h2', { className: 'text-2xl font-black text-white mb-12 flex items-center gap-5' }, h('div', { className: 'w-1.5 h-8 bg-brand rounded-full shadow-[0_0_15px_rgba(56,189,248,0.5)]' }), cat.name),
            h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8' },
              visible.map(tid => {
                const t = TOOLS[tid];
                const can = UNLOCKED_BY_DEFAULT.includes(tid) || props.role==='admin' || uData.perms[tid];
                return h('div', { key: tid, onClick: function(){ if(can) setScreen(tid); else alert('🔒 このツールは現在ロックされています。'); }, className: 'tool-card glass rounded-[2.5rem] p-10 cursor-pointer relative overflow-hidden group ' + (can ? '' : 'opacity-40 grayscale pointer-events-none') },
                  h('div', { className: 'absolute -right-6 -top-6 w-32 h-32 bg-brand/5 rounded-full blur-3xl group-hover:bg-brand/20 transition duration-700' }),
                  h('div', { className: 'flex justify-between items-start mb-10 relative z-10' },
                    h('div', { className: 'text-6xl group-hover:scale-110 transition duration-500 drop-shadow-xl' }, t.icon),
                    t.badge && h('span', { className: 'bg-brand/10 text-brand text-[10px] font-black px-4 py-1.5 rounded-full border border-brand/20 uppercase tracking-widest' }, t.badge)
                  ),
                  h('h3', { className: 'text-2xl font-black mb-4 text-white/90 group-hover:text-white transition' }, t.name),
                  h('p', { className: 'text-sm text-slate-500 leading-relaxed font-medium' }, t.desc)
                );
              })
            )
          );
        })
      );
    };

    /* =========================================================================
       7. ログイン画面 (以前のシンプルUIを復元・安定化)
       ========================================================================= */
    const AuthBox = function(props) {
      const [u, setU] = useState(''); const [p, setP] = useState('');
      const login = function() {
        const db = AppStorage.get();
        if (u === db.config.adminU && p === db.config.adminP) {
          localStorage.setItem(SESS_KEY, JSON.stringify({ u: db.config.adminU, r: 'admin' }));
          props.onLogin(db.config.adminU, 'admin');
        } else if (db.users[u] && db.users[u].status === 'approved') {
          localStorage.setItem(SESS_KEY, JSON.stringify({ u, r: 'approved' }));
          props.onLogin(u, 'approved');
        } else alert('名前に間違いがあるか、承認待ちです。');
      };
      return h('div', { className: 'w-full max-w-md mt-24 animate-in' },
        h('div', { className: 'glass rounded-[3rem] p-12 md:p-16 shadow-2xl text-center relative overflow-hidden' },
          h('div', { className: 'absolute -top-32 -left-32 w-64 h-64 bg-brand/20 rounded-full blur-[100px] animate-float' }),
          h('h2', { className: 'text-4xl font-black mb-14 tracking-tighter text-white' }, 'AI Content Pro'),
          h('div', { className: 'space-y-6 relative z-10' },
            h('input', { className: 'input-box text-center', placeholder: 'USER NAME', value: u, onChange: e => setU(e.target.value) }),
            h('input', { className: 'input-box text-center', type: 'password', placeholder: 'PASSWORD', value: p, onChange: e => setP(e.target.value) }),
            h('button', { onClick: login, className: 'w-full magic-btn py-5 rounded-2xl text-white font-black text-lg shadow-2xl active:scale-95 transition' }, 'LOGIN')
          ),
          h('p', { className: 'text-[10px] text-slate-600 font-black mt-12 tracking-[0.3em] uppercase' }, 'Secure Cloud Computing Network')
        )
      );
    };

    /* =========================================================================
       8. Root コンポーネント (統合ハブ)
       ========================================================================= */
    const App = function() {
      const [auth, setAuth] = useState({ u: null, r: null });
      const [isAdmin, setIsAdmin] = useState(false);

      useEffect(() => {
        const session = localStorage.getItem(SESS_KEY);
        if (session) setAuth(JSON.parse(session));
      }, []);

      const onLogout = () => { localStorage.removeItem(SESS_KEY); setAuth({ u: null, r: null }); setIsAdmin(false); };

      if (!auth.u) return h(AuthBox, { onLogin: (u, r) => setAuth({ u, r }) });
      if (auth.r === 'admin' && isAdmin) return h(AdminDash, { onGoApp: () => setIsAdmin(false), onLogout });
      
      return h(MainApp, { user: auth.u, role: auth.r, onLogout, onGoAdmin: () => setIsAdmin(true) });
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
  })();
  </script>
</body>
</html>
