];

const rJ = '\n【ルール】前置きなしでJSON出力:\n';
const TOOLS = {
  note: { i:'📝', n:'note記事生成', b:'必須', d:'売れる記事構成と本文を作成', tut:'読者の悩みに寄り添い、解決策を提示する有料記事を作成します。', f:[{id:'t1',t:'in',l:'テーマ'},{id:'t2',t:'in',l:'ターゲット層・悩み'},{id:'t3',t:'in',l:'価格・文字数目安'},{id:'chk',t:'chk',l:'購入者特典の案内を含める'}], bld:(v,b)=>b+'テーマ「'+v.t1+'」悩み「'+v.t2+'」向けnote記事作成。価格/文字数:'+v.t3+'\n'+(v.chk?'※最後に特典案内を含める\n':'')+'【厳守】前置きなしでMarkdown出力。\n---TITLES---\n1.タイトル案...\n---FREE_START---\n無料本文...\n---FREE_END---\n---PAID_START---\n有料本文...\n---PAID_END---', isNote:true },
  research: { i:'⚔️', n:'競合リサーチ', b:'神機能', d:'弱点とブルーオーシャンを発見', tut:'ライバルのセールス文をコピペし弱点を見つけます。', f:[{id:'t1',t:'ar',l:'ライバルの目次・セールス文'},{id:'t2',t:'in',l:'自分の強み(任意)'}], bld:(v,b)=>b+'以下の教材を分析し、弱点と私の強み「'+v.t2+'」を活かした勝てるコンセプトを3つ提案して。\n'+v.t1+rJ+'{"concepts":[{"title":"名","weakness":"弱点","strategy":"戦略"}]}' },
  lp: { i:'📄', n:'爆売れLP作成', b:'必須', d:'高単価を売るセールスレター', tut:'商品を売るLPの構成を作ります。', f:[{id:'t1',t:'in',l:'商品名・価格'},{id:'t2',t:'ar',l:'ベネフィット・特徴'}], bld:(v,b)=>b+'商品「'+v.t1+'」を売るLP構成を作成して。特徴: '+v.t2+rJ+'{"hero":"コピー","empathy":["共感..."],"benefits":["利点..."],"offer":"オファー"}' },
  affiliate: { i:'🔗', n:'アフィリエイト', b:'', d:'商品レビュー＆SNS誘導', tut:'他人の商品を売る記事とポストを作ります。', f:[{id:'t1',t:'in',l:'商品名・URL'},{id:'t2',t:'in',l:'ターゲット'},{id:'t3',t:'ar',l:'推しポイント・体験談'}], bld:(v,b)=>b+'商品「'+v.t1+'」をターゲット「'+v.t2+'」に売るレビューとSNS。推し: '+v.t3+rJ+'{"article":{"title":"題","sections":["見出し..."]},"sns_posts":["ポスト..."]}' },
  backend: { i:'💎', n:'高単価バックエンド', b:'', d:'30万円〜の商材企画', tut:'フロント商品購入者へ売る高単価企画を作ります。', f:[{id:'t1',t:'in',l:'価格・形式'},{id:'t2',t:'ar',l:'ベース知識・元記事'}], bld:(v,b)=>b+'知識をベースに価格「'+v.t1+'」の高額商品企画を3つ作成。\n'+v.t2+rJ+'{"plans":[{"title":"名","detail":"詳細","pitch":"セールス文"}]}' },
  bonus: { i:'🎁', n:'購入者特典生成', b:'', d:'記事から特典アイデア作成', tut:'商品の購入率を上げる「おまけ」を提案します。', f:[{id:'t1',t:'ar',l:'元記事'}], bld:(v,b)=>b+'記事を分析し購入者特典を8つ提案。\n'+v.t1+rJ+'{"suggestions":[{"title":"題","type":"種類","desc":"説明"}]}' },

  sns: { i:'📱', n:'SNS集客ポスト', b:'', d:'X/Threadsでバズる投稿', tut:'記事からSNS投稿を作ります。参考投稿を入れると型を真似ます。', f:[{id:'s1',t:'sel',l:'媒体',o:['X(単発)','X(ツリー)','Threads','両方']},{id:'s2',t:'sel',l:'目的',o:['価値提供','ストーリー','宣伝']},{id:'t2',t:'ar',l:'参考バズ投稿(任意)'},{id:'t1',t:'ar',l:'発信内容'}], bld:(v,b)=>b+'媒体「'+v.s1+'」目的「'+v.s2+'」で投稿を作成。\n'+(v.t2?'【モデリング】型を完全トレース:\n'+v.t2+'\n':'')+'【内容】\n'+v.t1+rJ+'{"posts":["本文..."]}' },
  video: { i:'🎥', n:'ショート動画台本', b:'', d:'TikTok/Shorts用台本', tut:'60秒以内のショート動画台本を作ります。', f:[{id:'t1',t:'ar',l:'内容・元記事'}], bld:(v,b)=>b+'内容から60秒動画台本と映像AI用プロンプトを作成。\n'+v.t1+rJ+'{"title":"題","scenes":[{"sec":"秒","narration":"ナレ","telop":"テロ","ai_prompt":"英語"}]}' },
  image: { i:'🖼️', n:'画像プロンプト', b:'', d:'画像生成AI用呪文', tut:'AIに美しい画像を描かせる指示文を作ります。', f:[{id:'t1',t:'in',l:'キーワード'}], bld:(v,b)=>b+'「'+v.t1+'」の画像生成プロンプトを5パターン作成(英語)。'+rJ+'{"results":[{"title":"意図","prompt":"プロンプト","negative":"ネガ"}]}' },
  magnet: { i:'🎁', n:'無料プレゼント', b:'', d:'LINE登録率を上げる特典', tut:'リスト取り用の特典構成を作ります。', f:[{id:'t1',t:'in',l:'悩み'},{id:'t2',t:'ar',l:'ノウハウ'}], bld:(v,b)=>b+'悩み「'+v.t1+'」を解決するLINE登録特典アイデア5つと最強の目次構成を作成。\n'+v.t2+rJ+'{"ideas":["案..."],"best_magnet":{"title":"題","outline":["目次..."]}}' },
  line: { i:'💌', n:'LINEステップ', b:'', d:'自動で売れる5日間シナリオ', tut:'5日間で商品を売る自動配信シナリオを作ります。', f:[{id:'t1',t:'in',l:'商品名・価格'},{id:'t2',t:'ar',l:'詳細'}], bld:(v,b)=>b+'商品「'+v.t1+'」を売るLINE5日間ステップ配信を作成。詳細: '+v.t2+rJ+'{"days":[{"day":1,"title":"件名","body":"本文"}...]}' },
  funnel: { i:'🩺', n:'ファネル診断', b:'', d:'売れない原因をAIコンサル', tut:'数字のボトルネックをAIに診断させます。', f:[{id:'t1',t:'ar',l:'現状の数字 (例: Xインプ1万, 売上0)'}], bld:(v,b)=>b+'数字を見てボトルネックを診断し改善策を3つ提示して。\n'+v.t1+rJ+'{"bottleneck":"原因","solutions":["策..."]}' },
  reply: { i:'💬', n:'LINE/DM 神返信', b:'', d:'完璧なセールス返信', tut:'問い合わせに対し、信頼を築き商品へ誘導する返信を作ります。', f:[{id:'s1',t:'sel',l:'目的',o:['信頼構築','商品誘導','不安解消','誠実対応']},{id:'t1',t:'ar',l:'相手のメッセージ'}], bld:(v,b)=>b+'DM「'+v.t1+'」に目的「'+v.s1+'」で神返信を作成。'+rJ+'{"replies":[{"type":"親しみ","text":"本文"},{"type":"権威","text":"本文"},{"type":"質問","text":"本文"}]}' },
  interview: { i:'🗣️', n:'AIインタビュー', b:'', d:'体験談を引き出す', tut:'AIとチャットして一次情報を引き出します。', f:[{id:'t1',t:'in',l:'テーマ'}], bld:(v,b)=>b+'あなたは編集者です。テーマ「'+v.t1+'」で私にインタビューし記事構成を作ります。【ルール】1ターン1問。私が答えたら深掘り。5問で構成出力。最初の質問をどうぞ。', noJson:true },
  journey: { i:'🗺️', n:'カスタマージャーニー', b:'', d:'戦略マップを作成', tut:'どんなSNSで何を発信して売るかの全体設計図を作ります。', f:[{id:'t1',t:'in',l:'テーマ'},{id:'t2',t:'in',l:'ターゲット'}], bld:(v,b)=>b+'テーマ「'+v.t1+'」ターゲット「'+v.t2+'」で【認知→興味→比較・検討→購入→リピート】の戦略を作成。'+rJ+'{"phases":[{"name":"フェーズ","goal":"目的","tools":["X等"],"action":"戦略"}...]}' },
  webdev: { i:'💻', n:'Webアプリ開発', b:'神機能', d:'アイデアからHTML生成', tut:'プログラミング知識ゼロでWebツールを作ります。Claudeへ投げます。', f:[{id:'t1',t:'ar',l:'アイデア'}], bld:(v,b)=>'あなたは天才エンジニアです。アイデアからHTML/CSS/JSが1枚にまとまったWebアプリを作成してください。GitHub公開手順も案内し、Geminiへ引き継ぐ仕様書を出力してください。\n【アイデア】\n'+v.t1, noJson:true }
};

// ── UI部品 ──
const InputF = ({f, v, onChange}) => {
  if(f.t==='in') return e('div',{className:'card'}, e('span',{className:'lbl'},f.l), e('input',{className:'inp',value:v,onChange:x=>onChange(x.target.value)}));
  if(f.t==='ar') return e('div',{className:'card'}, e('span',{className:'lbl'},f.l), e('textarea',{className:'inp',style:{minHeight:100},value:v,onChange:x=>onChange(x.target.value)}));
  if(f.t==='sel') return e('div',{className:'card'}, e('span',{className:'lbl'},f.l), e('select',{className:'inp',value:v,onChange:x=>onChange(x.target.value)}, f.o.map(o=>e('option',{key:o,value:o},o))));
  if(f.t==='chk') return e('div',{className:'card flex',style:{alignItems:'center'}}, e('input',{type:'checkbox',checked:v,onChange:x=>onChange(x.target.checked),style:{width:18,height:18}}), e('span',{style:{fontWeight:700}},f.l));
  return null;
};

const RJson = ({obj}) => {
  if(typeof obj === 'string') return e('p',{className:'res-box'}, obj);
  if(Array.isArray(obj)) return e('div',null, obj.map((x,i)=>e('div',{key:i,style:{marginBottom:10,borderBottom:'1px dashed #334155',paddingBottom:10}}, e(RJson,{obj:x}))));
  if(typeof obj === 'object' && obj) return e('div',null, Object.keys(obj).map(k=>e('div',{key:k,style:{marginBottom:8}}, e('span',{style:{color:'#38bdf8',fontSize:11,fontWeight:700}},k), e(RJson,{obj:obj[k]}))));
  return e('span',null, String(obj));
};

const wrapP = (p, b) => (p==='paid' ? '【システム: 有料AIモード】\n高度な推論とWeb検索が可能な状態です。複雑な指示にも完璧に従ってください。\n\n' : '【システム: 無料AIモード】\n出力制限がある環境です。途切れないよう簡潔に要点を絞って出力してください。\n\n') + b;

const WebLinks = ({msg}) => e('div',{style:{padding:14,background:'rgba(255,255,255,.03)',border:'1px solid rgba(56,189,248,.4)',borderRadius:10,marginBottom:16}}, e('p',{style:{fontSize:12,fontWeight:700,color:'#38bdf8',marginBottom:8}},'👇 AIを開いてプロンプトを送信'), e('div',{className:'flex',style:{marginBottom:12}}, ['Perplexity','ChatGPT','Claude'].map(x=>e('a',{key:x,href:'https://'+(x==='ChatGPT'?'chatgpt.com':x==='Claude'?'claude.ai':'www.perplexity.ai'),target:'_blank',className:'btn-s',style:{flex:1,textAlign:'center',background:'rgba(255,255,255,.1)'}},x))), msg===false?null:e('p',{style:{fontSize:11,color:'rgba(255,255,255,.5)'}},'回答完了後、すべてコピーして「📥 AI回答読込」に貼り付けてください。'));

// ── 共通ツールエンジン ──
const ToolEngine = ({tid, user, role, onBack}) => {
  const tC = TOOLS[tid];
  const [tab, setTab] = useState('set'); const [c, setC] = useState({}); const [links, setLinks] = useState(false);
  const [imp, setImp] = useState(''); const [res, setRes] = useState(null); const [err, setErr] = useState('');
  
  const db = getDB(); const uD = db.users[user]; const pid = uD.curProj || 'default';
  const [v, setV] = useState((uD.projects[pid].data[tid]) || {});

  const updV = (id, val) => { const n={...v, [id]:val}; setV(n); if(role!=='admin'){const d=getDB(); d.users[user].projects[pid].data[tid]=n; saveDB(d);} };
  const canUse = () => { if(role==='admin'||(uD.perms&&uD.perms[tid]))return true; const t=new Date().toDateString(); return (uD.usage.date!==t) || (uD.usage.count<DAILY_LIMIT); };
