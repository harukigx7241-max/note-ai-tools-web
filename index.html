<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI Content Pro (SaaS Edition)</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#0d0d1a;color:#fff;min-height:100vh;overflow-x:hidden;line-height:1.6}
button,input,textarea,select{font-family:inherit;font-size:16px}
button{-webkit-tap-highlight-color:transparent;cursor:pointer}
a{-webkit-tap-highlight-color:transparent}

/* 背景・レイアウト */
.pg{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;position:relative;background:linear-gradient(135deg,#0d0d1a,#1a0a2e 50%,#0a1628)}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.z1{position:relative;z-index:1}

/* タイトル周り */
.badge-sm{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:6px 18px;font-size:11px;font-weight:700;letter-spacing:.15em;color:rgba(255,255,255,.7);margin-bottom:24px}
.main-ttl{font-size:clamp(36px,8vw,64px);font-weight:900;line-height:1.1;text-align:center;margin-bottom:12px}
.main-ttl span{color:#38bdf8}
.main-sub{font-size:14px;color:rgba(255,255,255,.5);text-align:center;line-height:1.8;margin-bottom:32px}

/* ダッシュボード系 */
.cat-ttl{font-size:16px;font-weight:800;margin-bottom:14px;color:#38bdf8;border-bottom:2px solid rgba(56,189,248,.2);padding-bottom:6px;width:100%;max-width:920px;text-align:left}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;width:100%;max-width:920px;margin-bottom:36px}
.tool-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all .2s;text-align:left;display:flex;flex-direction:column}
.tool-card:hover{background:rgba(255,255,255,.08);border-color:rgba(56,189,248,.4);transform:translateY(-2px)}
.tc-badge{display:inline-block;background:rgba(233,69,96,.2);border:1px solid rgba(233,69,96,.4);border-radius:100px;padding:2px 8px;font-size:9px;color:#e94560;font-weight:800;letter-spacing:.1em;margin-bottom:7px;align-self:flex-start}
.tc-badge-new{background:rgba(56,189,248,.2);border-color:rgba(56,189,248,.4);color:#38bdf8}
.tc-icon{font-size:24px;margin-bottom:6px}
.tc-name{font-size:14px;font-weight:800;color:#fff;margin-bottom:4px}
.tc-desc{font-size:11px;color:rgba(255,255,255,.4);line-height:1.5}

/* UIパーツ共通 */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:15px 16px;margin-bottom:11px}
.lbl{color:rgba(255,255,255,.55);font-size:11px;font-weight:700;letter-spacing:.1em;display:block;margin-bottom:9px}
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:15px;outline:none;padding:11px 13px;font-family:inherit; transition:all .2s}
.inp:focus{border-color:rgba(56,189,248,.5); background:rgba(255,255,255,.08)}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:6px 12px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s}
.pill:hover{background:rgba(255,255,255,.1)}
.pill-on{background:rgba(56,189,248,.2) !important;border-color:rgba(56,189,248,.5) !important;color:#fff !important}
.err{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.3);border-radius:9px;padding:10px 12px;font-size:13px;color:#f87171;margin-bottom:9px;white-space:pre-wrap;line-height:1.5}
.btn-primary{padding:11px 24px;border-radius:9px;background:linear-gradient(135deg,#0ea5e9,#2563eb);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(14,165,233,.3);transition:all .2s}
.btn-primary:active{transform:scale(0.96)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-rl{display:flex;align-items:center;gap:5px;padding:9px 16px;border-radius:9px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.8);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;justify-content:center}
.btn-rl:hover{background:rgba(255,255,255,.12)}
.btn-rl:active{transform:scale(0.96)}
.genbtn{width:100%;border-radius:11px;border:none;cursor:pointer;position:relative;overflow:hidden;background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;margin-bottom:15px;box-shadow:0 4px 15px rgba(14,165,233,.3); transition:all 0.2s;}
.genbtn:active{transform:scale(0.98);}
.genbtn:disabled{opacity:0.5;cursor:not-allowed;}
.gen-in{position:relative;z-index:2;padding:16px 20px;display:flex;flex-direction:column;align-items:center;gap:5px}
.flex-row-gap { display:flex; gap:10px; flex-wrap:wrap; }
.flex-col { flex:1; min-width:200px; }

/* アプリヘッダー＆タブ */
.app{min-height:100vh;background:linear-gradient(135deg,#0d0d1a,#1a0a2e 50%,#0a1628)}
.app-hd{background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.07);padding:11px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
.app-hd-l{display:flex;align-items:center;gap:9px}
.app-ttl{font-size:15px;font-weight:900;color:#fff;margin:0}
.app-sub{font-size:11px;color:#38bdf8;margin:2px 0 0;font-weight:700}
.app-body{max-width:720px;margin:0 auto;padding:16px 12px}
.tabs{background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:12px 15px;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.35);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.tab-on{color:#fff !important;border-bottom-color:#38bdf8 !important}
.back-btn{padding:7px 12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:7px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}

/* 認証・管理者画面 */
.auth-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px 24px;width:100%;max-width:400px;text-align:center;backdrop-filter:blur(10px)}
.auth-box h2{font-size:22px;font-weight:900;margin-bottom:8px;color:#fff}
.auth-box p{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:24px}
.admin-table{width:100%;border-collapse:collapse;margin-top:20px;font-size:13px}
.admin-table th{background:rgba(255,255,255,.05);padding:12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.admin-table td{padding:12px;border-bottom:1px solid rgba(255,255,255,.05)}

/* ポスト＆結果カード */
.post-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin-bottom:8px}
.post-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.06)}
.post-body{padding:10px 13px;max-height:400px;overflow-y:auto;font-size:13px;color:rgba(255,255,255,.8);white-space:pre-wrap;line-height:1.7}
.cpbtn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.edit-ta{width:100%;min-height:400px;padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:14px;line-height:1.8;resize:vertical;outline:none;font-family:monospace}
.ai-launcher-link { display:flex; align-items:center; justify-content:center; gap:6px; flex:1; padding:10px; border-radius:8px; text-decoration:none; font-size:12px; font-weight:800; color:#fff; background:rgba(255,255,255,.1); transition:all 0.2s; white-space:nowrap;}
.ai-launcher-link:hover { background:rgba(255,255,255,.2); transform:translateY(-2px);}

@media(max-width:560px){
  .main-ttl{font-size:32px}
  .tool-grid{grid-template-columns:1fr}
  .app-ttl{font-size:13px}
  .edit-ta{min-height:280px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
'use strict';
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;

// ── データベースとシステム変数 ──
var DB_KEY_USERS = 'AICP_DB_Users_v1';
var DB_KEY_CURRENT = 'AICP_DB_Current_v1';

var THEMES = [ {id:'money',label:'💰 お金・節約'}, {id:'health',label:'💪 健康・ダイエット'}, {id:'career',label:'🚀 キャリア・副業'}, {id:'mindset',label:'🧠 マインドセット'}, {id:'relationship',label:'❤️ 人間関係・恋愛'}, {id:'productivity',label:'⚡ 生産性・習慣'}, {id:'parenting',label:'👶 育児・子育て'}, {id:'other',label:'📝 その他'} ];
var TONES = [ {id:'story',label:'📖 体験談・ストーリー'}, {id:'howto',label:'📋 ハウツー・解説'}, {id:'secret',label:'🔥 秘密・裏知識'}, {id:'contrast',label:'⚡ 比較・対比'}, {id:'warm',label:'💓 共感・寄り添い'}, {id:'custom',label:'✏️ カスタム'} ];
var AGES = [ {id:'10s',label:'10代'},{id:'20s',label:'20代'},{id:'30s',label:'30代'}, {id:'40s',label:'40代'},{id:'50s',label:'50代以上'},{id:'all',label:'全年齢'} ];
var SNS_PLATFORMS = [ {id:'both', label:'📱 X(単発) ＆ Threads (同時)'}, {id:'x_thread', label:'🧵 X (ツリー投稿)'}, {id:'x_single', label:'🐦 X (単発ポスト)'}, {id:'threads', label:'🌀 Threads (対話型)'} ];
var SNS_TONES = [ {id:'value', label:'💡 ノウハウ共有 (有益・保存狙い)'}, {id:'story', label:'📖 ストーリー (共感・バズ狙い)'}, {id:'promo', label:'📣 直接宣伝 (クリック誘導優先)'} ];
var IMG_TOOLS = [ {id:'chatgpt', label:'🟢 ChatGPT (DALL-E 3)'}, {id:'gemini', label:'🔵 Gemini (Nano Banana 2)'}, {id:'flux', label:'⚫ Grok / Flux.1'}, {id:'midjourney', label:'🎨 Midjourney (v6)'}, {id:'stablediffusion', label:'⚙️ Stable Diffusion 3'} ];
var IMG_ASPECTS = [ {id:'16:9', label:'📺 16:9 (サムネイル)'}, {id:'1:1', label:'⬛ 1:1 (正方形)'}, {id:'3:1', label:'▭ 3:1 (ヘッダー)'}, {id:'9:16', label:'📱 9:16 (縦長)'} ];
var IMG_LIGHTING = [ {id:'auto', label:'🤖 おまかせ'}, {id:'cinematic', label:'🎬 シネマティック'}, {id:'natural', label:'☀️ 自然光'}, {id:'neon', label:'🌃 サイバーパンク'}, {id:'studio', label:'📸 スタジオ照明'} ];
var IMG_ANGLE = [ {id:'auto', label:'🤖 おまかせ'}, {id:'closeup', label:'👁️ クローズアップ'}, {id:'wide', label:'🌍 広角'}, {id:'bird', label:'🦅 俯瞰'}, {id:'low', label:'🐜 ローアングル'} ];

var TOOLS_CATEGORIES = [
  { name: '📝 コンテンツ作成 ＆ マネタイズ', tools: ['note', 'affiliate', 'backend', 'bonus'] },
  { name: '🚀 SNS集客 ＆ アカウント設計', tools: ['profile', 'sns', 'video', 'image'] },
  { name: '💬 顧客対応 ＆ ファン化', tools: ['line', 'reply', 'interview', 'journey'] }
];

var TOOLS_INFO = {
  note: {id:'note', icon:'📝',name:'note記事生成', desc:'高品質な記事プロンプトを作成', badge:'必須'},
  affiliate: {id:'affiliate', icon:'🔗',name:'アフィリエイト生成', desc:'爆売れする商品レビュー＆SNS', badge:''},
  backend: {id:'backend', icon:'💎',name:'高単価バックエンド', desc:'noteから繋げる30万円の商材企画', badge:''},
  bonus: {id:'bonus', icon:'🎁',name:'購入者特典生成', desc:'記事から特典アイデアを作成', badge:''},
  profile: {id:'profile', icon:'👤',name:'アカウント設計', desc:'バズるプロフ・名前を自動生成', badge:''},
  sns: {id:'sns', icon:'📱',name:'SNS集客ポスト生成', desc:'X/Threadsでバズる投稿を作成', badge:'連動'},
  video: {id:'video', icon:'🎥',name:'ショート動画台本', desc:'無料動画AI(Luma/Kling等)用台本', badge:''},
  image: {id:'image', icon:'🖼️',name:'画像プロンプト', desc:'画像生成AI用呪文を作成', badge:''},
  line: {id:'line', icon:'💌',name:'LINEステップ生成', desc:'自動で売れる5日間の教育シナリオ', badge:''},
  reply: {id:'reply', icon:'💬',name:'LINE/DM 神返信', desc:'読者の心に刺さる完璧なセールス返信', badge:''},
  interview: {id:'interview', icon:'🗣️',name:'AIインタビュー', desc:'自分だけのオリジナル体験談を抽出', badge:''},
  journey: {id:'journey', icon:'🗺️',name:'全体設計(ジャーニー)', desc:'認知〜購入までの戦略マップを作成', badge:'NEW'}
};

// ── ユーティリティ関数 ──
function parseJSON(text){ var clean=text.replace(/```(?:json)?\n?/gi,'').replace(/```/g,'').trim(); var m=clean.match(/\{[\s\S]*\}/); if(m){ try{return JSON.parse(m[0]);}catch(e){} } try { return JSON.parse(clean); } catch(e) { return null; } }
function doCopy(text, st, setSt, k){ if(navigator.clipboard && navigator.clipboard.writeText){navigator.clipboard.writeText(text).catch(function(){});} var n=Object.assign({},st);n[k]=true;setSt(n); setTimeout(function(){var n2=Object.assign({},st);n2[k]=false;setSt(n2);},2000); }

// ── プロンプトビルダ（統合・軽量化） ──
var Prompts = {
  note: function(o) {
    var searchCmd = '【重要: 執筆前のリサーチ指示】\nあなたはWeb検索機能を持っています。執筆前に「'+(o.topic||o.theme)+'」に関連する最新の上位記事をリサーチし、競合にない独自の切り口を盛り込んでください。\n\n';
    var bonusCmd = o.hasBonus ? '【重要: 特典の記載】\n有料パートの最後に、購入者限定の豪華特典があることと、その受け取り方法（公式LINE等）を魅力的に記載してください。\n\n' : '';
    return 'あなたは累計売上1000万円を超えるトップnoteクリエイターかつプロのコピーライターです。以下の条件で飛ぶように売れるnote有料記事を作成してください。\n\n'+searchCmd+'## ターゲット読者\n- 年代: '+o.age+'\n- 状況: '+(o.situation||'未指定')+'\n- 悩み: '+(o.worry||'未指定')+'\n\n## 記事設定\n- テーマ: '+(o.topic||'未指定')+'\n- 文体: '+o.tone+'\n\n## 出力形式（以下のMarkdownフォーマットに厳密に従い、前置きは一切書かないでください）\n---TITLES---\n1. [タイトル1]...\n---TAGS---\n#タグ1 #タグ2...\n---PROMO---\n（X用告知文）\n---CTA---\n（有料誘導文）\n---FREE_START---\n（無料パート本文。読者の痛みに共感し、解決策のWhatを示す）\n---FREE_END---\n---PAID_START---\n（有料パート本文。具体的なHow、注意点、Q&A、アクションプランを記述）\n---PAID_END---';
  },
  sns: function(text, p, t, model) {
    var mCmd = model ? '【超重要: モデリング】以下のバズ投稿の「構成・リズム・熱量」を完全にトレースし、型を憑依させてください。\n◆参考バズ投稿:\n' + model + '\n\n' : '';
    var jFmt = p === 'both' ? '{"posts_x": ["X用"], "posts_threads": ["Threads用"], "tags": ["#タグ..."]}' : '{"posts": ["ポスト本文..."], "tags": ["#タグ..."]}';
    return 'あなたはSNSマーケティングのプロです。以下のnote記事を元に集客SNSポストを作成してください。\n\n' + mCmd + '【設定】\n形式: ' + p + '\n目的・トーン: ' + t + '\n\n【ルール】\n- 最後にnote記事へのリンク導線を入れる。\n- 前置きなしで以下のJSON形式のみを出力。\n' + jFmt + '\n\n【元記事】\n' + text.slice(0,3000);
  },
  line: function(text, aud, pr) {
    return 'あなたはトップコピーライターです。以下のnote記事を販売する「公式LINE向け5日間ステップ配信シナリオ」を作成してください。\n\nターゲット: '+(aud||'見込み客')+'\n価格: '+(pr||'未定')+'\n\n【構成】1日目:共感と問題提起 2日目:常識の破壊 3日目:新世界の提示 4日目:信頼構築 5日目:強烈なオファー\n\n【ルール】各800字程度。前置きなしで以下のJSONのみ出力。\n{"days": [{"day": 1, "title": "件名", "body": "本文"}...]}\n\n【元記事】\n' + text.slice(0,3000);
  },
  video: function(text, p) {
    return 'あなたはバズ動画ディレクターです。以下の記事を要約し、'+p+'用の動画台本と、無料動画AI用の英語プロンプトを作成してください。\n\n【ルール】前置きなしで以下のJSONのみ出力。\n{"title": "タイトル", "scenes": [{"sec": "0-3秒", "narration": "ナレーション", "telop": "テロップ", "ai_prompt": "動画生成AI用英語プロンプト"}...]}\n\n【元記事】\n' + text.slice(0,3000);
  },
  backend: function(text, pr, st) {
    return 'あなたはトップ事業コンサルタントです。以下のnote記事の購入者へ提供する『高単価バックエンド商品』の企画案を3つ作成してください。\n\n想定価格: '+pr+'\n強み: '+st+'\n\n【ルール】前置きなしで以下のJSONのみ出力。\n{"concepts": [{"title": "商品名", "price": "価格", "format": "形式", "detail": "詳細", "sales_pitch": "セールス文"}]}\n\n【元記事】\n' + text.slice(0,3000);
  },
  bonus: function(text) {
    return '以下のnote記事を分析し、購入者特典コンテンツを8つ提案してください。\n\n【ルール】前置きなしで以下のJSONのみ出力。\n{"suggestions":[{"id":"1","title":"タイトル","type":"種類","desc":"説明(30字)"}]}\n\n【元記事】\n' + text.slice(0,3000);
  },
  image: function(style, tool, aspect, uses, keyword, lighting, angle) {
    return 'あなたはプロのAI画像クリエイターです。以下の条件で画像生成プロンプトを5パターン作成してください。\n\n対象AI: '+tool+'\n比率: '+aspect+'\nスタイル: '+style+'\n照明: '+lighting+'\nアングル: '+angle+'\nキーワード: '+keyword+'\n\n【ルール】\nAIが理解しやすい言語(英語ツールなら英語)で記述。前置きなしで以下のJSONのみ出力。\n{"results": [{"title": "意図", "prompt": "プロンプト", "negative": "ネガティブ", "command": "コピペ用完全コマンド"}]}';
  },
  profile: function(genre, p, st) {
    return 'あなたはSNSコンサルタントです。以下の条件でバズるアカウント設計を提案してください。\n\n媒体: '+p+'\nジャンル: '+genre+'\n強み: '+st+'\n\n【ルール】前置きなしで以下のJSONのみ出力。\n{"names": ["名前候補1..."], "profile_short": "140字プロフ", "profile_long": "500字プロフ", "visual": "アイコン・ヘッダー推奨イメージ"}';

// ── ルート管理 (認証ラッピング) ──
function Root() {
  var [user, setUser] = useState(null);
  var [role, setRole] = useState(null); // 'pending', 'approved', 'rejected', 'admin'

  useEffect(function() {
    var un = localStorage.getItem(DB_KEY_CURRENT);
    if (un) {
      if (un === 'admin') { setUser(un); setRole('admin'); } 
      else {
        var db = JSON.parse(localStorage.getItem(DB_KEY_USERS) || '{}');
        if (db[un]) { setUser(un); setRole(db[un].status); } else { localStorage.removeItem(DB_KEY_CURRENT); }
      }
    }
  }, []);

  function handleLogout() { localStorage.removeItem(DB_KEY_CURRENT); setUser(null); setRole(null); }

  if (!user) return h(AuthScreen, { onLogin: function(u, r) { setUser(u); setRole(r); } });
  if (role === 'admin') return h(AdminDashboard, { onLogout: handleLogout });
  if (role === 'pending' || role === 'rejected') return h(PendingScreen, { 
    onCheck: function() { var db = JSON.parse(localStorage.getItem(DB_KEY_USERS) || '{}'); setRole(db[user].status); }, 
    onLogout: handleLogout 
  });
  if (role === 'approved') return h(MainApp, { onLogout: handleLogout });
  return null;
}

var root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(Root,null));

})();
