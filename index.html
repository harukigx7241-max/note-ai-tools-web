  </style>
</head>
<body class="grid-bg min-h-screen relative overflow-x-hidden">
  <div id="root" class="relative z-10 flex flex-col items-center p-4 md:p-8 min-h-screen w-full max-w-5xl mx-auto"></div>

  <!-- JSXによる絶対にクラッシュしないReactコード -->
  <script type="text/babel" data-type="module">
    const { useState, useEffect, Fragment } = React;

       1. 絶対安全なデータベース管理システム
       ========================================================================= */

    const getDB = () => {
      let db = null;
      try {
        const stored = localStorage.getItem(DB_KEY);
        if (stored) db = JSON.parse(stored);
      } catch (e) { console.error("DB Parse Error", e); }

      if (!db || typeof db !== 'object') {
        db = {
          admin: { p: 'admin123' },
          users: {
            'admin': { status: 'approved', sns: '@admin', registeredAt: Date.now(), usage: { date: '', count: 0 }, perms: {}, brand: { plan: 'paid', name: '管理者', target: '', tone: '' }, projects: { 'default': { name: '管理者領域', data: {} } }, curProj: 'default' }
          },
          inqs: []
        };
        localStorage.setItem(DB_KEY, JSON.stringify(db));
      }
      return db;
    };

    const saveDB = (db) => {
      try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch (e) { console.error(e); }
    };

    // クリップボード
    const copyToClip = (text, setCopied, key) => {
      if (navigator.clipboard) navigator.clipboard.writeText(text).catch(()=>{});
      setCopied(prev => ({ ...prev, [key]: true }));
      setTimeout(() => setCopied(prev => ({ ...prev, [key]: false })), 2000);
    };

    // JSONパース
    const safeParse = (txt) => {
      if (!txt) return null;
      try {
        const clean = txt.replace(/```(?:json)?\n?/gi, '').replace(/```/g, '').trim();
        const m = clean.match(/\{[\s\S]*\}/);
        if (m) { try { return JSON.parse(m[0]); } catch(e){} }
        return JSON.parse(clean);
      } catch(e) { return null; }
    };

    const fmtDate = (ts) => {
      if(!ts) return '-';
      const d = new Date(ts);
      return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${('0'+d.getHours()).slice(-2)}:${('0'+d.getMinutes()).slice(-2)}`;
    };

    /* =========================================================================
       2. ツール定義 ＆ プロンプトジェネレータ
       ========================================================================= */

      { name: '📝 コンテンツ作成 ＆ マネタイズ', tools: ['note', 'research', 'lp', 'affiliate', 'backend', 'bonus'] },

    const R_JSON = '\n\n【ルール】前置きや挨拶は一切不要です。以下のJSONフォーマットのみを出力してください:\n';

    const TOOLS = {

        isOnePage: true
      },
      research: { 
        icon: '⚔️', name: '競合リサーチ', badge: '神機能', desc: '弱点とブルーオーシャンを発見', tut: '売れているライバルの教材から「欠けている要素」を見つけます。',
        fields: [ {id: 'rival', type: 'textarea', label: 'ライバルの教材の目次・セールス文'}, {id: 'strength', type: 'text', label: '自分の強み(任意)', magic: '特別なスキルはないが、読者の痛みに深く共感し、専門用語を使わずに小学生でも分かるレベルで噛み砕いて説明できる言語化能力'} ],
        buildPrompt: (v, b) => `${b}以下のライバル教材を分析し、弱点と私の強み「${v.strength}」を活かした勝てる商品コンセプトを3つ提案してください。\n${v.rival}${R_JSON}{"concepts":[{"title":"コンセプト名","weakness":"ライバルの弱点","strategy":"戦略"}]}`

        fields: [ {id: 'product', type: 'text', label: '商品名・価格'}, {id: 'benefits', type: 'textarea', label: '商品のベネフィット', magic: '単にお金が稼げるだけでなく、心に余裕が生まれ、大切な人との時間を楽しめるようになり、自分に自信が持てるようになるという根源的な欲求の充足'} ],
        buildPrompt: (v, b) => `${b}商品「${v.product}」を売るLP構成とコピーを作成してください。特徴: ${v.benefits}${R_JSON}{"hero":"キャッチコピー","empathy":["共感ポイント1..."],"benefits":["利点1..."],"offer":"オファー内容"}`
      },
      affiliate: { 
        icon: '🔗', name: 'アフィリエイト', badge: '', desc: '商品レビュー＆SNS誘導', tut: '他人の商品を売るためのレビュー記事と誘導ポストを作ります。',
        fields: [ {id: 'product', type: 'text', label: '商品名・URL'}, {id: 'target', type: 'text', label: 'ターゲット'}, {id: 'points', type: 'textarea', label: '推しポイント・体験談', magic: '最初は胡散臭いと思っていたが、実際に試してみたらサポートが丁寧で、つまづくことなく初収益を達成できたというリアルな驚き'} ],
        buildPrompt: (v, b) => `${b}商品「${v.product}」をターゲット「${v.target}」に売るレビュー構成とSNS誘導文を作成してください。推し: ${v.points}${R_JSON}{"article":{"title":"タイトル","sections":["見出し1..."]},"sns_posts":["ポスト1..."]}`
      },
      backend: { 
        icon: '💎', name: '高単価バックエンド', badge: '', desc: '30万円〜の商材企画', tut: 'フロント商品購入者へ売る高単価企画を作ります。',
        fields: [ {id: 'price', type: 'text', label: '想定価格・形式', magic: '30万円（分割払い対応）、6ヶ月間の完全個別チャットサポート＋月2回のZoomコンサルティング'}, {id: 'know', type: 'textarea', label: 'ベース知識・元記事'} ],
        buildPrompt: (v, b) => `${b}以下の知識をベースに、価格・形式「${v.price}」の高額バックエンド商品企画を3つ作成してください。\n${v.know}${R_JSON}{"plans":[{"title":"商品名","detail":"詳細","pitch":"セールス文"}]}`
      },
      bonus: { 
        icon: '🎁', name: '購入者特典生成', badge: '', desc: '記事から特典アイデア作成', tut: '商品の購入率を上げる「おまけ」を提案します。',
        fields: [ {id: 'article', type: 'textarea', label: '元記事テキスト'} ],

      },

        fields: [ {id: 'genre', type: 'text', label: '発信ジャンル'}, {id: 'platform', type: 'select', label: '媒体', opts: ['X(Twitter)', 'Threads', 'Instagram']}, {id: 'bg', type: 'textarea', label: '経歴・強み', magic: '誇れる実績はまだないが、誰よりも失敗を繰り返し、泥臭く挑戦し続ける姿勢と、その過程を包み隠さず発信する誠実さ'} ],
        buildPrompt: (v, b) => `${b}媒体「${v.platform}」ジャンル「${v.genre}」経歴「${v.bg}」の条件で、バズるアカウント設計を提案してください。${R_JSON}{"names":["名前候補1..."],"profile_short":"140字プロフ","profile_long":"長文プロフ"}`

      },

      },

        fields: [ {id: 'goal', type: 'select', label: '目的', opts: ['信頼構築', '商品誘導', '不安解消', '誠実対応']}, {id: 'msg', type: 'textarea', label: '相手のメッセージ'} ],
        buildPrompt: (v, b) => `${b}DM「${v.msg}」に対し、目的「${v.goal}」を達成する神返信を作成してください。${R_JSON}{"replies":[{"type":"親しみ","text":"本文"},{"type":"権威","text":"本文"},{"type":"質問","text":"本文"}]}`

        noJson: true 
      },
      journey: { 
        icon: '🗺️', name: 'カスタマージャーニー', badge: '', desc: '戦略マップを作成', tut: 'どんなSNSで何を発信して売るかの全体設計図を作ります。',
        fields: [ {id: 'theme', type: 'text', label: 'テーマ'}, {id: 'target', type: 'text', label: 'ターゲット'} ],
        buildPrompt: (v, b) => `${b}テーマ「${v.theme}」ターゲット「${v.target}」で【認知→興味→比較・検討→購入→リピート】のカスタマージャーニーを作成してください。${R_JSON}{"phases":[{"name":"フェーズ名","goal":"目的","tools":["X等"],"action":"戦略"}...]}`
      },
      webdev: { 
        icon: '💻', name: 'Webアプリ開発', badge: '神機能', desc: 'アイデアからHTML生成', tut: 'プログラミング知識ゼロでWebツールを作ります。',

        buildPrompt: (v, b) => `あなたは天才エンジニアです。以下のアイデアから、HTML/CSS/JS(React等CDN可)が1枚にまとまったWebアプリのコードを作成してください。GitHub公開手順も案内し、Geminiへ引き継ぐ仕様書を出力してください。\n【アイデア】\n${v.idea}`,

      }
    };

    /* =========================================================================
       3. 共通UIコンポーネント (Tailwind + JSX で絶対崩れない設計)
       ========================================================================= */

    const FormField = ({ f, val, onChange }) => {
      const handleMagic = () => { if (f.magic) onChange(f.magic); };

      return (
        <div className="glass-card rounded-xl p-4 md:p-5 mb-4">
          <div className="flex justify-between items-center mb-2">
            <span className="text-xs font-bold text-slate-400 tracking-wider">{f.label}</span>
            {f.magic && (
              <button onClick={handleMagic} className="text-xs font-bold bg-brand-orange/20 text-brand-orange border border-brand-orange/30 px-2 py-1 rounded hover:bg-brand-orange/30 transition">
                ✨ 魔法の自動入力
              </button>
            )}
          </div>
          
          {f.t === 'input' && <input className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm focus:border-brand focus:bg-white/10 transition outline-none" value={val || ''} placeholder={f.ph || ''} onChange={e => onChange(e.target.value)} />}
          {f.t === 'area' && <textarea className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm min-h-[100px] resize-y focus:border-brand focus:bg-white/10 transition outline-none" value={val || ''} placeholder={f.ph || ''} onChange={e => onChange(e.target.value)} />}
          {f.t === 'select' && (
            <select className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm focus:border-brand transition outline-none" value={val || f.opts[0]} onChange={e => onChange(e.target.value)}>
              {f.opts.map(o => <option key={o} value={o} className="bg-bg-base text-white">{o}</option>)}
            </select>
          )}
          {f.t === 'check' && (
            <label className="flex items-center gap-3 cursor-pointer mt-2">
              <input type="checkbox" className="w-5 h-5 rounded border-white/20 text-brand focus:ring-brand" checked={!!val} onChange={e => onChange(e.target.checked)} />
              <span className="text-sm font-bold text-white/90">はい</span>
            </label>
          )}
        </div>
      );
    };

    const JSONViewer = ({ data }) => {
      if (typeof data === 'string') return <p className="bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm whitespace-pre-wrap text-slate-200 mb-3">{data}</p>;
      if (Array.isArray(data)) return <div>{data.map((item, i) => <div key={i} className="mb-4 pb-4 border-b border-dashed border-slate-700"><JSONViewer data={item} /></div>)}</div>;
      if (typeof data === 'object' && data !== null) {
        return (
          <div>
            {Object.keys(data).map(key => (
              <div key={key} className="mb-3">
                <span className="block text-brand text-xs font-bold mb-1">{key}</span>
                <JSONViewer data={data[key]} />
              </div>
            ))}
          </div>
        );
      }
      return <span>{String(data)}</span>;
    };

    const WebLinksPanel = ({ showImportMsg }) => (
      <div className="bg-white/5 border border-brand/40 rounded-xl p-4 my-5 text-center">
        <p className="text-brand text-sm font-bold mb-3">👇 下のリンクからWeb版AIを開いて送信してください</p>
        <div className="flex flex-wrap justify-center gap-2 mb-3">
          {['Perplexity', 'ChatGPT', 'Claude'].map(ai => (
            <a key={ai} href={`https://${ai==='ChatGPT'?'chatgpt.com':ai==='Claude'?'claude.ai':'www.perplexity.ai'}`} target="_blank" className="flex-1 min-w-[100px] bg-white/10 hover:bg-white/20 transition rounded-lg py-2 text-sm font-bold text-white border border-white/10">
              {ai === 'ChatGPT' ? '🟢 ' : ai === 'Claude' ? '🟠 ' : '🔍 '}{ai}
            </a>
          ))}
        </div>
        {showImportMsg && <p className="text-xs text-white/50">回答が完了したら、すべてコピーして「📥 読込」に貼り付けてください。</p>}
      </div>
    );

    /* =========================================================================
       4. 汎用ツール実行エンジン (Error Boundary 相当の安全設計)
       ========================================================================= */
    const ToolRunner = ({ tid, user, role, onBack }) => {
      const conf = TOOLS[tid];
      if (!conf) return <div className="text-red-500 p-8 text-center font-bold">Error: Tool not found</div>;

      const [db, setDb] = useState(AppDB.get());
      const uData = db?.users?.[user];
      const pid = uData?.curProj || 'default';
      const pData = uData?.projects?.[pid]?.data?.[tid] || {};

      const [vals, setVals] = useState(pData);
      const [tab, setTab] = useState('settings');
      const [copied, setCopied] = useState({});
      const [showLinks, setShowLinks] = useState(false);
      const [impText, setImpText] = useState('');
      const [resData, setResData] = useState(null);
      const [err, setErr] = useState('');

      const updateVal = (id, val) => {
        const newVals = { ...vals, [id]: val };
        setVals(newVals);
        if (role !== 'admin') {
          const newDb = AppDB.get();
          if (!newDb.users[user].projects[pid].data) newDb.users[user].projects[pid].data = {};
          newDb.users[user].projects[pid].data[tid] = newVals;
          AppDB.save(newDb);
        }
      };

      const checkAuth = () => {
        if (role === 'admin') return true;
        if (uData?.perms?.[tid]) return true;
        const today = new Date().toDateString();
        if (uData?.usage?.date !== today) return true;
        return uData.usage.count < DAILY_LIMIT;
      };

      const handleGenerate = () => {
        if (!checkAuth()) {
          alert(`本日の無料枠(${DAILY_LIMIT}回)を終了しました。\n無制限利用をご希望の場合は管理者へお問い合わせください。`);
          return;
        }

        if (role !== 'admin' && !(uData?.perms?.[tid])) {
          const newDb = AppDB.get();
          const today = new Date().toDateString();
          if (newDb.users[user].usage.date !== today) newDb.users[user].usage = { date: today, count: 0 };
          newDb.users[user].usage.count++;
          AppDB.save(newDb);
        }

        const brand = uData?.brand || {};
        const plan = brand.plan || 'free';
        let brandContext = '';
        if (brand.name) brandContext = `【発信者情報】名前:${brand.name} ターゲット:${brand.target||''} 文体:${brand.tone||''}\n\n`;

        const baseP = conf.buildPrompt(vals, brandContext);
        const prefix = plan === 'paid' 
          ? '【システム設定: 有料AIモード】\n高度な推論とWeb検索が可能な状態です。複雑な指示にも完璧に従い最高品質の出力をしてください。\n\n'
          : '【システム設定: 無料AIモード】\n出力制限がある環境です。回答が途切れないよう簡潔に要点を絞って出力してください。\n\n';
        
        copyToClip(prefix + baseP, setCopied, 'gen');
        setShowLinks(true);
        if (!conf.noJson && !conf.isOnePage) setTab('import');
      };

      const handleImport = () => {
        if (conf.noJson) {
          setResData(impText); setTab('preview'); setImpText(''); return;
        }
        setErr('');
        const parsed = safeParse(impText);
        if (parsed) {
          setResData(parsed); setTab('preview'); setImpText('');
        } else {
          setErr('JSONフォーマットエラーです。AIの出力をそのまま貼り付けてください。');
        }
      };

      const HeaderUI = () => (
        <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
          <div className="flex items-center gap-3">
            <button onClick={onBack} className="bg-white/10 hover:bg-white/20 text-white/80 px-3 py-1.5 rounded-lg text-sm font-bold transition">← 戻る</button>
            <h1 className="text-lg md:text-xl font-black">{conf.name}</h1>
          </div>
        </div>
      );

      const TutPanel = () => (
        <div className="bg-brand/5 border border-brand/20 rounded-xl p-4 md:p-5 mb-5">
          <p className="text-brand text-sm font-bold mb-2 flex items-center gap-2">💡 使い方と目的</p>
          <p className="text-xs text-white/80 leading-relaxed whitespace-pre-wrap">{conf.tut}</p>
        </div>
      );

      // 1画面UI (note)
      if (conf.isOnePage) {
        return (
          <div className="w-full">
            <HeaderUI />
            <TutPanel />
            {conf.f.map(f => <FormField key={f.id} f={f} val={vals[f.id]} onChange={(v) => updateVal(f.id, v)} />)}
            <button className="w-full bg-gradient-to-r from-brand-dark to-brand text-white font-black py-4 rounded-xl shadow-lg hover:scale-[0.98] transition mt-2 mb-4" onClick={handleGenerate}>
              {copied['gen'] ? '✓ コピー完了！AIへ送信してください' : '📋 プロンプト生成 ＆ コピー'}
            </button>
            {showLinks && <WebLinksPanel showImportMsg={false} />}
            <div className="glass-card rounded-xl p-5 mt-6">
              <span className="text-xs font-bold text-slate-400 block mb-3">📥 AIの回答を貼り付けて保管・編集</span>
              <textarea className="w-full bg-white/5 border border-white/10 rounded-lg p-4 text-sm min-h-[300px] outline-none focus:border-brand transition" value={resData || ''} onChange={e => setResData(e.target.value)} />
              <button className="w-full bg-white/10 hover:bg-white/20 text-white font-bold py-3 rounded-lg mt-3 transition" onClick={() => copyToClip(resData||'', setCopied, 'cAll')}>
                {copied['cAll'] ? '✓ コピー完了' : '📋 全文コピー'}
              </button>
            </div>
          </div>
        );
      }

      // 通常タブUI
      return (
        <div className="w-full">
          <HeaderUI />
          <div className="flex overflow-x-auto border-b border-white/10 mb-6 gap-2 hide-scrollbar">
            {[ {id:'settings', l:'⚙️ 条件設定', d:false}, {id:'import', l:'📥 AI回答読込', d:false}, {id:'preview', l:'👁 結果確認', d:!resData} ].map(t => (
              <button key={t.id} disabled={t.d} onClick={() => setTab(t.id)} className={`px-5 py-3 text-sm font-bold whitespace-nowrap border-b-2 transition ${tab===t.id ? 'text-brand border-brand' : 'text-white/40 border-transparent hover:text-white/60'} ${t.d ? 'opacity-30 cursor-not-allowed' : ''}`}>
                {t.l}
              </button>
            ))}
          </div>

          {tab === 'settings' && (
            <div className="animate-fade-in">
              <TutPanel />
              {conf.f.map(f => <FormField key={f.id} f={f} val={vals[f.id]} onChange={(v) => updateVal(f.id, v)} />)}
              <button className="w-full bg-gradient-to-r from-brand-dark to-brand text-white font-black py-4 rounded-xl shadow-lg hover:scale-[0.98] transition mt-2 mb-4" onClick={handleGenerate}>
                {copied['gen'] ? '✓ コピー完了！' : '📋 プロンプト生成 ＆ コピー'}
              </button>
              {showLinks && <WebLinksPanel showImportMsg={!conf.noJson} />}
            </div>
          )}

          {tab === 'import' && (
            <div className="glass-card rounded-xl p-5 animate-fade-in">
              <span className="text-xs font-bold text-slate-400 block mb-3">📥 AIの出力を貼り付け</span>
              <textarea className="w-full bg-white/5 border border-white/10 rounded-lg p-4 text-sm min-h-[200px] outline-none focus:border-brand transition" value={impText} onChange={e => setImpText(e.target.value)} />
              {err && <div className="bg-red-500/10 border border-red-500/30 text-red-400 p-3 rounded-lg text-sm mt-3 font-bold">❌ {err}</div>}
              <button className="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 rounded-lg mt-4 transition disabled:opacity-50" disabled={!impText.trim()} onClick={handleImport}>
                システムに反映して結果を見る
              </button>
            </div>
          )}

          {tab === 'preview' && resData && (
            <div className="glass-card rounded-xl p-5 animate-fade-in">
              <JSONViewer data={resData} />
            </div>
          )}
        </div>
      );
    };


    /* =========================================================================
       5. 設定・プロジェクト・問い合わせ
       ========================================================================= */
    const SettingsScreen = ({ user, onBack }) => {
      const db = AppDB.get();
      const b = db.users[user]?.brand || { plan: 'free', name: '', target: '', tone: '' };
      const [name, setName] = useState(b.name);
      const [target, setTarget] = useState(b.target);
      const [tone, setTone] = useState(b.tone);
      const [plan, setPlan] = useState(b.plan);

      const save = () => {
        if (user !== 'admin') {
          const newDb = AppDB.get();
          newDb.users[user].brand = { name, target, tone, plan };
          AppDB.save(newDb);
        }
        alert('設定を保存しました。');
        onBack();
      };

      return (
        <div className="w-full max-w-2xl mx-auto">
          <div className="flex items-center gap-3 mb-6 pb-4 border-b border-white/10">
            <button onClick={onBack} className="bg-white/10 hover:bg-white/20 text-white/80 px-3 py-1.5 rounded-lg text-sm font-bold transition">← 戻る</button>
            <h1 className="text-xl font-black">👤 マイ・ブランド ＆ AI設定</h1>
          </div>
          <div className="bg-brand/5 border border-brand/20 rounded-xl p-4 mb-6">
            <p className="text-xs text-white/80 leading-relaxed">登録した情報は全ツールのプロンプトに自動反映されます。使用AIプランに合わせてプロンプトの長さや要求度が最適化されます。</p>
          </div>
          
          <div className="glass-card rounded-xl p-5 mb-4">
            <span className="text-xs font-bold text-slate-400 block mb-2">🤖 使用しているAIプラン</span>
            <select className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm focus:border-brand outline-none" value={plan} onChange={e => setPlan(e.target.value)}>
              <option value="free" className="bg-bg-base">無料版 (ChatGPT Free 等)</option>
              <option value="paid" className="bg-bg-base">有料版 (ChatGPT Plus 等)</option>
            </select>
          </div>
          <div className="glass-card rounded-xl p-5 mb-4">
            <span className="text-xs font-bold text-slate-400 block mb-2">発信者名・肩書き</span>
            <input className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm outline-none focus:border-brand" value={name} onChange={e => setName(e.target.value)} />
          </div>
          <div className="glass-card rounded-xl p-5 mb-4">
            <span className="text-xs font-bold text-slate-400 block mb-2">メインのターゲット層</span>
            <input className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm outline-none focus:border-brand" value={target} onChange={e => setTarget(e.target.value)} />
          </div>
          <div className="glass-card rounded-xl p-5 mb-6">
            <span className="text-xs font-bold text-slate-400 block mb-2">文体のクセ・ルール (例:絵文字多め)</span>
            <textarea className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm min-h-[100px] outline-none focus:border-brand" value={tone} onChange={e => setTone(e.target.value)} />
          </div>
          <button className="w-full bg-brand hover:bg-brand-dark text-white font-bold py-4 rounded-xl shadow-lg transition" onClick={save}>設定を保存する</button>
        </div>
      );
    };

    const ProjectScreen = ({ user, onBack }) => {
      const [db, setDb] = useState(AppDB.get());
      const uData = db.users[user];
      const [newProj, setNewProj] = useState('');

      const create = () => {
        if (!newProj.trim() || user === 'admin') return;
        const id = 'p_' + Date.now();
        const newDb = AppDB.get();
        newDb.users[user].projects[id] = { name: newProj, data: {} };
        newDb.users[user].curProj = id;
        AppDB.save(newDb); setDb(newDb); setNewProj('');
      };
      
      const switchProj = (id) => {
        if (user === 'admin') return;
        const newDb = AppDB.get();
        newDb.users[user].curProj = id;
        AppDB.save(newDb); setDb(newDb); onBack();
      };

      return (
        <div className="w-full max-w-2xl mx-auto">
          <div className="flex items-center gap-3 mb-6 pb-4 border-b border-white/10">
            <button onClick={onBack} className="bg-white/10 hover:bg-white/20 text-white/80 px-3 py-1.5 rounded-lg text-sm font-bold transition">← 戻る</button>
            <h1 className="text-xl font-black">📁 プロジェクト管理</h1>
          </div>
          <div className="bg-brand/5 border border-brand/20 rounded-xl p-4 mb-6">
            <p className="text-xs text-white/80 leading-relaxed">案件ごとにツール内の入力データを分けて保存できます。</p>
          </div>
          <div className="flex gap-3 mb-8">
            <input className="flex-1 bg-white/5 border border-white/10 rounded-lg p-3 text-sm outline-none focus:border-brand" placeholder="新プロジェクト名" value={newProj} onChange={e => setNewProj(e.target.value)} />
            <button className="bg-brand hover:bg-brand-dark text-white font-bold px-6 rounded-lg transition disabled:opacity-50" onClick={create} disabled={user === 'admin'}>作成</button>
          </div>
          
          <div className="grid gap-3">
            {Object.keys(uData.projects).map(k => {
              const p = uData.projects[k];
              const isCur = k === uData.curProj;
              return (
                <div key={k} className={`glass-card rounded-xl p-4 flex justify-between items-center transition ${isCur ? 'border-brand bg-brand/5' : ''}`}>
                  <span className={`font-bold ${isCur ? 'text-brand' : 'text-white'}`}>{p.name} {isCur && '(選択中)'}</span>
                  {!isCur && <button className="bg-white/10 hover:bg-white/20 text-xs font-bold px-4 py-2 rounded-md transition" onClick={() => switchProj(k)}>切り替え</button>}
                </div>

            })}
          </div>
        </div>
      );

    const InquiryModal = ({ user, onClose }) => {
      const types = ['機能追加の要望', '不具合・バグの報告', 'プロンプト修正依頼', 'その他のお問い合わせ'];
      const [type, setType] = useState(types[0]);
      const [content, setContent] = useState('');
      const [sent, setSent] = useState(false);

      const handleSend = () => {
        if (!content.trim()) return;
        const db = AppDB.get();
        db.inquiries.push({ id: Date.now(), user, type, content, date: Date.now(), status: 'unread' });
        AppDB.save(db);
        setSent(true); setTimeout(onClose, 2000);
      };

      return (
        <div className="fixed inset-0 bg-black/80 z-[999] flex items-center justify-center p-4 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-[#0f172a] border border-white/10 rounded-2xl p-6 md:p-8 w-full max-w-lg shadow-2xl" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
              <h2 className="text-brand-orange text-lg font-black m-0">💬 管理者へのお問い合わせ</h2>
              <button onClick={onClose} className="text-2xl text-white/50 hover:text-white transition">×</button>
            </div>
            
            {sent ? (
              <div className="text-center py-12 text-brand-green font-black text-xl animate-pulse">送信完了しました！</div>
            ) : (
              <div>
                <div className="mb-5">
                  <span className="block text-xs font-bold text-slate-400 mb-2">お問い合わせ種別</span>
                  <select className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm focus:border-brand-orange outline-none" value={type} onChange={e => setType(e.target.value)}>
                    {types.map(t => <option key={t} value={t} className="bg-bg-base">{t}</option>)}
                  </select>
                </div>
                <div className="mb-6">
                  <span className="block text-xs font-bold text-slate-400 mb-2">内容</span>
                  <textarea className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm min-h-[120px] focus:border-brand-orange outline-none" value={content} onChange={e => setContent(e.target.value)} />
                </div>
                <button className="w-full bg-gradient-to-r from-brand-orange to-orange-600 text-white font-black py-4 rounded-xl shadow-lg hover:scale-[0.98] transition disabled:opacity-50" disabled={!content.trim()} onClick={handleSend}>
                  送信する
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    /* =========================================================================
       6. 認証 ＆ 管理ダッシュボード
       ========================================================================= */
    const AuthScreen = ({ onLogin }) => {
      const [isLogin, setIsLogin] = useState(true);
      const [un, setUn] = useState('');
      const [pw, setPw] = useState('');
      const [sns, setSns] = useState('');
      const [err, setErr] = useState('');
      const [isAdminMode, setIsAdminMode] = useState(false);

      const handleUnChange = (e) => {
        const val = e.target.value;
        setUn(val);
        const db = AppDB.get();
        setIsAdminMode(val === db.admin.u || val === 'admin'); // 動的パスワード欄表示
      };

      const handleSubmit = () => {
        setErr(''); const u = un.trim();
        if (!u) return setErr('ユーザー名を入力してください');
        
        const db = AppDB.get();
        const adminU = db.admin.u || 'admin';

        if (isAdminMode) {
          if (pw === db.admin.p) {
            localStorage.setItem(SESS_KEY, JSON.stringify({u: adminU, r: 'admin'}));
            onLogin(adminU, 'admin');
          } else { setErr('パスワードが違います'); }
          return;
        }

        if (isLogin) {
          if (!db.users[u]) return setErr('未登録のユーザー名です。新規申請を行ってください。');
          localStorage.setItem(SESS_KEY, JSON.stringify({u: u, r: db.users[u].status}));
          onLogin(u, db.users[u].status);
        } else {
          if (db.users[u]) return setErr('既に登録されている名前です。ログインしてください。');
          const s = sns.trim();
          if (!s || !s.includes('@')) return setErr('SNSアカウントは @ を含めて正確に入力してください');
          
          db.users[u] = {
            status: 'pending', sns: s, registeredAt: Date.now(),
            usage: {date: '', count: 0}, perms: {},
            brand: {plan: 'free', name: '', target: '', tone: ''},
            projects: {'default': {name: 'デフォルト', data: {}}},
            curProj: 'default'
          };
          AppDB.save(db);
          localStorage.setItem(SESS_KEY, JSON.stringify({u: u, r: 'pending'}));
          onLogin(u, 'pending');
        }
      };

      return (
        <div className="w-full max-w-md mx-auto mt-10 md:mt-20">
          <div className="glass-card rounded-[24px] p-8 md:p-10 text-center shadow-2xl relative overflow-hidden">
            {/* 装飾用光彩 */}
            <div className="absolute -top-20 -left-20 w-40 h-40 bg-brand/20 rounded-full blur-[50px] pointer-events-none"></div>
            <div className="absolute -bottom-20 -right-20 w-40 h-40 bg-brand-dark/20 rounded-full blur-[50px] pointer-events-none"></div>
            
            <div className="relative z-10">
              <h2 className="text-3xl font-black mb-2 tracking-tight">AI Content Pro</h2>
              <p className="text-brand font-bold text-sm mb-8 tracking-widest uppercase">SaaS Edition v32</p>
              
              {!isAdminMode && (
                <div className="flex bg-black/40 p-1.5 rounded-xl mb-8">
                  <button onClick={() => {setIsLogin(true); setErr('');}} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition ${isLogin ? 'bg-brand text-white shadow-lg' : 'text-white/50 hover:text-white'}`}>ログイン</button>
                  <button onClick={() => {setIsLogin(false); setErr('');}} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition ${!isLogin ? 'bg-brand text-white shadow-lg' : 'text-white/50 hover:text-white'}`}>新規申請</button>
                </div>
              )}
              
              <div className="space-y-4 mb-6">
                <input className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-brand transition" placeholder="ユーザー名" value={un} onChange={handleUnChange} />
                {(!isLogin && !isAdminMode) && <input className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-brand transition animate-fade-in" placeholder="SNSアカウント (@必須)" value={sns} onChange={e => setSns(e.target.value)} />}
                {isAdminMode && <input className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-brand transition animate-fade-in" type="password" placeholder="管理者パスワード" value={pw} onChange={e => setPw(e.target.value)} />}
              </div>
              
              {err && <div className="bg-red-500/10 border border-red-500/30 text-red-400 p-3 rounded-xl text-sm mb-6 font-bold">❌ {err}</div>}
              
              <button className="w-full bg-gradient-to-r from-brand-dark to-brand text-white font-black py-4 rounded-xl shadow-lg hover:scale-[0.98] transition" onClick={handleSubmit}>
                {isAdminMode ? '管理者としてログイン' : (isLogin ? 'ログイン' : '申請して待機画面へ')}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const AdminDashboard = ({ onGoApp, onLogout }) => {
      const [db, setDb] = useState(AppDB.get());
      const [tab, setTab] = useState('users');
      const [expUser, setExpUser] = useState(null);

      const [adminU, setAdminU] = useState(db.admin.u || 'admin');
      const [adminP, setAdminP] = useState(db.admin.p);
      const [sysMsg, setSysMsg] = useState('');

      const updateStatus = (u, st) => { const newDb = AppDB.get(); newDb.users[u].status = st; AppDB.save(newDb); setDb(newDb); };
      const togglePerm = (u, tid) => { const newDb = AppDB.get(); newDb.users[u].perms[tid] = !newDb.users[u].perms[tid]; AppDB.save(newDb); setDb(newDb); };
      const markRead = (id) => { const newDb = AppDB.get(); const iq = newDb.inquiries.find(x => x.id === id); if(iq) { iq.status = 'read'; AppDB.save(newDb); setDb(newDb); } };

      const saveAdmin = () => {
        if (!adminU.trim() || !adminP.trim()) return;
        const newDb = AppDB.get();
        const oldU = newDb.admin.u || 'admin';
        newDb.admin = { u: adminU, p: adminP };
        
        if (oldU !== adminU) {
          if(newDb.users[oldU]) {
            newDb.users[adminU] = newDb.users[oldU];
            delete newDb.users[oldU];
          }
          localStorage.setItem(SESS_KEY, JSON.stringify({u: adminU, r: 'admin'}));
        }
        
        AppDB.save(newDb); setDb(newDb);
        setSysMsg('設定を保存しました。次回から新しいユーザー名でログインできます。');
        setTimeout(() => setSysMsg(''), 3000);
      };

      const userKeys = Object.keys(db.users).filter(k => k !== (db.admin.u || 'admin'));
      const inqs = db.inquiries || [];

      return (
        <div className="w-full">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <h1 className="text-2xl font-black">🎛️ 管理者ダッシュボード</h1>
            <div className="flex gap-3">
              <button className="bg-gradient-to-r from-brand-orange to-orange-600 text-white font-bold py-2 px-5 rounded-lg shadow-lg hover:scale-95 transition" onClick={onGoApp}>🚀 ツール画面へ</button>
              <button className="bg-white/10 hover:bg-white/20 text-white font-bold py-2 px-5 rounded-lg transition" onClick={onLogout}>ログアウト</button>
            </div>
          </div>

          <div className="flex overflow-x-auto border-b border-white/10 mb-8 gap-2 hide-scrollbar">
            <button onClick={() => setTab('users')} className={`px-5 py-3 text-sm font-bold whitespace-nowrap border-b-2 transition ${tab==='users' ? 'text-brand border-brand' : 'text-white/40 border-transparent hover:text-white/60'}`}>👥 ユーザー管理</button>
            <button onClick={() => setTab('inqs')} className={`px-5 py-3 text-sm font-bold whitespace-nowrap border-b-2 transition ${tab==='inqs' ? 'text-brand border-brand' : 'text-white/40 border-transparent hover:text-white/60'}`}>📩 問い合わせ ({inqs.filter(x=>x.status==='unread').length})</button>
            <button onClick={() => setTab('sys')} className={`px-5 py-3 text-sm font-bold whitespace-nowrap border-b-2 transition ${tab==='sys' ? 'text-brand border-brand' : 'text-white/40 border-transparent hover:text-white/60'}`}>⚙️ システム設定</button>
          </div>

          {tab === 'users' && (
            <div className="glass-card rounded-xl overflow-hidden overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-white/5 border-b border-white/10 text-slate-400">
                  <tr><th className="p-4 font-bold">ユーザー</th><th className="p-4 font-bold">SNS</th><th className="p-4 font-bold">ステータス</th><th className="p-4 font-bold">操作 / 権限</th></tr>
                </thead>
                <tbody className="divide-y divide-white/5">
                  {userKeys.sort((a,b) => db.users[b].registeredAt - db.users[a].registeredAt).map(k => {
                    const u = db.users[k];
                    const isExp = expUser === k;
                    return (
                      <Fragment key={k}>
                        <tr className="hover:bg-white/5 transition">
                          <td className="p-4 font-bold">{k}</td>
                          <td className="p-4 text-brand">{u.sns}</td>
                          <td className={`p-4 font-bold ${u.status==='approved'?'text-brand-green':u.status==='pending'?'text-brand-orange':'text-brand-red'}`}>
                            {u.status==='approved'?'許可済':u.status==='pending'?'待機中':'BAN'}
                          </td>
                          <td className="p-4 flex gap-2">
                            {u.status !== 'approved' && <button className="bg-brand-green/20 text-brand-green border border-brand-green/30 px-3 py-1 rounded text-xs font-bold hover:bg-brand-green/30 transition" onClick={() => updateStatus(k, 'approved')}>許可</button>}
                            {u.status === 'approved' && <button className={`px-3 py-1 rounded text-xs font-bold transition border ${isExp?'bg-white/20 border-white/30 text-white':'bg-white/10 border-white/20 text-white/80 hover:bg-white/20'}`} onClick={() => setExpUser(isExp ? null : k)}>🔑 権限</button>}
                            {u.status !== 'rejected' && <button className="bg-brand-red/20 text-brand-red border border-brand-red/30 px-3 py-1 rounded text-xs font-bold hover:bg-brand-red/30 transition" onClick={() => updateStatus(k, 'rejected')}>BAN</button>}
                          </td>
                        </tr>
                        {isExp && (
                          <tr>
                            <td colSpan="4" className="p-0">
                              <div className="bg-black/30 p-5 border-l-4 border-brand">
                                <p className="text-xs text-brand-orange font-bold mb-4">✅ チェックを入れた機能は、このユーザーのみ【無制限】で利用可能になります。</p>
                                <div className="flex flex-wrap gap-4">
                                  {Object.keys(TOOLS).map(tid => (
                                    <label key={tid} className="flex items-center gap-2 cursor-pointer bg-white/5 px-3 py-2 rounded-lg hover:bg-white/10 transition border border-white/5">
                                      <input type="checkbox" className="w-4 h-4 rounded text-brand focus:ring-brand bg-black/50 border-white/20" checked={!!(u.perms && u.perms[tid])} onChange={() => togglePerm(k, tid)} />
                                      <span className="text-xs font-bold text-white/90">{TOOLS[tid].name}</span>
                                    </label>
                                  ))}
                                </div>
                              </div>
                            </td>
                          </tr>
                        )}
                      </Fragment>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {tab === 'inqs' && (
            <div className="grid gap-4">
              {inqs.sort((a,b) => b.date - a.date).map(iq => (
                <div key={iq.id} className={`glass-card rounded-xl p-5 transition ${iq.status==='unread'?'border-l-4 border-l-brand-orange':''}`}>
                  <div className="flex justify-between items-start mb-3">
                    <div>
                      <span className="font-black text-brand text-base mr-3">{iq.user}</span>
                      <span className="text-xs bg-white/10 px-2 py-1 rounded font-bold text-white/70">{iq.type}</span>
                    </div>
                    <span className="text-xs text-slate-400">{fmtDate(iq.date)}</span>
                  </div>
                  <p className="text-sm text-slate-200 whitespace-pre-wrap leading-relaxed">{iq.content}</p>
                  {iq.status === 'unread' && <button className="mt-4 bg-white/10 hover:bg-white/20 text-xs font-bold px-4 py-2 rounded-lg transition" onClick={() => markRead(iq.id)}>既読にする</button>}
                </div>
              ))}
              {inqs.length === 0 && <p className="text-center text-slate-500 py-10">問い合わせはありません。</p>}
            </div>
          )}

          {tab === 'sys' && (
            <div className="max-w-md mx-auto glass-card rounded-xl p-6 md:p-8 mt-4">
              <h2 className="text-lg font-black mb-6">⚙️ 管理者アカウント設定</h2>
              <div className="mb-5">
                <span className="block text-xs font-bold text-slate-400 mb-2">管理者 ユーザー名</span>
                <input className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm focus:border-brand outline-none transition" value={adminU} onChange={e => setAdminU(e.target.value)} />
              </div>
              <div className="mb-8">
                <span className="block text-xs font-bold text-slate-400 mb-2">管理者 パスワード</span>
                <input className="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-sm focus:border-brand outline-none transition" type="password" value={adminP} onChange={e => setAdminP(e.target.value)} />
              </div>
              <button className="w-full bg-brand hover:bg-brand-dark text-white font-black py-4 rounded-xl shadow-lg transition" onClick={saveAdmin}>設定を保存する</button>
              {sysMsg && <p className="text-center text-brand-green font-bold text-sm mt-4 animate-pulse">{sysMsg}</p>}
            </div>
          )}
        </div>
      );
    };

    /* =========================================================================
       7. メインダッシュボード（全機能のハブ）
       ========================================================================= */
    const MainDashboard = ({ user, role, onLogout, onGoAdmin }) => {
      const [screen, setScreen] = useState('home');
      const [showManual, setShowManual] = useState(false);
      const [showInquiry, setShowInquiry] = useState(false);

      const db = AppDB.get();
      const uData = db.users[user] || { projects: {'default': {name:'Error'}}, curProj:'default', usage:{date:'',count:0} };

      if (screen === 'settings') return <SettingsScreen user={user} onBack={() => setScreen('home')} />;
      if (screen === 'projects') return <ProjectScreen user={user} onBack={() => setScreen('home')} />;
      if (TOOLS[screen]) return <ToolRunner tid={screen} user={user} role={role} onBack={() => setScreen('home')} />;

      const projName = uData.projects[uData.curProj] ? uData.projects[uData.curProj].name : 'Project';
      const today = new Date().toDateString();
      const usageCount = uData.usage.date === today ? uData.usage.count : 0;

      return (
        <div className="w-full">
          {showManual && <ManualModal onClose={() => setShowManual(false)} />}
          {showInquiry && <InquiryModal user={user} onClose={() => setShowInquiry(false)} />}
          
          {/* Header Actions */}
          <div className="absolute top-4 right-4 md:top-6 md:right-6 z-50 flex flex-wrap gap-2 justify-end">
            {role === 'admin' && <button className="bg-brand-orange hover:bg-orange-500 text-white text-xs font-bold px-4 py-2 rounded-full shadow-lg transition" onClick={onGoAdmin}>🎛️ 管理画面</button>}
            {role !== 'admin' && <div className="bg-white/10 backdrop-blur text-white/80 text-xs font-bold px-4 py-2 rounded-full cursor-default">📂 {projName}</div>}
            {role !== 'admin' && <div className="bg-white/10 backdrop-blur text-white/80 text-xs font-bold px-4 py-2 rounded-full cursor-default">本日: {usageCount}/{DAILY_LIMIT}</div>}
            {role !== 'admin' && <button className="bg-brand-orange/20 text-brand-orange border border-brand-orange/40 hover:bg-brand-orange/30 text-xs font-bold px-4 py-2 rounded-full transition" onClick={() => setShowInquiry(true)}>💬 問合せ</button>}
            <button className="bg-white/10 hover:bg-white/20 text-white text-xs font-bold px-4 py-2 rounded-full transition" onClick={() => setShowManual(true)}>📖 マニュアル</button>
            <button className="text-white/50 hover:text-white text-xs font-bold px-3 py-2 transition" onClick={onLogout}>ログアウト</button>
          </div>
          
          {/* Hero Section */}
          <div className="text-center mt-16 md:mt-24 mb-12">
            <div className="inline-block bg-brand/20 border border-brand/40 text-brand text-xs font-black px-4 py-1.5 rounded-full mb-6 tracking-widest uppercase">
              AI Content Pro v32
            </div>
            <h1 className="text-4xl md:text-6xl font-black mb-4 tracking-tight">AI Content <br className="md:hidden"/><span className="text-brand">Platform</span></h1>
            <p className="text-slate-400 text-sm md:text-base max-w-lg mx-auto leading-relaxed">
              コンテンツ作成からSNS集客、ファン化まで<br/>すべてを自動化するクリエイター専用の指令塔。
            </p>
          </div>
          
          {role !== 'admin' && (
            <div className="flex justify-center gap-4 mb-16">
              <button className="glass-card hover:bg-white/5 text-sm font-bold px-6 py-3 rounded-xl transition flex items-center gap-2" onClick={() => setScreen('projects')}>📂 プロジェクト切替</button>
              <button className="glass-card hover:bg-white/5 text-sm font-bold px-6 py-3 rounded-xl transition flex items-center gap-2" onClick={() => setScreen('settings')}>👤 ブランド＆AI設定</button>
            </div>
          )}
          
          {/* Tools Grid */}
          <div className="max-w-5xl mx-auto">
            {CATEGORIES.map(cat => (
              <div key={cat.name} className="mb-14">
                <h2 className="text-lg font-black text-brand mb-6 flex items-center gap-3">
                  <div className="w-8 h-1 bg-brand rounded-full"></div>
                  {cat.name}
                </h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5">
                  {cat.tools.map(tid => {
                    const t = TOOLS[tid];
                    const canAccess = DEF_UNLOCKED.includes(tid) || role === 'admin' || (uData.perms && uData.perms[tid]);
                    
                    return (
                      <div 
                        key={tid} 
                        className={`glass-card rounded-2xl p-6 transition duration-300 group ${canAccess ? 'hover:-translate-y-1 hover:border-brand/50 hover:bg-white/5 cursor-pointer shadow-lg hover:shadow-brand/10' : 'opacity-60 grayscale cursor-not-allowed'}`}
                        onClick={() => {
                          if (canAccess) setScreen(tid);
                          else alert('🔒 この機能はロックされています。\n利用するには管理者への申請が必要です。');
                        }}
                      >
                        <div className="flex justify-between items-start mb-4">
                          <div className="text-3xl bg-white/5 w-12 h-12 rounded-xl flex items-center justify-center group-hover:scale-110 transition">{t.icon}</div>
                          <div className="flex flex-col items-end gap-2">
                            {!canAccess ? <span className="bg-slate-700 text-white text-[10px] font-black px-2.5 py-1 rounded-md">🔒 ロック</span> : 
                             (role === 'admin' || (uData.perms && uData.perms[tid])) ? <span className="bg-brand-green text-white text-[10px] font-black px-2.5 py-1 rounded-md shadow-[0_0_10px_rgba(16,185,129,0.4)]">✨ 無制限</span> : 
                             <span className="bg-indigo-500 text-white text-[10px] font-black px-2.5 py-1 rounded-md">無料枠対象</span>}
                            {t.badge && <span className={`text-[10px] font-black px-2.5 py-1 rounded-md border ${t.badge === '神機能' ? 'bg-brand-red/10 border-brand-red/30 text-brand-red' : 'bg-brand/10 border-brand/30 text-brand'}`}>{t.badge}</span>}
                          </div>
                        </div>
                        <h3 className="text-base font-black mb-2 text-white/90 group-hover:text-white transition">{t.name}</h3>
                        <p className="text-xs text-slate-400 leading-relaxed group-hover:text-slate-300 transition">{t.desc}</p>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    /* =========================================================================
       8. Root App Component
       ========================================================================= */
    const App = () => {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState(null);
      const [goAdmin, setGoAdmin] = useState(false);
      const [showManual, setShowManual] = useState(false);
      const [isInitializing, setIsInitializing] = useState(true);

      // 安全なセッション復元
      useEffect(() => {
        try {
          const sStr = localStorage.getItem(SESS_KEY);
          if (sStr) {
            const s = JSON.parse(sStr);
            if (s && s.u) {
              const db = AppDB.get();
              if (s.r === 'admin') {
                // セッションのadminとDBのadmin名が一致しているか確認
                if (s.u === (db.admin.u || 'admin')) {
                  setUser(s.u); setRole('admin'); setGoAdmin(true);
                } else {
                  localStorage.removeItem(SESS_KEY);
                }
              } else {
                if (db.users[s.u]) {
                  setUser(s.u); setRole(db.users[s.u].status);
                } else {
                  localStorage.removeItem(SESS_KEY);
                }
              }
            }
          }
        } catch(e) {
          console.error("Session Restore Error", e);
        } finally {
          setIsInitializing(false);
        }
      }, []);

      const handleLogout = () => {
        localStorage.removeItem(SESS_KEY);
        setUser(null); setRole(null); setGoAdmin(false);
      };

      const checkStatus = () => {
        try {
          const s = JSON.parse(localStorage.getItem(SESS_KEY) || '{}');
          if (s.u) {
            const db = AppDB.get();
            if (db.users[s.u]) setRole(db.users[s.u].status);
          }
        } catch(e) {}
      };

      if (isInitializing) return <div className="min-h-screen flex items-center justify-center text-brand font-bold animate-pulse">System Initializing...</div>;

      if (!user) {
        return <AuthScreen onLogin={(usr, rol) => { setUser(usr); setRole(rol); if (rol === 'admin') setGoAdmin(true); }} />;
      }

      if (role === 'admin' && goAdmin) {
        return <AdminDashboard onLogout={handleLogout} onGoApp={() => setGoAdmin(false)} />;
      }

      if (role === 'pending' || role === 'rejected') {
        return (
          <Fragment>
            {showManual && <ManualModal onClose={() => setShowManual(false)} />}
            <div className="page-container">
              <div className="grid-bg"></div>
              <div className="content-wrapper auth-container mt-10 md:mt-20">
                <h2 className="text-2xl font-black mb-4">{role === 'rejected' ? '🚫 拒否' : '⏳ 承認待ち'}</h2>
                <p className="text-slate-400 text-sm mb-8">{role === 'rejected' ? '管理者に制限されています。' : '管理者の許可をお待ちください。'}</p>
                <button className="w-full bg-brand/10 border border-brand/30 text-brand font-bold py-4 rounded-xl hover:bg-brand/20 transition mb-6" onClick={() => setShowManual(true)}>
                  📖 承認待ちの間にマニュアルを読む
                </button>
                <button className="btn-primary mb-4" onClick={checkStatus}>ステータスを更新</button>
                <button className="w-full text-slate-500 hover:text-white text-sm font-bold transition" onClick={handleLogout}>ログアウト</button>
              </div>
            </div>
          </Fragment>
        );
      }

      if (role === 'approved' || (role === 'admin' && !goAdmin)) {
        return <MainDashboard user={user} role={role} onLogout={handleLogout} onGoAdmin={() => setGoAdmin(true)} />;
      }

      return null;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  })();
  </script>
</body>
</html>
