        }, '✨ 魔法の杖') : null
      );

      let inputNode;
      if (f.t === 'text') {
        inputNode = input({ 
          className: 'input-base', 
          value: value, 
          placeholder: f.ph || '', 
          onChange: e => onChange(f.id, e.target.value) 
        });
      } else if (f.t === 'area') {
        inputNode = textarea({ 
          className: 'input-base min-h-[120px] resize-y', 
          value: value, 
          placeholder: f.ph || '', 
          onChange: e => onChange(f.id, e.target.value) 
        });
      } else if (f.t === 'select') {
        inputNode = select({ 
          className: 'input-base cursor-pointer', 
          value: value, 
          onChange: e => onChange(f.id, e.target.value) 
        }, 
          f.opts.map(o => option({ key: o, value: o, className: 'bg-slate-900 text-white py-2' }, o))
        );
      } else if (f.t === 'check') {

          ),
          input({ type: 'checkbox', className: 'hidden', checked: !!value, onChange: e => onChange(f.id, e.target.checked) }),

        );

      }
      if (typeof data === 'object' && data !== null) {

          span({ className: 'block text-brand-light text-[11px] font-black uppercase mb-2 tracking-widest' }, k),
          el(DataViewer, { data: data[k] })
        )));
      }
      return span({ className: 'text-white font-bold' }, String(data));
