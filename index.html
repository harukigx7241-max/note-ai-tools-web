<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI Content Pro (SaaS Edition)</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#0d0d1a;color:#fff;min-height:100vh;overflow-x:hidden;line-height:1.6}
button,input,textarea,select{font-family:inherit;font-size:14px;color:#fff}
button{-webkit-tap-highlight-color:transparent;cursor:pointer}
a{text-decoration:none;color:inherit}
.pg{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 16px 80px;position:relative;background:linear-gradient(135deg,#0d0d1a,#1a0a2e 50%,#0a1628)}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.z1{position:relative;z-index:1;width:100%;max-width:880px}
.main-ttl{font-size:clamp(32px,8vw,56px);font-weight:900;line-height:1.1;text-align:center;margin-bottom:10px}
.main-ttl span{color:#38bdf8}
.main-sub{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:24px}
.cat-ttl{font-size:15px;font-weight:800;margin-bottom:12px;color:#38bdf8;border-bottom:2px solid rgba(56,189,248,.2);padding-bottom:6px}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:30px}
.tool-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.tool-card:hover{background:rgba(255,255,255,.06);border-color:rgba(56,189,248,.4);transform:translateY(-2px)}
.tc-icon{font-size:22px;margin-bottom:6px}
.tc-name{font-size:14px;font-weight:800;margin-bottom:4px}
.tc-desc{font-size:11px;color:rgba(255,255,255,.4);line-height:1.4}
.tc-badge{background:rgba(233,69,96,.2);border:1px solid rgba(233,69,96,.4);border-radius:50px;padding:2px 8px;font-size:9px;color:#e94560;font-weight:800;align-self:flex-start;margin-bottom:6px}
.tc-badge.new{background:rgba(56,189,248,.2);border-color:rgba(56,189,248,.4);color:#38bdf8}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);display:block;margin-bottom:6px}
.inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px;transition:all .2s;outline:none}
.inp:focus{border-color:#38bdf8;background:rgba(255,255,255,.08)}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#2563eb);border:none;border-radius:8px;padding:12px 20px;font-weight:800;box-shadow:0 4px 12px rgba(14,165,233,.3);transition:all .2s;width:100%}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-sub{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;transition:all .2s}
.btn-sub:hover{background:rgba(255,255,255,.1)}
.flex-row{display:flex;gap:10px;flex-wrap:wrap}
.flex-1{flex:1;min-width:200px}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;padding:10px;border-radius:8px;font-size:12px;margin-bottom:12px}
.tut-panel{background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.2);border-radius:10px;padding:12px;margin-bottom:16px}
.tut-title{font-size:12px;font-weight:800;color:#38bdf8;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tut-body{font-size:12px;color:rgba(255,255,255,.7);line-height:1.6;white-space:pre-wrap}
.app-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:12px}
.auth-box{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;width:100%;max-width:400px;backdrop-filter:blur(10px)}
.admin-table{width:100%;border-collapse:collapse;font-size:12px}
.admin-table th,.admin-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,.05);text-align:left;word-break:break-word}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#0d0d1a;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.badge-limit{background:#f59e0b;color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:800;margin-left:6px}
.res-box{background:#111827;border:1px solid #334155;border-radius:8px;padding:12px;font-size:13px;white-space:pre-wrap;color:#e2e8f0;margin-bottom:10px}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:6px 12px;border-radius:50px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s}
.pill:hover{background:rgba(255,255,255,.1)}
.pill-on{background:rgba(56,189,248,.2) !important;border-color:rgba(56,189,248,.5) !important;color:#fff !important}
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:16px;gap:8px}
.tab{background:transparent;border:none;color:rgba(255,255,255,.5);padding:8px 12px;cursor:pointer;font-weight:700;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab-on{color:#38bdf8;border-bottom-color:#38bdf8}
.cpbtn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.ai-launcher-link { display:flex; align-items:center; justify-content:center; gap:6px; flex:1; padding:10px; border-radius:8px; text-decoration:none; font-size:12px; font-weight:800; color:#fff; background:rgba(255,255,255,.1); transition:all 0.2s; white-space:nowrap;}
.ai-launcher-link:hover { background:rgba(255,255,255,.2); transform:translateY(-2px);}
.post-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin-bottom:12px}
.post-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.06)}
.post-body{padding:12px 14px;max-height:400px;overflow-y:auto;font-size:13.5px;color:rgba(255,255,255,.85);white-space:pre-wrap;line-height:1.7}
@media(max-width:560px){
  .main-ttl{font-size:28px}
  .tool-grid{grid-template-columns:1fr}
  .admin-table th, .admin-table td { padding:8px 4px; font-size:11px; }
}
</style>
</head>

  { name: '📝 コンテンツ作成 ＆ リサーチ', tools: ['research', 'note', 'lp', 'backend'] },

    build: function(v,b) { return b+'「'+v.t1+'」について「'+v.t2+'」向けにnote有料記事を作成。\n価格/文字数:'+v.t3+'\n'+(v.chk?'最後に特典案内を含める\n':'')+'【厳守】前置きなしで以下のMarkdownのみ出力。\n---TITLES---\n1.タイトル案...\n---FREE_START---\n無料本文...\n---FREE_END---\n---PAID_START---\n有料本文...\n---PAID_END---'; }
  },

// ── ルート管理 (軽量版・イベント駆動) ──
function Root() {
  var [user, setUser] = useState(null); var [role, setRole] = useState(null); var [goAdmin, setGoAdmin] = useState(false); var [man, setMan] = useState(false);
  useEffect(function() {
    var s = localStorage.getItem(SESS_KEY);
    if (s) { s = JSON.parse(s); if (s.r === 'admin') { setUser(s.u); setRole('admin'); setGoAdmin(true); } else { var db = getDB(); if (db.users[s.u]) { setUser(s.u); setRole(db.users[s.u].status); } else localStorage.removeItem(SESS_KEY); } }
  }, []);
  function handleLogout() { localStorage.removeItem(SESS_KEY); setUser(null); setRole(null); setGoAdmin(false); }
  function checkStatus() { var s = JSON.parse(localStorage.getItem(SESS_KEY)||'{}'); if(s.u) { var db = getDB(); if(db.users[s.u]) setRole(db.users[s.u].status); } }

  if (!user) return h(AuthScreen, { onLogin: function(u, r) { setUser(u); setRole(r); if(r==='admin') setGoAdmin(true); } });
  if (role === 'admin' && goAdmin) return h(AdminDashboard, { onLogout: handleLogout, onGoApp: function(){setGoAdmin(false);} });
  if (role === 'pending' || role === 'rejected') return h('div',null, man?h(ManualModal,{onClose:function(){setMan(false)}}):null, h(PendingScreen, { rejected: role === 'rejected', onCheck: checkStatus, onLogout: handleLogout, onOpenManual: function(){setMan(true)} }) );
  if (role === 'approved' || (role === 'admin' && !goAdmin)) return h(MainApp, { user:user, role: role, onLogout: handleLogout, onGoAdmin: function(){setGoAdmin(true);} });
  return null;
}

var root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(Root,null));

})();
