    class ErrorBoundary extends Component {
      constructor(props) { 
        super(props); 
        this.state = { hasError: false, errorLog: '' }; 
      }
      static getDerivedStateFromError(error) { 
        return { hasError: true }; 
      }
      componentDidCatch(error, info) { 
        this.setState({ errorLog: error.toString() + "\n" + info.componentStack }); 
        console.error("システムエラー検知:", error); 
      }
      render() {
        if (this.state.hasError) {
          return div({ className: "min-h-screen flex items-center justify-center p-6" }, 
            div({ className: "glass-panel p-10 rounded-3xl text-center max-w-2xl w-full" }, 
              h2({ className: "text-3xl text-brand-danger mb-6 font-black" }, "⚠️ 描画エラーを検知しました"),

              div({ className: "bg-black/80 p-4 rounded-xl text-left overflow-auto text-xs text-red-400 mb-8 font-mono h-40" }, this.state.errorLog),
              button({ 
                onClick: () => { localStorage.clear(); window.location.reload(); }, 
                className: "btn-gradient py-4 px-8 rounded-xl font-bold text-white w-full text-lg shadow-lg" 
              }, "システムを初期化して再起動")
            )
          );
        }
        return this.props.children;
      }

      },
      journey: { 
        cat: 'fun', icon: '🗺️', name: 'カスタマージャーニー', desc: '認知から購入までのマップ', 
        fields: [
          { id: 'tgt', t: 'text', l: 'ターゲット' }, 
          { id: 'prod', t: 'text', l: '商品' }
        ], 
        build: (v) => `ターゲット「${v.tgt}」が商品「${v.prod}」を買うまでのカスタマージャーニーマップを作成せよ。` 
      },
      webdev: { 
        cat: 'fun', icon: '💻', name: 'Webアプリ開発支援', desc: 'アイデアからHTML構成を生成', 
        fields: [
          { id: 'idea', t: 'area', l: 'ツール案' }
        ], 
        build: (v) => `アイデア「${v.idea}」からWebツールの要件定義とコード構造を作成せよ。` 
      }
    };

    const CATEGORIES = [
      { id: 'omega', name: '🔥 オメガ特級ツール (お詫び機能含む)' },
      { id: 'mon', name: '📝 コンテンツ作成 ＆ 販売' },
      { id: 'cw', name: '💼 クラウドワークス完遂' },
      { id: 'sns', name: '🚀 SNSアカウント設計' },
      { id: 'fun', name: '💬 ファン化 ＆ 自動セールス' }
    ];

    /* =========================================================================
       4. UIコンポーネント (FormInput & DataViewer)
       ========================================================================= */
    const FormInput = ({ f, val, onChange, onMagic }) => {
      const value = val !== undefined ? val : (f.t === 'check' ? false : (f.opts ? f.opts[0] : ''));
      
      const header = div({ className: 'flex justify-between items-center mb-4' },
        span({ className: 'text-[11px] font-black text-slate-400 uppercase tracking-widest' }, f.l),
        (f.magic || f.isMainMagic) ? button({ 
          onClick: () => onMagic(f.id, !!f.isMainMagic), 
          className: 'bg-brand-accent/20 text-brand-accent px-4 py-1.5 text-[10px] rounded-full font-bold hover:bg-brand-accent/40 transition' 
        }, '✨ 魔法の杖') : null
      );

      let inputNode;
      if (f.t === 'text') {
        inputNode = input({ className: 'input-base', value: value, onChange: e => onChange(f.id, e.target.value) });
      } else if (f.t === 'area') {
        inputNode = textarea({ className: 'input-base min-h-[120px]', value: value, onChange: e => onChange(f.id, e.target.value) });
      } else if (f.t === 'select') {
        inputNode = select({ className: 'input-base', value: value, onChange: e => onChange(f.id, e.target.value) }, 
          f.opts.map(o => option({ key: o, value: o, className: 'bg-slate-900' }, o))
        );
      } else if (f.t === 'check') {
        inputNode = label({ className: 'flex items-center gap-3 cursor-pointer p-2' }, 
          input({ type: 'checkbox', className: 'w-5 h-5 accent-brand', checked: !!value, onChange: e => onChange(f.id, e.target.checked) }), 
          span({ className: 'text-sm font-bold text-white/80' }, '有効にする')
        );
      }

      return div({ className: 'glass-panel rounded-2xl p-6 mb-6 animate-in' }, header, inputNode);
    };

    const DataViewer = ({ data }) => {
      if (typeof data === 'string') {
        return pTag({ className: 'bg-black/40 border border-white/5 rounded-xl p-6 text-sm text-slate-200 whitespace-pre-wrap leading-relaxed' }, data);
      }
      if (Array.isArray(data)) {
        return div(null, data.map((item, i) => div({ key: i, className: 'mb-4 pb-4 border-b border-white/5' }, el(DataViewer, { data: item }))));
      }
      if (typeof data === 'object' && data !== null) {
        return div(null, Object.keys(data).map(k => div({ key: k, className: 'mb-4' }, 
          span({ className: 'block text-brand-light text-[10px] font-black uppercase mb-1' }, k), 
          el(DataViewer, { data: data[k] })
        )));
      }
      return span(null, String(data));
    };

    /* =========================================================================
       5. ツールエンジン (ToolCore)
       ========================================================================= */
    const ToolCore = ({ tid, user, role, onBack }) => {
      const conf = TOOLS[tid];
      const [db, setDb] = useState(AppDB.get());
      const uData = db.users[user];
      const pid = uData.curProj;
      const [vals, setVals] = useState(uData.projects[pid].data[tid] || {});
      const [activeTab, setActiveTab] = useState('settings');
      const [copied, setCopied] = useState(false);
      const [imp, setImp] = useState('');
      const [res, setRes] = useState(null);

      const update = (fid, v) => {
        const nv = { ...vals, [fid]: v }; 
        setVals(nv);
        if (role !== 'admin') { 
          const ndb = AppDB.get(); 
          ndb.users[user].projects[pid].data[tid] = nv; 
          AppDB.save(ndb); 
        }
      };

      const handleMagic = (fid, isMain) => {
        if (isMain) {
          if (tid === 'note') { 
            setVals({ ...vals, theme: "スマホ1台で月5万稼ぐ極意", target_detail: "スキルがない20代", benefit: "自由な時間", authority: "月収30万のマーケター", price: "2,980", free_vol: "1500", paid_vol: "4000", guarantee: true }); 
          } else if (tid === 'campaign') { 
            setVals({ ...vals, prod: "AIコンテンツマスター", tgt: "時間がない会社員", val: "1日15分で収益化" }); 
          } else if (tid === 'cw_proposal') { 
            setVals({ ...vals, skill: "AIを熟知し、高品質かつ迅速に納品可能です。" }); 
          } else if (tid === 'lp') { 
            setVals({ ...vals, prod: "完全個別指導プログラム", bene: "心に余裕が生まれ、自信が持てる" }); 
          }
        } else {
          const f = conf.fields.find(x => x.id === fid); 
          if (f && f.magic) update(fid, f.magic);
        }
      };

      const onGenerate = () => {
        const prompt = "【AIへの指示】\n" + conf.build(vals) + (conf.noJson ? "" : "\n\n【ルール】指定フォーマットのみ出力。");
        if (navigator.clipboard) navigator.clipboard.writeText(prompt).catch(()=>{});
        setCopied(true); 
        setTimeout(() => setCopied(false), 2000);
        if (!conf.isOnePage) setActiveTab('import');
      };

      const onImport = () => {
        if (conf.noJson) { 
          setRes(imp); 
          setActiveTab('preview'); 
          return; 
        }
        try {
           const clean = imp.replace(/           const match = clean.match(/\{[\s\S]*\}/);
           setRes(JSON.parse(match ? match[0] : clean)); 
           setActiveTab('preview'); 
           setImp('');
        } catch (e) { 
           alert("JSONとして解析できませんでした。回答をそのまま貼り付けてください。"); 
        }
      };

      const header = div({ className: 'flex items-center gap-4 mb-8 pb-4 border-b border-white/10 animate-in' }, 
        button({ onClick: onBack, className: 'glass-panel px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-white/10 transition' }, '← BACK'), 
        div(null, 
          h2({ className: 'text-2xl font-black text-white' }, conf.name), 
          pTag({ className: 'text-[10px] text-brand font-bold uppercase mt-1' }, conf.desc)
        )
      );

      if (conf.isOnePage) {
        return div({ className: 'w-full max-w-4xl mx-auto pb-20 px-4' }, 
          header,
          conf.fields.map(f => el(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic })),
          button({ onClick: onGenerate, className: 'w-full py-5 rounded-2xl btn-gradient text-white font-black text-lg mb-10 shadow-xl' }, copied ? '✓ コピー完了' : '📋 生成 ＆ コピー'),
          div({ className: 'glass-panel p-8 rounded-3xl animate-in' }, 
            span({ className: 'block text-xs font-bold text-slate-400 mb-4' }, '📥 回答を保存'), 
            textarea({ className: 'input-base min-h-[300px]', value: res || '', onChange: e => setRes(e.target.value) })
          )
        );
      }

      return div({ className: 'w-full max-w-4xl mx-auto pb-20 px-4' }, 
        header,
        div({ className: 'flex mb-8 border-b border-white/5 gap-2 overflow-x-auto hide-scrollbar' }, 
          [{id:'settings', l:'⚙️ 設定'}, {id:'import', l:'📥 読込'}, {id:'preview', l:'👁 結果'}].map(t => 
            button({ key: t.id, onClick: () => setActiveTab(t.id), className: 'px-8 py-4 font-black transition-all ' + (activeTab===t.id ? 'text-brand border-b-2 border-brand' : 'text-slate-500 hover:text-slate-300') }, t.l)
          )
        ),
        activeTab === 'settings' && div({ className: 'animate-in' }, 
          conf.fields.map(f => el(FormInput, { key: f.id, f, val: vals[f.id], onChange: update, onMagic: handleMagic })), 
          button({ onClick: onGenerate, className: 'w-full py-5 rounded-2xl btn-gradient text-white font-black text-lg shadow-xl' }, copied ? '✓ コピー完了' : '📋 生成 ＆ コピー')
        ),
        activeTab === 'import' && div({ className: 'glass-panel p-10 rounded-3xl animate-in' }, 
          textarea({ className: 'input-base min-h-[250px]', value: imp, onChange: e => setImp(e.target.value), placeholder: 'AIの回答を貼り付け' }), 
          button({ onClick: onImport, className: 'w-full bg-brand py-4 rounded-xl font-bold mt-6 text-white' }, '解析を実行')
        ),
        activeTab === 'preview' && res && div({ className: 'glass-panel p-10 rounded-3xl animate-in' }, 
          el(DataViewer, { data: res })
        )
      );
    };

    /* =========================================================================
       6. 管理者ダッシュボード (AdminDash) - ログイン画面直下に配置
       ========================================================================= */
    const AdminDash = ({ onGoApp, onLogout }) => {
      const [db, setDb] = useState(AppDB.get());
      const [tab, setTab] = useState('tools');
      
      const setVisible = (tid) => { 
        const n = AppDB.get(); 
        n.config.toolVisibility[tid] = !n.config.toolVisibility[tid]; 
        AppDB.save(n); 
        setDb(n); 
      };

      return div({ className: 'w-full max-w-5xl mx-auto animate-in px-4 mt-8 pb-20' },
        div({ className: 'glass-panel rounded-3xl p-8 border-t-4 border-brand-accent' },
          div({ className: 'flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4' }, 
            h2({ className: 'text-2xl font-black text-brand-accent' }, '🎛️ ADMIN PORTAL'), 
            div({ className: 'flex gap-3' }, 
              button({ onClick: onGoApp, className: 'bg-brand px-6 py-2 rounded-full font-bold text-sm text-white' }, 'ツールへ'), 
              button({ onClick: onLogout, className: 'bg-white/10 px-6 py-2 rounded-full font-bold text-sm text-white/70 hover:text-white' }, 'ログアウト')
            )
          ),
          
          div({ className: 'flex gap-4 border-b border-white/10 mb-8 pb-2' }, 
            button({ onClick: () => setTab('tools'), className: 'font-bold px-2 py-1 ' + (tab==='tools' ? 'text-brand-accent border-b-2 border-brand-accent' : 'text-slate-500') }, '🛠 ツール表示設定'), 
            button({ onClick: () => setTab('sys'), className: 'font-bold px-2 py-1 ' + (tab==='sys' ? 'text-brand-accent border-b-2 border-brand-accent' : 'text-slate-500') }, '⚙️ システム情報')
          ),
          
          tab === 'tools' && div({ className: 'animate-in' }, 
            pTag({ className: 'text-sm text-brand-accent font-bold mb-6' }, '⚠️ チェックを外すとユーザー画面からツールが消えます。'),
            div({ className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4' }, 
              Object.keys(TOOLS).map(tid => label({ key: tid, className: 'flex justify-between items-center bg-white/5 p-4 rounded-xl cursor-pointer hover:bg-white/10 transition' }, 
                div({ className: 'flex gap-3 items-center' }, 
                  span({ className: 'text-xl' }, TOOLS[tid].icon), 
                  span({ className: 'text-sm font-bold text-white' }, TOOLS[tid].name)
                ), 
                input({ type: 'checkbox', className: 'w-5 h-5 accent-brand-accent', checked: db.config.toolVisibility[tid] !== false, onChange: () => setVisible(tid) })
              ))
            )
          ),
          
          tab === 'sys' && div({ className: 'animate-in p-6 bg-black/30 rounded-xl' },
            pTag({ className: 'text-slate-400 text-sm font-mono' }, 'System Database: ' + DB_KEY),
            pTag({ className: 'text-brand-gold text-sm font-bold mt-2' }, 'Current Version: ' + SYSTEM_VERSION)
          )
        )
      );
    };

    /* =========================================================================
       7. メインダッシュボード (ユーザー画面)
       ========================================================================= */
    const MainApp = ({ user, role, onLogout }) => {
      const [screen, setScreen] = useState('home');
      const db = AppDB.get();

      if (TOOLS[screen]) {
        return el(ToolCore, { tid: screen, user, role, onBack: () => setScreen('home') });
      }

      return div({ className: 'w-full animate-in pb-20' },
        div({ className: 'fixed top-4 right-4 z-50 flex gap-3' }, 
          button({ onClick: onLogout, className: 'glass-panel px-6 py-2.5 rounded-full text-xs font-bold text-slate-300 hover:text-white transition' }, 'LOGOUT')
        ),
        
        div({ className: 'text-center mt-20 mb-24 px-4' }, 
          h1({ className: 'text-5xl md:text-7xl font-black text-white mb-6 tracking-tighter' }, 'Content ', span({ className: 'text-brand' }, 'Master')), 
          pTag({ className: 'text-slate-400 text-sm md:text-base max-w-xl mx-auto leading-relaxed' }, 'クラウドワークスから独自のコンテンツ販売まで。全32種のAIツールがあなたのビジネスを完全自動化します。')
        ),
        
        CATEGORIES.map(cat => {
          const visible = Object.keys(TOOLS).filter(tid => TOOLS[tid].cat === cat.id && db.config.toolVisibility[tid] !== false);
          if (visible.length === 0) return null;
          
          return div({ key: cat.id, className: 'mb-20 max-w-6xl mx-auto px-4' },
            h2({ className: 'text-xl font-black text-white mb-8 border-l-4 border-brand pl-4' }, cat.name),
            div({ className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6' }, 
              visible.map(tid => 
                div({ 
                  key: tid, 
                  onClick: () => setScreen(tid), 
                  className: 'glass-panel rounded-[2rem] p-8 cursor-pointer hover:-translate-y-2 hover:border-brand/50 transition duration-300 group' 
                }, 
                  div({ className: 'flex justify-between items-center mb-6' }, 
                    span({ className: 'text-4xl group-hover:scale-110 transition' }, TOOLS[tid].icon), 
                    TOOLS[tid].badge ? span({ className: 'bg-brand/20 text-brand px-3 py-1 rounded-lg text-[10px] font-bold' }, TOOLS[tid].badge) : null
                  ), 
                  h3({ className: 'text-lg font-bold text-white mb-2 group-hover:text-brand-light transition' }, TOOLS[tid].name), 
                  pTag({ className: 'text-xs text-slate-400 leading-relaxed' }, TOOLS[tid].desc)
                )
              )
            )
          );
        })
      );
    };

    /* =========================================================================
       8. ログイン画面 ＆ Root (AuthView)
       ========================================================================= */
    const AuthView = ({ onLogin }) => {
      const [u, setU] = useState(''); 
      const [pStr, setP] = useState('');
      const [err, setErr] = useState(''); 
      const [isAdminLogged, setIsAdminLogged] = useState(false);
      const [isL, setIsL] = useState(true);

      const login = () => {
        setErr(''); 
        const name = u.trim();
        if (!name) return setErr('ユーザー名を入力してください');
        
        const db = AppDB.get();
        
        // 管理者ログイン判定
        if (name === db.config.adminU) {
          if (pStr === db.config.adminP) {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: name, r: 'admin' }));
            setIsAdminLogged(true); 
            onLogin(name, 'admin', true);
          } else {
            setErr('パスワードが違います');
          }
          return;
        }
        
        // 一般ユーザー判定
        if (isL) {
          if (db.users[name]) {
            localStorage.setItem(SESS_KEY, JSON.stringify({ u: name, r: db.users[name].status })); 
            onLogin(name, db.users[name].status, false);
          } else {
            setErr('未登録です。新規申請してください。');
          }
        } else {
          if (db.users[name]) {
            setErr('既に登録されています。');
            return;
          }
          db.users[name] = { 
            status: 'pending', registeredAt: Date.now(), usage: { count: 0, date: '' }, 
            perms: {}, projects: { 'default': { name: 'デフォルト', data: {} } }, 
            curProj: 'default', brand: { plan: 'free', name: '' } 
          };
          AppDB.save(db); 
          alert('申請が完了しました。');
          setIsL(true);
        }
      };

      // 管理者ログイン成功時は、ログイン箱を消してダッシュボードを展開
      if (isAdminLogged) {
        return div(null, 
          div({ className: 'text-center mt-6' }, 
            button({ onClick: () => { localStorage.removeItem(SESS_KEY); setIsAdminLogged(false); onLogin(null, null, false); }, className: 'text-slate-500 text-sm underline hover:text-white transition' }, 'ログアウトしてログイン画面に戻る')
          ), 
          el(AdminDash, { 
            onGoApp: () => { setIsAdminLogged(false); onLogin(u, 'admin', false); }, 
            onLogout: () => { localStorage.removeItem(SESS_KEY); setIsAdminLogged(false); onLogin(null, null, false); } 
          })
        );
      }

      // 未ログイン時の画面
      return div({ className: 'w-full pb-20' },
        div({ className: 'max-w-sm mx-auto mt-24 px-4 animate-in' },
          div({ className: 'glass-panel rounded-[2.5rem] p-10 text-center shadow-2xl relative overflow-hidden' },
            h2({ className: 'text-3xl font-black mb-8 text-white relative z-10' }, 'AI Content Pro'),
            
            div({ className: 'flex bg-black/40 p-1.5 rounded-xl mb-8 relative z-10' },
              button({ onClick: () => { setIsL(true); setErr(''); }, className: 'flex-1 py-3 rounded-lg text-sm font-bold transition ' + (isL ? 'bg-brand text-white shadow-md' : 'text-white/50 hover:text-white/80') }, 'ログイン'),
              button({ onClick: () => { setIsL(false); setErr(''); }, className: 'flex-1 py-3 rounded-lg text-sm font-bold transition ' + (!isL ? 'bg-brand text-white shadow-md' : 'text-white/50 hover:text-white/80') }, '新規申請')
            ),

            div({ className: 'space-y-5 relative z-10' },
              input({ className: 'input-base text-center', placeholder: 'USER NAME', value: u, onChange: e => setU(e.target.value) }),
              input({ className: 'input-base text-center', type: 'password', placeholder: 'PASSWORD', value: pStr, onChange: e => setP(e.target.value) }),
              err ? pTag({ className: 'text-brand-danger text-xs font-bold bg-brand-danger/10 p-2 rounded' }, '❌ ' + err) : null,
              button({ onClick: login, className: 'w-full btn-gradient py-4 rounded-xl text-white font-bold text-lg mt-4' }, isL ? 'LOGIN' : 'APPLY')
            )
          )
        )
      );
    };

    /* =========================================================================
       9. Root コンポーネント (アプリ全体のエントリーポイント)
       ========================================================================= */
    const App = () => {
      const [auth, setAuth] = useState({ u: null, r: null, keepAdmin: false });
      
      useEffect(() => { 
        const session = localStorage.getItem(SESS_KEY); 
        if (session) { 
          const p = JSON.parse(session); 
          setAuth({ u: p.u, r: p.r, keepAdmin: false }); 
        } 
      }, []);
      
      const onLogout = () => { 
        localStorage.removeItem(SESS_KEY); 
        setAuth({ u: null, r: null, keepAdmin: false }); 
      };

      if (!auth.u || auth.keepAdmin) {
        return el(AuthView, { onLogin: (u, r, k) => setAuth({ u, r, keepAdmin: k }) });
      }
      
      if (auth.r === 'pending' || auth.r === 'rejected') {
        return div({ className: "min-h-screen flex items-center justify-center p-4" }, 
          div({ className: "glass-panel p-10 rounded-3xl text-center w-full max-w-md" }, 
            h2({ className: "text-2xl text-white mb-6 font-bold" }, auth.r === 'rejected' ? '🚫 アクセス拒否' : '⏳ 承認待ち'), 
            pTag({ className: "text-slate-400 text-sm mb-8" }, "管理者の許可をお待ちください。"),
            button({ onClick: onLogout, className: "text-slate-500 hover:text-white underline text-sm transition" }, 'ログアウト')
          )
        );
      }
      
      return el(MainApp, { user: auth.u, role: auth.r, onLogout });
    };

    // Reactのマウントとエラーバウンダリの適用
    const rootContainer = document.getElementById('root');
    const root = ReactDOM.createRoot(rootContainer);
    root.render(el(ErrorBoundary, null, el(App)));

  })();
  </script>
</body>
</html>
